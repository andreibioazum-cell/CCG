name: Roblox_Java_Ultimate_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Full Project Structure
        run: |
          mkdir -p app/src/main/java/com/dimos/roblox
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Стили интерфейса (Цвета из style-core.css)
          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#0d1528</color>
              <color name="accent_green">#22c55e</color>
              <color name="ui_glass">#CC000000</color>
              <color name="white">#FFFFFF</color>
          </resources>
          EOF

          # 2. Разметка Меню и Игрового UI
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_dark">
              
              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />

              <LinearLayout
                  android:id="@+id/menu_screen"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:background="@color/bg_dark"
                  android:gravity="center"
                  android:orientation="vertical"
                  android:visibility="visible">
                  
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="ROBLOX MOBILE"
                      android:textColor="@color/accent_green"
                      android:textSize="32sp"
                      android:textStyle="bold"
                      android:layout_marginBottom="50dp"/>

                  <Button android:id="@+id/btn_play" android:layout_width="250dp" android:layout_height="60dp" android:text="ИГРАТЬ" android:backgroundTint="@color/accent_green" android:textColor="@android:color/black"/>
                  <Button android:id="@+id/btn_studio" android:layout_width="250dp" android:layout_height="60dp" android:text="СТУДИЯ" android:layout_marginTop="15dp"/>
              </LinearLayout>

              <RelativeLayout
                  android:id="@+id/game_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">
                  
                  <Button android:id="@+id/btn_exit" android:layout_width="50dp" android:layout_height="50dp" android:text="✕" android:layout_margin="20dp"/>

                  <LinearLayout
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_alignParentBottom="true"
                      android:layout_centerHorizontal="true"
                      android:layout_marginBottom="20dp"
                      android:background="@color/ui_glass"
                      android:padding="10dp">
                      
                      <ImageButton android:id="@+id/tool_build" android:layout_width="60dp" android:layout_height="60dp" android:src="@android:drawable/ic_menu_add" android:contentDescription="Build"/>
                      <ImageButton android:id="@+id/tool_erase" android:layout_width="60dp" android:layout_height="60dp" android:src="@android:drawable/ic_menu_delete" android:layout_marginLeft="15dp" android:contentDescription="Erase"/>
                  </LinearLayout>
              </RelativeLayout>
          </FrameLayout>
          EOF

          # 3. Логика приложения (MainActivity.java)
          cat <<EOF > app/src/main/java/com/dimos/roblox/MainActivity.java
          package com.dimos.roblox;
          import android.app.Activity;
          import android.opengl.GLSurfaceView;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private boolean isEraserMode = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  View menu = findViewById(R.id.menu_screen);
                  View ui = findViewById(R.id.game_ui);

                  findViewById(R.id.btn_play).setOnClickListener(v -> {
                      menu.setVisibility(View.GONE);
                      ui.setVisibility(View.VISIBLE);
                  });

                  findViewById(R.id.btn_studio).setOnClickListener(v -> {
                      menu.setVisibility(View.GONE);
                      ui.setVisibility(View.VISIBLE);
                      Toast.makeText(this, "Режим редактирования", Toast.LENGTH_SHORT).show();
                  });

                  findViewById(R.id.btn_exit).setOnClickListener(v -> {
                      ui.setVisibility(View.GONE);
                      menu.setVisibility(View.VISIBLE);
                  });

                  findViewById(R.id.tool_erase).setOnClickListener(v -> {
                      isEraserMode = true;
                      Toast.makeText(this, "Ластик активен", Toast.LENGTH_SHORT).show();
                  });

                  findViewById(R.id.tool_build).setOnClickListener(v -> {
                      isEraserMode = false;
                      Toast.makeText(this, "Режим постройки", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          # 4. Gradle & Manifest
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos.roblox'
              compileSdk 34
              defaultConfig { applicationId "com.dimos.roblox"; minSdk 24; targetSdk 34; versionCode 3; versionName "3.0" }
          }
          dependencies {
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

      - name: Build Production APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Roblox_Final_NoOnline
          path: app/build/outputs/apk/debug/app-debug.apk
