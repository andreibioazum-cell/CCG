name: Fabric_Mod_Surgery_Restoration_V48
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Initialize Project Structure
        run: |
          mkdir -p src/main/java/com/dimos/mod/
          mkdir -p src/main/java/com/dimos/mod/item
          mkdir -p src/main/resources/assets/dimos/lang
          mkdir -p src/main/resources/assets/dimos/models/item
          mkdir -p src/main/resources/data/dimos/recipes

          # 1. Build.gradle (1.21.1)
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          version = '4.8.0'
          group = 'com.dimos.mod'
          repositories { mavenCentral(); maven { url = 'https://maven.fabricmc.net/' } }
          dependencies {
              minecraft 'com.mojang:minecraft:1.21.1'
              mappings 'net.fabricmc:yarn:1.21.1+build.3:v2'
              modImplementation 'net.fabricmc:fabric-loader:0.16.9'
              modImplementation 'net.fabricmc.fabric-api:fabric-api:0.102.1+1.21.1'
          }
          EOF

          # 2. ScalpelItem.java (ВОССТАНОВЛЕНО: ПКМ на себе)
          cat <<EOF > src/main/java/com/dimos/mod/item/ScalpelItem.java
          package com.dimos.mod.item;
          import com.dimos.mod.DimMod;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.util.Hand;
          import net.minecraft.util.TypedActionResult;
          import net.minecraft.world.World;

          public class ScalpelItem extends Item {
              public ScalpelItem(Settings settings) { super(settings); }
              @Override
              public TypedActionResult<ItemStack> use(World world, PlayerEntity user, Hand hand) {
                  if (!world.isClient && user.isSneaking()) {
                      DimMod.openMenu((ServerPlayerEntity)user, user);
                      return TypedActionResult.success(user.getStackInHand(hand));
                  }
                  return TypedActionResult.pass(user.getStackInHand(hand));
              }
          }
          EOF

          # 3. DimItems.java (Регистрация в креативе)
          cat <<EOF > src/main/java/com/dimos/mod/DimItems.java
          package com.dimos.mod;
          import com.dimos.mod.item.ScalpelItem;
          import net.fabricmc.fabric.api.itemgroup.v1.ItemGroupEvents;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemGroups;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.util.Identifier;

          public class DimItems {
              public static final Item SCALPEL = new ScalpelItem(new Item.Settings().maxCount(1));
              public static final Item BONE_TOOL = new Item(new Item.Settings().maxCount(1));
              public static final Item HEART = new Item(new Item.Settings());
              public static final Item MUSCLE = new Item(new Item.Settings());
              public static final Item BONE = new Item(new Item.Settings().maxDamage(80));
              public static final Item DRAGON_LUNGS = new Item(new Item.Settings().maxCount(1));
              public static final Item WOOD_PROSTHESIS = new Item(new Item.Settings().maxDamage(40));
              public static final Item STEEL_PROSTHESIS = new Item(new Item.Settings().maxDamage(500));
              public static final Item NETHERITE_PROSTHESIS = new Item(new Item.Settings());

              public static void register() {
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "scalpel"), SCALPEL);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "bone_tool"), BONE_TOOL);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "heart"), HEART);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "muscle"), MUSCLE);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "bone"), BONE);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "dragon_lungs"), DRAGON_LUNGS);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "wood_prosthesis"), WOOD_PROSTHESIS);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "steel_prosthesis"), STEEL_PROSTHESIS);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "netherite_prosthesis"), NETHERITE_PROSTHESIS);

                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.INGREDIENTS).register(content -> {
                      content.add(HEART); content.add(MUSCLE); content.add(BONE);
                      content.add(DRAGON_LUNGS); content.add(WOOD_PROSTHESIS);
                      content.add(STEEL_PROSTHESIS); content.add(NETHERITE_PROSTHESIS);
                  });
                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.COMBAT).register(content -> {
                      content.add(SCALPEL); content.add(BONE_TOOL);
                  });
              }
          }
          EOF

          # 4. DimMod.java (Глобальные ивенты инвалидности V46)
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.entity.event.v1.ServerLivingEntityEvents;
          import net.fabricmc.fabric.api.event.player.AttackEntityCallback;
          import net.fabricmc.fabric.api.event.player.UseEntityCallback;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.damage.DamageTypes;
          import net.minecraft.entity.effect.StatusEffectInstance;
          import net.minecraft.entity.effect.StatusEffects;
          import net.minecraft.inventory.SimpleInventory;
          import net.minecraft.item.ItemStack;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.text.Text;
          import net.minecraft.util.ActionResult;
          import java.util.HashMap;
          import java.util.UUID;

          public class DimMod implements ModInitializer {
              public static final HashMap<UUID, SimpleInventory> cavities = new HashMap<>();

              @Override
              public void onInitialize() {
                  DimItems.register();

                  // ПКМ на других
                  UseEntityCallback.EVENT.register((player, world, hand, entity, hit) -> {
                      if (!world.isClient && player.isSneaking() && entity instanceof LivingEntity target) {
                          if (player.getStackInHand(hand).isOf(DimItems.SCALPEL)) {
                              openMenu((ServerPlayerEntity)player, target);
                              return ActionResult.SUCCESS;
                          }
                      }
                      return ActionResult.PASS;
                  });

                  ServerLivingEntityEvents.ALLOW_DAMAGE.register((entity, source, amount) -> {
                      if (entity instanceof ServerPlayerEntity player && source.isOf(DamageTypes.FALL)) damageZone(player, 18, 26, (int)amount * 4);
                      return true;
                  });

                  AttackEntityCallback.EVENT.register((player, world, hand, entity, hit) -> {
                      if (!world.isClient && player instanceof ServerPlayerEntity sPlayer) damageZone(sPlayer, 0, 8, 1);
                      return ActionResult.PASS;
                  });

                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity p : server.getPlayerManager().getPlayerList()) checkVitals(p);
                  });
              }

              public static void openMenu(ServerPlayerEntity surgeon, LivingEntity target) {
                  SimpleInventory inv = cavities.computeIfAbsent(target.getUuid(), k -> new SimpleInventory(27));
                  surgeon.openHandledScreen(new net.minecraft.screen.SimpleNamedScreenHandlerFactory((id, pInv, p) -> 
                      new net.minecraft.screen.GenericContainerScreenHandler(net.minecraft.screen.ScreenHandlerType.GENERIC_9X3, id, pInv, inv, 3), 
                      Text.literal("Организм: " + target.getName().getString())));
              }

              private void damageZone(ServerPlayerEntity player, int start, int end, int amount) {
                  SimpleInventory inv = cavities.get(player.getUuid());
                  if (inv == null) return;
                  for (int i = start; i <= end; i++) {
                      ItemStack s = inv.getStack(i);
                      if (!s.isEmpty() && s.isDamageable()) {
                          s.setDamage(s.getDamage() + amount);
                          if (s.getDamage() >= s.getMaxDamage()) s.setCount(0);
                      }
                  }
              }

              private void checkVitals(ServerPlayerEntity player) {
                  SimpleInventory inv = cavities.get(player.getUuid());
                  if (inv == null) return;
                  boolean canWalk = false;
                  for (int i = 18; i < 27; i++) if (!inv.getStack(i).isEmpty()) canWalk = true;
                  if (!canWalk) player.addStatusEffect(new StatusEffectInstance(StatusEffects.SLOWNESS, 40, 254, false, false));
              }
          }
          EOF

          # 5. Модели для предметов-заглушек (V48 Fix Texture)
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/tripwire_hook"}}' > src/main/resources/assets/dimos/models/item/bone_tool.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/iron_shovel"}}' > src/main/resources/assets/dimos/models/item/scalpel.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/melon_slice"}}' > src/main/resources/assets/dimos/models/item/heart.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/bone"}}' > src/main/resources/assets/dimos/models/item/bone.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/leather"}}' > src/main/resources/assets/dimos/models/item/muscle.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/firework_rocket"}}' > src/main/resources/assets/dimos/models/item/wood_prosthesis.json

          # 6. Рецепт Костоправа
          cat <<EOF > src/main/resources/data/dimos/recipes/bone_tool.json
          {
            "type": "minecraft:crafting_shaped",
            "pattern": [ " I ", " B ", " B " ],
            "key": { "I": { "item": "minecraft:iron_ingot" }, "B": { "item": "minecraft:bone" } },
            "result": { "item": "dimos:bone_tool", "count": 1 }
          }
          EOF

          # 7. Локализация и конфиг
          echo '{"item.dimos.bone_tool":"Костоправ","item.dimos.heart":"Сердце","item.dimos.wood_prosthesis":"Деревянный протез","item.dimos.bone":"Кость"}' > src/main/resources/assets/dimos/lang/ru_ru.json
          echo '{"schemaVersion":1,"id":"dimos","version":"4.8.0","entrypoints":{"main":["com.dimos.mod.DimMod"]},"depends":{"fabricloader":">=0.16.0","minecraft":"1.21.1"}}' > src/main/resources/fabric.mod.json
          echo "pluginManagement { repositories { maven { url = 'https://maven.fabricmc.net/' }; mavenCentral() } }; rootProject.name = 'dimos-surgery'" > settings.gradle

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: Surgery-Disability-V48
          path: build/libs/*.jar
