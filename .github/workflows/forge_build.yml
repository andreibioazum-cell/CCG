                    "shortId": "50",
                    "fingerprint": "qq"
                  }
                }
              },
              {
                "tag": "proxy-2",
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": "test.bold-crown.test-cdn-kkk.com",
                      "port": 1443,
                      "users": [
                        {
                          "id": "d8094751-0c2e-4ba3-ac2c-16d95c6fc707",
                          "encryption": "none",
                          "flow": ""
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "grpc",
                  "grpcSettings": {
                    "serviceName": "de.eu-ffast.com"
                  },
                  "security": "reality",
                  "realitySettings": {
