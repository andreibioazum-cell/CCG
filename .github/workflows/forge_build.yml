name: KUSMAN_FORGE_FIXED
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Generate Forge Project
        run: |
          mkdir -p src/main/java/com/kusman src/main/resources/META-INF
          
          # Настройка сборки Forge
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { maven { url = 'https://maven.minecraftforge.net' } }
              dependencies { classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '6.0.+', changing: true }
          }
          apply plugin: 'net.minecraftforge.gradle'

          group = 'com.kusman'
          version = '1.0'

          minecraft {
              mappings channel: 'official', version: '1.20.1'
              runs { client { workingDirectory project.file('run') } }
          }

          dependencies {
              minecraft 'net.minecraftforge:forge:1.20.1-47.2.0'
          }
          EOF

          # Инфо о моде
          cat <<'EOF' > src/main/resources/META-INF/mods.toml
          modLoader="javafml"
          loaderVersion="[47,)"
          license="MIT"
          [[mods]]
          modId="kusman"
          version="1.0"
          displayName="Kusman Forge"
          EOF

          # Код мода с обработкой "ggg"
          cat <<'EOF' > src/main/java/com/kusman/KusmanMod.java
          package com.kusman;

          import net.minecraft.client.Minecraft;
          import net.minecraft.network.chat.Component;
          import net.minecraftforge.common.MinecraftForge;
          import net.minecraftforge.event.TickEvent;
          import net.minecraftforge.client.event.ClientChatEvent;
          import net.minecraftforge.eventbus.api.SubscribeEvent;
          import net.minecraftforge.fml.common.Mod;

          @Mod("kusman")
          public class KusmanMod {
              public static boolean fly = false;

              public KusmanMod() {
                  MinecraftForge.EVENT_BUS.register(this);
              }

              @SubscribeEvent
              public void onChat(ClientChatEvent event) {
                  String msg = event.getMessage();
                  if (msg.trim().equalsIgnoreCase("ggg")) {
                      fly = !fly;
                      if (Minecraft.getInstance().player != null) {
                        Minecraft.getInstance().player.displayClientMessage(Component.literal("§6[K] §fFly: " + (fly ? "§aON" : "§cOFF")), false);
                      }
                      event.setCanceled(true);
                  }
              }

              @SubscribeEvent
              public void onTick(TickEvent.ClientTickEvent event) {
                  Minecraft mc = Minecraft.getInstance();
                  if (mc.player != null && event.phase == TickEvent.Phase.END) {
                      if (fly) {
                          mc.player.getAbilities().flying = true;
                      } else if (!mc.player.isCreative()) {
                          mc.player.getAbilities().flying = false;
                      }
                  }
              }
          }
          EOF

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: Build with Forge
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-Forge-JAR
          path: build/libs/*.jar
