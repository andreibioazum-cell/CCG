name: Roblox_V26_Fix_UI_Spawn
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/dimos/roblox
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
          </style></resources>
          EOF

          # --- НОВЫЕ ЦВЕТА ДЖОЙСТИКА ---
          cat <<EOF > app/src/main/res/drawable/joy_base_black.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#CC000000"/> <stroke android:width="2dp" android:color="#FF555555"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick_grey.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#FF444444"/> </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_menu_round.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="15dp"/><solid android:color="#EE111111"/><stroke android:width="1dp" android:color="#00FFFF"/>
          </shape>
          EOF

          # --- Layout ---
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent" />
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_alignParentTop="true" android:layout_centerHorizontal="true" android:layout_marginTop="10dp">
                      <Button android:id="@+id/btn_reset" android:layout_width="80dp" android:layout_height="40dp"
                          android:text="SPAWN" android:textSize="10sp" android:layout_marginRight="10dp"
                          android:background="@drawable/btn_menu_round" android:textColor="#0FF"/>
                      <Button android:id="@+id/btn_settings" android:layout_width="80dp" android:layout_height="40dp"
                          android:text="RTX SET" android:textSize="10sp"
                          android:background="@drawable/btn_menu_round" android:textColor="#0FF"/>
                  </LinearLayout>
                  
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="120dp" android:layout_height="120dp"
                      android:layout_alignParentBottom="true" android:layout_marginLeft="40dp" android:layout_marginBottom="40dp"
                      android:background="@drawable/joy_base_black" />
                  <View android:id="@+id/joy_stick" android:layout_width="50dp" android:layout_height="50dp"
                      android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="35dp" android:layout_marginTop="35dp"
                      android:background="@drawable/joy_stick_grey" />
                      
                  <Button android:id="@+id/btn_jump" android:layout_width="90dp" android:layout_height="90dp"
                      android:layout_alignParentRight="true" android:layout_alignParentBottom="true"
                      android:layout_margin="40dp" android:text="JUMP" android:background="@drawable/joy_base_black" android:textColor="#FFF"/>
              </RelativeLayout>
          </FrameLayout>
          EOF

          # --- Renderer (Фикс Спавна и Слоев) ---
          cat <<EOF > app/src/main/java/com/dimos/roblox/GameRenderer.java
          package com.dimos.roblox;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] mvp=new float[16], proj=new float[16], view=new float[16], model=new float[16];
              // ИСПРАВЛЕННЫЙ СПАВН: pY = 2.5f (на земле)
              public float pX=0, pY=2.5f, pZ=10, rY=0, rX=0, jX=0, jY=0, vY=0;
              public int gfxMode = 0; 
              private int prog;
              private FloatBuffer vBuf;

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  GLES30.glEnable(GLES30.GL_BLEND);
                  GLES30.glBlendFunc(GLES30.GL_SRC_ALPHA, GLES30.GL_ONE_MINUS_SRC_ALPHA);
                  String vs="#version 300 es\nin vec4 aP; uniform mat4 uM; void main(){gl_Position=uM*aP;}";
                  String fs="#version 300 es\nprecision mediump float; uniform vec4 uC; uniform float alpha; out vec4 fC; void main(){fC=vec4(uC.rgb, alpha);}";
                  prog=shP(vs, fs);
                  float[] vc = {-0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f};
                  vBuf=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBuf.position(0);
              }

              @Override public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,45,(float)w/h,0.1f,300f);
              }

              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClearColor(0.5f, 0.7f, 0.9f, 1.0f);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float vy=(float)Math.sin(Math.toRadians(rX));
                  float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  Matrix.setLookAtM(view,0,pX,pY,pZ,pX+vx,pY+vy,pZ+vz,0,1,0);
                  GLES30.glUseProgram(prog);
                  int uM=GLES30.glGetUniformLocation(prog,"uM"), uC=GLES30.glGetUniformLocation(prog,"uC"), uA=GLES30.glGetUniformLocation(prog,"alpha");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);

                  // Пол (Отрисовка)
                  Matrix.setIdentityM(model,0); Matrix.scaleM(model,0,500,0.1f,500); 
                  GLES30.glUniform1f(uA, 1.0f); draw(uM,uC,0.3f,0.3f,0.35f);

                  // Кубы
                  for(int i=-1; i<=1; i++) {
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,i*10,2.1f, -20);
                      Matrix.scaleM(model,0,4,4,4); GLES30.glUniform1f(uA, 1.0f); draw(uM,uC,0.8f,0.1f,0.1f);
                  }
              }

              private void update() {
                  vY-=0.015f; pY+=vY; if(pY<2.1f){pY=2.1f; vY=0;}
                  float s=0.22f, rad=(float)Math.toRadians(rY);
                  pX += ((float)Math.sin(rad)*-jY + (float)Math.cos(rad)*jX)*s;
                  pZ += ((float)-Math.cos(rad)*-jY + (float)Math.sin(rad)*jX)*s;
              }
              private void draw(int uM,int uC,float r,float g,float b){
                  float[] res=new float[16]; Matrix.multiplyMM(res,0,proj,0,view,0); Matrix.multiplyMM(res,0,res,0,model,0);
                  GLES30.glUniformMatrix4fv(uM,1,false,res,0); GLES30.glUniform4f(uC,r,g,b,1f);
                  for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }
              private int shP(String v,String f){int p=GLES30.glCreateProgram();GLES30.glAttachShader(p,sh(35633,v));GLES30.glAttachShader(p,sh(35632,f));GLES30.glLinkProgram(p);return p;}
              private int sh(int t,String s){int i=GLES30.glCreateShader(t);GLES30.glShaderSource(i,s);GLES30.glCompileShader(i);return i;}
          }
          EOF

          # --- MainActivity (Фикс координат нажатий) ---
          cat <<EOF > app/src/main/java/com/dimos/roblox/MainActivity.java
          package com.dimos.roblox;
          import android.os.Bundle;
          import android.view.View;
          import android.view.MotionEvent;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx, ly;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  findViewById(R.id.btn_reset).setOnClickListener(v -> { ren.pX=0; ren.pZ=10; ren.pY=5; });
                  findViewById(R.id.btn_jump).setOnClickListener(v -> { if(ren.pY <= 2.2f) ren.vY = 0.4f; });
                  
                  View stick = findViewById(R.id.joy_stick);
                  findViewById(R.id.joy_base).setOnTouchListener((v, e) -> {
                      float cx = v.getWidth()/2f, cy = v.getHeight()/2f;
                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - cx, dy = e.getY() - cy;
                          float d = (float)Math.sqrt(dx*dx + dy*dy);
                          float limit = 35f;
                          if (d > limit) { dx *= limit/d; dy *= limit/d; }
                          stick.setTranslationX(dx); stick.setTranslationY(dy);
                          ren.jX = dx/limit; ren.jY = dy/limit;
                      } else { stick.setTranslationX(0); stick.setTranslationY(0); ren.jX = 0; ren.jY = 0; }
                      return true;
                  });

                  findViewById(R.id.look_zone).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) { lx = e.getX(); ly = e.getY(); }
                      else if (e.getAction() == MotionEvent.ACTION_MOVE) {
                          ren.rY += (e.getX() - lx) * 0.3f;
                          ren.rX = Math.max(-85, Math.min(85, ren.rX - (e.getY() - ly) * 0.3f));
                          lx = e.getX(); ly = e.getY();
                      }
                      return true;
                  });
              }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Engine Fix" android:theme="@style/AppTheme">
                  <activity android:name="com.dimos.roblox.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.dimos.roblox'; compileSdk 34; defaultConfig { applicationId 'com.dimos.roblox'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Engine_V26_Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
