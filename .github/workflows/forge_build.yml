name: KUSMAN_V9_DIMASI4EK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.10' }

      - name: Generate Project
        run: |
          mkdir -p src/main/java/com/kusman src/main/resources
          
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'kusman_mod'" >> settings.gradle

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.0+1.20.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "kusman", "version": "1.0.0", "name": "KusmanV9",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] }
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandManager;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandRegistrationCallback;
          import net.minecraft.entity.TntEntity;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.network.packet.c2s.play.PlayerInteractEntityC2SPacket;
          import net.minecraft.text.Text;
          import net.minecraft.world.GameMode;
          import net.minecraft.util.Hand;
          import net.minecraft.client.MinecraftClient;

          public class KusmanClient implements ClientModInitializer {
              public static boolean fly = false;
              public static boolean aura = false;
              public static boolean antikick = true;
              private static final String PREFIX = "§b[Mod by Dimasi4ek229] §f";

              @Override public void onInitializeClient() {
                  ClientCommandRegistrationCallback.EVENT.register((dispatcher, registryAccess) -> {
                      // Полет
                      dispatcher.register(ClientCommandManager.literal("ggg").executes(context -> {
                          fly = !fly;
                          context.getSource().sendFeedback(Text.literal(PREFIX + "Fly: " + (fly ? "§aON" : "§cOFF")));
                          return 1;
                      }));

                      // Аура (теперь на всех мобов)
                      dispatcher.register(ClientCommandManager.literal("aura").executes(context -> {
                          aura = !aura;
                          context.getSource().sendFeedback(Text.literal(PREFIX + "Aura (All Entities): " + (aura ? "§aON" : "§cOFF")));
                          return 1;
                      }));

                      // Рабочий динамит
                      dispatcher.register(ClientCommandManager.literal("boom").executes(context -> {
                          MinecraftClient client = MinecraftClient.getInstance();
                          if (client.player != null) {
                              TntEntity tnt = new TntEntity(client.world, client.player.getX(), client.player.getY(), client.player.getZ(), client.player);
                              tnt.setFuse(80); // 4 секунды до взрыва
                              client.world.addEntity(tnt.getId(), tnt);
                              context.getSource().sendFeedback(Text.literal(PREFIX + "§4TNT Activated!"));
                          }
                          return 1;
                      }));

                      // Клиентский креатив
                      dispatcher.register(ClientCommandManager.literal("gm").executes(context -> {
                          MinecraftClient client = MinecraftClient.getInstance();
                          if (client.player != null) {
                              client.interactionManager.setGameMode(
                                  client.interactionManager.getCurrentGameMode() == GameMode.CREATIVE ? GameMode.SURVIVAL : GameMode.CREATIVE
                              );
                              context.getSource().sendFeedback(Text.literal(PREFIX + "Visual GameMode Switched!"));
                          }
                          return 1;
                      }));
                  });

                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null) return;
                      
                      if (fly) {
                          client.player.getAbilities().flying = true;
                          if (antikick && client.player.age % 40 == 0) {
                              client.player.setPos(client.player.getX(), client.player.getY() - 0.01, client.player.getZ());
                          }
                      }

                      if (aura) {
                          for (var entity : client.world.getEntities()) {
                              if (entity instanceof LivingEntity target && target != client.player && !target.isDead() && client.player.distanceTo(target) <= 5.0) {
                                  if (client.player.getAttackCooldownProgress(0) >= 1.0f) {
                                      client.getNetworkHandler().sendPacket(PlayerInteractEntityC2SPacket.attack(target, client.player.isSneaking()));
                                      client.player.swingHand(Hand.MAIN_HAND);
                                  }
                              }
                          }
                      }
                  });
              }
          }
          EOF

      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V9-Final
          path: build/libs/*.jar
