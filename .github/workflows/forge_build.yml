name: DimOS_VPN_GodMode_Xray
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Xray Core
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64.zip
          unzip -o Xray-android-arm64.zip -d app/libs/xray/
          chmod +x app/libs/xray/xray

      - name: Initialize VPN Project with Xray
        run: |
          mkdir -p app/src/main/java/com/dimos/vpn
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/libs/xray

          # Копируем бинарник Xray в assets
          cp app/libs/xray/xray app/src/main/assets/xray
          
          # Сохраняем конфиг VPN
          cat <<'EOF' > app/src/main/assets/config.json
