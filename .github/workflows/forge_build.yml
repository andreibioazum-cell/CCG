            "remarks": "DimVPN ✅",
            "dns": {
              "port": 53,
              "servers": ["8.8.4.4", "8.8.8.8"],
              "queryStrategy": "UseIPv4"
            },
            "inbounds": [
              {
                "tag": "tun",
                "protocol": "tun",
                "settings": {
                  "fd": 0,
                  "address": ["10.0.0.2"],
                  "mtu": 1500
                },
                "sniffing": {
                  "enabled": true,
                  "destOverride": ["http", "tls"]
                }
              }
            ],
            "outbounds": [
              {
                "tag": "proxy-1",
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": "test.bold-crown.test-cdn-kkk.com",
                      "port": 443,
                      "users": [
                        {
                          "id": "d8094751-0c2e-4ba3-ac2c-16d95c6fc707",
                          "encryption": "none",
                          "flow": "xtls-rprx-vision"
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "reality",
                  "realitySettings": {
                    "serverName": "tradingview.com",
                    "publicKey": "-tePObR3oZwGAUOb5kqTYkNWl6rtUKl0RFuzuu06wgw",
                    "shortId": "50",
                    "fingerprint": "qq"
                  }
                }
              },
              {
                "tag": "proxy-2",
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": "test.bold-crown.test-cdn-kkk.com",
                      "port": 1443,
                      "users": [
                        {
                          "id": "d8094751-0c2e-4ba3-ac2c-16d95c6fc707",
                          "encryption": "none",
                          "flow": ""
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "grpc",
                  "grpcSettings": {
                    "serviceName": "de.eu-ffast.com"
                  },
                  "security": "reality",
                  "realitySettings": {
                    "serverName": "de.eu-ffast.com",
                    "publicKey": "-tePObR3oZwGAUOb5kqTYkNWl6rtUKl0RFuzuu06wgw",
                    "shortId": "50"
                  }
                }
              },
              {
                "tag": "proxy-3",
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": "test.bold-crown.test-cdn-kkk.com",
                      "port": 448,
                      "users": [
                        {
                          "id": "d8094751-0c2e-4ba3-ac2c-16d95c6fc707",
