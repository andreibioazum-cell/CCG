name: Fabric_Mod_ChestCavity_Scalpel_V34
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Initialize Project
        run: |
          mkdir -p src/main/java/com/dimos/mod/
          mkdir -p src/main/resources/assets/dimos/lang
          mkdir -p src/main/resources/assets/dimos/models/item

          # 1. Build.gradle
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          version = '3.4.0'
          group = 'com.dimos.mod'
          repositories { mavenCentral(); maven { url = "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc.fabric-loader:0.16.5"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.1+1.21.1"
          }
          EOF

          # 2. Предметы (DimItems.java)
          cat <<EOF > src/main/java/com/dimos/mod/DimItems.java
          package com.dimos.mod;
          import net.minecraft.item.Item;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.util.Identifier;

          public class DimItems {
              public static final Item SCALPEL = new Item(new Item.Settings().maxCount(1));
              public static final Item HEART = new Item(new Item.Settings());

              public static void register() {
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "scalpel"), SCALPEL);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "heart"), HEART);
              }
          }
          EOF

          # 3. Логика со скальпелем (DimMod.java)
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.player.UseEntityCallback;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.inventory.SimpleInventory;
          import net.minecraft.item.ItemStack;
          import net.minecraft.nbt.NbtCompound;
          import net.minecraft.nbt.NbtList;
          import net.minecraft.screen.GenericContainerScreenHandler;
          import net.minecraft.screen.ScreenHandlerType;
          import net.minecraft.screen.SimpleNamedScreenHandlerFactory;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;
          import net.minecraft.util.ActionResult;
          import java.util.HashMap;
          import java.util.UUID;

          public class DimMod implements ModInitializer {
              public static final HashMap<UUID, SimpleInventory> cavities = new HashMap<>();

              @Override
              public void onInitialize() {
                  DimItems.register();

                  // Открытие ТОЛЬКО скальпелем
                  UseEntityCallback.EVENT.register((p, world, hand, entity, hit) -> {
                      if (!world.isClient && p.isSneaking() && p.getStackInHand(hand).isOf(DimItems.SCALPEL) && entity instanceof LivingEntity target) {
                          openSurgeryMenu((ServerPlayerEntity)p, target);
                          return ActionResult.SUCCESS;
                      }
                      return ActionResult.PASS;
                  });

                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity player : server.getPlayerManager().getPlayerList()) {
                          if (cavities.containsKey(player.getUuid())) {
                              processBiology(player);
                          }
                      }
                  });
              }

              private void openSurgeryMenu(ServerPlayerEntity surgeon, LivingEntity target) {
                  SimpleInventory inv = cavities.computeIfAbsent(target.getUuid(), k -> loadNbt(target));
                  surgeon.openHandledScreen(new SimpleNamedScreenHandlerFactory((id, pInv, p) -> 
                      new GenericContainerScreenHandler(ScreenHandlerType.GENERIC_3X3, id, pInv, inv, 1), 
                      Text.literal("Полость организма")));
                  inv.addListener(i -> saveNbt(target, (SimpleInventory)i));
              }

              private SimpleInventory loadNbt(LivingEntity entity) {
                  SimpleInventory inv = new SimpleInventory(9);
                  NbtCompound nbt = new NbtCompound();
                  entity.writeNbt(nbt);
                  if (nbt.contains("ChestCavity", 9)) {
                      NbtList list = nbt.getList("ChestCavity", 10);
                      for (int i = 0; i < list.size(); i++) {
                          NbtCompound itemNbt = list.getCompound(i);
                          int slot = itemNbt.getByte("Slot");
                          if (slot >= 0 && slot < 9) inv.setStack(slot, ItemStack.fromNbtOrEmpty(entity.getWorld().getRegistryManager(), itemNbt));
                      }
                  }
                  return inv;
              }

              private void saveNbt(LivingEntity entity, SimpleInventory inv) {
                  NbtCompound nbt = new NbtCompound();
                  entity.writeNbt(nbt);
                  NbtList list = new NbtList();
                  for (int i = 0; i < inv.size(); i++) {
                      if (!inv.getStack(i).isEmpty()) {
                          NbtCompound itemNbt = new NbtCompound();
                          itemNbt.putByte("Slot", (byte) i);
                          inv.getStack(i).encode(entity.getWorld().getRegistryManager(), itemNbt);
                          list.add(itemNbt);
                      }
                  }
                  nbt.put("ChestCavity", list);
                  entity.readNbt(nbt);
              }

              private void processBiology(ServerPlayerEntity player) {
                  SimpleInventory inv = cavities.get(player.getUuid());
                  boolean hasHeart = false;
                  for (int i = 0; i < 9; i++) {
                      if (inv.getStack(i).isOf(DimItems.HEART)) hasHeart = true;
                  }
                  if (!hasHeart && player.getWorld().getTime() % 40 == 0) {
                      player.damage(player.getDamageSources().magic(), 4.0f);
                  }
              }
          }
          EOF

          # 4. Ресурсы
          echo '{"item.dimos.scalpel":"Хирургический скальпель","item.dimos.heart":"Сердце"}' > src/main/resources/assets/dimos/lang/ru_ru.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/iron_sword"}}' > src/main/resources/assets/dimos/models/item/scalpel.json
          echo "pluginManagement { repositories { maven { url = 'https://maven.fabricmc.net/' }; mavenCentral() } }; rootProject.name = 'dimos-surgery'" > settings.gradle

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: Surgery-ScalpelReturns-V34
          path: build/libs/*.jar
