name: KUSMAN_V22_GOD_XRAY_FIXED
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.10' }

      - name: Generate Project
        run: |
          mkdir -p src/main/java/com/kusman/mixin src/main/resources
          
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'kusman_mod'" >> settings.gradle

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.0"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "kusman", "version": "1.0.0", "name": "KusmanV22",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] },
            "mixins": [ "kusman.mixins.json" ]
          }
          EOF

          echo '{"required":true,"package":"com.kusman.mixin","mixins":["AbstractBlockMixin"]}' > src/main/resources/kusman.mixins.json

          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandManager;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandRegistrationCallback;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.text.Text;

          public class KusmanClient implements ClientModInitializer {
              public static boolean xray = false, fly = false, god = false, speed = false;
              public static final String PREFIX = "§b[Dimasi4ek229] §f";

              @Override public void onInitializeClient() {
                  ClientCommandRegistrationCallback.EVENT.register((dispatcher, registryAccess) -> {
                      dispatcher.register(ClientCommandManager.literal("xray").executes(c -> {
                          xray = !xray;
                          MinecraftClient.getInstance().worldRenderer.reload();
                          msg("X-Ray: " + (xray ? "§aON" : "§cOFF"));
                          return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("god").executes(c -> {
                          god = !god;
                          msg("GodMode: " + (god ? "§aON" : "§cOFF"));
                          return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("ggg").executes(c -> { fly = !fly; msg("Fly: " + fly); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("speed").executes(c -> { speed = !speed; msg("Speed: " + speed); return 1; }));
                  });

                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null) return;
                      
                      if (god) {
                          client.player.getAbilities().invulnerable = true;
                          client.player.setHealth(20.0f);
                          client.player.getHungerManager().setFoodLevel(20);
                          // Отключаем статус смерти клиента
                          client.player.deathTime = 0;
                      }
                      
                      if (fly) {
                          client.player.getAbilities().allowFlying = true;
                          client.player.getAbilities().flying = true;
                      }

                      if (speed && client.player.input.movementForward > 0) {
                          client.player.updateVelocity(0.2f, new net.minecraft.util.math.Vec3d(0, 0, 1));
                      }
                  });
              }

              public static void msg(String s) {
                  if (MinecraftClient.getInstance().player != null)
                      MinecraftClient.getInstance().player.sendMessage(Text.literal(PREFIX + s), false);
              }
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/mixin/AbstractBlockMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.block.AbstractBlock;
          import net.minecraft.block.BlockState;
          import net.minecraft.block.Blocks;
          import net.minecraft.util.math.BlockPos;
          import net.minecraft.util.math.Direction;
          import net.minecraft.world.BlockView;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

          @Mixin(AbstractBlock.class)
          public abstract class AbstractBlockMixin {
              @Inject(method = "getAmbientOcclusionLightLevel", at = @At("HEAD"), cancellable = true)
              private void onGetAmbientOcclusionLightLevel(BlockState state, BlockView world, BlockPos pos, CallbackInfoReturnable<Float> cir) {
                  if (KusmanClient.xray) cir.setReturnValue(1.0f);
              }

              @Inject(method = "isTransparent", at = @At("HEAD"), cancellable = true)
              private void onIsTransparent(BlockState state, BlockView world, BlockPos pos, CallbackInfoReturnable<Boolean> cir) {
                  if (KusmanClient.xray) {
                      boolean isOre = state.getBlock().getName().getString().toLowerCase().contains("ore") || 
                                     state.getBlock() == Blocks.CHEST || state.getBlock() == Blocks.SPAWNER;
                      if (!isOre) cir.setReturnValue(true);
                  }
              }
          }
          EOF

      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V22-Ultimate
          path: build/libs/*.jar
