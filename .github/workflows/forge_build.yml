name: Fabric_Mod_ChestCavity_Hardcore_V26
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Initialize Project
        run: |
          mkdir -p src/main/java/com/dimos/mod/item
          mkdir -p src/main/resources/assets/dimos/lang

          # 1. Build.gradle
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          version = '2.6.0'
          group = 'com.dimos.mod'
          repositories { mavenCentral(); maven { url = "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.5"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.1+1.21.1"
          }
          EOF

          # 2. Органы (DimItems.java)
          cat <<EOF > src/main/java/com/dimos/mod/DimItems.java
          package com.dimos.mod;
          import net.minecraft.item.Item;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.util.Identifier;

          public class DimItems {
              public static final Item SCALPEL = new Item(new Item.Settings().maxCount(1));
              public static final Item HEART = new Item(new Item.Settings());
              public static final Item LUNG = new Item(new Item.Settings());
              public static final Item IRON_MUSCLE = new Item(new Item.Settings().fireproof());
              public static final Item SQUID_GILLS = new Item(new Item.Settings());
              public static final Item BLAZE_CORE = new Item(new Item.Settings().fireproof());

              public static void register() {
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "scalpel"), SCALPEL);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "heart"), HEART);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "lung"), LUNG);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "iron_muscle"), IRON_MUSCLE);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "squid_gills"), SQUID_GILLS);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "blaze_core"), BLAZE_CORE);
              }
          }
          EOF

          # 3. Хардкорная Логика (DimMod.java)
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.player.UseEntityCallback;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.effect.StatusEffectInstance;
          import net.minecraft.entity.effect.StatusEffects;
          import net.minecraft.inventory.SimpleInventory;
          import net.minecraft.item.ItemStack;
          import net.minecraft.screen.GenericContainerScreenHandler;
          import net.minecraft.screen.SimpleNamedScreenHandlerFactory;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;
          import net.minecraft.util.ActionResult;
          import java.util.HashMap;
          import java.util.UUID;

          public class DimMod implements ModInitializer {
              public static final HashMap<UUID, SimpleInventory> cavities = new HashMap<>();

              @Override
              public void onInitialize() {
                  DimItems.register();

                  UseEntityCallback.EVENT.register((p, world, hand, entity, hit) -> {
                      if (!world.isClient && p.isSneaking() && p.getStackInHand(hand).isOf(DimItems.SCALPEL)) {
                          SimpleInventory inv = cavities.computeIfAbsent(entity.getUuid(), k -> {
                              SimpleInventory newInv = new SimpleInventory(9);
                              if (entity.getType() == EntityType.IRON_GOLEM) newInv.setStack(4, new ItemStack(DimItems.IRON_MUSCLE));
                              else if (entity.getType() == EntityType.SQUID) newInv.setStack(0, new ItemStack(DimItems.SQUID_GILLS));
                              else if (entity.getType() == EntityType.BLAZE) newInv.setStack(1, new ItemStack(DimItems.BLAZE_CORE));
                              else newInv.setStack(1, new ItemStack(DimItems.HEART));
                              return newInv;
                          });
                          p.openHandledScreen(new SimpleNamedScreenHandlerFactory((s, i, player) -> 
                              GenericContainerScreenHandler.createGeneric3x3(s, i, inv), Text.literal("Анатомия")));
                          return ActionResult.SUCCESS;
                      }
                      return ActionResult.PASS;
                  });

                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity player : server.getPlayerManager().getPlayerList()) {
                          processBiology(player);
                      }
                  });
              }

              private void processBiology(ServerPlayerEntity player) {
                  SimpleInventory inv = cavities.get(player.getUuid());
                  if (inv == null) return;

                  int lungCount = 0; int muscles = 0; boolean hasHeart = false; boolean canBreatheUnderwater = false;

                  for (int i = 0; i < inv.size(); i++) {
                      ItemStack s = inv.getStack(i);
                      if (s.isOf(DimItems.LUNG)) lungCount++;
                      if (s.isOf(DimItems.HEART) || s.isOf(DimItems.BLAZE_CORE)) hasHeart = true;
                      if (s.isOf(DimItems.IRON_MUSCLE)) muscles++;
                      if (s.isOf(DimItems.SQUID_GILLS)) canBreatheUnderwater = true;
                  }

                  // 1. Проверка легких
                  if (lungCount == 0 && !canBreatheUnderwater) {
                      player.setAir(Math.max(-20, player.getAir() - 2));
                      if (player.getAir() <= -20) player.damage(player.getDamageSources().drown(), 2.0f);
                  } else if (lungCount == 1 && player.isSubmergedInWater()) {
                      player.setAir(player.getAir() - 1); // Быстрее тонешь
                  }

                  // 2. Проверка сердца
                  if (!hasHeart) player.damage(player.getDamageSources().magic(), 1.0f);

                  // 3. Проверка мышц
                  if (muscles > 0) player.addStatusEffect(new StatusEffectInstance(StatusEffects.STRENGTH, 40, muscles - 1, true, false));
                  else player.addStatusEffect(new StatusEffectInstance(StatusEffects.WEAKNESS, 40, 0, true, false));
                  
                  // 4. Огненное ядро
                  if (inv.containsAny(s -> s.isOf(DimItems.BLAZE_CORE))) {
                      player.addStatusEffect(new StatusEffectInstance(StatusEffects.FIRE_RESISTANCE, 40, 0, true, false));
                      if (player.isWet()) player.damage(player.getDamageSources().onFire(), 1.0f);
                  }
              }
          }
          EOF

          # 4. Языки
          echo '{"item.dimos.iron_muscle":"Железные мышцы","item.dimos.squid_gills":"Жабры спрута","item.dimos.blaze_core":"Огненное ядро"}' > src/main/resources/assets/dimos/lang/ru_ru.json
          echo "pluginManagement { repositories { maven { url = 'https://maven.fabricmc.net/' }; mavenCentral() } }; rootProject.name = 'dimos-surgery'" > settings.gradle

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: Surgery-Hardcore-V26
          path: build/libs/*.jar
