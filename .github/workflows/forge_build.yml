name: Enjoer_Studio_Final_Stable
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Create Engine Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Настройки проекта
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle

          # --- Ресурсы UI ---
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
          </style></resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/menu_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#121212"/><corners android:radius="20dp"/>
              <stroke android:width="3dp" android:color="#00FF00"/>
          </shape>
          EOF

          # --- Вертикальное Меню ---
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" />

              <LinearLayout android:id="@+id/main_menu"
                  android:layout_width="match_parent" android:layout_height="match_parent"
                  android:orientation="vertical" android:gravity="center" android:padding="50dp">
                  
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="ENJOER ENGINE" android:textColor="#0F0" android:textSize="35sp" android:textStyle="bold" android:layout_marginBottom="60dp"/>

                  <Button android:id="@+id/btn_play" android:layout_width="match_parent" android:layout_height="80dp"
                      android:text="PLAY: MY PLACE" android:background="@drawable/menu_btn" android:textColor="#FFF" android:layout_marginBottom="25dp" android:textSize="18sp"/>

                  <Button android:id="@+id/btn_studio" android:layout_width="match_parent" android:layout_height="80dp"
                      android:text="ENJOER STUDIO" android:background="@drawable/menu_btn" android:textColor="#0F0" android:textSize="18sp"/>
              </LinearLayout>

              <RelativeLayout android:id="@+id/game_ui" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent" />
                  <Button android:id="@+id/btn_exit" android:layout_width="60dp" android:layout_height="60dp" android:text="✕" android:layout_margin="20dp" android:background="@drawable/menu_btn" android:textColor="#F00" android:textSize="20sp"/>
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="130dp" android:layout_height="130dp"
                      android:layout_alignParentBottom="true" android:layout_marginLeft="40dp" android:layout_marginBottom="40dp" android:alpha="0.6" android:background="@drawable/menu_btn" />
                  <View android:id="@+id/joy_stick" android:layout_width="55dp" android:layout_height="55dp"
                      android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base" android:layout_marginLeft="37.5dp" android:layout_marginTop="37.5dp" android:background="@drawable/menu_btn" />
              </RelativeLayout>
          </FrameLayout>
          EOF

          # --- Renderer (Дождь, Пол, Движок) ---
          cat <<EOF > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.Random;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] proj=new float[16], view=new float[16], model=new float[16];
              public float pX=0, pY=2.1f, pZ=5, rY=0, jX=0, jY=0;
              private int prog;
              private FloatBuffer vBuf;
              
              private static final int RC = 600; // Количество капель
              private float[] rX = new float[RC], rYp = new float[RC], rZ = new float[RC];
              private Random rnd = new Random();

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="#version 300 es\nlayout(location=0) in vec4 aP; uniform mat4 uMVP; void main(){gl_Position=uMVP*aP;}";
                  String fs="#version 300 es\nprecision mediump float; uniform vec4 uC; out vec4 fC; void main(){fC=uC;}";
                  int vS=sh(35633,vs), fS=sh(35632,fs);
                  prog=GLES30.glCreateProgram(); GLES30.glAttachShader(prog, vS); GLES30.glAttachShader(prog, fS); GLES30.glLinkProgram(prog);
                  float[] vc = {-0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f};
                  vBuf=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBuf.position(0);
                  for(int i=0; i<RC; i++) { respawnRain(i); rYp[i] = rnd.nextFloat()*40.0f; }
              }

              private void respawnRain(int i) {
                  rX[i] = pX + (rnd.nextFloat()*60.0f - 30.0f);
                  rYp[i] = pY + 25.0f;
                  rZ[i] = pZ + (rnd.nextFloat()*60.0f - 30.0f);
              }

              @Override public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,45,(float)w/h,0.1f,600f);
              }

              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClearColor(0, 0.02f, 0.04f, 1.0f);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  Matrix.setLookAtM(view,0,pX,pY,pZ,pX+(float)Math.sin(Math.toRadians(rY)),pY,pZ+(float)-Math.cos(Math.toRadians(rY)),0,1,0);
                  GLES30.glUseProgram(prog);
                  int uM=GLES30.glGetUniformLocation(prog,"uMVP"), uC=GLES30.glGetUniformLocation(prog,"uC");
                  GLES30.glVertexAttribPointer(0, 3, GLES30.GL_FLOAT, false, 0, vBuf); GLES30.glEnableVertexAttribArray(0);

                  // ПОЛ (ЗЕЛЕНЫЙ)
                  Matrix.setIdentityM(model,0); Matrix.scaleM(model,0,300,0.1f,300);
                  draw(uM, uC, 0.0f, 1.0f, 0.3f);

                  // ДОЖДЬ
                  for(int i=0; i<RC; i++) {
                      rYp[i] -= 0.7f; if(rYp[i] < 0) respawnRain(i);
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,rX[i],rYp[i],rZ[i]); Matrix.scaleM(model,0,0.03f,1.2f,0.03f);
                      draw(uM, uC, 0.5f, 0.7f, 1.0f);
                  }
              }

              private void update() {
                  float s=0.25f, rad=(float)Math.toRadians(rY);
                  pX += ((float)Math.sin(rad)*-jY + (float)Math.cos(rad)*jX)*s;
                  pZ += ((float)-Math.cos(rad)*-jY + (float)Math.sin(rad)*jX)*s;
              }
              private void draw(int uM, int uC, float r, float g, float b) {
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0); Matrix.multiplyMM(mvp,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(uM,1,false,mvp,0); GLES30.glUniform4f(uC,r,g,b,0.6f);
                  GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,0,4);
              }
              private int sh(int t, String s){int i=GLES30.glCreateShader(t);GLES30.glShaderSource(i,s);GLES30.glCompileShader(i);return i;}
          }
          EOF

          # --- MainActivity ---
          cat <<EOF > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.view.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  final View menu = findViewById(R.id.main_menu), ui = findViewById(R.id.game_ui);
                  final android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3); ren = new GameRenderer(); gv.setRenderer(ren);

                  findViewById(R.id.btn_play).setOnClickListener(v -> { menu.setVisibility(View.GONE); gv.setVisibility(View.VISIBLE); ui.setVisibility(View.VISIBLE); });
                  findViewById(R.id.btn_studio).setOnClickListener(v -> { menu.setVisibility(View.GONE); gv.setVisibility(View.VISIBLE); ui.setVisibility(View.VISIBLE); });
                  findViewById(R.id.btn_exit).setOnClickListener(v -> { ui.setVisibility(View.GONE); gv.setVisibility(View.GONE); menu.setVisibility(View.VISIBLE); });

                  final View stick = findViewById(R.id.joy_stick);
                  findViewById(R.id.joy_base).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - v.getWidth()/2f, dy = e.getY() - v.getHeight()/2f;
                          stick.setTranslationX(dx/2); stick.setTranslationY(dy/2);
                          ren.jX = dx/100f; ren.jY = dy/100f;
                      } else { stick.setTranslationX(0); stick.setTranslationY(0); ren.jX = 0; ren.jY = 0; }
                      return true;
                  });
                  findViewById(R.id.look_zone).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) lx = e.getX();
                      else if (e.getAction() == MotionEvent.ACTION_MOVE) { ren.rY += (e.getX() - lx) * 0.5f; lx = e.getX(); }
                      return true;
                  });
              }
          }
          EOF

          # --- AndroidManifest ---
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer Studio" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # --- ИСПРАВЛЕННЫЙ GRADLE CONFIG ---
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Studio_Engine
          path: app/build/outputs/apk/debug/app-debug.apk
