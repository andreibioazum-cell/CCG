name: Roblox_V14_Structures_Noise
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/dimos/roblox
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # --- Ресурсы ---
          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#66000000"/><stroke android:width="2dp" android:color="#AAFFFFFF"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/btn_round.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#AAFFFFFF"/><stroke android:width="2dp" android:color="#FFFFFF"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
          </style></resources>
          EOF

          # --- Интерфейс (Маленький фиксированный джойстик) ---
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent" />
                  
                  <FrameLayout android:id="@+id/joy_container" android:layout_width="100dp" android:layout_height="100dp"
                      android:layout_alignParentBottom="true" android:layout_marginLeft="40dp" android:layout_marginBottom="40dp"
                      android:background="@drawable/joy_base">
                      <View android:id="@+id/joy_center" android:layout_width="40dp" android:layout_height="40dp"
                          android:layout_gravity="center" android:background="@drawable/btn_round" />
                  </FrameLayout>

                  <Button android:id="@+id/btn_jump" android:layout_width="80dp" android:layout_height="80dp"
                      android:layout_alignParentRight="true" android:layout_alignParentBottom="true"
                      android:layout_margin="40dp" android:background="@drawable/btn_round" android:text="UP" />
              </RelativeLayout>
          </FrameLayout>
          EOF

          # --- Renderer (Шум и Структуры) ---
          cat <<EOF > app/src/main/java/com/dimos/roblox/GameRenderer.java
          package com.dimos.roblox;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.Random;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] mvpM = new float[16], pM = new float[16], vM = new float[16];
              public float pX=0, pY=2.5f, pZ=10, rotY=0, rotX=0, joyDX=0, joyDY=0, velY=0;
              private int program;
              private FloatBuffer cubeBuf;
              private float[] structPos = new float[60]; // 20 структур (x, y_scale, z)

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  GLES30.glClearColor(0.4f, 0.6f, 0.9f, 1.0f);
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  
                  // Шейдер с шумом пола (псевдо-шахматы)
                  String vS = "#version 300 es\nlayout(location=0) in vec4 p; uniform mat4 uM; out vec3 vP; void main(){gl_Position=uM*p; vP=p.xyz;}";
                  String fS = "#version 300 es\nprecision mediump float; in vec3 vP; out vec4 fc; uniform vec4 uC; void main(){" +
                              "if(vP.y < 0.1) {" +
                              "  float f = mod(floor(vP.x) + floor(vP.z), 2.0);" +
                              "  fc = mix(uC, uC*0.8, f);" +
                              "} else { fc = uC; }}";
                  
                  program = GLES30.glCreateProgram();
                  int vs=sh(35633,vS), fs=sh(35632,fS);
                  GLES30.glAttachShader(program,vs); GLES30.glAttachShader(program,fs); GLES30.glLinkProgram(program);
                  
                  float[] v = {-0.5f,0,-0.5f, 0.5f,0,-0.5f, 0.5f,1,-0.5f, -0.5f,1,-0.5f, // Одна грань куба
                               -0.5f,0,0.5f, 0.5f,0,0.5f, 0.5f,1,0.5f, -0.5f,1,0.5f}; // Упростим для скорости
                  cubeBuf = ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer();
                  cubeBuf.put(v).position(0);

                  Random r = new Random();
                  for(int i=0; i<20; i++) {
                      structPos[i*3] = r.nextFloat()*100 - 50; // X
                      structPos[i*3+1] = 1 + r.nextFloat()*5;   // Высота
                      structPos[i*3+2] = r.nextFloat()*100 - 50; // Z
                  }
              }

              @Override public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0, 0, w, h); Matrix.perspectiveM(pM, 0, 45, (float)w/h, 0.1f, 200f);
              }

              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClear(16640);
                  float vx = (float)(Math.sin(Math.toRadians(rotY)) * Math.cos(Math.toRadians(rotX)));
                  float vy = (float)Math.sin(Math.toRadians(rotX));
                  float vz = (float)(-Math.cos(Math.toRadians(rotY)) * Math.cos(Math.toRadians(rotX)));
                  Matrix.setLookAtM(vM, 0, pX, pY, pZ, pX+vx, pY+vy, pZ+vz, 0, 1, 0);
                  
                  GLES30.glUseProgram(program);
                  int uM = GLES30.glGetUniformLocation(program, "uM");
                  int uC = GLES30.glGetUniformLocation(program, "uC");
                  
                  // Пол
                  float[] model = new float[16]; Matrix.setIdentityM(model, 0);
                  Matrix.scaleM(model, 0, 200, 1, 200);
                  Matrix.multiplyMM(mvpM, 0, pM, 0, vM, 0);
                  float[] res = new float[16]; Matrix.multiplyMM(res, 0, mvpM, 0, model, 0);
                  GLES30.glUniformMatrix4fv(uM, 1, false, res, 0);
                  GLES30.glUniform4f(uC, 0.3f, 0.5f, 0.3f, 1.0f);
                  GLES30.glVertexAttribPointer(0, 3, GLES30.GL_FLOAT, false, 0, cubeBuf);
                  GLES30.glEnableVertexAttribArray(0);
                  GLES30.glDrawArrays(GLES30.GL_TRIANGLE_FAN, 0, 4);

                  // Структуры
                  for(int i=0; i<20; i++) {
                      Matrix.setIdentityM(model, 0);
                      Matrix.translateM(model, 0, structPos[i*3], 0, structPos[i*3+2]);
                      Matrix.scaleM(model, 0, 2, structPos[i*3+1], 2);
                      Matrix.multiplyMM(res, 0, mvpM, 0, model, 0);
                      GLES30.glUniformMatrix4fv(uM, 1, false, res, 0);
                      GLES30.glUniform4f(uC, 0.6f, 0.4f, 0.3f, 1.0f);
                      GLES30.glDrawArrays(GLES30.GL_TRIANGLE_FAN, 0, 4);
                      GLES30.glDrawArrays(GLES30.GL_TRIANGLE_FAN, 4, 4);
                  }
              }

              private void update() {
                  velY -= 0.015f; pY += velY;
                  if (pY <= 2.5f) { pY = 2.5f; velY = 0; }
                  float s = 0.15f, r = (float)Math.toRadians(rotY);
                  pX += ((float)Math.sin(r) * -joyDY + (float)Math.cos(r) * joyDX) * s;
                  pZ += ((float)-Math.cos(r) * -joyDY + (float)Math.sin(r) * joyDX) * s;
              }
              private int sh(int t, String s){int i=GLES30.glCreateShader(t);GLES30.glShaderSource(i,s);GLES30.glCompileShader(i);return i;}
          }
          EOF

          cat <<EOF > app/src/main/java/com/dimos/roblox/MainActivity.java
          package com.dimos.roblox;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lX, lY, sX, sY;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  findViewById(R.id.btn_jump).setOnClickListener(v -> { if(ren.pY <= 2.6f) ren.velY = 0.35f; });

                  findViewById(R.id.joy_container).setOnTouchListener((v, e) -> {
                      float cx = v.getWidth()/2f, cy = v.getHeight()/2f;
                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - cx, dy = e.getY() - cy;
                          float d = (float)Math.sqrt(dx*dx + dy*dy);
                          if (d > 50) { dx *= 50/d; dy *= 50/d; }
                          findViewById(R.id.joy_center).setTranslationX(dx);
                          findViewById(R.id.joy_center).setTranslationY(dy);
                          ren.joyDX = dx/50f; ren.joyDY = dy/50f;
                      } else {
                          findViewById(R.id.joy_center).setTranslationX(0);
                          findViewById(R.id.joy_center).setTranslationY(0);
                          ren.joyDX = 0; ren.joyDY = 0;
                      }
                      return true;
                  });

                  findViewById(R.id.look_zone).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) { lX = e.getX(); lY = e.getY(); }
                      else if (e.getAction() == MotionEvent.ACTION_MOVE) {
                          ren.rotY += (e.getX() - lX) * 0.3f;
                          ren.rotX = Math.max(-85, Math.min(85, ren.rotX - (e.getY() - lY) * 0.3f));
                          lX = e.getX(); lY = e.getY();
                      }
                      return true;
                  });
              }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Roblox V14" android:theme="@style/AppTheme">
                  <activity android:name="com.dimos.roblox.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.dimos.roblox'; compileSdk 34; defaultConfig { applicationId 'com.dimos.roblox'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Roblox_V14_World
          path: app/build/outputs/apk/debug/app-debug.apk
