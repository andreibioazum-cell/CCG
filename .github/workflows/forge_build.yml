name: Fabric_Mod_Surgery_Disability_V46
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Initialize Project
        run: |
          mkdir -p src/main/java/com/dimos/mod/
          mkdir -p src/main/resources/assets/dimos/lang

          # 1. DimItems.java
          cat <<EOF > src/main/java/com/dimos/mod/DimItems.java
          package com.dimos.mod;
          import net.minecraft.item.Item;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.util.Identifier;

          public class DimItems {
              public static final Item SCALPEL = new Item(new Item.Settings().maxCount(1));
              public static final Item BONE_TOOL = new Item(new Item.Settings().maxCount(1));
              public static final Item HEART = new Item(new Item.Settings());
              public static final Item MUSCLE = new Item(new Item.Settings());
              public static final Item BONE = new Item(new Item.Settings().maxDamage(80));
              public static final Item DRAGON_LUNGS = new Item(new Item.Settings().maxCount(1));
              public static final Item WOOD_PROSTHESIS = new Item(new Item.Settings().maxDamage(40));
              public static final Item STEEL_PROSTHESIS = new Item(new Item.Settings().maxDamage(500));
              public static final Item NETHERITE_PROSTHESIS = new Item(new Item.Settings());

              public static void register() {
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "scalpel"), SCALPEL);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "bone_tool"), BONE_TOOL);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "heart"), HEART);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "muscle"), MUSCLE);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "bone"), BONE);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "dragon_lungs"), DRAGON_LUNGS);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "wood_prosthesis"), WOOD_PROSTHESIS);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "steel_prosthesis"), STEEL_PROSTHESIS);
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "netherite_prosthesis"), NETHERITE_PROSTHESIS);
              }
          }
          EOF

          # 2. DimMod.java (Логика инвалидности)
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.entity.event.v1.EntityDamageEvents;
          import net.fabricmc.fabric.api.event.player.AttackEntityCallback;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.entity.damage.DamageTypes;
          import net.minecraft.entity.effect.StatusEffectInstance;
          import net.minecraft.entity.effect.StatusEffects;
          import net.minecraft.inventory.SimpleInventory;
          import net.minecraft.item.ItemStack;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.text.Text;
          import net.minecraft.util.ActionResult;
          import java.util.HashMap;
          import java.util.UUID;

          public class DimMod implements ModInitializer {
              public static final HashMap<UUID, SimpleInventory> cavities = new HashMap<>();

              @Override
              public void onInitialize() {
                  DimItems.register();

                  // Урон по ногам при падении
                  EntityDamageEvents.AFTER_DAMAGE.register((entity, source, amount, damage, absorbed) -> {
                      if (entity instanceof ServerPlayerEntity player && source.isOf(DamageTypes.FALL)) {
                          damageZone(player, 18, 26, (int)amount * 4);
                      }
                  });

                  // Урон по рукам при ударе
                  AttackEntityCallback.EVENT.register((player, world, hand, entity, hit) -> {
                      if (!world.isClient && player instanceof ServerPlayerEntity sPlayer) {
                          damageZone(sPlayer, 0, 8, 2);
                      }
                      return ActionResult.PASS;
                  });

                  // Тик эффектов
                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity p : server.getPlayerManager().getPlayerList()) {
                          checkVitals(p);
                      }
                  });
              }

              private void damageZone(ServerPlayerEntity player, int start, int end, int amount) {
                  SimpleInventory inv = cavities.get(player.getUuid());
                  if (inv == null) return;
                  for (int i = start; i <= end; i++) {
                      ItemStack s = inv.getStack(i);
                      if (s.getItem() instanceof net.minecraft.item.Item && s.isDamageable()) {
                          s.damage(amount, player, p -> {});
                          if (s.isEmpty()) {
                              player.getWorld().playSound(null, player.getX(), player.getY(), player.getZ(), SoundEvents.ENTITY_ITEM_BREAK, SoundCategory.PLAYERS, 1.0f, 0.5f);
                          }
                      }
                  }
              }

              private void checkVitals(ServerPlayerEntity player) {
                  SimpleInventory inv = cavities.get(player.getUuid());
                  if (inv == null) return;

                  boolean canWalk = false;
                  boolean canWork = false;

                  for (int i = 0; i < 9; i++) if (!inv.getStack(i).isEmpty()) canWork = true; // Руки
                  for (int i = 18; i < 27; i++) if (!inv.getStack(i).isEmpty()) canWalk = true; // Ноги

                  if (!canWalk) {
                      player.addStatusEffect(new StatusEffectInstance(StatusEffects.SLOWNESS, 40, 254, false, false));
                      player.addStatusEffect(new StatusEffectInstance(StatusEffects.JUMP_BOOST, 40, 200, false, false));
                  }
                  if (!canWork) {
                      player.addStatusEffect(new StatusEffectInstance(StatusEffects.MINING_FATIGUE, 40, 4, false, false));
                  }
              }
          }
          EOF

          # 3. Ресурсы
          echo '{"item.dimos.bone_tool":"Костоправ","item.dimos.wood_prosthesis":"Деревянный протез"}' > src/main/resources/assets/dimos/lang/ru_ru.json
          echo '{"schemaVersion":1,"id":"dimos","version":"4.6.0","entrypoints":{"main":["com.dimos.mod.DimMod"]},"depends":{"fabricloader":">=0.16.0","minecraft":"1.21.1"}}' > src/main/resources/fabric.mod.json
          echo "pluginManagement { repositories { maven { url = 'https://maven.fabricmc.net/' }; mavenCentral() } }; rootProject.name = 'dimos-surgery'" > settings.gradle
          echo "plugins { id 'fabric-loom' version '1.7-SNAPSHOT' } \n version = '4.6.0' \n group = 'com.dimos.mod' \n repositories { mavenCentral(); maven { url = 'https://maven.fabricmc.net/' } } \n dependencies { minecraft 'com.mojang:minecraft:1.21.1'; mappings 'net.fabricmc:yarn:1.21.1+build.3:v2'; modImplementation 'net.fabricmc:fabric-loader:0.16.9'; modImplementation 'net.fabricmc.fabric-api:fabric-api:0.102.1+1.21.1' }" > build.gradle

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: Surgery-Disability-V46
          path: build/libs/*.jar
