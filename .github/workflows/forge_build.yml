name: Fabric_DimSpace_V1_3_Galactic
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Initialize Galactic Mod
        run: |
          mkdir -p src/main/java/com/dimos/space/item
          mkdir -p src/main/java/com/dimos/space/block
          mkdir -p src/main/resources/assets/dimspace/lang
          mkdir -p src/main/resources/assets/dimspace/models/item
          mkdir -p src/main/resources/assets/dimspace/models/block
          mkdir -p src/main/resources/data/dimspace/dimension
          mkdir -p src/main/resources/data/dimspace/worldgen/configured_feature

          # 1. LuniteTools.java (Супер-инструменты)
          cat <<EOF > src/main/java/com/dimos/space/item/LuniteItem.java
          package com.dimos.space.item;
          import net.minecraft.item.PickaxeItem;
          import net.minecraft.item.SwordItem;
          import net.minecraft.item.ToolMaterial;
          import net.minecraft.recipe.Ingredient;
          import net.minecraft.item.Items;

          public class LuniteItem {
              public static final ToolMaterial MATERIAL = new ToolMaterial() {
                  @Override public int getDurability() { return -1; } // Бесконечно
                  @Override public float getMiningSpeedMultiplier() { return 15.0f; }
                  @Override public float getAttackDamage() { return 10.0f; }
                  @Override public int getEnchantability() { return 25; }
                  @Override public Ingredient getRepairIngredient() { return Ingredient.ofItems(Items.NETHERITE_INGOT); }
              };
              public static class LunitePickaxe extends PickaxeItem {
                  public LunitePickaxe(Settings s) { super(MATERIAL, s); }
              }
              public static class LuniteSword extends SwordItem {
                  public LuniteSword(Settings s) { super(MATERIAL, s); }
              }
          }
          EOF

          # 2. SpaceBlocks.java (Руда и Камень)
          cat <<EOF > src/main/java/com/dimos/space/block/SpaceBlocks.java
          package com.dimos.space.block;
          import net.minecraft.block.AbstractBlock;
          import net.minecraft.block.Block;
          import net.minecraft.block.Blocks;
          import net.minecraft.item.BlockItem;
          import net.minecraft.item.Item;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.util.Identifier;

          public class SpaceBlocks {
              public static final Block MOON_STONE = new Block(AbstractBlock.Settings.copy(Blocks.STONE));
              public static final Block LUNITE_ORE = new Block(AbstractBlock.Settings.copy(Blocks.DIAMOND_ORE).luminance(s -> 8));
              
              public static void register() {
                  Registry.register(Registries.BLOCK, Identifier.of("dimspace", "moon_stone"), MOON_STONE);
                  Registry.register(Registries.BLOCK, Identifier.of("dimspace", "lunite_ore"), LUNITE_ORE);
                  Registry.register(Registries.ITEM, Identifier.of("dimspace", "moon_stone"), new BlockItem(MOON_STONE, new Item.Settings()));
                  Registry.register(Registries.ITEM, Identifier.of("dimspace", "lunite_ore"), new BlockItem(LUNITE_ORE, new Item.Settings()));
              }
          }
          EOF

          # 3. SpaceMod.java (Переход в Космос + Полет)
          cat <<EOF > src/main/java/com/dimos/space/SpaceMod.java
          package com.dimos.space;

          import com.dimos.space.item.SpaceItems;
          import com.dimos.space.block.SpaceBlocks;
          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.entity.effect.StatusEffectInstance;
          import net.minecraft.entity.effect.StatusEffects;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.registry.RegistryKey;
          import net.minecraft.registry.RegistryKeys;
          import net.minecraft.util.Identifier;
          import net.minecraft.world.World;

          public class SpaceMod implements ModInitializer {
              @Override
              public void onInitialize() {
                  SpaceItems.register();
                  SpaceBlocks.register();

                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity player : server.getPlayerManager().getPlayerList()) {
                          Identifier dim = player.getWorld().getRegistryKey().getValue();
                          
                          // Переход с Луны в Открытый Космос
                          if (dim.equals(Identifier.of("dimspace", "moon")) && player.getY() > 250) {
                              RegistryKey<World> spaceKey = RegistryKey.of(RegistryKeys.WORLD, Identifier.of("dimspace", "deep_space"));
                              ServerWorld spaceWorld = server.getWorld(spaceKey);
                              if (spaceWorld != null) player.teleport(spaceWorld, player.getX(), 50, player.getZ(), 0, 0);
                          }

                          // Физика открытого космоса
                          if (dim.equals(Identifier.of("dimspace", "deep_space"))) {
                              player.addStatusEffect(new StatusEffectInstance(StatusEffects.LEVITATION, 10, 0, false, false));
                              player.setNoGravity(true);
                          } else {
                              player.setNoGravity(false);
                          }
                      }
                  });
              }
          }
          EOF

          # 4. Модели и Текстуры (V1.3)
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/netherite_pickaxe"}}' > src/main/resources/assets/dimspace/models/item/lunite_pickaxe.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/netherite_sword"}}' > src/main/resources/assets/dimspace/models/item/lunite_sword.json
          echo '{"parent":"minecraft:block/cube_all","textures":{"all":"minecraft:block/crying_obsidian"}}' > src/main/resources/assets/dimspace/models/block/lunite_ore.json

          # 5. Генерация Кратеров (Упрощенно через шум в Moon.json)
          cat <<EOF > src/main/resources/data/dimspace/dimension/moon.json
          {
            "type": "minecraft:the_end",
            "generator": {
              "type": "minecraft:noise",
              "settings": {
                "default_block": { "Name": "dimspace:moon_stone" },
                "default_fluid": { "Name": "minecraft:air" },
                "noise": { "min_y": 0, "height": 256, "size_horizontal": 2, "size_vertical": 1 },
                "surface_rule": {
                  "type": "minecraft:condition",
                  "if_true": { "type": "minecraft:noise_threshold", "noise": "minecraft:surface", "min_threshold": 0.5 },
                  "then_run": { "type": "minecraft:block", "result_state": { "Name": "minecraft:air" } }
                }
              },
              "biome_source": { "type": "minecraft:fixed", "biome": "minecraft:the_end" }
            }
          }
          EOF

          # 6. Локализация
          echo '{"item.dimspace.lunite_pickaxe":"Кирка из Люнита","item.dimspace.lunite_sword":"Меч из Люнита","block.dimspace.lunite_ore":"Люнитовая руда"}' > src/main/resources/assets/dimspace/lang/ru_ru.json
          echo '{"schemaVersion":1,"id":"dimspace","version":"1.3.0","entrypoints":{"main":["com.dimos.space.SpaceMod"]},"depends":{"fabricloader":">=0.16.0","minecraft":"1.21.1"}}' > src/main/resources/fabric.mod.json
          echo "rootProject.name = 'dimspace'" > settings.gradle

      - name: Build Galactic Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: DimSpace-V1_3_Galactic
          path: build/libs/*.jar
