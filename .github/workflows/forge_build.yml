name: KUSMAN_V45_WRAPPER_FIX
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      
      - name: Generate Project and Wrapper
        run: |
          # 1. Создаем структуру папок
          mkdir -p src/main/java/com/kusman src/main/resources
          
          # 2. Создаем файлы конфигурации
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'kusman_mod'" >> settings.gradle

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.18.4"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "kusman", "version": "1.0.0", "name": "KusmanV45",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] }
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;

          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandManager;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandRegistrationCallback;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.entity.mob.HostileEntity;
          import net.minecraft.entity.passive.PassiveEntity;
          import net.minecraft.text.Text;
          import net.minecraft.util.Hand;

          public class KusmanClient implements ClientModInitializer {
              public static boolean auraAll = false, auraPlayers = false, auraMobs = false;
              public static boolean fly = false, god = false, step = false, speed = false;
              private final String P = "§b[K] §r";

              @Override
              public void onInitializeClient() {
                  ClientCommandRegistrationCallback.EVENT.register((dispatcher, registryAccess) -> {
                      dispatcher.register(ClientCommandManager.literal("aura").executes(c -> {
                          auraAll = !auraAll; auraPlayers = false; auraMobs = false;
                          c.getSource().sendFeedback(Text.literal(P + "§fAura (All): " + (auraAll ? "§aON" : "§cOFF"))); return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("aurapl").executes(c -> {
                          auraPlayers = !auraPlayers; auraAll = false;
                          c.getSource().sendFeedback(Text.literal(P + "§fAura (Players): " + (auraPlayers ? "§aON" : "§cOFF"))); return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("auramb").executes(c -> {
                          auraMobs = !auraMobs; auraAll = false;
                          c.getSource().sendFeedback(Text.literal(P + "§fAura (Mobs): " + (auraMobs ? "§aON" : "§cOFF"))); return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("fl").executes(c -> {
                          fly = !fly; c.getSource().sendFeedback(Text.literal(P + "§fFly: " + (fly ? "§aON" : "§cOFF"))); return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("godm").executes(c -> {
                          god = !god; c.getSource().sendFeedback(Text.literal(P + "§fGodMode: " + (god ? "§aON" : "§cOFF"))); return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("step").executes(c -> {
                          step = !step; c.getSource().sendFeedback(Text.literal(P + "§fStep: " + (step ? "§aON" : "§cOFF"))); return 1;
                      }));
                      dispatcher.register(ClientCommandManager.literal("speed").executes(c -> {
                          speed = !speed; c.getSource().sendFeedback(Text.literal(P + "§fSpeed: " + (speed ? "§aON" : "§cOFF"))); return 1;
                      }));
                  });

                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null) return;
                      if (god) { client.player.setHealth(20f); client.player.getAbilities().invulnerable = true; }
                      if (fly) { client.player.getAbilities().allowFlying = true; client.player.getAbilities().flying = true; }
                      if (step) { client.player.setStepHeight(1.5f); } else { client.player.setStepHeight(0.6f); }
                      if (speed && (client.player.forwardSpeed != 0 || client.player.sidewaysSpeed != 0)) {
                          client.player.updateVelocity(0.12f, client.player.getRotationVector());
                      }
                      if (auraAll || auraPlayers || auraMobs) {
                          client.world.getEntities().forEach(e -> {
                              if (e instanceof LivingEntity target && target != client.player && target.isAlive() && client.player.distanceTo(target) < 4.5) {
                                  boolean hit = auraAll || (auraPlayers && target instanceof PlayerEntity) || (auraMobs && (target instanceof HostileEntity || target instanceof PassiveEntity));
                                  if (hit && client.player.getAttackCooldownProgress(0) >= 0.9f) {
                                      client.interactionManager.attackEntity(client.player, target);
                                      client.player.swingHand(Hand.MAIN_HAND);
                                  }
                              }
                          });
                      }
                  });
              }
          }
          EOF

      - name: Setup and Build
        run: |
          # Генерируем gradlew если его нет
          gradle wrapper --gradle-version 8.10
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V45-Final-Fix
          path: build/libs/*.jar
