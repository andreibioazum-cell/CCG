name: KUSMAN_V29_STABLE_NO_MIXIN_CRASH
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.10' }

      - name: Generate Project
        run: |
          mkdir -p src/main/java/com/kusman/mixin src/main/resources
          
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'kusman_mod'" >> settings.gradle

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.0"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "kusman", "version": "1.0.0", "name": "KusmanV29",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] },
            "mixins": [ "kusman.mixins.json" ]
          }
          EOF

          echo '{"required":true,"package":"com.kusman.mixin","mixins":["NetworkMixin"]}' > src/main/resources/kusman.mixins.json

          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandManager;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandRegistrationCallback;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.entity.Entity;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.entity.mob.MobEntity;
          import net.minecraft.text.Text;
          import net.minecraft.util.Hand;
          import net.minecraft.util.math.MathHelper;

          public class KusmanClient implements ClientModInitializer {
              public static boolean xray=false, god=false, fly=false, aura=false, aurapl=false, auramb=false;
              public static final String PREFIX = "§b[Dimasi4ek229] §f";

              @Override public void onInitializeClient() {
                  ClientCommandRegistrationCallback.EVENT.register((dispatcher, registryAccess) -> {
                      dispatcher.register(ClientCommandManager.literal("god").executes(c -> { god = !god; msg("God: " + god); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("aura").executes(c -> { aura = !aura; msg("Aura All: " + aura); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("aurapl").executes(c -> { aurapl = !aurapl; msg("Aura Players: " + aurapl); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("auramb").executes(c -> { auramb = !auramb; msg("Aura Mobs: " + auramb); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("xray").executes(c -> { xray = !xray; msg("Xray (Fullbright): " + xray); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("ggg").executes(c -> { fly = !fly; msg("Fly: " + fly); return 1; }));
                  });

                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null || client.world == null) return;
                      
                      if (god) { client.player.setHealth(20f); client.player.getHungerManager().setFoodLevel(20); }
                      if (fly) { client.player.getAbilities().allowFlying = true; client.player.getAbilities().flying = true; }
                      if (xray) { client.options.getGamma().setValue(100.0); }

                      if (aura || aurapl || auramb) {
                          for (Entity e : client.world.getEntities()) {
                              if (e instanceof LivingEntity target && target != client.player && target.isAlive()) {
                                  double dist = client.player.distanceTo(target);
                                  if (dist <= 4.0) {
                                      boolean valid = (aura) || (aurapl && target instanceof PlayerEntity) || (auramb && target instanceof MobEntity);
                                      if (valid && client.player.getAttackCooldownProgress(0) >= 1.0f) {
                                          // Стабильная наводка
                                          double dx = target.getX() - client.player.getX();
                                          double dy = target.getEyeY() - client.player.getEyeY();
                                          double dz = target.getZ() - client.player.getZ();
                                          double distXZ = Math.sqrt(dx * dx + dz * dz);
                                          client.player.setYaw((float) Math.toDegrees(Math.atan2(-dx, dz)));
                                          client.player.setPitch((float) Math.toDegrees(Math.atan2(-dy, distXZ)));
                                          
                                          client.interactionManager.attackEntity(client.player, target);
                                          client.player.swingHand(Hand.MAIN_HAND);
                                          break; 
                                      }
                                  }
                              }
                          }
                      }
                  });
              }
              private void msg(String s) { if (MinecraftClient.getInstance().player != null) MinecraftClient.getInstance().player.sendMessage(Text.literal(PREFIX + s), false); }
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/mixin/NetworkMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.client.network.ClientPlayNetworkHandler;
          import net.minecraft.network.packet.s2c.play.EntityDamageS2CPacket;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(ClientPlayNetworkHandler.class)
          public class NetworkMixin {
              @Inject(method = "onEntityDamage", at = @At("HEAD"), cancellable = true)
              private void blockDamage(EntityDamageS2CPacket packet, CallbackInfo ci) {
                  if (KusmanClient.god) ci.cancel();
              }
          }
          EOF

      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V29-Safe
          path: build/libs/*.jar
