name: Roblox_Java_Final_Fixed_V6
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Project Structure
        run: |
          # Создаем ПРАВИЛЬНУЮ структуру папок (важно!)
          mkdir -p app/src/main/java/com/dimos/roblox
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Настройки AndroidX
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # 2. Исправленный Манифест (теперь папка точно существует)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.dimos.roblox">
              <application
                  android:allowBackup="true"
                  android:label="Roblox Mobile"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. Цвета
          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#0d1528</color>
              <color name="accent_green">#22c55e</color>
              <color name="ui_glass">#AA000000</color>
          </resources>
          EOF

          # 4. Стили (чтобы не было ошибок темы)
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
              </style>
          </resources>
          EOF

          # 5. Разметка UI
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/bg_dark">
              <LinearLayout
                  android:id="@+id/menu_layout"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_gravity="center"
                  android:orientation="vertical">
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="ROBLOX JAVA"
                      android:textColor="@color/accent_green"
                      android:textSize="32sp"
                      android:textStyle="bold"/>
                  <Button android:id="@+id/btn_play" 
                      android:layout_width="200dp" 
                      android:layout_height="60dp" 
                      android:layout_marginTop="20dp"
                      android:text="ИГРАТЬ"/>
              </LinearLayout>
          </FrameLayout>
          EOF

          # 6. Java Код
          cat <<EOF > app/src/main/java/com/dimos/roblox/MainActivity.java
          package com.dimos.roblox;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.View;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          # 7. Конфигурация Gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos.roblox'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.dimos.roblox"
                  minSdk 24
                  targetSdk 34
                  versionCode 6
                  versionName "6.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.code.gson:gson:2.10.1'
          }
          EOF
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Roblox_Final_Fixed_V6
          path: app/build/outputs/apk/debug/app-debug.apk
