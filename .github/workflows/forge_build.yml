name: DimOS_VPN_GodMode_Xray
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create directories and Download Xray Core
        run: |
          # Создаем директории перед распаковкой
          mkdir -p app/libs/xray
          mkdir -p app/src/main/assets
          
          # Download Xray Linux binary (для теста, потом заменим на Android)
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip -d app/libs/xray/
          # Rename to xray for consistency
          mv app/libs/xray/xray app/libs/xray/xray_linux
          
          echo "Xray core downloaded successfully"

      - name: Setup Xray for Android
        run: |
          # Create download script that will fetch Xray on first run
          cat <<'EOF' > app/src/main/assets/setup_xray.sh
          #!/system/bin/sh
          XRAY_DIR=\$DATA_DIR/xray
          mkdir -p \$XRAY_DIR
          
          # Check architecture and download appropriate binary
          ARCH=\$(getprop ro.product.cpu.abi)
          case \$ARCH in
              arm64-v8a)
                  URL="https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64.zip"
                  ;;
              armeabi-v7a)
                  URL="https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm32-v7a.zip"
                  ;;
              x86)
                  URL="https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-x86.zip"
                  ;;
              x86_64)
                  URL="https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-x64.zip"
                  ;;
              *)
                  echo "Unsupported architecture: \$ARCH"
                  exit 1
                  ;;
          esac
          
          # Download and extract
          cd \$XRAY_DIR
          curl -L -o xray.zip \$URL
          unzip -o xray.zip
          chmod +x xray
          rm xray.zip
          echo "Xray downloaded for architecture: \$ARCH"
          EOF
          
          chmod +x app/src/main/assets/setup_xray.sh

      - name: Initialize VPN Project with Xray
        run: |
          mkdir -p app/src/main/java/com/dimos/vpn
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/jniLibs/arm64-v8a
          
          # Save the VPN config
          cat <<'EOF' > app/src/main/assets/config.json
