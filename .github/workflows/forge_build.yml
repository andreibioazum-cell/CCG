name: Enjoer_Pro_Engine_v1.7
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
          </style></resources>
          EOF

          # UI: Кнопки и Джойстик
          cat <<EOF > app/src/main/res/drawable/ui_element.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#CC050A18"/><corners android:radius="25dp"/><stroke android:width="2dp" android:color="#22C55E"/>
          </shape>
          EOF

          # Layout
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent" />
              <RelativeLayout android:id="@+id/input_zone" android:layout_width="match_parent" android:layout_height="match_parent">
                  <View android:id="@+id/btn_jump" android:layout_width="90dp" android:layout_height="90dp"
                      android:layout_alignParentRight="true" android:layout_alignParentBottom="true"
                      android:layout_margin="50dp" android:background="@drawable/ui_element" />
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="140dp" android:layout_height="140dp"
                      android:layout_alignParentBottom="true" android:layout_marginLeft="50dp" android:layout_marginBottom="50dp"
                      android:background="@drawable/ui_element" android:alpha="0.7" />
                  <View android:id="@+id/joy_stick" android:layout_width="50dp" android:layout_height="50dp"
                      android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="45dp" android:layout_marginTop="45dp" android:background="#22C55E" />
              </RelativeLayout>
          </FrameLayout>
          EOF

          # --- ENGINE: RENDERER & PHYSICS ---
          cat <<EOF > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.ArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] proj=new float[16], view=new float[16], model=new float[16];
              public float pX=0, pY=2.1f, pZ=5, rY=0, rX=0, jX=0, jY=0, vY=0, walkAnim=0;
              private int prog;
              private FloatBuffer vBuf;
              public boolean gunEquipped = false;

              public static class Box {
                  float x, y, z, sx, sy, sz, r, g, b;
                  Box(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) 
                  { this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b; }
                  
                  boolean checkCol(float px, float py, float pz) {
                      return px > x-sx/2-0.3f && px < x+sx/2+0.3f && pz > z-sz/2-0.3f && pz < z+sz/2+0.3f && py > y-sy/2-2.1f && py < y+sy/2;
                  }
              }
              private ArrayList<Box> map = new ArrayList<>();

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="#version 300 es\nlayout(location=0) in vec4 aP; uniform mat4 uMVP; out float vZ; void main(){gl_Position=uMVP*aP; vZ=gl_Position.z;}";
                  String fs="#version 300 es\nprecision highp float; in float vZ; uniform vec4 uC; out vec4 fC; void main(){ float f=0.0; if(vZ>20.0) f=clamp((vZ-20.0)/100.0, 0.0, 1.0); fC=mix(uC, vec4(0.02, 0.04, 0.08, 1.0), f); }";
                  prog=shP(vs, fs);
                  float[] vc={-0.5f,0.5f,0.5f,-0.5f,-0.5f,0.5f,0.5f,0.5f,0.5f,0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f,-0.5f,-0.5f,-0.5f,0.5f,0.5f,-0.5f,0.5f,-0.5f,-0.5f, -0.5f,0.5f,-0.5f,-0.5f,0.5f,0.5f,0.5f,0.5f,-0.5f,0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f,-0.5f,-0.5f,0.5f,0.5f,-0.5f,-0.5f,0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f,-0.5f,-0.5f,-0.5f,-0.5f,0.5f,0.5f,-0.5f,-0.5f,0.5f, 0.5f,0.5f,-0.5f,0.5f,-0.5f,-0.5f,0.5f,0.5f,0.5f,0.5f,-0.5f,0.5f};
                  vBuf=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBuf.position(0);
                  
                  // Плейс: Паркур
                  map.add(new Box(0, 0, 0, 15, 0.2f, 15, 0.1f, 0.1f, 0.15f));
                  map.add(new Box(0, 1.5f, -12, 4, 1, 4, 0.14f, 0.77f, 0.36f));
                  map.add(new Box(7, 3.0f, -20, 4, 1, 4, 0.14f, 0.77f, 0.36f));
                  map.add(new Box(-2, 5.0f, -30, 4, 1, 4, 0.14f, 0.77f, 0.36f));
                  map.add(new Box(-10, 6.5f, -40, 6, 0.5f, 6, 0.9f, 0.1f, 0.1f)); // Финиш
                  map.add(new Box(-10, 7.5f, -40, 0.4f, 1.5f, 0.4f, 1, 1, 0)); // Пушка
              }

              @Override public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,65,(float)w/h,0.1f,500f);
              }

              @Override public void onDrawFrame(GL10 gl) {
                  physics();
                  GLES30.glClearColor(0.02f, 0.04f, 0.08f, 1.0f);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  
                  float b = (Math.abs(jX)>0.1f || Math.abs(jY)>0.1f) ? (float)Math.sin(walkAnim*0.15f)*0.04f : 0;
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX))), vy=(float)Math.sin(Math.toRadians(rX)), vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  Matrix.setLookAtM(view,0,pX,pY+b,pZ,pX+vx,pY+vy+b,pZ+vz,0,1,0);

                  GLES30.glUseProgram(prog);
                  int uMVP=GLES30.glGetUniformLocation(prog,"uMVP"), uC=GLES30.glGetUniformLocation(prog,"uC");
                  GLES30.glVertexAttribPointer(0, 3, GLES30.GL_FLOAT, false, 0, vBuf); GLES30.glEnableVertexAttribArray(0);

                  for(Box box : map) {
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,box.x,box.y,box.z); Matrix.scaleM(model,0,box.sx,box.sy,box.sz);
                      draw(uMVP, uC, box.r, box.g, box.b);
                  }
                  renderPlayerAssets(uMVP, uC, b);
              }

              private void renderPlayerAssets(int uMVP, int uC, float b) {
                  GLES30.glClear(GLES30.GL_DEPTH_BUFFER_BIT);
                  // Левая рука
                  drawPart(-0.45f, -0.5f+b, -0.7f, 0.12f, 0.12f, 0.5f, 0.8f, 0.6f, 0.4f, uMVP, uC);
                  // Правая рука
                  drawPart(0.45f, -0.5f+b, -0.7f, 0.12f, 0.12f, 0.5f, 0.8f, 0.6f, 0.4f, uMVP, uC);
                  
                  if(gunEquipped) {
                      // Лазерная пушка
                      drawPart(0.45f, -0.35f+b, -1.1f, 0.1f, 0.15f, 0.45f, 0.2f, 0.2f, 0.2f, uMVP, uC);
                      // ЛАЗЕР (светится)
                      drawPart(0.45f, -0.32f+b, -10f, 0.015f, 0.015f, 18f, 0, 1, 0, uMVP, uC);
                  }
              }

              private void physics() {
                  vY -= 0.018f; pY += vY;
                  boolean onGround = false;
                  for(Box b : map) {
                      if(b.checkCol(pX, pY, pZ)) {
                          if(vY < 0) { pY = b.y + b.sy/2 + 2.1f; vY = 0; onGround = true; }
                      }
                  }
                  if(pY < -20) { pX=0; pY=5; pZ=5; vY=0; } // Respawn
                  
                  float s=0.18f, rad=(float)Math.toRadians(rY);
                  float nextX = pX + ((float)Math.sin(rad)*-jY + (float)Math.cos(rad)*jX)*s;
                  float nextZ = pZ + ((float)-Math.cos(rad)*-jY + (float)Math.sin(rad)*jX)*s;
                  
                  // Коллизия стен
                  boolean wall = false;
                  for(Box b : map) if(b.checkCol(nextX, pY, nextZ) && Math.abs(pY - (b.y+b.sy/2+2.1f)) > 0.5f) wall=true;
                  if(!wall) { pX=nextX; pZ=nextZ; }
                  
                  if(Math.abs(jX)>0 || Math.abs(jY)>0) walkAnim += 1.2f;
                  if(Math.abs(pX+10)<2 && Math.abs(pZ+40)<2) gunEquipped = true;
              }

              private void drawPart(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b, int uMVP, int uC) {
                  Matrix.setIdentityM(model, 0); Matrix.translateM(model, 0, x, y, z); Matrix.scaleM(model, 0, sx, sy, sz);
                  draw(uMVP, uC, r, g, b);
              }

              private void draw(int uMVP, int uC, float r, float g, float b) {
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0); Matrix.multiplyMM(mvp,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP, 1, false, mvp, 0); GLES30.glUniform4f(uC, r, g, b, 1.0f);
                  for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP, i*4, 4);
              }
              private int shP(String v,String f){int p=GLES30.glCreateProgram();GLES30.glAttachShader(p,sh(35633,v));GLES30.glAttachShader(p,sh(35632,f));GLES30.glLinkProgram(p);return p;}
              private int sh(int t,String s){int i=GLES30.glCreateShader(t);GLES30.glShaderSource(i,s);GLES30.glCompileShader(i);return i;}
          }
          EOF

          # --- MAIN ACTIVITY: INSTANT JUMP & SMOOTH LOOK ---
          cat <<EOF > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lastX, lastY;
              private int lookID = -1, joyID = -1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  // МГНОВЕННЫЙ ПРЫЖОК ПО НАЖАТИЮ
                  findViewById(R.id.btn_jump).setOnTouchListener((v, e) -> {
                      if(e.getAction() == MotionEvent.ACTION_DOWN && ren.vY == 0) ren.vY = 0.42f;
                      return true;
                  });

                  View stick = findViewById(R.id.joy_stick);
                  View base = findViewById(R.id.joy_base);
                  findViewById(R.id.input_zone).setOnTouchListener((v, e) -> {
                      int act = e.getActionMasked(), idx = e.getActionIndex(), id = e.getPointerId(idx);
                      float x = e.getX(idx), y = e.getY(idx);

                      if(act==MotionEvent.ACTION_DOWN || act==MotionEvent.ACTION_POINTER_DOWN) {
                          if(x < v.getWidth()/2f && joyID == -1) joyID = id;
                          else if(lookID == -1) { lookID = id; lastX = x; lastY = y; }
                      } else if(act==MotionEvent.ACTION_MOVE) {
                          for(int i=0; i<e.getPointerCount(); i++) {
                              int pid = e.getPointerId(i);
                              if(pid == joyID) {
                                  float dx = e.getX(i)-(base.getLeft()+70), dy = e.getY(i)-(base.getTop()+70), d=(float)Math.sqrt(dx*dx+dy*dy);
                                  if(d>60){ dx*=60/d; dy*=60/d; }
                                  stick.setTranslationX(dx); stick.setTranslationY(dy);
                                  ren.jX = dx/60f; ren.jY = dy/60f;
                              } else if(pid == lookID) {
                                  // Плавный поворот без вязкости
                                  ren.rY += (e.getX(i)-lastX)*0.12f;
                                  ren.rX = Math.max(-88, Math.min(88, ren.rX-(e.getY(i)-lastY)*0.12f));
                                  lastX = e.getX(i); lastY = e.getY(i);
                              }
                          }
                      } else if(act==MotionEvent.ACTION_UP || act==MotionEvent.ACTION_POINTER_UP) {
                          if(id == joyID) { joyID = -1; ren.jX=0; ren.jY=0; stick.setTranslationX(0); stick.setTranslationY(0); }
                          else if(id == lookID) lookID = -1;
                      }
                      return true;
                  });
              }
          }
          EOF

          # Build Config
          echo "include ':app'" > settings.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer Pro" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Pro_Engine
          path: app/build/outputs/apk/debug/app-debug.apk
