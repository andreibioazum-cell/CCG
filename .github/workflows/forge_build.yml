name: DIAMOND_GOD_MOD_V7
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.10' }

      - name: Generate Advanced God Mod
        run: |
          mkdir -p src/main/java/com/godmod/mixin
          
          echo "rootProject.name = 'god_mod'" > settings.gradle

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.18.4"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "godmod", "version": "7.0.0", "name": "Diamond God",
            "entrypoints": { "main": [ "com.godmod.GodMod" ] },
            "mixins": [ "godmod.mixins.json" ],
            "depends": { "fabricloader": ">=0.18.4", "minecraft": "~1.21", "fabric-api": "*" }
          }
          EOF

          cat <<'EOF' > src/main/resources/godmod.mixins.json
          {
            "required": true,
            "minVersion": "0.8",
            "package": "com.godmod.mixin",
            "compatibilityLevel": "JAVA_21",
            "mixins": [ "DiamondBlockMixin" ],
            "injectors": { "defaultRequire": 1 }
          }
          EOF

          cat <<'EOF' > src/main/java/com/godmod/GodMod.java
          package com.godmod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.block.Blocks;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.LightningEntity;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.effect.StatusEffectInstance;
          import net.minecraft.entity.effect.StatusEffects;
          import net.minecraft.particle.ParticleTypes;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.text.Text;
          import net.minecraft.util.math.BlockPos;
          import net.minecraft.util.math.Box;
          import java.util.HashMap;
          import java.util.Map;
          import java.util.UUID;

          public class GodMod implements ModInitializer {
              // Храним выбранный режим для каждого игрока
              public static final Map<UUID, Integer> playerMode = new HashMap<>();
              // 0 - Реген, 1 - Молния, 2 - Луч

              @Override
              public void onInitialize() {
                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity player : server.getPlayerManager().getPlayerList()) {
                          BlockPos down = player.getBlockPos().down();
                          if (player.getWorld().getBlockState(down).isOf(Blocks.DIAMOND_BLOCK)) {
                              int mode = playerMode.getOrDefault(player.getUuid(), 0);
                              applyPower(player, mode);
                          }
                      }
                  });
              }

              private void applyPower(ServerPlayerEntity player, int mode) {
                  ServerWorld world = (ServerWorld) player.getWorld();
                  switch (mode) {
                      case 0: // Регенерация
                          player.addStatusEffect(new StatusEffectInstance(StatusEffects.REGENERATION, 40, 1, false, false));
                          break;
                      case 1: // Молния (раз в 2 секунды)
                          if (world.getTime() % 40 == 0) {
                              world.getEntitiesByClass(LivingEntity.class, new Box(player.getBlockPos()).expand(10), e -> e != player)
                                  .forEach(entity -> {
                                      LightningEntity lightning = EntityType.LIGHTNING_BOLT.create(world);
                                      if (lightning != null) {
                                          lightning.refreshPositionAfterTeleport(entity.getX(), entity.getY(), entity.getZ());
                                          world.spawnEntity(lightning);
                                      }
                                  });
                          }
                          break;
                      case 2: // Луч Бога
                          LivingEntity target = null;
                          for (LivingEntity e : world.getEntitiesByClass(LivingEntity.class, new Box(player.getBlockPos()).expand(15), e -> e != player)) {
                              target = e; break;
                          }
                          if (target != null) {
                              // Визуальный эффект желтого луча (частицы)
                              for(double i=0; i<target.getEyeHeight(); i+=0.2) {
                                  world.spawnParticles(ParticleTypes.ELECTRIC_SPARK, target.getX(), target.getY()+i, target.getZ(), 5, 0.1, 0.1, 0.1, 0.05);
                              }
                              target.damage(world.getDamageSources().magic(), 4.0f);
                          }
                          break;
                  }
              }
          }
          EOF

          cat <<'EOF' > src/main/java/com/godmod/mixin/DiamondBlockMixin.java
          package com.godmod.mixin;

          import com.godmod.GodMod;
          import net.minecraft.block.AbstractBlock;
          import net.minecraft.block.Block;
          import net.minecraft.block.BlockState;
          import net.minecraft.block.Blocks;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.text.Text;
          import net.minecraft.util.ActionResult;
          import net.minecraft.util.Hand;
          import net.minecraft.util.hit.BlockHitResult;
          import net.minecraft.util.math.BlockPos;
          import net.minecraft.world.World;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

          @Mixin(Block.class)
          public abstract class DiamondBlockMixin {
              @Inject(method = "onUse", at = @At("HEAD"), cancellable = true)
              private void onDiamondUse(BlockState state, World world, BlockPos pos, PlayerEntity player, BlockHitResult hit, CallbackInfoReturnable<ActionResult> cir) {
                  if (state.isOf(Blocks.DIAMOND_BLOCK) && player.isSneaking()) {
                      if (!world.isClient) {
                          int currentMode = GodMod.playerMode.getOrDefault(player.getUuid(), 0);
                          int nextMode = (currentMode + 1) % 3;
                          GodMod.playerMode.put(player.getUuid(), nextMode);
                          
                          String modeName = switch (nextMode) {
                              case 0 -> "§aРЕГЕНЕРАЦИЯ";
                              case 1 -> "§eГНЕВ МОЛНИЙ";
                              case 2 -> "§6ЛУЧ БОГА";
                              default -> "???";
                          };
                          
                          player.sendMessage(Text.literal("§bРежим изменен на: " + modeName), true);
                      }
                      cir.setReturnValue(ActionResult.SUCCESS);
                  }
              }
          }
          EOF

      - name: Build
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Diamond-God-V7
          path: build/libs/*.jar
