name: TOTEM_THUNDER_V9_3_FINAL
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Generate Ultra Stable Totem Mod
        run: |
          mkdir -p src/main/java/com/totemmod
          mkdir -p src/main/resources
          
          cat <<'EOF' > settings.gradle
          pluginManagement { repositories { maven { url "https://maven.fabricmc.net/" }; gradlePluginPortal() } }
          rootProject.name = 'totem_mod'
          EOF

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              // Используем максимально совместимые маппинги
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.18.4"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "totemmod",
            "version": "9.3.0",
            "name": "Totem Thunder",
            "entrypoints": { "main": [ "com.totemmod.TotemMod" ] },
            "depends": { "fabricloader": ">=0.18.4", "minecraft": "~1.21" }
          }
          EOF

          cat <<'EOF' > src/main/java/com/totemmod/TotemMod.java
          package com.totemmod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.player.UseItemCallback;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.LightningEntity;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.Items;
          import net.minecraft.util.TypedActionResult;
          import net.minecraft.util.math.Box;
          import java.util.List;

          public class TotemMod implements ModInitializer {
              @Override
              public void onInitialize() {
                  System.out.println("!!! TOTEM THUNDER 9.3 - ULTRA STABLE START !!!");

                  UseItemCallback.EVENT.register((player, world, hand) -> {
                      ItemStack stack = player.getStackInHand(hand);

                      // Проверка на сервере и наличие тотема
                      if (!world.isClient() && stack.isOf(Items.TOTEM_OF_UNDYING)) {
                          
                          if (!player.getItemCooldownManager().isCoolingDown(Items.TOTEM_OF_UNDYING)) {
                              
                              double r = 15.0;
                              Box box = player.getBoundingBox().expand(r);
                              
                              // Ищем сущности (используем базовый LivingEntity)
                              List<LivingEntity> targets = world.getEntitiesByClass(LivingEntity.class, box, (e) -> e.isAlive() && e != player);

                              if (!targets.isEmpty()) {
                                  LivingEntity target = targets.get(0);

                                  LightningEntity bolt = EntityType.LIGHTNING_BOLT.create(world);
                                  if (bolt != null) {
                                      bolt.refreshPositionAfterTeleport(target.getX(), target.getY(), target.getZ());
                                      world.spawnEntity(bolt);
                                      
                                      // КД 5 секунд (100 тиков)
                                      player.getItemCooldownManager().set(Items.TOTEM_OF_UNDYING, 100);
                                      return TypedActionResult.success(stack);
                                  }
                              }
                          }
                      }
                      return TypedActionResult.pass(stack);
                  });
              }
          }
          EOF

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: Totem-Thunder-V9.3
          path: build/libs/*.jar
