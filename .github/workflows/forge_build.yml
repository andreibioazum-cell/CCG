          # Файлы сборки
          cat <<EOF > settings.gradle
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # build.gradle для модуля
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos.vpn'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimos.vpn.godmode"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-Xray-GodMode"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.core:core:1.12.0'
          }
          EOF

          # Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              
              <application 
                  android:label="DimOS Xray VPN" 
                  android:theme="@style/Theme.DimOSVPN"
                  android:allowBackup="true">
                  
                  <activity android:name=".MainActivity" 
                      android:exported="true"
                      android:launchMode="singleTask">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <service 
                      android:name=".VpnXrayService" 
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.net.VpnService" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          # Тема
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.DimOSVPN" parent="android:Theme.DeviceDefault.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
              </style>
          </resources>
          EOF

          # MainActivity.java
          cat <<EOF > app/src/main/java/com/dimos/vpn/MainActivity.java
          package com.dimos.vpn;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;

          public class MainActivity extends Activity {
              private LinearLayout root;
              private boolean isVpnRunning = false;
              private TextView statusText;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  initUI();
              }

              private void initUI() {
                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);
                  root.setPadding(50, 100, 50, 50);
                  root.setGravity(Gravity.CENTER);

                  TextView title = new TextView(this);
                  title.setText("DimOS Xray VPN");
                  title.setTextSize(32);
                  title.setTextColor(Color.CYAN);
                  title.setGravity(Gravity.CENTER);
                  root.addView(title);

                  statusText = new TextView(this);
                  statusText.setText("STATUS: DISCONNECTED");
                  statusText.setTextSize(18);
                  statusText.setTextColor(Color.RED);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 50, 0, 50);
                  root.addView(statusText);

                  Button connectBtn = new Button(this);
                  connectBtn.setText("🔌 CONNECT VPN");
                  connectBtn.setBackgroundColor(Color.parseColor("#0066CC"));
                  connectBtn.setTextColor(Color.WHITE);
                  connectBtn.setOnClickListener(v -> startVpn());
                  root.addView(connectBtn);

                  Button disconnectBtn = new Button(this);
                  disconnectBtn.setText("⛔ DISCONNECT");
                  disconnectBtn.setBackgroundColor(Color.parseColor("#CC3300"));
                  disconnectBtn.setTextColor(Color.WHITE);
                  disconnectBtn.setOnClickListener(v -> stopVpn());
                  root.addView(disconnectBtn);

                  Button selectServerBtn = new Button(this);
                  selectServerBtn.setText("🌍 SELECT SERVER");
                  selectServerBtn.setBackgroundColor(Color.parseColor("#006600"));
                  selectServerBtn.setTextColor(Color.WHITE);
                  selectServerBtn.setOnClickListener(v -> {
                      Toast.makeText(this, "Servers: Auto-balancing (3 proxies)", Toast.LENGTH_SHORT).show();
                  });
                  root.addView(selectServerBtn);

                  TextView info = new TextView(this);
                  info.setText("VLESS + Reality/WS/gRPC\nAuto-balancer active");
                  info.setTextSize(14);
                  info.setTextColor(Color.GRAY);
                  info.setGravity(Gravity.CENTER);
                  info.setPadding(0, 50, 0, 0);
                  root.addView(info);

                  setContentView(root);
              }

              private void startVpn() {
                  Intent intent = VpnService.prepare(this);
                  if (intent != null) {
                      startActivityForResult(intent, 0);
                  } else {
                      onActivityResult(0, RESULT_OK, null);
                  }
              }

              private void stopVpn() {
                  Intent intent = new Intent(this, VpnXrayService.class);
                  intent.setAction("stop");
                  startService(intent);
                  statusText.setText("STATUS: DISCONNECTED");
                  statusText.setTextColor(Color.RED);
                  isVpnRunning = false;
              }

              @Override
              protected void onActivityResult(int request, int result, Intent data) {
                  super.onActivityResult(request, result, data);
                  if (result == RESULT_OK) {
                      Intent intent = new Intent(this, VpnXrayService.class);
                      intent.setAction("start");
                      startService(intent);
                      
                      statusText.setText("STATUS: CONNECTED");
                      statusText.setTextColor(Color.GREEN);
                      isVpnRunning = true;
                      Toast.makeText(this, "Xray VPN Started", Toast.LENGTH_SHORT).show();
                  }
              }
          }
          EOF

          # VPN Service с Xray
          cat <<EOF > app/src/main/java/com/dimos/vpn/VpnXrayService.java
          package com.dimos.vpn;

          import android.net.VpnService;
          import android.os.ParcelFileDescriptor;
          import android.util.Log;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.io.OutputStream;

          public class VpnXrayService extends VpnService {
              private static final String TAG = "XrayVPN";
              private Process xrayProcess;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && "stop".equals(intent.getAction())) {
                      stopXray();
                      stopSelf();
                  } else {
                      startXray();
                  }
                  return START_STICKY;
              }

              private void startXray() {
                  try {
                      // Копируем Xray из assets
                      File xrayFile = new File(getFilesDir(), "xray");
                      if (!xrayFile.exists()) {
                          InputStream is = getAssets().open("xray");
                          OutputStream os = new FileOutputStream(xrayFile);
                          byte[] buffer = new byte[1024];
                          int len;
                          while ((len = is.read(buffer)) != -1) {
                              os.write(buffer, 0, len);
                          }
                          os.close();
                          is.close();
                          xrayFile.setExecutable(true);
                      }

                      // Конфиг
                      File configFile = new File(getFilesDir(), "config.json");
                      InputStream configIs = getAssets().open("config.json");
                      OutputStream configOs = new FileOutputStream(configFile);
                      byte[] buf = new byte[1024];
                      int l;
                      while ((l = configIs.read(buf)) != -1) {
                          configOs.write(buf, 0, l);
                      }
                      configOs.close();
                      configIs.close();

                      // Настройка VPN туннеля
                      Builder builder = new Builder();
                      builder.setSessionName("DimOS Xray VPN");
                      builder.setMtu(1500);
                      builder.addAddress("10.0.0.2", 32);
                      builder.addRoute("0.0.0.0", 0);
                      builder.addDnsServer("8.8.8.8");
                      
                      ParcelFileDescriptor vpnInterface = builder.establish();

                      // Запуск Xray
                      ProcessBuilder pb = new ProcessBuilder(
                          xrayFile.getAbsolutePath(),
                          "run",
                          "-c", configFile.getAbsolutePath()
                      );
                      pb.environment().put("VPN_FD", String.valueOf(vpnInterface.getFd()));
                      
                      xrayProcess = pb.start();
                      
                      Log.d(TAG, "Xray VPN started");

                  } catch (Exception e) {
                      Log.e(TAG, "Error starting Xray", e);
                  }
              }

              private void stopXray() {
                  if (xrayProcess != null) {
                      xrayProcess.destroy();
                      xrayProcess = null;
                  }
              }

              @Override
              public void onDestroy() {
                  stopXray();
                  super.onDestroy();
              }
          }
          EOF

      - name: Build VPN APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload VPN APK
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-Xray-VPN-GodMode
          path: app/build/outputs/apk/debug/*.apk
