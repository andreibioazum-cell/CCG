name: TOTEM_THUNDER_V9_4_EMERGENCY
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Generate Mod
        run: |
          mkdir -p src/main/java/com/totemmod
          mkdir -p src/main/resources
          
          cat <<'EOF' > settings.gradle
          rootProject.name = 'totem_mod'
          EOF

          cat <<'EOF' > build.gradle
          plugins {
              id 'fabric-loom' version '1.8-SNAPSHOT'
          }
          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.18.4"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "totemmod",
            "version": "9.4.0",
            "name": "Totem Thunder",
            "entrypoints": { "main": [ "com.totemmod.TotemMod" ] },
            "depends": { "fabricloader": ">=0.18.4", "minecraft": "~1.21" }
          }
          EOF

          cat <<'EOF' > src/main/java/com/totemmod/TotemMod.java
          package com.totemmod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.player.UseItemCallback;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.LightningEntity;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.Items;
          import net.minecraft.util.TypedActionResult;
          import net.minecraft.util.math.Box;
          import java.util.List;

          public class TotemMod implements ModInitializer {
              @Override
              public void onInitialize() {
                  System.out.println("STABLE LOAD 9.4");
                  
                  UseItemCallback.EVENT.register((player, world, hand) -> {
                      if (world.isClient()) return TypedActionResult.pass(player.getStackInHand(hand));
                      
                      ItemStack stack = player.getStackInHand(hand);
                      
                      if (stack.isOf(Items.TOTEM_OF_UNDYING)) {
                          if (!player.getItemCooldownManager().isCoolingDown(Items.TOTEM_OF_UNDYING)) {
                              
                              Box area = player.getBoundingBox().expand(15.0);
                              List<LivingEntity> targets = world.getEntitiesByClass(LivingEntity.class, area, (e) -> e != player && e.isAlive());

                              if (!targets.isEmpty()) {
                                  LivingEntity target = targets.get(0);
                                  LightningEntity bolt = new LightningEntity(EntityType.LIGHTNING_BOLT, world);
                                  bolt.setPosition(target.getPos());
                                  world.spawnEntity(bolt);
                                  
                                  player.getItemCooldownManager().set(Items.TOTEM_OF_UNDYING, 100);
                                  return TypedActionResult.success(stack);
                              }
                          }
                      }
                      return TypedActionResult.pass(stack);
                  });
              }
          }
          EOF

      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Totem-Thunder-V9.4
          path: build/libs/*.jar
