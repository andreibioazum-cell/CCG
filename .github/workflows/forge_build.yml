name: KUSMAN_V18_FINAL
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.10' }

      - name: Generate Project
        run: |
          mkdir -p src/main/java/com/kusman src/main/resources
          
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'kusman_mod'" >> settings.gradle

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.0"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "kusman", "version": "1.0.0", "name": "KusmanV18",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] }
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandManager;
          import net.fabricmc.fabric.api.client.command.v2.ClientCommandRegistrationCallback;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.text.Text;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.Items;
          import net.minecraft.network.packet.c2s.play.CreativeInventoryActionC2SPacket;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.util.Hand;

          public class KusmanClient implements ClientModInitializer {
              public static boolean fly = false;
              public static boolean aura = false;
              public static boolean god = false;
              public static final String PREFIX = "§b[Dimasi4ek229] §f";

              @Override public void onInitializeClient() {
                  ClientCommandRegistrationCallback.EVENT.register((dispatcher, registryAccess) -> {
                      dispatcher.register(ClientCommandManager.literal("ggg").executes(c -> { fly = !fly; msg("Fly: " + fly); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("aura").executes(c -> { aura = !aura; msg("Aura: " + aura); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("god").executes(c -> { god = !god; msg("GodMode: " + god); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("kit").executes(c -> { giveKit(); return 1; }));
                      dispatcher.register(ClientCommandManager.literal("antiban").executes(c -> { msg("Anti-Report Active"); return 1; }));
                  });

                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null) return;

                      // GODMODE + ANTIKICK
                      if (god) {
                          client.player.getAbilities().invulnerable = true;
                          if (client.player.getHealth() < 20f) client.player.setHealth(20f);
                      }

                      if (fly) {
                          client.player.getAbilities().allowFlying = true;
                          client.player.getAbilities().flying = true;
                          // Антикик: легкое падение каждые 40 тиков
                          if (client.player.age % 40 == 0) {
                              client.player.setPosition(client.player.getX(), client.player.getY() - 0.05, client.player.getZ());
                          }
                      }

                      // AURA
                      if (aura) {
                          client.world.getEntities().forEach(e -> {
                              if (e instanceof LivingEntity t && t != client.player && t.isAlive() && client.player.distanceTo(t) <= 6.0) {
                                  client.player.setYaw((float) Math.toDegrees(Math.atan2(-(t.getX() - client.player.getX()), t.getZ() - client.player.getZ())));
                                  if (client.player.getAttackCooldownProgress(0) >= 1.0f) {
                                      client.interactionManager.attackEntity(client.player, t);
                                      client.player.swingHand(Hand.MAIN_HAND);
                                  }
                              }
                          });
                      }
                  });
              }

              private void giveKit() {
                  MinecraftClient client = MinecraftClient.getInstance();
                  int[] slots = {36, 37, 38, 9};
                  ItemStack[] items = {
                      new ItemStack(Items.NETHERITE_SWORD),
                      new ItemStack(Items.ENCHANTED_GOLDEN_APPLE, 64),
                      new ItemStack(Items.NETHERITE_CHESTPLATE),
                      new ItemStack(Items.NETHERITE_PICKAXE)
                  };
                  for (int i = 0; i < slots.length; i++) {
                      client.getNetworkHandler().sendPacket(new CreativeInventoryActionC2SPacket(slots[i], items[i]));
                  }
                  msg("§6Kit Delivered!");
              }

              private void msg(String s) {
                  if (MinecraftClient.getInstance().player != null)
                      MinecraftClient.getInstance().player.sendMessage(Text.literal(PREFIX + s), false);
              }
          }
          EOF

      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V18-Final
          path: build/libs/*.jar
      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V17-Stable
          path: build/libs/*.jar
