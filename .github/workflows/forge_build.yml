name: KUSMAN_V33_FINAL_FIX
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      
      # Полная очистка перед сборкой, чтобы избежать "No build results"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
          cache-disabled: true 

      - name: Generate Project
        run: |
          mkdir -p src/main/java/com/kusman/mixin src/main/resources
          
          cat <<'EOF' > settings.gradle
          rootProject.name = 'kusman_mod'
          EOF

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.0"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "kusman", "version": "1.0.0", "name": "KusmanV33",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] },
            "mixins": [ "kusman.mixins.json" ]
          }
          EOF

          echo '{"required":true,"package":"com.kusman.mixin","mixins":["InventoryMixin"]}' > src/main/resources/kusman.mixins.json

          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.util.Hand;

          public class KusmanClient implements ClientModInitializer {
              public static boolean god=false, aura=false, fly=false;

              @Override public void onInitializeClient() {
                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null) return;
                      if (god) { client.player.setHealth(20f); client.player.getAbilities().invulnerable = true; }
                      if (fly) { client.player.getAbilities().allowFlying = true; client.player.getAbilities().flying = true; }
                      
                      if (aura) {
                          client.world.getEntities().forEach(e -> {
                              if (e instanceof LivingEntity target && target != client.player && target.isAlive() && client.player.distanceTo(target) < 4.5) {
                                  if (client.player.getAttackCooldownProgress(0) >= 0.9f) {
                                      client.interactionManager.attackEntity(client.player, target);
                                      client.player.swingHand(Hand.MAIN_HAND);
                                  }
                              }
                          });
                      }
                  });
              }
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/mixin/InventoryMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.client.gui.screen.ingame.InventoryScreen;
          import net.minecraft.client.gui.widget.ButtonWidget;
          import net.minecraft.text.Text;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(InventoryScreen.class)
          public abstract class InventoryMixin extends net.minecraft.client.gui.screen.Screen {
              protected InventoryMixin(Text title) { super(title); }

              @Inject(method = "init", at = @At("TAIL"))
              private void onInit(CallbackInfo ci) {
                  int x = 5; // Слева на экране при открытом инвентаре
                  addDrawableChild(ButtonWidget.builder(Text.literal("GOD"), b -> KusmanClient.god = !KusmanClient.god).dimensions(x, 20, 40, 20).build());
                  addDrawableChild(ButtonWidget.builder(Text.literal("AURA"), b -> KusmanClient.aura = !KusmanClient.aura).dimensions(x, 45, 40, 20).build());
                  addDrawableChild(ButtonWidget.builder(Text.literal("FLY"), b -> KusmanClient.fly = !KusmanClient.fly).dimensions(x, 70, 40, 20).build());
              }
          }
          EOF

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V33-Final
          path: build/libs/*.jar
