name: Enjoer_Pro_v2_1
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # ФИКС: Включаем AndroidX
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() } 
          }
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "2.1"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
          <item name="android:windowFullscreen">true</item></style></resources>
          EOF
          
          echo '<shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#AA000000"/><corners android:radius="50dp"/></shape>' > app/src/main/res/drawable/ui_circle.xml

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent" />
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <View android:id="@+id/btn_jump" android:layout_width="85dp" android:layout_height="85dp" android:layout_alignParentRight="true" android:layout_alignParentBottom="true" android:layout_margin="50dp" android:background="@drawable/ui_circle" />
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="130dp" android:layout_height="130dp" android:layout_alignParentBottom="true" android:layout_marginLeft="50dp" android:layout_marginBottom="50dp" android:background="@drawable/ui_circle" android:alpha="0.5" />
                  <View android:id="@+id/joy_stick" android:layout_width="55dp" android:layout_height="55dp" android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base" android:layout_marginLeft="37dp" android:layout_marginTop="37dp" android:background="#22C55E" />
              </RelativeLayout>
          </FrameLayout>
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.ArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] proj=new float[16], view=new float[16], model=new float[16];
              public float pX=0, pY=5f, pZ=5, rY=0, rX=0, jX=0, jY=0, vY=0, anim=0;
              private int prog;
              private FloatBuffer vBuf;
              
              public static class Shape {
                  float x,y,z,sx,sy,sz,r,g,b;
                  Shape(float x,float y,float z,float sx,float sy,float sz,float r,float g,float b)
                  {this.x=x;this.y=y;this.z=z;this.sx=sx;this.sy=sy;this.sz=sz;this.r=r;this.g=g;this.b=b;}
                  boolean check(float px,float py,float pz)
                  {return px>x-sx/2-0.4f && px<x+sx/2+0.4f && pz>z-sz/2-0.4f && pz<z+sz/2+0.4f && py>y-sy/2-2.1f && py<y+sy/2;}
              }
              private ArrayList<Shape> scene = new ArrayList<>();

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="#version 300 es\nin vec4 aP; uniform mat4 uM; void main(){gl_Position=uM*aP;}";
                  String fs="#version 300 es\nprecision mediump float; uniform vec4 uC; out vec4 fC; void main(){fC=uC;}";
                  prog=shP(vs,fs);
                  float[] v={-0.5f,0.5f,0.5f,-0.5f,-0.5f,0.5f,0.5f,0.5f,0.5f,0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f,-0.5f,-0.5f,-0.5f,0.5f,0.5f,-0.5f,0.5f,-0.5f,-0.5f, -0.5f,0.5f,-0.5f,-0.5f,0.5f,0.5f,0.5f,0.5f,-0.5f,0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f,-0.5f,-0.5f,0.5f,0.5f,-0.5f,-0.5f,0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f,-0.5f,-0.5f,-0.5f,-0.5f,0.5f,0.5f,-0.5f,-0.5f,0.5f, 0.5f,0.5f,-0.5f,0.5f,-0.5f,-0.5f,0.5f,0.5f,0.5f,0.5f,-0.5f,0.5f};
                  vBuf=ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(v); vBuf.position(0);
                  scene.add(new Shape(0,0,0, 20,0.2f,20, 0.2f,0.2f,0.3f));
                  scene.add(new Shape(0,2,-12, 4,1,4, 0.1f,0.7f,0.3f));
                  scene.add(new Shape(7,4,-20, 4,1,4, 0.1f,0.7f,0.3f));
                  scene.add(new Shape(0,6,-30, 6,0.2f,6, 0.8f,0.1f,0.1f));
              }

              @Override public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,65,(float)w/h,0.1f,500f);
              }

              @Override public void onDrawFrame(GL10 gl) {
                  vY-=0.016f; pY+=vY;
                  for(Shape s:scene) if(s.check(pX,pY,pZ)) { if(vY<0){pY=s.y+s.sy/2+2.1f; vY=0;} }
                  float spd=0.22f, rad=(float)Math.toRadians(rY);
                  float nX=pX+((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*spd;
                  float nZ=pZ+((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*spd;
                  boolean col=false; for(Shape s:scene) if(s.check(nX,pY,nZ)&&Math.abs(pY-(s.y+s.sy/2+2.1f))>0.5f) col=true;
                  if(!col){pX=nX; pZ=nZ;} if(Math.abs(jX)>0.1f||Math.abs(jY)>0.1f) anim+=1.3f;
                  if(pY<-15){pX=0; pY=5; pZ=5; vY=0;}

                  GLES30.glClearColor(0.02f,0.03f,0.06f,1); GLES30.glClear(16640);
                  float b=(Math.abs(jX)>0.1f||Math.abs(jY)>0.1f)?(float)Math.sin(anim*0.15f)*0.05f:0;
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX))), vy=(float)Math.sin(Math.toRadians(rX)), vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  Matrix.setLookAtM(view,0,pX,pY+b,pZ,pX+vx,pY+vy+b,pZ+vz,0,1,0);
                  GLES30.glUseProgram(prog); int uM=GLES30.glGetUniformLocation(prog,"uM"), uC=GLES30.glGetUniformLocation(prog,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);

                  for(Shape s:scene) {
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,s.x,s.y,s.z); Matrix.scaleM(model,0,s.sx,s.sy,s.sz);
                      draw(uM,uC,s.r,s.g,s.b);
                  }
                  GLES30.glClear(256);
                  drawM(-0.5f,-0.6f+b,-0.8f, 0.15f,0.15f,0.6f, 0.8f,0.6f,0.4f, uM,uC);
                  drawM(0.5f,-0.6f+b,-0.8f, 0.15f,0.15f,0.6f, 0.8f,0.6f,0.4f, uM,uC);
              }
              private void drawM(float x,float y,float z,float sx,float sy,float sz,float r,float g,float b,int uM,int uC) {
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,x,y,z); Matrix.scaleM(model,0,sx,sy,sz); draw(uM,uC,r,g,b);
              }
              private void draw(int uM,int uC,float r,float g,float b) {
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0); Matrix.multiplyMM(mvp,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(uM,1,false,mvp,0); GLES30.glUniform4f(uC,r,g,b,1);
                  for(int i=0;i<6;i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }
              private int shP(String v,String f){int p=GLES30.glCreateProgram();GLES30.glAttachShader(p,sh(35633,v));GLES30.glAttachShader(p,sh(35632,f));GLES30.glLinkProgram(p);return p;}
              private int sh(int t,String s){int i=GLES30.glCreateShader(t);GLES30.glShaderSource(i,s);GLES30.glCompileShader(i);return i;}
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx, ly;
              private int lookId=-1, joyId=-1;
              @Override protected void onCreate(Bundle bS) {
                  super.onCreate(bS); setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv=findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3); ren=new GameRenderer(); gv.setRenderer(ren);
                  findViewById(R.id.btn_jump).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN && ren.vY==0) ren.vY=0.43f;
                      return true;
                  });
                  View stick=findViewById(R.id.joy_stick), base=findViewById(R.id.joy_base);
                  findViewById(R.id.gl_view).setOnTouchListener((v,e)->{
                      int a=e.getActionMasked(), i=e.getActionIndex(), id=e.getPointerId(i);
                      float x=e.getX(i), y=e.getY(i);
                      if(a==0||a==5) {
                          if(x<v.getWidth()/2f && joyId==-1) joyId=id;
                          else if(lookId==-1) { lookId=id; lx=x; ly=y; }
                      } else if(a==2) {
                          for(int p=0; p<e.getPointerCount(); p++) {
                              int pid=e.getPointerId(p);
                              if(pid==joyId) {
                                  float dx=e.getX(p)-(base.getLeft()+65), dy=e.getY(p)-(base.getTop()+65), d=(float)Math.sqrt(dx*dx+dy*dy);
                                  if(d>60){dx*=60/d; dy*=60/d;} stick.setTranslationX(dx); stick.setTranslationY(dy);
                                  ren.jX=dx/60f; ren.jY=dy/60f;
                              } else if(pid==lookId) {
                                  ren.rY+=(e.getX(p)-lx)*0.16f; ren.rX=Math.max(-85,Math.min(85,ren.rX-(e.getY(p)-ly)*0.16f));
                                  lx=e.getX(p); ly=e.getY(p);
                              }
                          }
                      } else if(a==1||a==6) {
                          if(id==joyId){joyId=-1; ren.jX=0; ren.jY=0; stick.setTranslationX(0); stick.setTranslationY(0);}
                          else if(id==lookId) lookId=-1;
                      }
                      return true;
                  });
              }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer Pro 2.1" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          gradle assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Pro_v2_1
          path: app/build/outputs/apk/debug/app-debug.apk
