name: Enjoer_v1.0_Release
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
          </style></resources>
          EOF

          # --- UI (Black & Grey) ---
          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#AA000000"/><stroke android:width="2dp" android:color="#333"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#FF555555"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/btn_ui.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="10dp"/><solid android:color="#DD111111"/><stroke android:width="1dp" android:color="#0FF"/>
          </shape>
          EOF

          # --- Layout ---
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent" />
                  
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_alignParentTop="true" android:layout_centerHorizontal="true" android:layout_marginTop="10dp">
                      <Button android:id="@+id/btn_respawn" android:layout_width="90dp" android:layout_height="40dp"
                          android:text="RESPAWN" android:textSize="10sp" android:background="@drawable/btn_ui" android:textColor="#0FF" android:layout_marginRight="10dp"/>
                      <Button android:id="@+id/btn_settings" android:layout_width="90dp" android:layout_height="40dp"
                          android:text="RTX MENU" android:textSize="10sp" android:background="@drawable/btn_ui" android:textColor="#0FF"/>
                  </LinearLayout>

                  <FrameLayout android:id="@+id/joy_base" android:layout_width="140dp" android:layout_height="140dp"
                      android:layout_alignParentBottom="true" android:layout_marginLeft="40dp" android:layout_marginBottom="40dp"
                      android:background="@drawable/joy_base" />
                  <View android:id="@+id/joy_stick" android:layout_width="60dp" android:layout_height="60dp"
                      android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="40dp" android:layout_marginTop="40dp"
                      android:background="@drawable/joy_stick" />
                  
                  <Button android:id="@+id/btn_jump" android:layout_width="100dp" android:layout_height="100dp"
                      android:layout_alignParentRight="true" android:layout_alignParentBottom="true"
                      android:layout_margin="40dp" android:text="JUMP" android:background="@drawable/joy_base" android:textColor="#FFF"/>
              </RelativeLayout>

              <LinearLayout android:id="@+id/rtx_menu" android:layout_width="200dp" android:layout_height="wrap_content"
                  android:layout_gravity="center" android:background="#F2000000" android:padding="20dp"
                  android:orientation="vertical" android:visibility="gone">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="GRAPHICS" android:textColor="#0FF" android:layout_gravity="center"/>
                  <Button android:id="@+id/rtx_off" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="RTX OFF" android:layout_marginTop="10dp"/>
                  <Button android:id="@+id/rtx_on" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="RTX ON (RAY TRACE)"/>
              </LinearLayout>
          </FrameLayout>
          EOF

          # --- Renderer (Enjoer 1.0 Core) ---
          cat <<EOF > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] proj=new float[16], view=new float[16], model=new float[16];
              public float pX=0, pY=2.1f, pZ=10, rY=0, rX=0, jX=0, jY=0, vY=0;
              public boolean rtxEnabled = false;
              private int prog;
              private FloatBuffer vBuf;
              private float[] bX={-8, 8, 0}, bZ={-12, -12, -20};

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  GLES30.glEnable(GLES30.GL_BLEND);
                  GLES30.glBlendFunc(GLES30.GL_SRC_ALPHA, GLES30.GL_ONE_MINUS_SRC_ALPHA);
                  String vs="#version 300 es\nin vec4 aP; uniform mat4 uM; void main(){gl_Position=uM*aP;}";
                  String fs="#version 300 es\nprecision mediump float; uniform vec4 uC; uniform float a; out vec4 fC; void main(){fC=vec4(uC.rgb, a);}";
                  prog=shP(vs, fs);
                  float[] vc = {-0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f};
                  vBuf=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBuf.position(0);
              }

              @Override public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,45,(float)w/h,0.1f,300f);
              }

              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClearColor(0.5f, 0.8f, 1.0f, 1.0f);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float vy=(float)Math.sin(Math.toRadians(rX));
                  float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  Matrix.setLookAtM(view,0,pX,pY,pZ,pX+vx,pY+vy,pZ+vz,0,1,0);
                  
                  GLES30.glUseProgram(prog);
                  int uM=GLES30.glGetUniformLocation(prog,"uM"), uC=GLES30.glGetUniformLocation(prog,"uC"), uA=GLES30.glGetUniformLocation(prog,"a");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);

                  // 1. RTX: Тени и Отражения
                  if(rtxEnabled) {
                      for(int i=0; i<3; i++) {
                          // Тень (черный приплюснутый блок на полу)
                          Matrix.setIdentityM(model,0); Matrix.translateM(model,0,bX[i]+1.5f, 0.06f, bZ[i]+1.5f); 
                          Matrix.scaleM(model,0,3.5f, 0.01f, 3.5f); GLES30.glUniform1f(uA, 0.4f); draw(uM,uC,0,0,0);
                          // Отражение
                          Matrix.setIdentityM(model,0); Matrix.translateM(model,0,bX[i], -1.5f, bZ[i]); 
                          Matrix.scaleM(model,0,3,3,3); GLES30.glUniform1f(uA, 0.15f); draw(uM,uC,1,0.2f,0.2f);
                      }
                  }

                  // 2. Зеленый Пол (Трава)
                  Matrix.setIdentityM(model,0); Matrix.scaleM(model,0,1000,0.1f,1000); 
                  GLES30.glUniform1f(uA, 1.0f); draw(uM,uC,0.2f,0.7f,0.2f);

                  // 3. Реальные блоки (На земле)
                  for(int i=0; i<3; i++) {
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,bX[i], 1.55f, bZ[i]); 
                      Matrix.scaleM(model,0,3,3,3); GLES30.glUniform1f(uA, 1.0f); draw(uM,uC,0.9f,0.1f,0.1f);
                  }
              }

              private void update() {
                  vY-=0.015f; pY+=vY; if(pY<2.1f){pY=2.1f; vY=0;}
                  float s=0.22f, rad=(float)Math.toRadians(rY);
                  float dx = ((float)Math.sin(rad)*-jY + (float)Math.cos(rad)*jX)*s;
                  float dz = ((float)-Math.cos(rad)*-jY + (float)Math.sin(rad)*jX)*s;
                  
                  // СИСТЕМА СКОЛЬЖЕНИЯ (Sliding Collision)
                  if(!checkCol(pX+dx, pZ)) pX += dx;
                  if(!checkCol(pX, pZ+dz)) pZ += dz;
              }

              private boolean checkCol(float nx, float nz) {
                  for(int i=0; i<3; i++) {
                      if(Math.abs(nx-bX[i]) < 2.2f && Math.abs(nz-bZ[i]) < 2.2f) return true;
                  }
                  return false;
              }

              private void draw(int uM,int uC,float r,float g,float b){
                  float[] res=new float[16]; Matrix.multiplyMM(res,0,proj,0,view,0); Matrix.multiplyMM(res,0,res,0,model,0);
                  GLES30.glUniformMatrix4fv(uM,1,false,res,0); GLES30.glUniform4f(uC,r,g,b,1f);
                  for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }
              private int shP(String v,String f){int p=GLES30.glCreateProgram();GLES30.glAttachShader(p,sh(35633,v));GLES30.glAttachShader(p,sh(35632,f));GLES30.glLinkProgram(p);return p;}
              private int sh(int t,String s){int i=GLES30.glCreateShader(t);GLES30.glShaderSource(i,s);GLES30.glCompileShader(i);return i;}
          }
          EOF

          # --- MainActivity ---
          cat <<EOF > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.view.View;
          import android.view.MotionEvent;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx, ly;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  findViewById(R.id.btn_respawn).setOnClickListener(v -> { ren.pX=0; ren.pZ=10; ren.pY=5; });
                  
                  View rMenu = findViewById(R.id.rtx_menu);
                  findViewById(R.id.btn_settings).setOnClickListener(v -> rMenu.setVisibility(View.VISIBLE));
                  findViewById(R.id.rtx_off).setOnClickListener(v -> { ren.rtxEnabled=false; rMenu.setVisibility(View.GONE); });
                  findViewById(R.id.rtx_on).setOnClickListener(v -> { ren.rtxEnabled=true; rMenu.setVisibility(View.GONE); });

                  findViewById(R.id.btn_jump).setOnClickListener(v -> { if(ren.pY <= 2.2f) ren.vY = 0.42f; });
                  
                  View stick = findViewById(R.id.joy_stick);
                  findViewById(R.id.joy_base).setOnTouchListener((v, e) -> {
                      float cx = v.getWidth()/2f, cy = v.getHeight()/2f;
                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - cx, dy = e.getY() - cy;
                          float d = (float)Math.sqrt(dx*dx + dy*dy);
                          float limit = 45f;
                          if (d > limit) { dx *= limit/d; dy *= limit/d; }
                          stick.setTranslationX(dx); stick.setTranslationY(dy);
                          ren.jX = dx/limit; ren.jY = dy/limit;
                      } else { stick.setTranslationX(0); stick.setTranslationY(0); ren.jX = 0; ren.jY = 0; }
                      return true;
                  });

                  findViewById(R.id.look_zone).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) { lx = e.getX(); ly = e.getY(); }
                      else if (e.getAction() == MotionEvent.ACTION_MOVE) {
                          ren.rY += (e.getX() - lx) * 0.25f;
                          ren.rX = Math.max(-85, Math.min(85, ren.rX - (e.getY() - ly) * 0.25f));
                          lx = e.getX(); ly = e.getY();
                      }
                      return true;
                  });
              }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_v1.0_Final
          path: app/build/outputs/apk/debug/app-debug.apk
