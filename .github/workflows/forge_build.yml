name: Roblox_V22_FPS_Arms
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/dimos/roblox
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
          </style></resources>
          EOF

          # --- Drawable ресурсы (Круглые) ---
          cat <<EOF > app/src/main/res/drawable/joy_base_round.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#44FFFFFF"/><stroke android:width="2dp" android:color="#88FFFFFF"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/joy_stick_round.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#AAFFFFFF"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/btn_menu_round.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="20dp"/><solid android:color="#88000000"/><stroke android:width="1dp" android:color="#FFFFFF"/>
          </shape>
          EOF

          # --- Layout ---
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent" />
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_alignParentTop="true" android:layout_centerHorizontal="true"
                      android:layout_marginTop="10dp" android:orientation="horizontal">
                      <Button android:id="@+id/btn_reset" android:layout_width="80dp" android:layout_height="40dp"
                          android:text="SPAWN" android:textSize="10sp" android:layout_marginRight="10dp"
                          android:background="@drawable/btn_menu_round" android:textColor="#FFF"/>
                      <Button android:id="@+id/btn_exit" android:layout_width="80dp" android:layout_height="40dp"
                          android:text="EXIT" android:textSize="10sp"
                          android:background="@drawable/btn_menu_round" android:textColor="#FFF"/>
                  </LinearLayout>
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="120dp" android:layout_height="120dp"
                      android:layout_alignParentBottom="true" android:layout_alignParentLeft="true"
                      android:layout_marginLeft="40dp" android:layout_marginBottom="40dp"
                      android:background="@drawable/joy_base_round" />
                  <View android:id="@+id/joy_stick" android:layout_width="50dp" android:layout_height="50dp"
                      android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="35dp" android:layout_marginTop="35dp"
                      android:background="@drawable/joy_stick_round" />
                  <Button android:id="@+id/btn_jump" android:layout_width="90dp" android:layout_height="90dp"
                      android:layout_alignParentRight="true" android:layout_alignParentBottom="true"
                      android:layout_margin="40dp" android:text="JUMP" 
                      android:background="@drawable/joy_base_round" android:textColor="#FFF"/>
              </RelativeLayout>
          </FrameLayout>
          EOF

          # --- Renderer (Визуальные руки FPS) ---
          cat <<EOF > app/src/main/java/com/dimos/roblox/GameRenderer.java
          package com.dimos.roblox;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] mvp=new float[16], proj=new float[16], view=new float[16], model=new float[16];
              public float pX=0, pY=3, pZ=10, rY=0, rX=0, jX=0, jY=0, vY=0;
              private int progWorld, progArms;
              private FloatBuffer vBufCube, vBufArm;
              private float[] obsX={-20,20,0,-20,20}, obsZ={-20,-20,-30,20,20};
              private float obsSize=3.2f; 

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  GLES30.glClearColor(0.5f, 0.8f, 1.0f, 1.0f);
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  
                  // 1. Шейдер для мира
                  String vsW="#version 300 es\nin vec4 aP; uniform mat4 uM; void main(){gl_Position=uM*aP;}";
                  String fsW="#version 300 es\nprecision mediump float; uniform vec4 uC; out vec4 fC; void main(){fC=uC;}";
                  progWorld=shP(vsW, fsW);

                  // 2. Шейдер для рук (идентичный, но отдельный для удобства)
                  String vsA="#version 300 es\nin vec4 aP; uniform mat4 uM; void main(){gl_Position=uM*aP;}";
                  String fsA="#version 300 es\nprecision mediump float; uniform vec4 uC; out vec4 fC; void main(){fC=uC;}";
                  progArms=shP(vsA, fsA);
                  
                  // Меш куба (стандартный)
                  float[] vc = {-0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,-0.5f,0.5f, -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f};
                  vBufCube=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBufCube.position(0);

                  // Меш руки (чуть тоньше и длиннее куба)
                  float[] va = {-0.1f,0.1f,0.4f, -0.1f,-0.1f,0.4f, 0.1f,0.1f,0.4f, 0.1f,-0.1f,0.4f, -0.1f,0.1f,-0.4f, -0.1f,-0.1f,-0.4f, 0.1f,0.1f,-0.4f, 0.1f,-0.1f,-0.4f, -0.1f,0.1f,-0.4f, -0.1f,0.1f,0.4f, 0.1f,0.1f,-0.4f, 0.1f,0.1f,0.4f, -0.1f,-0.1f,-0.4f, -0.1f,-0.1f,0.4f, 0.1f,-0.1f,-0.4f, 0.1f,-0.1f,0.4f, -0.1f,0.1f,-0.4f, -0.1f,-0.1f,-0.4f, -0.1f,0.1f,0.4f, -0.1f,-0.1f,0.4f, 0.1f,0.1f,-0.4f, 0.1f,-0.1f,-0.4f, 0.1f,0.1f,0.4f, 0.1f,-0.1f,0.4f};
                  vBufArm=ByteBuffer.allocateDirect(va.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(va); vBufArm.position(0);
              }

              @Override public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,45,(float)w/h,0.1f,300f);
              }

              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClear(16640);
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float vy=(float)Math.sin(Math.toRadians(rX));
                  float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  Matrix.setLookAtM(view,0,pX,pY,pZ,pX+vx,pY+vy,pZ+vz,0,1,0);

                  // --- 1. Рендеринг Мира ---
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST); // Включаем тест глубины для мира
                  GLES30.glUseProgram(progWorld);
                  int uMw=GLES30.glGetUniformLocation(progWorld,"uM"), uCw=GLES30.glGetUniformLocation(progWorld,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBufCube); GLES30.glEnableVertexAttribArray(0);

                  Matrix.setIdentityM(model,0); Matrix.scaleM(model,0,500,0.1f,500); draw(uMw,uCw,0.3f,0.6f,0.3f);
                  for(int i=0; i<5; i++){
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,obsX[i],5,obsZ[i]); Matrix.scaleM(model,0,4,10,4);
                      draw(uMw,uCw,0.6f,0.4f,0.2f);
                  }

                  // --- 2. Рендеринг Рук (Viewmodel) ---
                  GLES30.glDisable(GLES30.GL_DEPTH_TEST); // Отключаем тест глубины, чтобы руки были поверх всего
                  GLES30.glUseProgram(progArms);
                  int uMa=GLES30.glGetUniformLocation(progArms,"uM"), uCa=GLES30.glGetUniformLocation(progArms,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBufArm); GLES30.glEnableVertexAttribArray(0);
                  GLES30.glUniform4f(uCa, 0.9f, 0.7f, 0.6f, 1f); // Телесный цвет рук

                  // Левая рука
                  Matrix.setIdentityM(model,0);
                  // Привязываем к камере: позиция игрока + небольшой сдвиг
                  Matrix.translateM(model,0,pX,pY,pZ);
                  // Поворот камеры
                  Matrix.rotateM(model, 0, -rY, 0, 1, 0);
                  Matrix.rotateM(model, 0, rX, 1, 0, 0);
                  // Позиционирование viewmodel (левее, ниже, чуть впереди глаза)
                  Matrix.translateM(model,0, -0.35f, -0.4f, -0.6f);
                  // Небольшой наклон внутрь
                  Matrix.rotateM(model, 0, 10, 0, 1, 0);
                  
                  Matrix.multiplyMM(mvp,0,proj,0,view,0); // Используем ту же view матрицу
                  float[] resL=new float[16]; Matrix.multiplyMM(resL,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMa,1,false,resL,0);
                  for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);

                  // Правая рука (симметрично)
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,pX,pY,pZ);
                  Matrix.rotateM(model, 0, -rY, 0, 1, 0);
                  Matrix.rotateM(model, 0, rX, 1, 0, 0);
                  Matrix.translateM(model,0, 0.35f, -0.4f, -0.6f); // Правее
                  Matrix.rotateM(model, 0, -10, 0, 1, 0); // Наклон в другую сторону

                  float[] resR=new float[16]; Matrix.multiplyMM(resR,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMa,1,false,resR,0);
                  for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }

              private void update() {
                  vY-=0.015f; pY+=vY; if(pY<2.5f){pY=2.5f; vY=0;}
                  float s=0.2f, rad=(float)Math.toRadians(rY);
                  float dx = ((float)Math.sin(rad)*-jY + (float)Math.cos(rad)*jX)*s;
                  float dz = ((float)-Math.cos(rad)*-jY + (float)Math.sin(rad)*jX)*s;
                  if(!checkCollision(pX + dx, pZ)) pX += dx;
                  if(!checkCollision(pX, pZ + dz)) pZ += dz;
              }
              private boolean checkCollision(float nextX, float nextZ) {
                  for(int i=0; i<5; i++) { if(Math.abs(nextX-obsX[i])<obsSize && Math.abs(nextZ-obsZ[i])<obsSize) return true; }
                  return false;
              }
              private void draw(int uM, int uC, float r, float g, float b) {
                  float[] res=new float[16]; Matrix.multiplyMM(res,0,proj,0,view,0);
                  Matrix.multiplyMM(res,0,res,0,model,0); GLES30.glUniformMatrix4fv(uM,1,false,res,0);
                  GLES30.glUniform4f(uC,r,g,b,1f); for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }
              private int shP(String vs, String fs){
                  int prog=GLES30.glCreateProgram();
                  int vsh=sh(35633,vs), fsh=sh(35632,fs);
                  GLES30.glAttachShader(prog,vsh); GLES30.glAttachShader(prog,fsh); GLES30.glLinkProgram(prog); return prog;
              }
              private int sh(int t,String s){int i=GLES30.glCreateShader(t);GLES30.glShaderSource(i,s);GLES30.glCompileShader(i);return i;}
          }
          EOF

          # --- MainActivity (Без изменений) ---
          cat <<EOF > app/src/main/java/com/dimos/roblox/MainActivity.java
          package com.dimos.roblox;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx, ly;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  findViewById(R.id.btn_reset).setOnClickListener(v -> { ren.pX=0; ren.pZ=10; ren.pY=5; });
                  findViewById(R.id.btn_exit).setOnClickListener(v -> finish());
                  findViewById(R.id.btn_jump).setOnClickListener(v -> { if(ren.pY <= 2.6f) ren.vY = 0.35f; });
                  
                  View stick = findViewById(R.id.joy_stick);
                  findViewById(R.id.joy_base).setOnTouchListener((v, e) -> {
                      float cx = v.getWidth()/2f, cy = v.getHeight()/2f;
                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - cx, dy = e.getY() - cy;
                          float d = (float)Math.sqrt(dx*dx + dy*dy);
                          float limit = 35f;
                          if (d > limit) { dx *= limit/d; dy *= limit/d; }
                          stick.setTranslationX(dx); stick.setTranslationY(dy);
                          ren.jX = dx/limit; ren.jY = dy/limit;
                      } else {
                          stick.setTranslationX(0); stick.setTranslationY(0);
                          ren.jX = 0; ren.jY = 0;
                      }
                      return true;
                  });

                  findViewById(R.id.look_zone).setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) { lx = e.getX(); ly = e.getY(); }
                      else if (e.getAction() == MotionEvent.ACTION_MOVE) {
                          ren.rY += (e.getX() - lx) * 0.3f;
                          ren.rX = Math.max(-85, Math.min(85, ren.rX - (e.getY() - ly) * 0.3f));
                          lx = e.getX(); ly = e.getY();
                      }
                      return true;
                  });
              }
          }
          EOF

          # --- Манифест и Gradle ---
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Roblox FPS" android:theme="@style/AppTheme">
                  <activity android:name="com.dimos.roblox.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.dimos.roblox'; compileSdk 34; defaultConfig { applicationId 'com.dimos.roblox'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Roblox_V22_FPS_Arms
          path: app/build/outputs/apk/debug/app-debug.apk
