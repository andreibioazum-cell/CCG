name: Build Mod Menu
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Zip
        run: |
          # Ищем любой zip файл в репозитории и распаковываем его
          ZIP_FILE=$(find . -name "*.zip" -print -quit)
          if [ -n "$ZIP_FILE" ]; then
            echo "Распаковка $ZIP_FILE..."
            unzip -o "$ZIP_FILE"
          else
            echo "Архив не найден, работаем с текущими файлами"
          fi

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Build with ndk-build
        run: |
          # Ищем файл Android.mk (он всегда внутри jni)
          MK_FILE=$(find . -name "Android.mk" -print -quit)
          if [ -z "$MK_FILE" ]; then
            echo "ОШИБКА: Android.mk не найден даже после распаковки!"
            exit 1
          fi
          JNI_DIR=$(dirname "$MK_FILE")
          echo "Найдена папка проекта: $JNI_DIR"
          cd "$JNI_DIR"
          ndk-build

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: my-mod-library
          path: "**/libs/*"
