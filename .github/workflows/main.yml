name: DPI_Bypass_PRO_AutoStrategy
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/{java/com/dpibypass/pro,cpp,res/{layout,values,drawable}}

      - name: Create Advanced Packet Engine
        run: |
          cat > app/src/main/cpp/advanced_engine.cpp << 'CPPEOF'
          #include <jni.h>
          #include <string>
          #include <cstring>
          #include <arpa/inet.h>
          #include <vector>
          #include <map>
          #include <unordered_map>
          #include <algorithm>
          #include <random>
          #include <chrono>
          #include <android/log.h>

          #define LOG(...) __android_log_print(ANDROID_LOG_INFO, "DPIBypassPRO", __VA_ARGS__)

          // ========== СТРУКТУРЫ ==========
          struct IPHeader {
              uint8_t ver_ihl, tos;
              uint16_t len, id, off;
              uint8_t ttl, proto;
              uint16_t csum;
              uint32_t src, dst;
          } __attribute__((packed));

          struct TCPHeader {
              uint16_t sport, dport;
              uint32_t seq, ack;
              uint8_t off_res, flags;
              uint16_t win, csum, urp;
          } __attribute__((packed));

          struct UDPHeader {
              uint16_t sport, dport, len, csum;
          } __attribute__((packed));

          // ========== СТРАТЕГИИ ОБХОДА ==========
          enum StrategyType {
              STRAT_NONE = 0,
              STRAT_FRAG_SMALL = 1,      // 2-байтовая фрагментация
              STRAT_FRAG_MEDIUM = 2,     // 40-байтовая
              STRAT_FRAG_SNI = 3,        // Разрыв перед SNI
              STRAT_FAKE_SYN = 4,        // Fake packet перед реальным
              STRAT_TTL_TRICK = 5,       // TTL=1 для первого пакета
              STRAT_DISORDER = 6,        // Отправка в обратном порядке
              STRAT_SPLIT2 = 7,          // Двойная фрагментация
              STRAT_MD5SIG = 8,          // TCP MD5 signature fake
              STRAT_HTTP_SPLIT = 9,      // HTTP Host: split
              STRAT_COMBINED = 10        // Комбинация методов
          };

          struct Strategy {
              StrategyType type;
              int param1;  // frag_size / ttl / delay
              int param2;  // secondary param
              float success_rate;
              int test_count;
              uint64_t last_used;
              
              Strategy() : type(STRAT_NONE), param1(0), param2(0), 
                          success_rate(0.5f), test_count(0), last_used(0) {}
          };

          struct DomainStats {
              std::string domain;
              std::vector<Strategy> tested_strategies;
              Strategy best_strategy;
              int total_attempts;
              int successful_attempts;
              uint64_t last_success_time;
          };

          // ========== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ==========
          static std::unordered_map<std::string, DomainStats> g_domain_cache;
          static std::mt19937 g_rng(std::chrono::steady_clock::now().time_since_epoch().count());
          static long g_total_packets = 0;
          static long g_modified_packets = 0;
          static bool g_auto_mode = true;
          static std::vector<std::string> g_whitelist;
          static std::vector<std::string> g_blacklist;

          // ========== УТИЛИТЫ ==========
          uint64_t get_timestamp_ms() {
              return std::chrono::duration_cast<std::chrono::milliseconds>(
                  std::chrono::steady_clock::now().time_since_epoch()
              ).count();
          }

          uint16_t checksum(const uint16_t* buf, int len) {
              uint32_t sum = 0;
              for(int i = 0; i < len / 2; i++) sum += buf[i];
              if(len & 1) sum += ((uint8_t*)buf)[len - 1];
              while(sum >> 16) sum = (sum & 0xFFFF) + (sum >> 16);
              return ~sum;
          }

          void fix_ip_checksum(uint8_t* pkt) {
              IPHeader* ip = (IPHeader*)pkt;
              ip->csum = 0;
              ip->csum = checksum((uint16_t*)ip, (ip->ver_ihl & 0x0F) * 4);
          }

          void fix_tcp_checksum(uint8_t* pkt, int total_len) {
              IPHeader* ip = (IPHeader*)pkt;
              int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
              TCPHeader* tcp = (TCPHeader*)(pkt + ip_hlen);
              int tcp_len = ntohs(ip->len) - ip_hlen;
              
              tcp->csum = 0;
              uint32_t sum = 0;
              sum += (ip->src >> 16) + (ip->src & 0xFFFF);
              sum += (ip->dst >> 16) + (ip->dst & 0xFFFF);
              sum += htons(6);
              sum += htons(tcp_len);
              
              uint8_t* tcp_data = (uint8_t*)tcp;
              for(int i = 0; i < tcp_len / 2; i++)
                  sum += ((uint16_t*)tcp_data)[i];
              if(tcp_len & 1) sum += tcp_data[tcp_len - 1];
              
              while(sum >> 16) sum = (sum & 0xFFFF) + (sum >> 16);
              tcp->csum = ~sum;
          }

          // ========== ИЗВЛЕЧЕНИЕ SNI ==========
          std::string extract_sni(const uint8_t* tls, int len) {
              if(len < 43 || tls[0] != 0x16 || tls[5] != 0x01) return "";
              
              int pos = 43;
              if(pos >= len) return "";
              
              int session_len = tls[pos];
              pos += 1 + session_len;
              if(pos + 2 > len) return "";
              
              int cipher_len = ntohs(*(uint16_t*)(tls + pos));
              pos += 2 + cipher_len;
              if(pos + 1 > len) return "";
              
              int comp_len = tls[pos];
              pos += 1 + comp_len;
              if(pos + 2 > len) return "";
              
              int ext_len = ntohs(*(uint16_t*)(tls + pos));
              pos += 2;
              
              int ext_end = pos + ext_len;
              while(pos + 4 <= ext_end && pos + 4 <= len) {
                  uint16_t ext_type = ntohs(*(uint16_t*)(tls + pos));
                  uint16_t ext_data_len = ntohs(*(uint16_t*)(tls + pos + 2));
                  pos += 4;
                  
                  if(ext_type == 0 && pos + 5 + ext_data_len <= len) {
                      int name_len = ntohs(*(uint16_t*)(tls + pos + 3));
                      if(pos + 5 + name_len <= len) {
                          return std::string((char*)(tls + pos + 5), name_len);
                      }
                  }
                  pos += ext_data_len;
              }
              return "";
          }

          // Найти позицию SNI в TLS данных
          int find_sni_position(const uint8_t* tls, int len) {
              if(len < 43 || tls[0] != 0x16 || tls[5] != 0x01) return -1;
              
              int pos = 43;
              if(pos >= len) return -1;
              
              int session_len = tls[pos];
              pos += 1 + session_len;
              if(pos + 2 > len) return -1;
              
              int cipher_len = ntohs(*(uint16_t*)(tls + pos));
              pos += 2 + cipher_len;
              if(pos + 1 > len) return -1;
              
              int comp_len = tls[pos];
              pos += 1 + comp_len;
              if(pos + 2 > len) return -1;
              
              int ext_len = ntohs(*(uint16_t*)(tls + pos));
              pos += 2;
              
              int ext_end = pos + ext_len;
              while(pos + 4 <= ext_end && pos + 4 <= len) {
                  uint16_t ext_type = ntohs(*(uint16_t*)(tls + pos));
                  uint16_t ext_data_len = ntohs(*(uint16_t*)(tls + pos + 2));
                  
                  if(ext_type == 0) {
                      return pos; // Позиция начала SNI extension
                  }
                  pos += 4 + ext_data_len;
              }
              return -1;
          }

          // ========== DOMAIN FILTERING ==========
          bool is_domain_match(const std::string& domain, const std::vector<std::string>& list) {
              for(const auto& pattern : list) {
                  if(pattern[0] == '*') {
                      std::string suffix = pattern.substr(1);
                      if(domain.size() >= suffix.size() && 
                         domain.compare(domain.size() - suffix.size(), suffix.size(), suffix) == 0)
                          return true;
                  } else if(pattern == domain) {
                      return true;
                  }
              }
              return false;
          }

          bool should_process_domain(const std::string& domain) {
              if(!g_whitelist.empty() && is_domain_match(domain, g_whitelist)) {
                  return false; // В whitelist - не трогаем
              }
              if(!g_blacklist.empty() && !is_domain_match(domain, g_blacklist)) {
                  return false; // Не в blacklist - не трогаем
              }
              return true;
          }

          // ========== МЕТОДЫ ОБХОДА ==========

          // 1. Фрагментация TLS (универсальная)
          std::vector<std::vector<uint8_t>> fragment_tls(uint8_t* pkt, int len, int frag_size) {
              std::vector<std::vector<uint8_t>> result;
              IPHeader* ip = (IPHeader*)pkt;
              int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
              TCPHeader* tcp = (TCPHeader*)(pkt + ip_hlen);
              int tcp_hlen = ((tcp->off_res >> 4) & 0x0F) * 4;
              int payload_offset = ip_hlen + tcp_hlen;
              int payload_len = len - payload_offset;
              
              if(payload_len <= frag_size) {
                  result.push_back(std::vector<uint8_t>(pkt, pkt + len));
                  return result;
              }
              
              // Первый фрагмент
              std::vector<uint8_t> frag1(pkt, pkt + payload_offset + frag_size);
              IPHeader* ip1 = (IPHeader*)frag1.data();
              ip1->len = htons(payload_offset + frag_size);
              fix_ip_checksum(frag1.data());
              fix_tcp_checksum(frag1.data(), frag1.size());
              result.push_back(frag1);
              
              // Второй фрагмент
              std::vector<uint8_t> frag2(payload_offset);
              memcpy(frag2.data(), pkt, payload_offset);
              frag2.insert(frag2.end(), pkt + payload_offset + frag_size, pkt + len);
              
              IPHeader* ip2 = (IPHeader*)frag2.data();
              TCPHeader* tcp2 = (TCPHeader*)(frag2.data() + ip_hlen);
              tcp2->seq = htonl(ntohl(tcp2->seq) + frag_size);
              ip2->len = htons(frag2.size());
              fix_ip_checksum(frag2.data());
              fix_tcp_checksum(frag2.data(), frag2.size());
              result.push_back(frag2);
              
              return result;
          }

          // 2. Фрагментация перед SNI (умная)
          std::vector<std::vector<uint8_t>> fragment_before_sni(uint8_t* pkt, int len) {
              IPHeader* ip = (IPHeader*)pkt;
              int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
              TCPHeader* tcp = (TCPHeader*)(pkt + ip_hlen);
              int tcp_hlen = ((tcp->off_res >> 4) & 0x0F) * 4;
              int payload_offset = ip_hlen + tcp_hlen;
              
              int sni_pos = find_sni_position(pkt + payload_offset, len - payload_offset);
              if(sni_pos > 5) {
                  // Режем за 2 байта до SNI
                  return fragment_tls(pkt, len, sni_pos - 2);
              }
              
              // Fallback на 40 байт
              return fragment_tls(pkt, len, 40);
          }

          // 3. Fake SYN
          std::vector<uint8_t> create_fake_syn(uint8_t* real_pkt, int ttl = 1) {
              IPHeader* ip = (IPHeader*)real_pkt;
              int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
              TCPHeader* tcp = (TCPHeader*)(real_pkt + ip_hlen);
              
              std::vector<uint8_t> fake(ip_hlen + 20);
              memcpy(fake.data(), real_pkt, ip_hlen + 20);
              
              IPHeader* fake_ip = (IPHeader*)fake.data();
              TCPHeader* fake_tcp = (TCPHeader*)(fake.data() + ip_hlen);
              
              fake_ip->len = htons(ip_hlen + 20);
              fake_ip->ttl = ttl;
              fake_tcp->seq = htonl(ntohl(tcp->seq) - 1);
              fake_tcp->flags = 0x02; // SYN
              fake_tcp->win = htons(512);
              
              fix_ip_checksum(fake.data());
              fix_tcp_checksum(fake.data(), fake.size());
              
              return fake;
          }

          // 4. TTL Trick
          void apply_ttl(uint8_t* pkt, int ttl) {
              IPHeader* ip = (IPHeader*)pkt;
              ip->ttl = ttl;
              fix_ip_checksum(pkt);
          }

          // 5. DISORDER (отправка в обратном порядке)
          std::vector<std::vector<uint8_t>> apply_disorder(uint8_t* pkt, int len, int frag_size) {
              auto frags = fragment_tls(pkt, len, frag_size);
              if(frags.size() == 2) {
                  std::reverse(frags.begin(), frags.end());
              }
              return frags;
          }

          // 6. SPLIT2 (двойная фрагментация)
          std::vector<std::vector<uint8_t>> apply_split2(uint8_t* pkt, int len) {
              std::vector<std::vector<uint8_t>> result;
              
              // Первая фрагментация (2 байта)
              auto first_split = fragment_tls(pkt, len, 2);
              if(first_split.size() < 2) return first_split;
              
              // Вторая фрагментация второго пакета (40 байт)
              auto second_split = fragment_tls(first_split[1].data(), first_split[1].size(), 40);
              
              result.push_back(first_split[0]);
              result.insert(result.end(), second_split.begin(), second_split.end());
              
              return result;
          }

          // 7. MD5SIG (TCP MD5 signature fake)
          std::vector<uint8_t> create_md5sig_fake(uint8_t* real_pkt) {
              IPHeader* ip = (IPHeader*)real_pkt;
              int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
              TCPHeader* tcp = (TCPHeader*)(real_pkt + ip_hlen);
              
              // Создаём TCP пакет с MD5 signature option (kind=19, len=18)
              std::vector<uint8_t> fake(ip_hlen + 20 + 20); // +20 для опций
              memcpy(fake.data(), real_pkt, ip_hlen + 20);
              
              IPHeader* fake_ip = (IPHeader*)fake.data();
              TCPHeader* fake_tcp = (TCPHeader*)(fake.data() + ip_hlen);
              
              // MD5 signature option
              uint8_t* options = fake.data() + ip_hlen + 20;
              options[0] = 19; // TCP_MD5SIG
              options[1] = 18; // Length
              memset(options + 2, 0, 16); // Fake signature
              
              fake_tcp->off_res = (((20 + 20) / 4) << 4);
              fake_tcp->seq = htonl(ntohl(fake_tcp->seq) - 100);
              fake_tcp->flags = 0x02; // SYN
              fake_ip->ttl = 1;
              fake_ip->len = htons(ip_hlen + 40);
              
              fix_ip_checksum(fake.data());
              fix_tcp_checksum(fake.data(), fake.size());
              
              return fake;
          }

          // 8. HTTP Split
          std::vector<std::vector<uint8_t>> split_http(uint8_t* pkt, int len) {
              std::vector<std::vector<uint8_t>> result;
              IPHeader* ip = (IPHeader*)pkt;
              int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
              TCPHeader* tcp = (TCPHeader*)(pkt + ip_hlen);
              int tcp_hlen = ((tcp->off_res >> 4) & 0x0F) * 4;
              int payload_offset = ip_hlen + tcp_hlen;
              
              std::string http((char*)(pkt + payload_offset), len - payload_offset);
              size_t host_pos = http.find("Host:");
              
              if(host_pos != std::string::npos && host_pos > 10) {
                  std::vector<uint8_t> part1(pkt, pkt + payload_offset + host_pos);
                  IPHeader* ip1 = (IPHeader*)part1.data();
                  ip1->len = htons(payload_offset + host_pos);
                  fix_ip_checksum(part1.data());
                  fix_tcp_checksum(part1.data(), part1.size());
                  result.push_back(part1);
                  
                  std::vector<uint8_t> part2(payload_offset);
                  memcpy(part2.data(), pkt, payload_offset);
                  part2.insert(part2.end(), pkt + payload_offset + host_pos, pkt + len);
                  
                  IPHeader* ip2 = (IPHeader*)part2.data();
                  TCPHeader* tcp2 = (TCPHeader*)(part2.data() + ip_hlen);
                  tcp2->seq = htonl(ntohl(tcp2->seq) + host_pos);
                  ip2->len = htons(part2.size());
                  fix_ip_checksum(part2.data());
                  fix_tcp_checksum(part2.data(), part2.size());
                  result.push_back(part2);
                  
                  return result;
              }
              
              result.push_back(std::vector<uint8_t>(pkt, pkt + len));
              return result;
          }

          // ========== АВТОСТРАТЕГИЯ ==========
          Strategy select_strategy_for_domain(const std::string& domain) {
              auto it = g_domain_cache.find(domain);
              
              // Домен известен - используем лучшую стратегию
              if(it != g_domain_cache.end() && it->second.best_strategy.test_count > 0) {
                  return it->second.best_strategy;
              }
              
              // Новый домен - выбираем случайную стратегию для теста
              if(it == g_domain_cache.end()) {
                  g_domain_cache[domain] = DomainStats();
                  g_domain_cache[domain].domain = domain;
                  g_domain_cache[domain].total_attempts = 0;
              }
              
              // Список стратегий для тестирования
              std::vector<Strategy> test_strategies = {
                  {STRAT_FRAG_SMALL, 2, 0},
                  {STRAT_FRAG_MEDIUM, 40, 0},
                  {STRAT_FRAG_SNI, 0, 0},
                  {STRAT_FAKE_SYN, 1, 0},
                  {STRAT_TTL_TRICK, 1, 0},
                  {STRAT_DISORDER, 40, 0},
                  {STRAT_SPLIT2, 0, 0},
                  {STRAT_MD5SIG, 0, 0},
                  {STRAT_COMBINED, 40, 1} // frag_size=40, ttl=1
              };
              
              // Выбираем непротестированную стратегию
              for(auto& strat : test_strategies) {
                  bool already_tested = false;
                  for(auto& tested : g_domain_cache[domain].tested_strategies) {
                      if(tested.type == strat.type && tested.param1 == strat.param1) {
                          already_tested = true;
                          break;
                      }
                  }
                  if(!already_tested) {
                      LOG("Testing strategy %d for %s", strat.type, domain.c_str());
                      return strat;
                  }
              }
              
              // Все протестированы - используем лучшую
              float best_rate = 0;
              Strategy best = {STRAT_FRAG_MEDIUM, 40, 0};
              for(auto& tested : g_domain_cache[domain].tested_strategies) {
                  if(tested.success_rate > best_rate) {
                      best_rate = tested.success_rate;
                      best = tested;
                  }
              }
              
              g_domain_cache[domain].best_strategy = best;
              LOG("Best strategy for %s: %d (%.1f%%)", domain.c_str(), best.type, best_rate * 100);
              return best;
          }

          void update_strategy_stats(const std::string& domain, const Strategy& strat, bool success) {
              auto& stats = g_domain_cache[domain];
              stats.total_attempts++;
              
              bool found = false;
              for(auto& tested : stats.tested_strategies) {
                  if(tested.type == strat.type && tested.param1 == strat.param1) {
                      tested.test_count++;
                      tested.success_rate = tested.success_rate * 0.8f + (success ? 0.2f : 0.0f);
                      tested.last_used = get_timestamp_ms();
                      found = true;
                      break;
                  }
              }
              
              if(!found) {
                  Strategy new_strat = strat;
                  new_strat.test_count = 1;
                  new_strat.success_rate = success ? 1.0f : 0.0f;
                  new_strat.last_used = get_timestamp_ms();
                  stats.tested_strategies.push_back(new_strat);
              }
              
              if(success) {
                  stats.successful_attempts++;
                  stats.last_success_time = get_timestamp_ms();
              }
          }

          // ========== ПРИМЕНЕНИЕ СТРАТЕГИИ ==========
          std::vector<std::vector<uint8_t>> apply_strategy(uint8_t* pkt, int len, const Strategy& strat) {
              std::vector<std::vector<uint8_t>> result;
              
              switch(strat.type) {
                  case STRAT_FRAG_SMALL:
                      result = fragment_tls(pkt, len, 2);
                      break;
                      
                  case STRAT_FRAG_MEDIUM:
                      result = fragment_tls(pkt, len, strat.param1);
                      break;
                      
                  case STRAT_FRAG_SNI:
                      result = fragment_before_sni(pkt, len);
                      break;
                      
                  case STRAT_FAKE_SYN:
                      result.push_back(create_fake_syn(pkt, strat.param1));
                      result.push_back(std::vector<uint8_t>(pkt, pkt + len));
                      break;
                      
                  case STRAT_TTL_TRICK:
                      result.push_back(std::vector<uint8_t>(pkt, pkt + len));
                      apply_ttl(result[0].data(), strat.param1);
                      break;
                      
                  case STRAT_DISORDER:
                      result = apply_disorder(pkt, len, strat.param1);
                      break;
                      
                  case STRAT_SPLIT2:
                      result = apply_split2(pkt, len);
                      break;
                      
                  case STRAT_MD5SIG:
                      result.push_back(create_md5sig_fake(pkt));
                      result.push_back(std::vector<uint8_t>(pkt, pkt + len));
                      break;
                      
                  case STRAT_COMBINED:
                      // Комбинация: fake SYN + фрагментация + TTL
                      result.push_back(create_fake_syn(pkt, 1));
                      auto frags = fragment_tls(pkt, len, strat.param1);
                      if(!frags.empty()) apply_ttl(frags[0].data(), strat.param2);
                      result.insert(result.end(), frags.begin(), frags.end());
                      break;
              }
              
              if(result.empty()) {
                  result.push_back(std::vector<uint8_t>(pkt, pkt + len));
              }
              
              return result;
          }

          // ========== JNI INTERFACE ==========
          extern "C" JNIEXPORT jobject JNICALL
          Java_com_dpibypass_pro_PacketEngine_processPacket(JNIEnv* env, jobject, jbyteArray packet) {
              jbyte* pkt_data = env->GetByteArrayElements(packet, nullptr);
              jsize pkt_len = env->GetArrayLength(packet);
              uint8_t* pkt = (uint8_t*)pkt_data;
              
              g_total_packets++;
              
              if(pkt_len < 20 || (pkt[0] >> 4) != 4) {
                  env->ReleaseByteArrayElements(packet, pkt_data, 0);
                  return nullptr;
              }
              
              IPHeader* ip = (IPHeader*)pkt;
              std::vector<std::vector<uint8_t>> output_packets;
              std::string domain;
              bool processed = false;
              
              // TCP обработка
              if(ip->proto == 6) {
                  int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
                  if(pkt_len < ip_hlen + 20) goto finish;
                  
                  TCPHeader* tcp = (TCPHeader*)(pkt + ip_hlen);
                  int tcp_hlen = ((tcp->off_res >> 4) & 0x0F) * 4;
                  int payload_offset = ip_hlen + tcp_hlen;
                  int payload_len = pkt_len - payload_offset;
                  
                  if(payload_len > 0) {
                      uint8_t* payload = pkt + payload_offset;
                      
                      // TLS ClientHello
                      if(payload[0] == 0x16 && payload_len > 5 && payload[5] == 0x01) {
                          domain = extract_sni(payload, payload_len);
                          
                          if(!domain.empty()) {
                              if(!should_process_domain(domain)) {
                                  goto finish;
                              }
                              
                              LOG("TLS to: %s", domain.c_str());
                              
                              Strategy strat;
                              if(g_auto_mode) {
                                  strat = select_strategy_for_domain(domain);
                              } else {
                                  strat = {STRAT_FRAG_MEDIUM, 40, 0};
                              }
                              
                              output_packets = apply_strategy(pkt, pkt_len, strat);
                              processed = true;
                              g_modified_packets++;
                              
                              // Обновляем статистику (предполагаем успех, т.к. нет feedback)
                              if(g_auto_mode) {
                                  update_strategy_stats(domain, strat, true);
                              }
                          }
                      }
                      // HTTP
                      else if(payload_len > 4 && 
                              (memcmp(payload, "GET ", 4) == 0 || 
                               memcmp(payload, "POST", 4) == 0)) {
                          output_packets = split_http(pkt, pkt_len);
                          processed = true;
                          g_modified_packets++;
                      }
                  }
              }
              // UDP QUIC
              else if(ip->proto == 17) {
                  int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
                  if(pkt_len >= ip_hlen + 8) {
                      UDPHeader* udp = (UDPHeader*)(pkt + ip_hlen);
                      if(ntohs(udp->dport) == 443) {
                          LOG("QUIC blocked");
                          env->ReleaseByteArrayElements(packet, pkt_data, 0);
                          return nullptr;
                      }
                  }
              }
              
          finish:
              env->ReleaseByteArrayElements(packet, pkt_data, 0);
              
              if(!processed) {
                  output_packets.push_back(std::vector<uint8_t>(pkt, pkt + pkt_len));
              }
              
              // Convert to ArrayList<byte[]>
              jclass arrayListClass = env->FindClass("java/util/ArrayList");
              jmethodID arrayListInit = env->GetMethodID(arrayListClass, "<init>", "()V");
              jmethodID arrayListAdd = env->GetMethodID(arrayListClass, "add", "(Ljava/lang/Object;)Z");
              
              jobject result = env->NewObject(arrayListClass, arrayListInit);
              
              for(const auto& out_pkt : output_packets) {
                  jbyteArray arr = env->NewByteArray(out_pkt.size());
                  env->SetByteArrayRegion(arr, 0, out_pkt.size(), (jbyte*)out_pkt.data());
                  env->CallBooleanMethod(result, arrayListAdd, arr);
                  env->DeleteLocalRef(arr);
              }
              
              return result;
          }

          extern "C" JNIEXPORT jlong JNICALL
          Java_com_dpibypass_pro_PacketEngine_getTotalPackets(JNIEnv*, jobject) {
              return g_total_packets;
          }

          extern "C" JNIEXPORT jlong JNICALL
          Java_com_dpibypass_pro_PacketEngine_getModifiedPackets(JNIEnv*, jobject) {
              return g_modified_packets;
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_dpibypass_pro_PacketEngine_setAutoMode(JNIEnv*, jobject, jboolean enabled) {
              g_auto_mode = enabled;
              LOG("Auto mode: %s", enabled ? "ON" : "OFF");
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_dpibypass_pro_PacketEngine_setWhitelist(JNIEnv* env, jobject, jobjectArray domains) {
              g_whitelist.clear();
              int len = env->GetArrayLength(domains);
              for(int i = 0; i < len; i++) {
                  jstring jstr = (jstring)env->GetObjectArrayElement(domains, i);
                  const char* str = env->GetStringUTFChars(jstr, nullptr);
                  g_whitelist.push_back(str);
                  env->ReleaseStringUTFChars(jstr, str);
              }
              LOG("Whitelist updated: %zu domains", g_whitelist.size());
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_dpibypass_pro_PacketEngine_setBlacklist(JNIEnv* env, jobject, jobjectArray domains) {
              g_blacklist.clear();
              int len = env->GetArrayLength(domains);
              for(int i = 0; i < len; i++) {
                  jstring jstr = (jstring)env->GetObjectArrayElement(domains, i);
                  const char* str = env->GetStringUTFChars(jstr, nullptr);
                  g_blacklist.push_back(str);
                  env->ReleaseStringUTFChars(jstr, str);
              }
              LOG("Blacklist updated: %zu domains", g_blacklist.size());
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_dpibypass_pro_PacketEngine_getStrategyStats(JNIEnv* env, jobject) {
              std::string stats = "Domain Strategy Stats:\n\n";
              
              for(const auto& pair : g_domain_cache) {
                  const auto& dstats = pair.second;
                  stats += dstats.domain + ":\n";
                  stats += "  Total: " + std::to_string(dstats.total_attempts) + 
                           " Success: " + std::to_string(dstats.successful_attempts) + "\n";
                  
                  if(dstats.best_strategy.test_count > 0) {
                      stats += "  Best: Strategy " + std::to_string(dstats.best_strategy.type) + 
                               " (" + std::to_string((int)(dstats.best_strategy.success_rate * 100)) + "%)\n";
                  }
                  
                  stats += "  Tested:\n";
                  for(const auto& tested : dstats.tested_strategies) {
                      stats += "    - Type " + std::to_string(tested.type) + 
                               ": " + std::to_string(tested.test_count) + " tests, " +
                               std::to_string((int)(tested.success_rate * 100)) + "% success\n";
                  }
                  stats += "\n";
              }
              
              return env->NewStringUTF(stats.c_str());
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_dpibypass_pro_PacketEngine_resetStats(JNIEnv*, jobject) {
              g_total_packets = 0;
              g_modified_packets = 0;
              g_domain_cache.clear();
          }
          CPPEOF

