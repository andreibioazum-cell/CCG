name: Fabric_Clone_Mod_1.21.11
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Initialize Project
        run: |
          mkdir -p src/main/java/com/enjoer/mod
          mkdir -p src/main/resources

          # --- Конфиг Fabric ---
          cat <<EOF > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "enjoer_clones",
            "version": "1.1.0",
            "name": "Enjoer Clones Pro",
            "description": "Спавн клонов и переключение камер",
            "entrypoints": { "client": [ "com.enjoer.mod.CloneMod" ] },
            "depends": { "fabricloader": ">=0.15.0", "minecraft": "1.21.11" }
          }
          EOF

          # --- Java: Основной код мода ---
          cat <<'EOF' > src/main/java/com/enjoer/mod/CloneMod.java
          package com.enjoer.mod;

          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.keybinding.v1.KeyBindingHelper;
          import net.minecraft.client.option.KeyBinding;
          import net.minecraft.client.util.InputUtil;
          import net.minecraft.text.Text;
          import org.lwjgl.glfw.GLFW;
          import java.util.UUID;

          public class CloneMod implements ClientModInitializer {
              private static KeyBinding keySpawn;
              private static KeyBinding keyRemove;
              private static KeyBinding keySwitch;
              private UUID lastCloneId;

              @Override
              public void onInitializeClient() {
                  keySpawn = KeyBindingHelper.registerKeyBinding(new KeyBinding("Спавн клона", InputUtil.Type.KEYSYM, GLFW.GLFW_KEY_J, "Enjoer Mod"));
                  keyRemove = KeyBindingHelper.registerKeyBinding(new KeyBinding("Удалить клона", InputUtil.Type.KEYSYM, GLFW.GLFW_KEY_K, "Enjoer Mod"));
                  keySwitch = KeyBindingHelper.registerKeyBinding(new KeyBinding("Переключить игрока", InputUtil.Type.KEYSYM, GLFW.GLFW_KEY_L, "Enjoer Mod"));

                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null) return;

                      // СПАВН (через отправку команды серверу, так как это надежнее для видимости всем)
                      if (keySpawn.wasPressed()) {
                          String cloneName = "Clone_" + client.player.getName().getString();
                          client.player.networkHandler.sendChatCommand("summon player " + cloneName);
                          client.player.sendMessage(Text.of("§a[Enjoer] Клон " + cloneName + " заспавнен!"), false);
                      }

                      // УДАЛЕНИЕ
                      if (keyRemove.wasPressed()) {
                          client.player.networkHandler.sendChatCommand("kick Clone_" + client.player.getName().getString());
                          client.player.sendMessage(Text.of("§c[Enjoer] Клон удален."), false);
                      }

                      // ПЕРЕКЛЮЧЕНИЕ (Спектатор мод за клона)
                      if (keySwitch.wasPressed()) {
                          client.player.networkHandler.sendChatCommand("spectate Clone_" + client.player.getName().getString());
                      }
                  });
              }
          }
          EOF

          # --- build.gradle (Настройка под 1.21.11) ---
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }

          dependencies {
              minecraft "com.mojang:minecraft:1.21.11"
              mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21.11"
          }
          EOF

          echo "rootProject.name = 'EnjoerClones'" > settings.gradle
          # Генерируем wrapper
          gradle wrapper --gradle-version 8.8

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Clone_Mod_1.21.11
          path: build/libs/*.jar
