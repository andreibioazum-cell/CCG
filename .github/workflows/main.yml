              private void onAddBlock(){
                  String[] types = {"event_start", "event_tap", "move_x", "move_y", "go_xy", "say", "hide", "show", "wait", "set_var", "change_var", "signal", "goto_scene", "list_add"};
                  String[] labels = {"Начало", "При клике", "Движение на X", "Движение на Y", "Перейти на X,Y", "Сказать", "Скрыть", "Показать", "Ждать", "Установить переменную", "Изменить переменную", "Сигнал", "Перейти на сцену", "Добавить в список"};

