                              showBlockTypeDialog("motion");
                          } else if(w == 2){
                              showBlockTypeDialog("looks");
                          } else if(w == 3){
                              showBlockTypeDialog("control");
                          } else if(w == 4){
                              showBlockTypeDialog("data");
                          } else {
                              showBlockTypeDialog("signal");
                          }
                      })
                      .show();
              }

              private void showBlockTypeDialog(String cat){
                  if("event".equals(cat)){
                      String[] items = {"Когда запущено", "Когда объект нажат", "Когда получен сигнал"};
                      new AlertDialog.Builder(this)
                          .setTitle("События")
                          .setItems(items, (d,w) -> {
                              if(w == 0){
                                  insertBlockDialog(new BlockItem("event_start", "Когда запущено", "", ""));
                              } else if(w == 1){
                                  insertBlockDialog(new BlockItem("event_tap", "Когда объект нажат", "", ""));
                              } else {
                                  openFormulaEditor("Имя сигнала", "сигнал1", false,
                                      v -> insertBlockDialog(new BlockItem("event_signal", "Когда получен сигнал", v, "")));
                              }
                          })
                          .show();
                  } else if("motion".equals(cat)){
                      String[] items = {"Двигаться по X", "Двигаться по Y", "Перейти в X Y", "Перейти в сцену"};
                      new AlertDialog.Builder(this)
                          .setTitle("Движение")
                          .setItems(items, (d,w) -> {
                              if(w == 0){
                                  openFormulaEditor("Формула X", "10", true,
                                      v -> insertBlockDialog(new BlockItem("move_x", "Двигаться по X", v, "")));
                              } else if(w == 1){
                                  openFormulaEditor("Формула Y", "10", true,
                                      v -> insertBlockDialog(new BlockItem("move_y", "Двигаться по Y", v, "")));
                              } else if(w == 2){
                                  openTwoFormulaEditor("Перейти в X Y", "X+10", "Y", true,
                                      (a,b) -> insertBlockDialog(new BlockItem("go_xy", "Перейти в", a, b)));
                              } else if(w == 3){
                                  openFormulaEditor("Имя сцены", "\"Сцена 2\"", false,
                                      v -> insertBlockDialog(new BlockItem("goto_scene", "Перейти в сцену", v, "")));
                              }
                          })
                          .show();
                  } else if("looks".equals(cat)){
                      String[] items = {"Сказать", "Скрыть", "Показать", "Текст объекта"};
                      new AlertDialog.Builder(this)
                          .setTitle("Внешность")
                          .setItems(items, (d,w) -> {
                              if(w == 0){
                                  openFormulaEditor("Текст", "\"Привет\"", false,
                                      v -> insertBlockDialog(new BlockItem("say", "Сказать", v, "")));
                              } else if(w == 1){
                                  insertBlockDialog(new BlockItem("hide", "Скрыть", "", ""));
                              } else if(w == 2){
                                  insertBlockDialog(new BlockItem("show", "Показать", "", ""));
                              } else {
                                  openFormulaEditor("Текст", "\"Текст\"", false, v -> {
                                      ObjectItem o = currentObject();
                                      if(o != null){
                                          o.spriteType = "text";
                                          o.text = v.replace("\"", "");
                                          saveAll();
                                          renderObjects();
                                      }
                                  });
                              }
                          })
                          .show();
                  } else if("control".equals(cat)){
                      String[] items = {"Ждать", "Вечно", "Конец вечно"};
                      new AlertDialog.Builder(this)
                          .setTitle("Управление")
                          .setItems(items, (d,w) -> {
                              if(w == 0){
                                  openFormulaEditor("Секунды", "1", true,
                                      v -> insertBlockDialog(new BlockItem("wait", "Ждать", v, "")));
                              } else if(w == 1){
                                  insertBlockDialog(new BlockItem("forever", "Вечно", "", ""));
                              } else {
                                  insertBlockDialog(new BlockItem("end_forever", "Конец вечно", "", ""));
                              }
                          })
                          .show();
                  } else if("data".equals(cat)){
                      String[] items = {"Установить переменную", "Изменить переменную", "Добавить в список"};
                      new AlertDialog.Builder(this)
                          .setTitle("Данные")
                          .setItems(items, (d,w) -> {
                              if(w == 0){
                                  chooseVariable(name ->
                                      openFormulaEditor("Значение", "10", true,
                                          val -> insertBlockDialog(new BlockItem("set_var", "Установить переменную", name, val)))
                                  );
                              } else if(w == 1){
                                  chooseVariable(name ->
                                      openFormulaEditor("Изменить на", "-1", true,
                                          val -> insertBlockDialog(new BlockItem("change_var", "Изменить переменную", name, val)))
                                  );
                              } else {
                                  chooseList(name ->
                                      openFormulaEditor("Значение", "\"элемент\"", false,
                                          val -> insertBlockDialog(new BlockItem("list_add", "Добавить в список", name, val)))
                                  );
                              }
                          })
                          .show();
                  } else if("signal".equals(cat)){
                      String[] items = {"Послать сигнал"};
                      new AlertDialog.Builder(this)
                          .setTitle("Сигналы")
                          .setItems(items, (d,w) ->
                              openFormulaEditor("Имя сигнала", "сигнал1", false,
                                  v -> insertBlockDialog(new BlockItem("signal", "Послать сигнал", v, "")))
                          )
                          .show();
                  }
              }

              private interface OneArg { void ok(String v); }
              private interface TwoArg { void ok(String a, String b); }
              private interface PickName { void pick(String name); }

              private void chooseVariable(PickName cb){
                  ProjectItem p = currentProject();
                  if(p == null || p.variables.isEmpty()){
                      toast("Сначала создай переменную");
                      return;
                  }
                  String[] arr = new String[p.variables.size()];
                  for(int i=0;i<p.variables.size();i++) arr[i] = p.variables.get(i).name;
                  new AlertDialog.Builder(this)
                      .setTitle("Выбери переменную")
                      .setItems(arr, (d,w) -> cb.pick(arr[w]))
                      .show();
              }

              private void chooseList(PickName cb){
                  ProjectItem p = currentProject();
                  if(p == null || p.lists.isEmpty()){
                      toast("Сначала создай список");
                      return;
                  }
                  String[] arr = new String[p.lists.size()];
                  for(int i=0;i<p.lists.size();i++) arr[i] = p.lists.get(i).name;
                  new AlertDialog.Builder(this)
                      .setTitle("Выбери список")
                      .setItems(arr, (d,w) -> cb.pick(arr[w]))
                      .show();
              }

              private void openTwoFormulaEditor(String title, String def1, String def2, boolean numeric, TwoArg cb){
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);

                  TextView t1 = new TextView(this);
                  t1.setText("Arg1");
                  TextView v1 = new TextView(this);
                  v1.setText(def1);
                  v1.setTextSize(18f);
                  v1.setPadding(dp(10), dp(10), dp(10), dp(10));
                  v1.setBackgroundResource(R.drawable.bg_panel);

                  TextView t2 = new TextView(this);
                  t2.setText("Arg2");
                  TextView v2 = new TextView(this);
                  v2.setText(def2);
                  v2.setTextSize(18f);
                  v2.setPadding(dp(10), dp(10), dp(10), dp(10));
                  v2.setBackgroundResource(R.drawable.bg_panel);

                  root.addView(t1);
                  root.addView(v1);
                  root.addView(t2);
                  root.addView(v2);

                  final String[] a1 = {def1};
                  final String[] a2 = {def2};

                  v1.setOnClickListener(v -> openFormulaEditor("Arg1", a1[0], numeric, val -> { a1[0] = val; v1.setText(val); }));
                  v2.setOnClickListener(v -> openFormulaEditor("Arg2", a2[0], numeric, val -> { a2[0] = val; v2.setText(val); }));

                  new AlertDialog.Builder(this)
                      .setTitle(title)
                      .setView(root)
                      .setPositiveButton("ОК", (d,w) -> cb.ok(a1[0], a2[0]))
                      .setNegativeButton("Отмена", null)
                      .show();
              }

              private void openFormulaEditor(String title, String def, boolean numericMode, OneArg cb){
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(dp(8), dp(8), dp(8), dp(8));

                  TextView display = new TextView(this);
                  display.setText(def);
                  display.setTextSize(20f);
                  display.setTextColor(Color.BLACK);
                  display.setPadding(dp(12), dp(12), dp(12), dp(12));
                  display.setBackgroundResource(R.drawable.bg_panel);
                  root.addView(display);

                  GridLayout grid = new GridLayout(this);
                  grid.setColumnCount(4);

                  String[] keys = numericMode
                      ? new String[]{"7","8","9","+","4","5","6","-","1","2","3","*","0",".","(",")","X","Y","/","⌫","sin(","cos(","tan(","atan(","sqrt(","abs(","random(","касаниеX","касаниеY","колКасаний","Перем.","Очистить"}
                      : new String[]{"Текст","X","Y","касаниеX","касаниеY","колКасаний","Перем.","sin(","cos(","tan(","atan(","sqrt(","abs(","random(","+","-","*","/","(",")","⌫","Очистить"};

                  final StringBuilder sb = new StringBuilder(def == null ? "" : def);

                  for(String k : keys){
                      Button b = new Button(this);
                      b.setText(k);
                      b.setTextColor(Color.WHITE);
                      b.setAllCaps(false);
                      b.setBackgroundResource(R.drawable.btn_gray);

                      GridLayout.LayoutParams lp = new GridLayout.LayoutParams();
                      lp.width = 0;
                      lp.height = dp(48);
                      lp.columnSpec = GridLayout.spec(GridLayout.UNDEFINED, 1f);
                      lp.setMargins(dp(4), dp(4), dp(4), dp(4));
                      b.setLayoutParams(lp);

                      b.setOnClickListener(v -> {
                          if("⌫".equals(k)){
                              if(sb.length() > 0) sb.deleteCharAt(sb.length()-1);
                              display.setText(sb.toString());
                              return;
                          }

                          if("Очистить".equals(k)){
                              sb.setLength(0);
                              display.setText(sb.toString());
                              return;
                          }

                          if("Перем.".equals(k)){
                              chooseVariable(name -> {
                                  sb.append(name);
                                  display.setText(sb.toString());
                              });
                              return;
                          }

                          if("Текст".equals(k)){
                              EditText input = new EditText(this);
                              input.setInputType(InputType.TYPE_CLASS_TEXT);
                              new AlertDialog.Builder(this)
                                  .setTitle("Текст")
                                  .setView(input)
                                  .setPositiveButton("ОК", (dd,ww) -> {
                                      sb.append("\"").append(input.getText().toString()).append("\"");
                                      display.setText(sb.toString());
                                  })
                                  .setNegativeButton("Отмена", null)
                                  .show();
                              return;
                          }

                          sb.append(k);
                          display.setText(sb.toString());
                      });

                      grid.addView(b);
                  }

                  ScrollView sv = new ScrollView(this);
                  sv.addView(grid);
                  root.addView(sv);

                  new AlertDialog.Builder(this)
                      .setTitle(title)
                      .setView(root)
                      .setPositiveButton("ОК", (d,w) -> cb.ok(sb.toString()))
                      .setNegativeButton("Отмена", null)
                      .show();
              }

              private void insertBlockDialog(BlockItem block){
                  ObjectItem o = currentObject();
                  if(o == null) return;

                  String[] opts = new String[o.blocks.size()+1];
                  opts[0] = "В конец";
                  for(int i=0;i<o.blocks.size();i++){
                      opts[i+1] = "Перед: " + o.blocks.get(i).label;
                  }

                  new AlertDialog.Builder(this)
                      .setTitle("Куда вставить блок?")
                      .setItems(opts, (d,w) -> {
                          if(w == 0){
                              o.blocks.add(block);
                          } else {
                              o.blocks.add(w-1, block);
                          }
                          saveAll();
                          renderBlocks();
                      })
                      .show();
              }

              private void showBlockMenu(int idx){
                  ObjectItem o = currentObject();
                  if(o == null) return;
                  BlockItem b = o.blocks.get(idx);

                  String[] items = {"Удалить", "Изменить Arg1", "Изменить Arg2"};
                  new AlertDialog.Builder(this)
                      .setTitle("Блок")
                      .setItems(items, (d,w) -> {
                          if(w == 0){
                              o.blocks.remove(idx);
                              saveAll();
                              renderBlocks();
                          } else if(w == 1){
                              openFormulaEditor("Arg1", b.arg1 == null ? "" : b.arg1, !isTextBlock(b), val -> {
                                  b.arg1 = val;
                                  saveAll();
                                  renderBlocks();
                              });
                          } else if(w == 2){
                              openFormulaEditor("Arg2", b.arg2 == null ? "" : b.arg2, true, val -> {
                                  b.arg2 = val;
                                  saveAll();
                                  renderBlocks();
                              });
                          }
                      })
                      .show();
              }

              private boolean isTextBlock(BlockItem b){
                  return "say".equals(b.type) || "goto_scene".equals(b.type) || "signal".equals(b.type) || "event_signal".equals(b.type) || "list_add".equals(b.type);
              }

