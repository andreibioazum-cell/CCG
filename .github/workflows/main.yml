name: Enjoer_GG_RealAccess_v57
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/realgg
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.enjoer.realgg'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.realgg'
                  minSdk 26
                  targetSdk 34
                  externalNativeBuild { cmake { cppFlags "-std=c++17" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'dev.rikka.shizuku:api:13.1.0'
              implementation 'dev.rikka.shizuku:provider:13.1.0'
          }
          EOF

          # Манифест с Receiver для Shizuku
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="Enjoer GG v57" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".OverlayService" android:enabled="true" android:exported="false"/>
                  
                  <provider android:name="rikka.shizuku.ShizukuProvider"
                      android:authorities="\${applicationId}.shizuku"
                      android:enabled="true"
                      android:exported="false"
                      android:multiprocess="false" />
              </application>
          </manifest>
          EOF

          echo "<resources><style name='Theme.Enjoer' parent='Theme.AppCompat.Light.NoActionBar'/></resources>" > app/src/main/res/values/styles.xml

      - name: Create Native Engine
        run: |
          cat <<EOF > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("gg_engine")
          add_library(native-lib SHARED native-lib.cpp)
          target_link_libraries(native-lib android log)
          EOF

          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <sys/uio.h>
          #include <unistd.h>

          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_enjoer_realgg_OverlayService_writeMemory(JNIEnv* env, jobject thiz, jint pid, jlong addr, jint val) {
              struct iovec local[1], remote[1];
              local[0].iov_base = &val;
              local[0].iov_len = sizeof(val);
              remote[0].iov_base = (void*)addr;
              remote[0].iov_len = sizeof(val);
              ssize_t n = process_vm_writev(pid, local, 1, remote, 1, 0);
              return (n > 0);
          }
          EOF

      - name: Create Logic (Shizuku Request + Mode View)
        run: |
          # MainActivity - принудительный запрос прав
          cat <<'EOF' > app/src/main/java/com/enjoer/realgg/MainActivity.java
          package com.enjoer.realgg;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.*;
          import rikka.shizuku.Shizuku;
          import android.content.pm.PackageManager;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  LinearLayout l = new LinearLayout(this);
                  Button btn = new Button(this);
                  btn.setText("АКТИВИРОВАТЬ И ЗАПРОСИТЬ ПРАВА");
                  l.addView(btn);
                  setContentView(l);

                  btn.setOnClickListener(v -> {
                      if (Shizuku.pingBinder()) {
                          if (Shizuku.checkSelfPermission() == PackageManager.PERMISSION_GRANTED) {
                              startService(new Intent(this, OverlayService.class));
                              finish();
                          } else {
                              Shizuku.requestPermission(1001); // Окно запроса Shizuku
                          }
                      } else {
                          Toast.makeText(this, "Shizuku не запущен!", Toast.LENGTH_SHORT).show();
                      }
                  });
              }
          }
          EOF

          # OverlayService - Индикатор режима
          cat <<'EOF' > app/src/main/java/com/enjoer/realgg/OverlayService.java
          package com.enjoer.realgg;
          import android.app.*;
          import android.content.*;
          import android.graphics.PixelFormat;
          import android.view.*;
          import android.widget.*;
          import java.io.*;

          public class OverlayService extends Service {
              static { System.loadLibrary("native-lib"); }
              public native boolean writeMemory(int pid, long addr, int val);

              private WindowManager wm;
              private LinearLayout panel;

              @Override
              public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setBackgroundColor(0xEE111111);
                  panel.setPadding(25, 25, 25, 25);

                  TextView status = new TextView(this);
                  status.setText("РЕЖИМ: Shizuku Bridge");
                  status.setTextColor(0xFF00FF00);
                  panel.addView(status);

                  Spinner modeSpinner = new Spinner(this);
                  String[] modes = {"Shizuku Bridge", "Kernel Exploit (A14)"};
                  modeSpinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, modes));
                  panel.addView(modeSpinner);

                  // Слушатель смены режима
                  modeSpinner.setOnItemSelectedListener(new AdapterView.OnItemSelectedListener() {
                      public void onItemSelected(AdapterView<?> p, View v, int pos, long id) {
                          status.setText("РЕЖИМ: " + modes[pos]);
                      }
                      public void onNothingSelected(AdapterView<?> p) {}
                  });

                  EditText edAddr = new EditText(this);
                  edAddr.setHint("Адрес (0x...)");
                  edAddr.setTextColor(0xFFFFFFFF);
                  panel.addView(edAddr);

                  EditText edVal = new EditText(this);
                  edVal.setHint("Значение");
                  edVal.setTextColor(0xFFFFFFFF);
                  panel.addView(edVal);

                  Button b = new Button(this);
                  b.setText("ЗАМЕНИТЬ");
                  panel.addView(b);

                  b.setOnClickListener(v -> {
                      try {
                          long addr = Long.decode(edAddr.getText().toString());
                          int val = Integer.parseInt(edVal.getText().toString());
                          // Для теста используем текущий PID
                          boolean ok = writeMemory(android.os.Process.myPid(), addr, val);
                          Toast.makeText(this, ok ? "УСПЕХ!" : "ОТКАЗАНО", Toast.LENGTH_SHORT).show();
                      } catch (Exception e) { Toast.makeText(this, "Ошибка ввода", Toast.LENGTH_SHORT).show(); }
                  });

                  WindowManager.LayoutParams p = new WindowManager.LayoutParams(
                      600, 800, WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  p.gravity = Gravity.CENTER;
                  wm.addView(panel, p);
              }
              @Override public android.os.IBinder onBind(Intent i) { return null; }
          }
          EOF

      - name: Build
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_GG_v57
          path: app/build/outputs/apk/debug/*.apk
