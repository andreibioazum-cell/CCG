name: Cubic_Battle_Industrial
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          # Создаем папки
          mkdir -p app/src/main/java/com/cubic/battle
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Настройки
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # Темы
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:statusBarColor">#000000</item>
            </style>
          </resources>
          EOF

          # Строки
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">Cubic Battle</string></resources>
          EOF

          # Главный экран (Лобби)
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000"
              android:padding="32dp">
              <TextView
                  android:id="@+id/title"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="CUBIC BATTLE\nВ новых красках 🎨"
                  android:textColor="#FFFFFF"
                  android:textSize="32sp"
                  android:textStyle="bold"/>
              <LinearLayout
                  android:layout_width="250dp"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/title"
                  android:layout_marginTop="20dp"
                  android:orientation="vertical">
                  <Button
                      android:id="@+id/btn_play"
                      android:layout_width="match_parent"
                      android:layout_height="60dp"
                      android:text="Режимы"
                      android:backgroundTint="#6A1B9A"
                      android:textColor="#FFFFFF"
                      android:layout_marginBottom="10dp"/>
                  <Button
                      android:layout_width="match_parent"
                      android:layout_height="60dp"
                      android:text="Больше"
                      android:backgroundTint="#6A1B9A"
                      android:textColor="#FFFFFF"/>
                  <Button
                      android:layout_width="140dp"
                      android:layout_height="90dp"
                      android:text="Классы"
                      android:backgroundTint="#6A1B9A"
                      android:textColor="#FFFFFF"
                      android:layout_marginTop="30dp"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # Игровой движок (Java)
          cat > app/src/main/java/com/cubic/battle/GameView.java << 'EOF'
          package com.cubic.battle;
          import android.content.Context;
          import android.graphics.*;
          import android.view.*;

          public class GameView extends SurfaceView implements Runnable {
              private Thread thread;
              private boolean running;
              private float x = 200, y = 200; // Игрок
              private float bx = 800, by = 400; // Бот
              private float jx = 250, jy = 750, tx = 250, ty = 750; // Джойстик
              private boolean moving = false;

              public GameView(Context context) { super(context); }

              public void start() {
                  running = true;
                  thread = new Thread(this);
                  thread.start();
              }

              @Override
              public void run() {
                  while (running) {
                      if (getHolder().getSurface().isValid()) {
                          Canvas canvas = getHolder().lockCanvas();
                          // Логика
                          if (moving) {
                              float dx = tx - jx, dy = ty - jy;
                              float d = (float)Math.sqrt(dx*dx + dy*dy);
                              if (d > 5) { x += (dx/d)*12; y += (dy/d)*12; }
                          }
                          // Бот преследует
                          float bdx = x - bx, bdy = y - by;
                          float bd = (float)Math.sqrt(bdx*bdx + bdy*bdy);
                          if (bd > 100) { bx += (bdx/bd)*6; by += (bdy/bd)*6; }

                          // Отрисовка
                          canvas.drawColor(Color.parseColor("#D2B48C")); // Песок
                          Paint p = new Paint();
                          drawCube(canvas, x, y, p); // Игрок
                          drawCube(canvas, bx, by, p); // Бот
                          
                          // Джойстик
                          p.setColor(Color.WHITE); p.setAlpha(100);
                          canvas.drawCircle(jx, jy, 130, p);
                          p.setAlpha(200); canvas.drawCircle(tx, ty, 65, p);
                          
                          // Кнопки
                          p.setAlpha(255); p.setColor(Color.parseColor("#BA68C8"));
                          canvas.drawCircle(canvas.getWidth()-350, canvas.getHeight()-350, 90, p);
                          p.setColor(Color.parseColor("#E57373"));
                          canvas.drawCircle(canvas.getWidth()-180, canvas.getHeight()-180, 90, p);

                          getHolder().unlockCanvasAndPost(canvas);
                      }
                      try { Thread.sleep(16); } catch (Exception e) {}
                  }
              }

              private void drawCube(Canvas c, float x, float y, Paint p) {
                  p.setColor(Color.BLACK); c.drawRect(x, y, x+110, y+110, p);
                  p.setColor(Color.WHITE); 
                  c.drawRect(x+15, y+20, x+45, y+50, p); // Глаз 1
                  c.drawRect(x+65, y+20, x+95, y+50, p); // Глаз 2
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getX() < getWidth()/2) {
                      if (e.getAction() == MotionEvent.ACTION_UP) { tx=jx; ty=jy; moving=false; }
                      else { tx=e.getX(); ty=e.getY(); moving=true; }
                  }
                  return true;
              }
          }
          EOF

          # Главная активность (Java)
          cat > app/src/main/java/com/cubic/battle/MainActivity.java << 'EOF'
          package com.cubic.battle;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.widget.Button;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  findViewById(R.id.btn_play).setOnClickListener(v -> {
                      GameView g = new GameView(this);
                      setContentView(g);
                      g.start();
                  });
              }
          }
          EOF

          # Манифест
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Cubic Battle" android:theme="@style/AppTheme">
                  <activity android:name="com.cubic.battle.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Скрипты сборки
          echo "include ':app'" > settings.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.cubic.battle'
              compileSdk 34
              defaultConfig { applicationId 'com.cubic.battle'; minSdk 24; targetSdk 34 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Cubic_Battle_Industrial
          path: app/build/outputs/apk/debug/app-debug.apk
