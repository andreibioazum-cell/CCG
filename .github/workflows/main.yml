          cat <<EOF > app/src/main/res/drawable/ic_check.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="16dp" android:height="16dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#5DB050" android:pathData="M18,7l-1.41,-1.41 -6.34,6.34 1.41,1.41zM22.24,5.59L11.66,16.17 7.48,12l-1.41,1.41 5.59,5.59 12,-12zM0.41,13.41L6,19l1.41,-1.41L1.83,12z"/></vector>
