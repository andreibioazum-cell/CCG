          EOF

          cat <<'EOF' > app/src/main/res/layout/screen_chats.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFF">
              <LinearLayout android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="56dp" android:background="@drawable/bg_toolbar" android:gravity="center_vertical" android:paddingLeft="4dp" android:paddingRight="4dp">
                  <ImageView android:id="@+id/btn_menu" android:layout_width="48dp" android:layout_height="48dp" android:padding="12dp" android:src="@drawable/ic_menu"/>
                  <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="Telegram" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold" android:layout_marginLeft="8dp"/>
                  <ImageView android:layout_width="48dp" android:layout_height="48dp" android:padding="12dp" android:src="@drawable/ic_search"/>
              </LinearLayout>
              <androidx.recyclerview.widget.RecyclerView android:id="@+id/list" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/toolbar"/>
              <FrameLayout android:id="@+id/fab" android:layout_width="56dp" android:layout_height="56dp" android:layout_alignParentRight="true" android:layout_alignParentBottom="true" android:layout_margin="16dp" android:background="@drawable/bg_fab" android:elevation="6dp">
                  <ImageView android:layout_width="24dp" android:layout_height="24dp" android:layout_gravity="center" android:src="@drawable/ic_edit"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          cat <<'EOF' > app/src/main/res/layout/item_chat.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="72dp" android:background="?selectableItemBackground" android:paddingLeft="16dp" android:paddingRight="16dp">
              <FrameLayout android:id="@+id/av_wrap" android:layout_width="52dp" android:layout_height="52dp" android:layout_centerVertical="true">
                  <TextView android:id="@+id/avatar" android:layout_width="52dp" android:layout_height="52dp" android:background="@drawable/bg_avatar" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                  <View android:id="@+id/online" android:layout_width="14dp" android:layout_height="14dp" android:layout_gravity="bottom|right" android:background="@drawable/bg_online" android:visibility="gone"/>
              </FrameLayout>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_centerVertical="true" android:layout_marginLeft="68dp" android:layout_marginRight="55dp" android:orientation="vertical">
                  <TextView android:id="@+id/name" android:layout_width="wrap_content" android:layout_height="wrap_content" android:ellipsize="end" android:maxLines="1" android:textColor="#000" android:textSize="16sp" android:textStyle="bold"/>
                  <TextView android:id="@+id/msg" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_marginTop="2dp" android:ellipsize="end" android:maxLines="1" android:textColor="#8E8E93" android:textSize="14sp"/>
              </LinearLayout>
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentRight="true" android:layout_centerVertical="true" android:gravity="right" android:orientation="vertical">
                  <TextView android:id="@+id/time" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#8E8E93" android:textSize="12sp"/>
                  <TextView android:id="@+id/badge" android:layout_width="22dp" android:layout_height="22dp" android:layout_marginTop="4dp" android:background="@drawable/bg_badge" android:gravity="center" android:textColor="#FFF" android:textSize="12sp" android:visibility="gone"/>
              </LinearLayout>
              <View android:layout_width="match_parent" android:layout_height="1dp" android:layout_alignParentBottom="true" android:layout_marginLeft="68dp" android:background="#E5E5EA"/>
          </RelativeLayout>
          EOF

          cat <<'EOF' > app/src/main/res/layout/screen_chat.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#E5DDD5">
              <LinearLayout android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="56dp" android:background="@drawable/bg_toolbar" android:gravity="center_vertical" android:paddingRight="4dp">
                  <ImageView android:id="@+id/btn_back" android:layout_width="48dp" android:layout_height="48dp" android:padding="12dp" android:src="@drawable/ic_back"/>
                  <TextView android:id="@+id/av" android:layout_width="40dp" android:layout_height="40dp" android:background="@drawable/bg_avatar" android:gravity="center" android:textColor="#FFF" android:textSize="16sp" android:textStyle="bold"/>
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:layout_marginLeft="12dp" android:orientation="vertical">
                      <TextView android:id="@+id/t_name" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FFF" android:textSize="17sp" android:textStyle="bold"/>
                      <TextView android:id="@+id/t_status" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="online" android:textColor="#C5E1F7" android:textSize="13sp"/>
                  </LinearLayout>
                  <ImageView android:layout_width="48dp" android:layout_height="48dp" android:padding="12dp" android:src="@drawable/ic_call"/>
                  <ImageView android:layout_width="48dp" android:layout_height="48dp" android:padding="12dp" android:src="@drawable/ic_more"/>
              </LinearLayout>
              <androidx.recyclerview.widget.RecyclerView android:id="@+id/msgs" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_above="@id/input_bar" android:layout_below="@id/toolbar" android:clipToPadding="false" android:padding="8dp"/>
              <LinearLayout android:id="@+id/input_bar" android:layout_width="match_parent" android:layout_height="52dp" android:layout_alignParentBottom="true" android:background="#FFF" android:gravity="center_vertical" android:padding="4dp">
                  <ImageView android:layout_width="44dp" android:layout_height="44dp" android:padding="10dp" android:src="@drawable/ic_emoji"/>
                  <EditText android:id="@+id/input" android:layout_width="0dp" android:layout_height="40dp" android:layout_weight="1" android:background="@null" android:hint="Message" android:paddingLeft="4dp" android:textSize="16sp"/>
                  <ImageView android:layout_width="44dp" android:layout_height="44dp" android:padding="10dp" android:src="@drawable/ic_attach"/>
                  <FrameLayout android:id="@+id/btn_send" android:layout_width="44dp" android:layout_height="44dp" android:background="@drawable/bg_send" android:visibility="gone">
