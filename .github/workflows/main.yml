name: DPI_Bypass_PRO_Tecno_A14
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/{java/com/dpibypass/pro,cpp,res/{layout,values,drawable}}

      - name: Create Advanced Packet Engine (C++)
        run: |
          cat > app/src/main/cpp/advanced_engine.cpp << 'CPPEOF'
          #include <jni.h>
          #include <string>
          #include <vector>
          #include <sys/socket.h>
          #include <netinet/in.h>
          #include <arpa/inet.h>
          #include <unistd.h>
          #include <fcntl.h>
          #include <android/log.h>

          #define LOG(...) __android_log_print(ANDROID_LOG_INFO, "DPIBypassPRO", __VA_ARGS__)

          static long g_total = 0;
          static long g_mod = 0;

          // Движок обхода DPI на уровне сокетов (ByeDPI style)
          // Этот метод намного стабильнее на Android 14
          extern "C" JNIEXPORT jint JNICALL
          Java_com_dpibypass_pro_PacketEngine_nativeConnect(JNIEnv* env, jobject, jstring host, jint port) {
              const char* h = env->GetStringUTFChars(host, 0);
              int sock = socket(AF_INET, SOCK_STREAM, 0);
              
              struct sockaddr_in addr;
              addr.sin_family = AF_INET;
              addr.sin_port = htons(port);
              inet_pton(AF_INET, h, &addr.sin_addr);

              if (connect(sock, (struct sockaddr*)&addr, sizeof(addr)) < 0) {
                  close(sock);
                  env->ReleaseStringUTFChars(host, h);
                  return -1;
              }

              env->ReleaseStringUTFChars(host, h);
              return sock;
          }

          extern "C" JNIEXPORT jint JNICALL
          Java_com_dpibypass_pro_PacketEngine_nativeSend(JNIEnv* env, jobject, jint sock, jbyteArray data, jint len) {
              jbyte* buf = env->GetByteArrayElements(data, 0);
              uint8_t* payload = (uint8_t*)buf;
              int sent = 0;

              g_total += len;

              // Если это TLS ClientHello (начало HTTPS соединения)
              if (len > 5 && payload[0] == 0x16 && payload[5] == 0x01) {
                  LOG("TLS ClientHello detected. Splitting...");
                  g_mod++;
                  // Применяем фрагментацию: шлем 2 байта, потом остальное
                  send(sock, payload, 2, 0);
                  usleep(50000); // Задержка для обмана DPI
                  sent = send(sock, payload + 2, len - 2, 0) + 2;
              } else {
                  sent = send(sock, payload, len, 0);
              }

              env->ReleaseByteArrayElements(data, buf, 0);
              return sent;
          }

          extern "C" JNIEXPORT jlong JNICALL Java_com_dpibypass_pro_PacketEngine_getTotal(JNIEnv*, jobject) { return g_total; }
          extern "C" JNIEXPORT jlong JNICALL Java_com_dpibypass_pro_PacketEngine_getMod(JNIEnv*, jobject) { return g_mod; }
          CPPEOF

      - name: Create CMakeLists
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18.1)
          project("dpibypass")
          add_library(dpibypass SHARED advanced_engine.cpp)
          find_library(log-lib log)
          target_link_libraries(dpibypass ${log-lib})
          EOF

      - name: Create PacketEngine Java
        run: |
          cat > app/src/main/java/com/dpibypass/pro/PacketEngine.java << 'JAVAEOF'
          package com.dpibypass.pro;
          public class PacketEngine {
              static { System.loadLibrary("dpibypass"); }
              public native int nativeConnect(String host, int port);
              public native int nativeSend(int sock, byte[] data, int len);
              public native long getTotal();
              public native long getMod();
          }
          JAVAEOF

      - name: Create VPN Service (Стабильный интернет)
        run: |
          cat > app/src/main/java/com/dpibypass/pro/VpnService.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.content.Intent;
          import android.net.ProxyInfo;
          import android.os.ParcelFileDescriptor;
          import java.io.IOException;

          public class VpnService extends android.net.VpnService {
              private ParcelFileDescriptor vpn;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (vpn != null) return START_STICKY;

                  Builder builder = new Builder();
                  builder.setSession("Tecno A14 PRO")
                         .setMtu(1500)
                         .addAddress("10.0.0.2", 24)
                         .addRoute("8.8.8.8", 32) // Направляем только DNS через VPN для теста
                         .addDnsServer("8.8.8.8")
                         .addDnsServer("1.1.1.1");

                  // В Android 14 это лучший способ заставить систему работать через прокси-обход
                  if (android.os.Build.VERSION.SDK_INT >= 29) {
                      builder.setHttpProxy(ProxyInfo.buildDirectProxy("127.0.0.1", 8080));
                  }

                  vpn = builder.establish();
                  MainActivity.updateStatus(true);
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  try { if(vpn != null) vpn.close(); } catch(Exception e) {}
                  MainActivity.updateStatus(false);
                  super.onDestroy();
              }
          }
          JAVAEOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/dpibypass/pro/MainActivity.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.app.Activity;
          import android.content.*;
          import android.os.Bundle;
          import android.widget.*;
          import android.graphics.Color;
          import android.os.Build;

          public class MainActivity extends Activity {
              private static TextView statusView, statsView;
              private Switch mainSwitch;
              private PacketEngine engine = new PacketEngine();

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(50, 50, 50, 50);
                  root.setBackgroundColor(0xFF050505);

                  TextView title = new TextView(this);
                  title.setText("TECNO SPARK GO - DPI PRO");
                  title.setTextSize(22); title.setTextColor(Color.GREEN);
                  root.addView(title);

                  TextView info = new TextView(this);
                  info.setText("System: Android " + Build.VERSION.RELEASE + " (API " + Build.VERSION.SDK_INT + ")");
                  info.setTextColor(Color.WHITE);
                  root.addView(info);

                  statusView = new TextView(this);
                  statusView.setText("● СТАТУС: ВЫКЛЮЧЕНО");
                  statusView.setTextColor(Color.RED);
                  statusView.setPadding(0, 30, 0, 30);
                  root.addView(statusView);

                  mainSwitch = new Switch(this);
                  mainSwitch.setText("ЗАПУСТИТЬ ОБХОД");
                  mainSwitch.setTextColor(Color.WHITE);
                  mainSwitch.setOnCheckedChangeListener((v, c) -> {
                      if(c) {
                          Intent intent = android.net.VpnService.prepare(this);
                          if(intent != null) startActivityForResult(intent, 0);
                          else startService(new Intent(this, VpnService.class));
                      } else {
                          stopService(new Intent(this, VpnService.class));
                      }
                  });
                  root.addView(mainSwitch);

                  statsView = new TextView(this);
                  statsView.setPadding(0, 40, 0, 0);
                  statsView.setTextColor(Color.GRAY);
                  root.addView(statsView);

                  setContentView(root);

                  // Stats Updater
                  new Thread(() -> {
                      try {
                          while(true) {
                              Thread.sleep(1000);
                              runOnUiThread(() -> statsView.setText("Data: " + engine.getTotal() / 1024 + " KB | Bypassed: " + engine.getMod()));
                          }
                      } catch(Exception e) {}
                  }).start();
              }

              public static void updateStatus(boolean a) {
                  if(statusView != null) statusView.post(() -> {
                      statusView.setText(a ? "● СТАТУС: АКТИВЕН" : "● СТАТУС: ВЫКЛЮЧЕНО");
                      statusView.setTextColor(a ? Color.GREEN : Color.RED);
                  });
              }
          }
          JAVAEOF

      - name: Create Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              <application android:label="Tecno Bypass" android:theme="@android:style/Theme.DeviceDefault">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".VpnService" android:exported="true"
                           android:foregroundServiceType="specialUse"
                           android:permission="android.permission.BIND_VPN_SERVICE">
                      <intent-filter>
                          <action android:name="android.net.VpnService"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Create Build Files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "include ':app'" > settings.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dpibypass.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.dpibypass.pro'
                  minSdk 34
                  targetSdk 34
                  versionCode 7
                  ndk { abiFilters 'arm64-v8a' }
              }
              externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt' } }
          }
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tecno_DPI_Final_A14
          path: app/build/outputs/apk/debug/app-debug.apk
