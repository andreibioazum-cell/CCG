                      float mx=((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*s;
                      float mz=((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*s;
                      vY-=0.025f;float nX=pX+mx,nY=pY+vY,nZ=pZ+mz;
                      float footY=nY-PLAYER_HEIGHT;
                      if(footY<FLOOR_Y){nY=FLOOR_Y+PLAYER_HEIGHT;vY=0;}
                      for(Block b:blocks){
                          boolean h=nX+PLAYER_RADIUS>b.minX()&&nX-PLAYER_RADIUS<b.maxX()&&nZ+PLAYER_RADIUS>b.minZ()&&nZ-PLAYER_RADIUS<b.maxZ();
                          if(h){
                              if(pY-PLAYER_HEIGHT>=b.maxY()-0.15f&&footY<b.maxY()){nY=b.maxY()+PLAYER_HEIGHT;vY=0;}
                              else if(pY<b.minY()&&nY>b.minY()){nY=b.minY();vY=0;}
                              else if(nY-PLAYER_HEIGHT<b.maxY()-0.1f&&nY>b.minY()+0.1f){
                                  float ox1=(nX+PLAYER_RADIUS)-b.minX(),ox2=b.maxX()-(nX-PLAYER_RADIUS);
                                  float oz1=(nZ+PLAYER_RADIUS)-b.minZ(),oz2=b.maxZ()-(nZ-PLAYER_RADIUS);
                                  float mo=Math.min(Math.min(ox1,ox2),Math.min(oz1,oz2));
                                  if(mo==ox1)nX=b.minX()-PLAYER_RADIUS;else if(mo==ox2)nX=b.maxX()+PLAYER_RADIUS;
                                  else if(mo==oz1)nZ=b.minZ()-PLAYER_RADIUS;else nZ=b.maxZ()+PLAYER_RADIUS;
                              }
