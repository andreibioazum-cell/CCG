name: Tecno_Spark_Go_A14_PRO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/{java/com/dpibypass/pro,cpp,res/{layout,values,drawable}}

      - name: Create Advanced Packet Engine
        run: |
          cat > app/src/main/cpp/advanced_engine.cpp << 'CPPEOF'
          #include <jni.h>
          #include <string>
          #include <cstring>
          #include <arpa/inet.h>
          #include <vector>
          #include <algorithm>
          #include <android/log.h>

          #define LOG(...) __android_log_print(ANDROID_LOG_INFO, "DPIBypassPRO", __VA_ARGS__)

          struct IPHeader {
              uint8_t ver_ihl, tos;
              uint16_t len, id, off;
              uint8_t ttl, proto;
              uint16_t csum;
              uint32_t src, dst;
          } __attribute__((packed));

          struct TCPHeader {
              uint16_t sport, dport;
              uint32_t seq, ack;
              uint8_t off_res, flags;
              uint16_t win, csum, urp;
          } __attribute__((packed));

          enum StrategyType { STRAT_NONE = 0, STRAT_FRAG = 1 };

          struct Strategy {
              StrategyType type;
              int param1;
              Strategy() : type(STRAT_NONE), param1(0) {}
              Strategy(StrategyType t, int p) : type(t), param1(p) {}
          };

          static long g_total = 0;
          static long g_mod = 0;

          uint16_t checksum(const uint16_t* buf, int len) {
              uint32_t sum = 0;
              for(int i = 0; i < len / 2; i++) sum += buf[i];
              if(len & 1) sum += ((uint8_t*)buf)[len - 1];
              while(sum >> 16) sum = (sum & 0xFFFF) + (sum >> 16);
              return ~sum;
          }

          void fix_chk(uint8_t* pkt, int len) {
              IPHeader* ip = (IPHeader*)pkt;
              ip->csum = 0;
              ip->csum = checksum((uint16_t*)ip, (ip->ver_ihl & 0x0F) * 4);
              if(ip->proto == 6) {
                  int ih = (ip->ver_ihl & 0x0F) * 4;
                  TCPHeader* tcp = (TCPHeader*)(pkt + ih);
                  int tl = ntohs(ip->len) - ih;
                  tcp->csum = 0;
                  uint32_t sum = (ip->src >> 16) + (ip->src & 0xFFFF) + (ip->dst >> 16) + (ip->dst & 0xFFFF) + htons(6) + htons(tl);
                  uint16_t* tp = (uint16_t*)tcp;
                  for(int i = 0; i < tl / 2; i++) sum += tp[i];
                  if(tl & 1) sum += pkt[len-1];
                  while(sum >> 16) sum = (sum & 0xFFFF) + (sum >> 16);
                  tcp->csum = ~sum;
              }
          }

          extern "C" JNIEXPORT jobject JNICALL
          Java_com_dpibypass_pro_PacketEngine_processPacket(JNIEnv* env, jobject, jbyteArray packet) {
              jbyte* data = env->GetByteArrayElements(packet, nullptr);
              int len = env->GetArrayLength(packet);
              uint8_t* pkt = (uint8_t*)data;
              g_total++;

              std::vector<std::vector<uint8_t>> out;
              IPHeader* ip = (IPHeader*)pkt;

              if (ip->proto == 6 && len > 60) {
                  int ih = (ip->ver_ihl & 0x0F) * 4;
                  int po = ih + (((TCPHeader*)(pkt + ih))->off_res >> 4) * 4;
                  if (len > po && pkt[po] == 0x16) {
                      g_mod++;
                      // Split TLS ClientHello into 2 bytes and the rest
                      int split = 2;
                      std::vector<uint8_t> p1(pkt, pkt + po + split);
                      ((IPHeader*)p1.data())->len = htons(p1.size());
                      fix_chk(p1.data(), p1.size());
                      out.push_back(p1);

                      std::vector<uint8_t> p2(pkt, pkt + po);
                      p2.insert(p2.end(), pkt + po + split, pkt + len);
                      ((IPHeader*)p2.data())->len = htons(p2.size());
                      ((TCPHeader*)(p2.data() + ih))->seq = htonl(ntohl(((TCPHeader*)(pkt + ih))->seq) + split);
                      fix_chk(p2.data(), p2.size());
                      out.push_back(p2);
                  }
              }
              
              if(out.empty()) out.push_back(std::vector<uint8_t>(pkt, pkt + len));

              env->ReleaseByteArrayElements(packet, data, 0);
              jclass alc = env->FindClass("java/util/ArrayList");
              jmethodID ali = env->GetMethodID(alc, "<init>", "()V");
              jmethodID ala = env->GetMethodID(alc, "add", "(Ljava/lang/Object;)Z");
              jobject res = env->NewObject(alc, ali);
              for(auto& p : out) {
                  jbyteArray arr = env->NewByteArray(p.size());
                  env->SetByteArrayRegion(arr, 0, p.size(), (jbyte*)p.data());
                  env->CallBooleanMethod(res, ala, arr);
                  env->DeleteLocalRef(arr);
              }
              return res;
          }

          extern "C" JNIEXPORT jlong JNICALL Java_com_dpibypass_pro_PacketEngine_getTotal(JNIEnv*, jobject) { return g_total; }
          extern "C" JNIEXPORT jlong JNICALL Java_com_dpibypass_pro_PacketEngine_getMod(JNIEnv*, jobject) { return g_mod; }
          CPPEOF

      - name: Create CMakeLists
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18.1)
          project("dpibypass")
          add_library(dpibypass SHARED advanced_engine.cpp)
          find_library(log-lib log)
          target_link_libraries(dpibypass ${log-lib})
          EOF

      - name: Create PacketEngine Java
        run: |
          cat > app/src/main/java/com/dpibypass/pro/PacketEngine.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import java.util.ArrayList;
          public class PacketEngine {
              static { System.loadLibrary("dpibypass"); }
              public native ArrayList<byte[]> processPacket(byte[] packet);
              public native long getTotal();
              public native long getMod();
          }
          JAVAEOF

      - name: Create VPN Service (Android 14 Optimized)
        run: |
          cat > app/src/main/java/com/dpibypass/pro/VpnService.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.content.Intent; import android.os.ParcelFileDescriptor;
          import java.io.*; import java.util.ArrayList;

          public class VpnService extends android.net.VpnService {
              private ParcelFileDescriptor vpn;
              private Thread thread;
              private volatile boolean running = false;
              private PacketEngine engine = new PacketEngine();

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (running) return START_STICKY;
                  Builder builder = new Builder();
                  builder.setSession("Tecno PRO").setMtu(1500)
                         .addAddress("10.0.0.2", 24)
                         .addRoute("0.0.0.0", 0)
                         .addDnsServer("1.1.1.1").addDnsServer("8.8.8.8");

                  try { builder.addDisallowedApplication(getPackageName()); } catch(Exception e) {}

                  vpn = builder.establish();
                  running = true;
                  thread = new Thread(() -> {
                      FileInputStream in = new FileInputStream(vpn.getFileDescriptor());
                      FileOutputStream out = new FileOutputStream(vpn.getFileDescriptor());
                      byte[] buf = new byte[32768];
                      try {
                          while (running) {
                              int len = in.read(buf);
                              if (len > 0) {
                                  byte[] p = new byte[len]; System.arraycopy(buf, 0, p, 0, len);
                                  ArrayList<byte[]> res = engine.processPacket(p);
                                  for(byte[] r : res) out.write(r);
                              }
                          }
                      } catch (Exception e) {}
                  });
                  thread.start();
                  MainActivity.updateStatus(true);
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  running = false;
                  try { if(vpn != null) vpn.close(); } catch(Exception e) {}
                  MainActivity.updateStatus(false);
                  super.onDestroy();
              }
          }
          JAVAEOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/dpibypass/pro/MainActivity.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.app.Activity; import android.content.*; import android.os.Bundle;
          import android.widget.*; import android.graphics.Color; import android.os.Build;
          import java.util.Timer; import java.util.TimerTask;

          public class MainActivity extends Activity {
              private static TextView statusView, statsView;
              private Switch mainSwitch;
              private PacketEngine engine = new PacketEngine();

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(50, 50, 50, 50);
                  root.setBackgroundColor(0xFF0a0a0a);

                  TextView title = new TextView(this);
                  title.setText("TECNO SPARK BYPASS PRO");
                  title.setTextSize(22); title.setTextColor(Color.YELLOW);
                  root.addView(title);

                  TextView info = new TextView(this);
                  info.setText("Производитель: " + Build.MANUFACTURER + "\nМодель: " + Build.MODEL);
                  info.setTextColor(Color.WHITE);
                  info.setPadding(0, 20, 0, 20);
                  root.addView(info);

                  mainSwitch = new Switch(this);
                  mainSwitch.setText("АКТИВИРОВАТЬ");
                  mainSwitch.setTextColor(Color.WHITE);
                  mainSwitch.setOnCheckedChangeListener((v, c) -> {
                      if(c) startVpn(); else stopVpn();
                  });
                  root.addView(mainSwitch);

                  statusView = new TextView(this);
                  statusView.setText("● СТАТУС: ВЫКЛЮЧЕНО");
                  statusView.setTextColor(Color.RED);
                  statusView.setPadding(0, 30, 0, 10);
                  root.addView(statusView);

                  statsView = new TextView(this);
                  statsView.setTextColor(Color.GRAY);
                  root.addView(statsView);

                  setContentView(root);
                  new Timer().schedule(new TimerTask() {
                      @Override public void run() { updateStats(); }
                  }, 1000, 1000);
              }

              private void startVpn() {
                  Intent intent = android.net.VpnService.prepare(this);
                  if (intent != null) startActivityForResult(intent, 0);
                  else startService(new Intent(this, VpnService.class));
              }
              private void stopVpn() { stopService(new Intent(this, VpnService.class)); }
              private void updateStats() {
                  runOnUiThread(() -> statsView.setText("Пакетов: " + engine.getTotal() + " | Обход: " + engine.getMod()));
              }
              public static void updateStatus(boolean a) {
                  if(statusView != null) statusView.post(() -> {
                      statusView.setText(a ? "● СТАТУС: ЗАЩИЩЕНО" : "● СТАТУС: ВЫКЛЮЧЕНО");
                      statusView.setTextColor(a ? Color.GREEN : Color.RED);
                  });
              }
          }
          JAVAEOF

      - name: Create Manifest (Android 14 API 34)
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              
              <application android:label="Tecno Bypass" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".VpnService" android:exported="true"
                           android:foregroundServiceType="specialUse"
                           android:permission="android.permission.BIND_VPN_SERVICE">
                      <intent-filter>
                          <action android:name="android.net.VpnService"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Create Build Files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "include ':app'" > settings.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dpibypass.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.dpibypass.pro'
                  minSdk 34
                  targetSdk 34
                  versionCode 1
                  versionName "3.0"
                  ndk { abiFilters 'arm64-v8a' }
              }
              externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt' } }
          }
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DPI_Tecno_A14_Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
