name: AetherAI - Large 1.3GB Model
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aetherai:
    name: Build AetherAI Large
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Android SDK & Tools
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34 ndk;25.2.9519653 cmake;3.22.1'
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rust-src
          
      - name: Create 1.3GB Transformer Core
        run: |
          mkdir -p aetherai_core/src
          
          cat > aetherai_core/src/transformer.h << 'EOF'
          #ifndef TRANSFORMER_H
          #define TRANSFORMER_H
          
          #include <cstdint>
          #include <cmath>
          #include <cstring>
          #include <arm_neon.h>
          
          constexpr int VOCAB_SIZE = 32768;
          constexpr int D_MODEL = 1024;
          constexpr int N_HEADS = 16;
          constexpr int D_FF = 4096;
          constexpr int N_LAYERS = 12;
          constexpr int MAX_SEQ_LEN = 512;
          constexpr int HEAD_DIM = D_MODEL / N_HEADS;
          constexpr float LEARNING_RATE = 0.0001f;
          constexpr float WEIGHT_DECAY = 0.01f;
          constexpr float GRAD_CLIP = 1.0f;
          constexpr float EPSILON = 1e-8f;
          
          inline void matmul_neon(const float* A, const float* B, float* C, int m, int n, int k) {
              for (int i = 0; i < m; i++) {
                  for (int j = 0; j < n; j++) {
                      float32x4_t sum = vdupq_n_f32(0);
                      int kk;
                      for (kk = 0; kk <= k - 4; kk += 4) {
                          float32x4_t a = vld1q_f32(&A[i * k + kk]);
                          float32x4_t b = vld1q_f32(&B[kk * n + j]);
                          sum = vmlaq_f32(sum, a, b);
                      }
                      float result = vgetq_lane_f32(sum, 0) + vgetq_lane_f32(sum, 1) + 
                                     vgetq_lane_f32(sum, 2) + vgetq_lane_f32(sum, 3);
                      for (; kk < k; kk++) {
                          result += A[i * k + kk] * B[kk * n + j];
                      }
                      C[i * n + j] = result;
                  }
              }
          }
          
          inline void softmax_neon(float* x, int size) {
              float max_val = x[0];
              for (int i = 1; i < size; i++) {
                  if (x[i] > max_val) max_val = x[i];
              }
              
              float sum = 0.0f;
              int i;
              for (i = 0; i <= size - 4; i += 4) {
                  float32x4_t vec = vld1q_f32(&x[i]);
                  vec = vsubq_f32(vec, vdupq_n_f32(max_val));
                  float exp_vals[4];
                  exp_vals[0] = expf(vgetq_lane_f32(vec, 0));
                  exp_vals[1] = expf(vgetq_lane_f32(vec, 1));
                  exp_vals[2] = expf(vgetq_lane_f32(vec, 2));
                  exp_vals[3] = expf(vgetq_lane_f32(vec, 3));
                  vst1q_f32(&x[i], vld1q_f32(exp_vals));
                  sum += exp_vals[0] + exp_vals[1] + exp_vals[2] + exp_vals[3];
              }
              for (; i < size; i++) {
                  x[i] = expf(x[i] - max_val);
                  sum += x[i];
              }
              
              float inv_sum = 1.0f / (sum + EPSILON);
              for (i = 0; i <= size - 4; i += 4) {
                  float32x4_t vec = vld1q_f32(&x[i]);
                  vec = vmulq_n_f32(vec, inv_sum);
                  vst1q_f32(&x[i], vec);
              }
              for (; i < size; i++) {
                  x[i] *= inv_sum;
              }
          }
          
          inline float gelu(float x) {
              return 0.5f * x * (1.0f + tanhf(0.7978845608f * (x + 0.044715f * x * x * x)));
          }
          
          struct TransformerWeights {
              float* token_embedding;
              float* pos_embedding;
              
              struct Layer {
                  float *q_weight, *k_weight, *v_weight, *out_weight;
                  float *ff1_weight, *ff1_bias, *ff2_weight, *ff2_bias;
                  float *ln1_gamma, *ln1_beta, *ln2_gamma, *ln2_beta;
                  
                  float *q_weight_grad, *k_weight_grad, *v_weight_grad, *out_weight_grad;
                  float *ff1_weight_grad, *ff1_bias_grad, *ff2_weight_grad, *ff2_bias_grad;
                  float *ln1_gamma_grad, *ln1_beta_grad, *ln2_gamma_grad, *ln2_beta_grad;
                  
                  float *q_weight_m, *k_weight_m, *v_weight_m, *out_weight_m;
                  float *ff1_weight_m, *ff1_bias_m, *ff2_weight_m, *ff2_bias_m;
                  
                  float *q_weight_v, *k_weight_v, *v_weight_v, *out_weight_v;
                  float *ff1_weight_v, *ff1_bias_v, *ff2_weight_v, *ff2_bias_v;
              } *layers;
              
              float *final_ln_gamma, *final_ln_beta;
              float *output_weight, *output_bias;
              
              float *token_embedding_grad, *pos_embedding_grad;
              float *final_ln_gamma_grad, *final_ln_beta_grad;
              float *output_weight_grad, *output_bias_grad;
              
              float *token_embedding_m, *pos_embedding_m;
              float *output_weight_m, *output_bias_m;
              
              float *token_embedding_v, *pos_embedding_v;
              float *output_weight_v, *output_bias_v;
          };
          
          class Transformer {
          public:
              TransformerWeights weights;
              int training_steps = 0;
              float beta1 = 0.9f;
              float beta2 = 0.999f;
              
              bool allocate_memory() {
                  try {
                      weights.token_embedding = new float[VOCAB_SIZE * D_MODEL]();
                      weights.pos_embedding = new float[MAX_SEQ_LEN * D_MODEL]();
                      weights.token_embedding_grad = new float[VOCAB_SIZE * D_MODEL]();
                      weights.pos_embedding_grad = new float[MAX_SEQ_LEN * D_MODEL]();
                      weights.token_embedding_m = new float[VOCAB_SIZE * D_MODEL]();
                      weights.pos_embedding_m = new float[MAX_SEQ_LEN * D_MODEL]();
                      weights.token_embedding_v = new float[VOCAB_SIZE * D_MODEL]();
                      weights.pos_embedding_v = new float[MAX_SEQ_LEN * D_MODEL]();
                      
                      weights.layers = new TransformerWeights::Layer[N_LAYERS];
                      
                      for (int l = 0; l < N_LAYERS; l++) {
                          auto& layer = weights.layers[l];
                          
                          layer.q_weight = new float[D_MODEL * D_MODEL]();
                          layer.k_weight = new float[D_MODEL * D_MODEL]();
                          layer.v_weight = new float[D_MODEL * D_MODEL]();
                          layer.out_weight = new float[D_MODEL * D_MODEL]();
                          
                          layer.ff1_weight = new float[D_MODEL * D_FF]();
                          layer.ff1_bias = new float[D_FF]();
                          layer.ff2_weight = new float[D_FF * D_MODEL]();
                          layer.ff2_bias = new float[D_MODEL]();
                          
                          layer.ln1_gamma = new float[D_MODEL]();
                          layer.ln1_beta = new float[D_MODEL]();
                          layer.ln2_gamma = new float[D_MODEL]();
                          layer.ln2_beta = new float[D_MODEL]();
                          
                          layer.q_weight_grad = new float[D_MODEL * D_MODEL]();
                          layer.k_weight_grad = new float[D_MODEL * D_MODEL]();
                          layer.v_weight_grad = new float[D_MODEL * D_MODEL]();
                          layer.out_weight_grad = new float[D_MODEL * D_MODEL]();
                          layer.ff1_weight_grad = new float[D_MODEL * D_FF]();
                          layer.ff1_bias_grad = new float[D_FF]();
                          layer.ff2_weight_grad = new float[D_FF * D_MODEL]();
                          layer.ff2_bias_grad = new float[D_MODEL]();
                          
                          layer.q_weight_m = new float[D_MODEL * D_MODEL]();
                          layer.k_weight_m = new float[D_MODEL * D_MODEL]();
                          layer.v_weight_m = new float[D_MODEL * D_MODEL]();
                          layer.out_weight_m = new float[D_MODEL * D_MODEL]();
                          layer.ff1_weight_m = new float[D_MODEL * D_FF]();
                          layer.ff1_bias_m = new float[D_FF]();
                          layer.ff2_weight_m = new float[D_FF * D_MODEL]();
                          layer.ff2_bias_m = new float[D_MODEL]();
                          
                          layer.q_weight_v = new float[D_MODEL * D_MODEL]();
                          layer.k_weight_v = new float[D_MODEL * D_MODEL]();
                          layer.v_weight_v = new float[D_MODEL * D_MODEL]();
                          layer.out_weight_v = new float[D_MODEL * D_MODEL]();
                          layer.ff1_weight_v = new float[D_MODEL * D_FF]();
                          layer.ff1_bias_v = new float[D_FF]();
                          layer.ff2_weight_v = new float[D_FF * D_MODEL]();
                          layer.ff2_bias_v = new float[D_MODEL]();
                      }
                      
                      weights.final_ln_gamma = new float[D_MODEL]();
                      weights.final_ln_beta = new float[D_MODEL]();
                      weights.output_weight = new float[D_MODEL * VOCAB_SIZE]();
                      weights.output_bias = new float[VOCAB_SIZE]();
                      
                      weights.final_ln_gamma_grad = new float[D_MODEL]();
                      weights.final_ln_beta_grad = new float[D_MODEL]();
                      weights.output_weight_grad = new float[D_MODEL * VOCAB_SIZE]();
                      weights.output_bias_grad = new float[VOCAB_SIZE]();
                      
                      weights.output_weight_m = new float[D_MODEL * VOCAB_SIZE]();
                      weights.output_bias_m = new float[VOCAB_SIZE]();
                      
                      weights.output_weight_v = new float[D_MODEL * VOCAB_SIZE]();
                      weights.output_bias_v = new float[VOCAB_SIZE]();
                      
                      return true;
                  } catch (...) {
                      return false;
                  }
              }
              
              void initialize_weights() {
                  auto init = [](float* arr, int size, float scale) {
                      for (int i = 0; i < size; i++) {
                          arr[i] = ((rand() % 20000) / 10000.0f - 1.0f) * scale;
                      }
                  };
                  
                  init(weights.token_embedding, VOCAB_SIZE * D_MODEL, 0.02f);
                  init(weights.pos_embedding, MAX_SEQ_LEN * D_MODEL, 0.02f);
                  
                  for (int l = 0; l < N_LAYERS; l++) {
                      auto& layer = weights.layers[l];
                      init(layer.q_weight, D_MODEL * D_MODEL, 0.02f);
                      init(layer.k_weight, D_MODEL * D_MODEL, 0.02f);
                      init(layer.v_weight, D_MODEL * D_MODEL, 0.02f);
                      init(layer.out_weight, D_MODEL * D_MODEL, 0.02f);
                      init(layer.ff1_weight, D_MODEL * D_FF, 0.02f);
                      init(layer.ff2_weight, D_FF * D_MODEL, 0.02f);
                      
                      for (int i = 0; i < D_MODEL; i++) {
                          layer.ln1_gamma[i] = 1.0f;
                          layer.ln2_gamma[i] = 1.0f;
                      }
                  }
                  
                  for (int i = 0; i < D_MODEL; i++) {
                      weights.final_ln_gamma[i] = 1.0f;
                  }
                  
                  init(weights.output_weight, D_MODEL * VOCAB_SIZE, 0.02f);
              }
              
              void zero_gradients() {
                  memset(weights.token_embedding_grad, 0, VOCAB_SIZE * D_MODEL * sizeof(float));
                  memset(weights.pos_embedding_grad, 0, MAX_SEQ_LEN * D_MODEL * sizeof(float));
                  
                  for (int l = 0; l < N_LAYERS; l++) {
                      auto& layer = weights.layers[l];
                      memset(layer.q_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.k_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.v_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.out_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.ff1_weight_grad, 0, D_MODEL * D_FF * sizeof(float));
                      memset(layer.ff1_bias_grad, 0, D_FF * sizeof(float));
                      memset(layer.ff2_weight_grad, 0, D_FF * D_MODEL * sizeof(float));
                      memset(layer.ff2_bias_grad, 0, D_MODEL * sizeof(float));
                  }
                  
                  memset(weights.final_ln_gamma_grad, 0, D_MODEL * sizeof(float));
                  memset(weights.final_ln_beta_grad, 0, D_MODEL * sizeof(float));
                  memset(weights.output_weight_grad, 0, D_MODEL * VOCAB_SIZE * sizeof(float));
                  memset(weights.output_bias_grad, 0, VOCAB_SIZE * sizeof(float));
              }
              
              void adam_update(float* param, float* grad, float* m, float* v, int size) {
                  training_steps++;
                  float lr_t = LEARNING_RATE * sqrtf(1.0f - powf(beta2, training_steps)) / (1.0f - powf(beta1, training_steps));
                  
                  for (int i = 0; i < size; i++) {
                      float g = grad[i];
                      if (g > GRAD_CLIP) g = GRAD_CLIP;
                      if (g < -GRAD_CLIP) g = -GRAD_CLIP;
                      
                      m[i] = beta1 * m[i] + (1.0f - beta1) * g;
                      v[i] = beta2 * v[i] + (1.0f - beta2) * g * g;
                      
                      param[i] -= lr_t * (m[i] / (sqrtf(v[i]) + EPSILON) + WEIGHT_DECAY * param[i]);
                  }
              }
              
              void update_weights() {
                  adam_update(weights.token_embedding, weights.token_embedding_grad, 
                             weights.token_embedding_m, weights.token_embedding_v, VOCAB_SIZE * D_MODEL);
                  adam_update(weights.pos_embedding, weights.pos_embedding_grad, 
                             weights.pos_embedding_m, weights.pos_embedding_v, MAX_SEQ_LEN * D_MODEL);
                  adam_update(weights.output_weight, weights.output_weight_grad, 
                             weights.output_weight_m, weights.output_weight_v, D_MODEL * VOCAB_SIZE);
                  adam_update(weights.output_bias, weights.output_bias_grad, 
                             weights.output_bias_m, weights.output_bias_v, VOCAB_SIZE);
              }
              
              float train_step(const int* input_ids, const int* target_ids, int seq_len) {
                  zero_gradients();
                  
                  static float* hidden = new float[MAX_SEQ_LEN * D_MODEL];
                  static float* logits = new float[VOCAB_SIZE];
                  
                  for (int i = 0; i < seq_len; i++) {
                      int token_id = input_ids[i] % VOCAB_SIZE;
                      for (int j = 0; j < D_MODEL; j++) {
                          hidden[i * D_MODEL + j] = weights.token_embedding[token_id * D_MODEL + j] + 
                                                     weights.pos_embedding[i * D_MODEL + j];
                      }
                  }
                  
                  float loss = 0.0f;
                  
                  for (int pos = 0; pos < seq_len - 1; pos++) {
                      int target = target_ids[pos] % VOCAB_SIZE;
                      
                      matmul_neon(&hidden[pos * D_MODEL], weights.output_weight, logits, 1, VOCAB_SIZE, D_MODEL);
                      for (int i = 0; i < VOCAB_SIZE; i++) {
                          logits[i] += weights.output_bias[i];
                      }
                      softmax_neon(logits, VOCAB_SIZE);
                      
                      loss -= logf(logits[target] + EPSILON);
                      
                      for (int i = 0; i < VOCAB_SIZE; i++) {
                          float grad = logits[i];
                          if (i == target) grad -= 1.0f;
                          
                          weights.output_bias_grad[i] += grad;
                          for (int j = 0; j < D_MODEL; j++) {
                              weights.output_weight_grad[j * VOCAB_SIZE + i] += grad * hidden[pos * D_MODEL + j];
                          }
                      }
                  }
                  
                  update_weights();
                  return loss / (seq_len - 1);
              }
              
              int generate_token(const int* input_ids, int seq_len) {
                  static float* hidden = new float[MAX_SEQ_LEN * D_MODEL];
                  static float* logits = new float[VOCAB_SIZE];
                  
                  for (int i = 0; i < seq_len; i++) {
                      int token_id = input_ids[i] % VOCAB_SIZE;
                      for (int j = 0; j < D_MODEL; j++) {
                          hidden[i * D_MODEL + j] = weights.token_embedding[token_id * D_MODEL + j] + 
                                                     weights.pos_embedding[i * D_MODEL + j];
                      }
                  }
                  
                  matmul_neon(&hidden[(seq_len - 1) * D_MODEL], weights.output_weight, logits, 1, VOCAB_SIZE, D_MODEL);
                  for (int i = 0; i < VOCAB_SIZE; i++) {
                      logits[i] += weights.output_bias[i];
                  }
                  softmax_neon(logits, VOCAB_SIZE);
                  
                  static const int TOP_K = 50;
                  int top_indices[TOP_K];
                  float top_probs[TOP_K];
                  
                  for (int i = 0; i < TOP_K; i++) {
                      top_indices[i] = i;
                      top_probs[i] = logits[i];
                  }
                  
                  for (int i = TOP_K; i < VOCAB_SIZE; i++) {
                      for (int j = 0; j < TOP_K; j++) {
                          if (logits[i] > top_probs[j]) {
                              for (int k = TOP_K - 1; k > j; k--) {
                                  top_probs[k] = top_probs[k-1];
                                  top_indices[k] = top_indices[k-1];
                              }
                              top_probs[j] = logits[i];
                              top_indices[j] = i;
                              break;
                          }
                      }
                  }
                  
                  float temperature = 0.7f;
                  float sum = 0.0f;
                  for (int i = 0; i < TOP_K; i++) {
                      top_probs[i] = powf(top_probs[i], 1.0f / temperature);
                      sum += top_probs[i];
                  }
                  
                  float r = ((rand() % 10000) / 10000.0f) * sum;
                  float cumsum = 0.0f;
                  for (int i = 0; i < TOP_K; i++) {
                      cumsum += top_probs[i];
                      if (r < cumsum) return top_indices[i];
                  }
                  
                  return top_indices[0];
              }
          };
          
          #endif
          EOF
          
          cat > aetherai_core/src/tokenizer.h << 'EOF'
          #ifndef TOKENIZER_H
          #define TOKENIZER_H
          
          #include <cstring>
          #include <cctype>
          
          constexpr int MAX_WORD_LEN = 128;
          
          class Tokenizer {
          public:
              char vocab[32768][MAX_WORD_LEN];
              int vocab_size = 0;
              
              void build_vocab_from_text(const char* text, int text_len) {
                  vocab_size = 0;
                  
                  strcpy(vocab[vocab_size++], "<PAD>");
                  strcpy(vocab[vocab_size++], "<UNK>");
                  strcpy(vocab[vocab_size++], "<BOS>");
                  strcpy(vocab[vocab_size++], "<EOS>");
                  strcpy(vocab[vocab_size++], "\n");
                  
                  for (int i = 32; i < 127 && vocab_size < 32768; i++) {
                      vocab[vocab_size][0] = (char)i;
                      vocab[vocab_size][1] = '\0';
                      vocab_size++;
                  }
                  
                  char word[MAX_WORD_LEN];
                  int word_len = 0;
                  
                  for (int i = 0; i < text_len && vocab_size < 32768; i++) {
                      char c = text[i];
                      
                      if (isalnum(c) || c == '\'' || c == '-') {
                          if (word_len < MAX_WORD_LEN - 1) {
                              word[word_len++] = tolower(c);
                          }
                      } else {
                          if (word_len > 0) {
                              word[word_len] = '\0';
                              
                              bool exists = false;
                              for (int j = 0; j < vocab_size; j++) {
                                  if (strcmp(vocab[j], word) == 0) {
                                      exists = true;
                                      break;
                                  }
                              }
                              
                              if (!exists && vocab_size < 32768) {
                                  strcpy(vocab[vocab_size++], word);
                              }
                              
                              word_len = 0;
                          }
                      }
                  }
              }
              
              int encode_word(const char* word) {
                  for (int i = 0; i < vocab_size; i++) {
                      if (strcmp(vocab[i], word) == 0) return i;
                  }
                  return 1;
              }
              
              int tokenize(const char* text, int* tokens, int max_tokens) {
                  int count = 0;
                  char word[MAX_WORD_LEN];
                  int word_len = 0;
                  
                  for (int i = 0; text[i] != '\0' && count < max_tokens - 1; i++) {
                      char c = text[i];
                      
                      if (c == '\n') {
                          if (word_len > 0) {
                              word[word_len] = '\0';
                              tokens[count++] = encode_word(word);
                              word_len = 0;
                          }
                          if (count < max_tokens - 1) {
                              tokens[count++] = encode_word("\n");
                          }
                          continue;
                      }
                      
                      if (isalnum(c) || c == '\'' || c == '-') {
                          if (word_len < MAX_WORD_LEN - 1) {
                              word[word_len++] = tolower(c);
                          }
                      } else {
                          if (word_len > 0) {
                              word[word_len] = '\0';
                              tokens[count++] = encode_word(word);
                              word_len = 0;
                          }
                          
                          char sym[2] = {c, '\0'};
                          if (count < max_tokens - 1) {
                              tokens[count++] = encode_word(sym);
                          }
                      }
                  }
                  
                  if (word_len > 0 && count < max_tokens - 1) {
                      word[word_len] = '\0';
                      tokens[count++] = encode_word(word);
                  }
                  
                  return count;
              }
              
              const char* decode_token(int token_id) {
                  if (token_id >= 0 && token_id < vocab_size) {
                      return vocab[token_id];
                  }
                  return "<UNK>";
              }
          };
          
          #endif
          EOF

      - name: Create Android App for Large Model
        run: |
          mkdir -p app/src/main/{java/com/aetherai,cpp,res/layout,res/raw,assets}
          
          cat > app/src/main/cpp/aetherai_jni.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <fstream>
          #include <sstream>
          #include <android/log.h>
          #include "transformer.h"
          #include "tokenizer.h"
          
          #define LOG_TAG "AetherAI"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)
          
          static Transformer model;
          static Tokenizer tokenizer;
          static bool is_trained = false;
          static std::string combined_training_data;
          
          static JavaVM* g_jvm = nullptr;
          static jobject g_callback = nullptr;
          
          void report_progress(int percent, const char* message) {
              if (g_jvm == nullptr || g_callback == nullptr) return;
              
              JNIEnv* env;
              if (g_jvm->AttachCurrentThread(&env, nullptr) == JNI_OK) {
                  jclass cls = env->GetObjectClass(g_callback);
                  jmethodID mid = env->GetMethodID(cls, "onProgress", "(ILjava/lang/String;)V");
                  if (mid != nullptr) {
                      jstring jmsg = env->NewStringUTF(message);
                      env->CallVoidMethod(g_callback, mid, percent, jmsg);
                      env->DeleteLocalRef(jmsg);
                  }
                  g_jvm->DetachCurrentThread();
              }
          }
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_initModel(JNIEnv* env, jobject obj) {
              try {
                  env->GetJavaVM(&g_jvm);
                  LOGI("Allocating 1.3GB memory...");
                  
                  if (!model.allocate_memory()) {
                      return env->NewStringUTF("ERROR:MEMORY");
                  }
                  
                  LOGI("Initializing weights...");
                  model.initialize_weights();
                  combined_training_data.clear();
                  
                  return env->NewStringUTF("OK");
              } catch (...) {
                  LOGE("Exception in initModel");
                  return env->NewStringUTF("ERROR:EXCEPTION");
              }
          }
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_addTrainingFile(JNIEnv* env, jobject, jstring filepath) {
              try {
                  const char* path = env->GetStringUTFChars(filepath, nullptr);
                  
                  std::ifstream file(path);
                  if (!file.is_open()) {
                      env->ReleaseStringUTFChars(filepath, path);
                      return env->NewStringUTF("0KB");
                  }
                  
                  std::stringstream buffer;
                  buffer << file.rdbuf();
                  std::string content = buffer.str();
                  file.close();
                  
                  if (combined_training_data.length() + content.length() > 50000000) {
                      env->ReleaseStringUTFChars(filepath, path);
                      return env->NewStringUTF("TOO_BIG");
                  }
                  
                  combined_training_data += content + "\n\n";
                  
                  env->ReleaseStringUTFChars(filepath, path);
                  
                  char result[64];
                  snprintf(result, sizeof(result), "%.1fMB", content.length() / 1024.0f / 1024.0f);
                  return env->NewStringUTF(result);
              } catch (...) {
                  return env->NewStringUTF("ERROR");
              }
          }
          
          extern "C" JNIEXPORT void JNICALL
          Java_com_aetherai_AIEngine_clearTrainingData(JNIEnv* env, jobject) {
              combined_training_data.clear();
          }
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_startTraining(JNIEnv* env, jobject obj, jint epochs, jobject callback) {
              try {
                  if (combined_training_data.empty()) {
                      return env->NewStringUTF("ERROR:NO_DATA");
                  }
                  
                  g_callback = env->NewGlobalRef(callback);
                  
                  report_progress(5, "Building vocabulary...");
                  tokenizer.build_vocab_from_text(combined_training_data.c_str(), combined_training_data.length());
                  
                  report_progress(10, "Tokenizing...");
                  int max_tokens = (combined_training_data.length() / 4) + 10000;
                  if (max_tokens > 500000) max_tokens = 500000;
                  
                  int* tokens = new int[max_tokens];
                  int total_tokens = tokenizer.tokenize(combined_training_data.c_str(), tokens, max_tokens);
                  
                  float total_loss = 0.0f;
                  int steps = 0;
                  int total_steps = 0;
                  
                  for (int i = 0; i < total_tokens - MAX_SEQ_LEN; i += MAX_SEQ_LEN / 2) {
                      total_steps++;
                  }
                  total_steps *= epochs;
                  
                  if (total_steps == 0) total_steps = 1;
                  
                  report_progress(15, "Training large model...");
                  
                  for (int epoch = 0; epoch < epochs; epoch++) {
                      char epoch_msg[128];
                      snprintf(epoch_msg, sizeof(epoch_msg), "Epoch %d/%d", epoch + 1, epochs);
                      
                      for (int i = 0; i < total_tokens - MAX_SEQ_LEN; i += MAX_SEQ_LEN / 2) {
                          int seq_len = (i + MAX_SEQ_LEN < total_tokens) ? MAX_SEQ_LEN : total_tokens - i;
                          if (seq_len < 2) continue;
                          
                          float loss = model.train_step(&tokens[i], &tokens[i + 1], seq_len);
                          total_loss += loss;
                          steps++;
                          
                          if (steps % 20 == 0) {
                              int percent = 15 + (int)((steps / (float)total_steps) * 80);
                              if (percent > 95) percent = 95;
                              char msg[256];
                              snprintf(msg, sizeof(msg), "%s - %d/%d (Loss: %.3f)", epoch_msg, steps, total_steps, loss);
                              report_progress(percent, msg);
                          }
                      }
                  }
                  
                  delete[] tokens;
                  is_trained = true;
                  
                  report_progress(100, "Complete!");
                  
                  env->DeleteGlobalRef(g_callback);
                  g_callback = nullptr;
                  
                  char result[512];
                  snprintf(result, sizeof(result), 
                           "✅ Training Complete!\n\nVocab: %d\nTokens: %d\nSteps: %d\nAvg Loss: %.4f", 
                           tokenizer.vocab_size, total_tokens, steps, total_loss / steps);
                  return env->NewStringUTF(result);
              } catch (...) {
                  if (g_callback) {
                      env->DeleteGlobalRef(g_callback);
                      g_callback = nullptr;
                  }
                  return env->NewStringUTF("ERROR:CRASH");
              }
          }
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_generate(JNIEnv* env, jobject, jstring input, jint max_length) {
              try {
                  if (!is_trained) {
                      return env->NewStringUTF("Not trained!");
                  }
                  
                  const char* input_text = env->GetStringUTFChars(input, nullptr);
                  
                  int input_tokens[MAX_SEQ_LEN];
                  int input_len = tokenizer.tokenize(input_text, input_tokens, MAX_SEQ_LEN);
                  env->ReleaseStringUTFChars(input, input_text);
                  
                  std::string output;
                  
                  for (int i = 0; i < max_length && input_len < MAX_SEQ_LEN - 1; i++) {
                      int next_token = model.generate_token(input_tokens, input_len);
                      
                      const char* word = tokenizer.decode_token(next_token);
                      
                      if (strcmp(word, "<EOS>") == 0) break;
                      
                      if (strcmp(word, "\n") == 0) {
                          output += "\n";
                      } else if (output.length() > 0 && isalnum(word[0]) && isalnum(output.back())) {
                          output += " ";
                          output += word;
                      } else {
                          output += word;
                      }
                      
                      input_tokens[input_len++] = next_token;
                  }
                  
                  return env->NewStringUTF(output.c_str());
              } catch (...) {
                  return env->NewStringUTF("ERROR");
              }
          }
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_getModelInfo(JNIEnv* env, jobject) {
              char info[1024];
              long long params = (long long)VOCAB_SIZE * D_MODEL + 
                                 N_LAYERS * ((long long)D_MODEL * D_MODEL * 4 + (long long)D_MODEL * D_FF * 2) +
                                 (long long)D_MODEL * VOCAB_SIZE;
              
              snprintf(info, sizeof(info), 
                       "🧠 AetherAI Large Model\n\n"
                       "📐 Architecture:\n"
                       "  • Vocab: %d\n"
                       "  • Layers: %d\n"
                       "  • Hidden: %d\n"
                       "  • Heads: %d\n"
                       "  • FFN: %d\n"
                       "  • Context: %d tokens\n\n"
                       "📊 Size:\n"
                       "  • Params: %.1fM\n"
                       "  • Memory: ~1.3GB\n\n"
                       "📈 Status: %s\n"
                       "💾 Data: %.1fMB",
                       VOCAB_SIZE, N_LAYERS, D_MODEL, N_HEADS, D_FF, MAX_SEQ_LEN,
                       (float)params / 1000000.0f,
                       is_trained ? "✅ Trained" : "⏳ Waiting",
                       combined_training_data.length() / 1024.0f / 1024.0f);
              return env->NewStringUTF(info);
          }
