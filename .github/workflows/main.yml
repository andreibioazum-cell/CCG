name: Enjoer_APK_Builder_v48
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Project Structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/builder
          mkdir -p app/src/main/res/values
          
          # Настройки AndroidX и Gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle

          # Корневой build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # Модульный build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.enjoer.builder'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.builder'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # Манифест с иконкой и разрешением на оверлей
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application 
                  android:label="Enjoer Patcher" 
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                  android:icon="@android:drawable/sym_def_app_icon">
                  
                  <activity android:name="com.enjoer.builder.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  
                  <service android:name="com.enjoer.builder.ModMenuService" 
                      android:enabled="true" 
                      android:exported="false"/>
              </application>
          </manifest>
          EOF

          # Темы для корректного отображения
          echo "<resources><style name='Theme.Enjoer' parent='Theme.AppCompat.Light.NoActionBar'/></resources>" > app/src/main/res/values/styles.xml

      - name: Create Java Source Code
        run: |
          # MainActivity с выбором файла
          cat <<'EOF' > app/src/main/java/com/enjoer/builder/MainActivity.java
          package com.enjoer.builder;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.*;
          import android.view.Gravity;

          public class MainActivity extends Activity {
              private static final int PICK_APK_REQUEST = 1001;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);

                  TextView tv = new TextView(this);
                  tv.setText("ENJOER APK PATCHER\nВыберите оригинал игры:");
                  tv.setGravity(Gravity.CENTER);
                  tv.setPadding(0, 0, 0, 50);
                  layout.addView(tv);

                  Button btnPick = new Button(this);
                  btnPick.setText("ВЫБРАТЬ APK");
                  layout.addView(btnPick);

                  setContentView(layout);

                  btnPick.setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                      intent.setType("application/vnd.android.package-archive");
                      intent.addCategory(Intent.CATEGORY_OPENABLE);
                      startActivityForResult(Intent.createChooser(intent, "Выберите Chicken Gun APK"), PICK_APK_REQUEST);
                  });
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == PICK_APK_REQUEST && resultCode == RESULT_OK && data != null) {
                      Uri uri = data.getData();
                      if (uri != null) {
                          Toast.makeText(this, "Файл успешно выбран!", Toast.LENGTH_LONG).show();
                          // Логика патчинга пойдет здесь
                      }
                  }
              }
          }
          EOF

          # Пустой сервис (заготовка под мод-меню)
          cat <<'EOF' > app/src/main/java/com/enjoer/builder/ModMenuService.java
          package com.enjoer.builder;
          import android.app.Service;
          import android.content.Intent;
          import android.os.IBinder;

          public class ModMenuService extends Service {
              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

      - name: Build APK with Gradle
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Patcher_v48
          path: app/build/outputs/apk/debug/*.apk
