name: DPI_Bypass_PRO_AutoStrategy
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/{java/com/dpibypass/pro,cpp,res/{layout,values,drawable}}

      - name: Create Advanced Packet Engine (C++)
        run: |
          cat > app/src/main/cpp/advanced_engine.cpp << 'CPPEOF'
          #include <jni.h>
          #include <string>
          #include <cstring>
          #include <arpa/inet.h>
          #include <vector>
          #include <algorithm>
          #include <android/log.h>

          #define LOG(...) __android_log_print(ANDROID_LOG_INFO, "DPIBypassPRO", __VA_ARGS__)

          struct IPHeader {
              uint8_t ver_ihl, tos;
              uint16_t len, id, off;
              uint8_t ttl, proto;
              uint16_t csum;
              uint32_t src, dst;
          } __attribute__((packed));

          struct TCPHeader {
              uint16_t sport, dport;
              uint32_t seq, ack;
              uint8_t off_res, flags;
              uint16_t win, csum, urp;
          } __attribute__((packed));

          // Вычисление контрольной суммы
          uint16_t checksum(const uint16_t* buf, int len) {
              uint32_t sum = 0;
              for(int i = 0; i < len / 2; i++) sum += buf[i];
              if(len & 1) sum += ((uint8_t*)buf)[len - 1];
              while(sum >> 16) sum = (sum & 0xFFFF) + (sum >> 16);
              return ~sum;
          }

          void fix_checksums(uint8_t* pkt, int len) {
              IPHeader* ip = (IPHeader*)pkt;
              ip->csum = 0;
              ip->csum = checksum((uint16_t*)ip, (ip->ver_ihl & 0x0F) * 4);
              
              if (ip->proto == 6) { // TCP
                  int ip_hlen = (ip->ver_ihl & 0x0F) * 4;
                  TCPHeader* tcp = (TCPHeader*)(pkt + ip_hlen);
                  int tcp_len = ntohs(ip->len) - ip_hlen;
                  tcp->csum = 0;
                  uint32_t sum = (ip->src >> 16) + (ip->src & 0xFFFF) + (ip->dst >> 16) + (ip->dst & 0xFFFF) + htons(6) + htons(tcp_len);
                  uint16_t* tcp_p = (uint16_t*)tcp;
                  for(int i = 0; i < tcp_len / 2; i++) sum += tcp_p[i];
                  if(tcp_len & 1) sum += pkt[len - 1];
                  while(sum >> 16) sum = (sum & 0xFFFF) + (sum >> 16);
                  tcp->csum = ~sum;
              }
          }

          // Стратегия: Фрагментация (разрез пакета на 2 части)
          std::vector<std::vector<uint8_t>> fragment_packet(uint8_t* pkt, int len, int split_at) {
              std::vector<std::vector<uint8_t>> res;
              IPHeader* ip = (IPHeader*)pkt;
              int ip_h_len = (ip->ver_ihl & 0x0F) * 4;
              int tcp_h_len = (((TCPHeader*)(pkt + ip_h_len))->off_res >> 4) * 4;
              int header_len = ip_h_len + tcp_h_len;
              int payload_len = len - header_len;

              if (payload_len <= split_at) {
                  res.push_back(std::vector<uint8_t>(pkt, pkt + len));
                  return res;
              }

              // Часть 1
              std::vector<uint8_t> p1(pkt, pkt + header_len + split_at);
              ((IPHeader*)p1.data())->len = htons(header_len + split_at);
              fix_checksums(p1.data(), p1.size());
              res.push_back(p1);

              // Часть 2
              std::vector<uint8_t> p2(pkt, pkt + header_len); // копируем заголовки
              p2.insert(p2.end(), pkt + header_len + split_at, pkt + len);
              IPHeader* ip2 = (IPHeader*)p2.data();
              TCPHeader* tcp2 = (TCPHeader*)(p2.data() + ip_h_len);
              ip2->len = htons(p2.size());
              tcp2->seq = htonl(ntohl(tcp2->seq) + split_at);
              fix_checksums(p2.data(), p2.size());
              res.push_back(p2);

              return res;
          }

          extern "C" JNIEXPORT jobject JNICALL
          Java_com_dpibypass_pro_PacketEngine_processPacket(JNIEnv* env, jobject, jbyteArray packet) {
              jbyte* data = env->GetByteArrayElements(packet, nullptr);
              int len = env->GetArrayLength(packet);
              uint8_t* pkt = (uint8_t*)data;

              std::vector<std::vector<uint8_t>> output;
              IPHeader* ip = (IPHeader*)pkt;

              // Если это TCP (6) и есть данные (TLS ClientHello начинается с 0x16)
              if (ip->proto == 6 && len > 60) {
                  int ip_h_len = (ip->ver_ihl & 0x0F) * 4;
                  int tcp_h_len = (((TCPHeader*)(pkt + ip_h_len))->off_res >> 4) * 4;
                  uint8_t* payload = pkt + ip_h_len + tcp_h_len;

                  if (payload[0] == 0x16) { // TLS Handshake
                      LOG("TLS Detected! Applying Bypass...");
                      output = fragment_packet(pkt, len, 2); // Режем на 2 байта
                  } else {
                      output.push_back(std::vector<uint8_t>(pkt, pkt + len));
                  }
              } else {
                  // Все остальное (UDP/ICMP/DNS) пропускаем как есть
                  output.push_back(std::vector<uint8_t>(pkt, pkt + len));
              }

              env->ReleaseByteArrayElements(packet, data, 0);

              jclass alc = env->FindClass("java/util/ArrayList");
              jmethodID ali = env->GetMethodID(alc, "<init>", "()V");
              jmethodID ala = env->GetMethodID(alc, "add", "(Ljava/lang/Object;)Z");
              jobject res_list = env->NewObject(alc, ali);

              for (auto& p : output) {
                  jbyteArray arr = env->NewByteArray(p.size());
                  env->SetByteArrayRegion(arr, 0, p.size(), (jbyte*)p.data());
                  env->CallBooleanMethod(res_list, ala, arr);
                  env->DeleteLocalRef(arr);
              }
              return res_list;
          }
          CPPEOF

      - name: Create CMakeLists
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18.1)
          project("dpibypass")
          add_library(dpibypass SHARED advanced_engine.cpp)
          find_library(log-lib log)
          target_link_libraries(dpibypass ${log-lib})
          EOF

      - name: Create PacketEngine Java
        run: |
          cat > app/src/main/java/com/dpibypass/pro/PacketEngine.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import java.util.ArrayList;
          public class PacketEngine {
              static { System.loadLibrary("dpibypass"); }
              public native ArrayList<byte[]> processPacket(byte[] packet);
          }
          JAVAEOF

      - name: Create VPN Service (С поддержкой UDP и DNS)
        run: |
          cat > app/src/main/java/com/dpibypass/pro/VpnService.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.content.Intent;
          import android.os.ParcelFileDescriptor;
          import java.io.*;
          import java.nio.ByteBuffer;
          import java.util.ArrayList;

          public class VpnService extends android.net.VpnService {
              private ParcelFileDescriptor vpn;
              private Thread thread;
              private volatile boolean running = false;
              private PacketEngine engine = new PacketEngine();

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (running) return START_STICKY;

                  Builder builder = new Builder();
                  builder.setSession("DPI Bypass PRO")
                         .setMtu(1500)
                         .addAddress("10.0.0.2", 24)
                         .addRoute("0.0.0.0", 0)
                         .addDnsServer("1.1.1.1")
                         .addDnsServer("8.8.8.8");

                  vpn = builder.establish();
                  running = true;

                  thread = new Thread(() -> {
                      FileInputStream in = new FileInputStream(vpn.getFileDescriptor());
                      FileOutputStream out = new FileOutputStream(vpn.getFileDescriptor());
                      byte[] buffer = new byte[32768];

                      try {
                          while (running) {
                              int len = in.read(buffer);
                              if (len > 0) {
                                  byte[] packet = new byte[len];
                                  System.arraycopy(buffer, 0, packet, 0, len);
                                  
                                  ArrayList<byte[]> result = engine.processPacket(packet);
                                  for (byte[] p : result) {
                                      out.write(p);
                                  }
                              }
                          }
                      } catch (Exception e) {}
                  });
                  thread.start();

                  MainActivity.updateStatus(true);
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  running = false;
                  if (thread != null) thread.interrupt();
                  try { if(vpn != null) vpn.close(); } catch(Exception e) {}
                  MainActivity.updateStatus(false);
                  super.onDestroy();
              }
          }
          JAVAEOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/dpibypass/pro/MainActivity.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.app.Activity;
          import android.content.*;
          import android.os.Bundle;
          import android.widget.*;
          import android.graphics.Color;

          public class MainActivity extends Activity {
              private static TextView statusView;
              private Switch mainSwitch;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(40, 40, 40, 40);
                  root.setBackgroundColor(0xFF0F172A);

                  TextView title = new TextView(this);
                  title.setText("🛡️ DPI BYPASS PRO v2.2");
                  title.setTextSize(24);
                  title.setTextColor(Color.WHITE);
                  root.addView(title);

                  statusView = new TextView(this);
                  statusView.setText("● СТАТУС: ВЫКЛЮЧЕНО");
                  statusView.setTextColor(Color.RED);
                  statusView.setPadding(0, 30, 0, 30);
                  root.addView(statusView);

                  mainSwitch = new Switch(this);
                  mainSwitch.setText("АКТИВИРОВАТЬ ОБХОД");
                  mainSwitch.setTextColor(Color.LTGRAY);
                  mainSwitch.setOnCheckedChangeListener((v, isChecked) -> {
                      if (isChecked) {
                          Intent intent = android.net.VpnService.prepare(this);
                          if (intent != null) startActivityForResult(intent, 0);
                          else startService(new Intent(this, VpnService.class));
                      } else {
                          stopService(new Intent(this, VpnService.class));
                      }
                  });
                  root.addView(mainSwitch);
                  setContentView(root);
              }

              public static void updateStatus(boolean active) {
                  if (statusView == null) return;
                  statusView.post(() -> {
                      statusView.setText(active ? "● СТАТУС: ЗАЩИЩЕНО" : "● СТАТУС: ВЫКЛЮЧЕНО");
                      statusView.setTextColor(active ? Color.GREEN : Color.RED);
                  });
              }
          }
          JAVAEOF

      - name: Create Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application android:label="DPI Bypass PRO" android:theme="@android:style/Theme.DeviceDefault">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".VpnService" 
                           android:permission="android.permission.BIND_VPN_SERVICE"
                           android:exported="true">
                      <intent-filter>
                          <action android:name="android.net.VpnService"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Create Build Files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "include ':app'" > settings.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dpibypass.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.dpibypass.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 5
                  ndk { abiFilters 'arm64-v8a', 'armeabi-v7a' }
              }
              externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt' } }
          }
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DPI_Bypass_PRO_Final
          path: app/build/outputs/apk/debug/app-debug.apk
