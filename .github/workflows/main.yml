name: JsAI_Retro_Studio_Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Studio Structure
        run: |
          mkdir -p app/src/main/java/com/jsai/studio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- CONFIG ---
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal(); } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); } 
          }
          include ':app'
          EOF
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.jsai.studio'
              compileSdk 34
              defaultConfig {
                  applicationId "com.jsai.studio"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.luaj:luaj-jse:3.0.1'
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # --- ИНТЕРФЕЙС (РЕТРО) ---
          cat > app/src/main/res/layout/editor_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#121212">
              <LinearLayout android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="36dp" android:background="#222222" android:orientation="horizontal" android:padding="2dp">
                  <Button android:id="@+id/btnAdd" android:layout_width="40dp" android:layout_height="match_parent" android:text="+" android:backgroundTint="#FFFFFF" android:textColor="#000000" android:textSize="16sp" android:insetTop="0dp" android:insetBottom="0dp" android:padding="0dp"/>
                  <Button android:id="@+id/btnNewScene" android:layout_width="wrap_content" android:layout_height="match_parent" android:text="Новая Сцена" android:textSize="9sp" android:backgroundTint="#FFFFFF" android:textColor="#000000" android:layout_marginLeft="5dp" android:insetTop="0dp" android:insetBottom="0dp"/>
                  <Spinner android:id="@+id/sceneSpinner" android:layout_width="120dp" android:layout_height="match_parent" android:backgroundTint="#FFFFFF" android:layout_marginLeft="5dp"/>
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  <Button android:id="@+id/btnPlay" android:layout_width="85dp" android:layout_height="match_parent" android:text="Запуск" android:backgroundTint="#FFFFFF" android:textColor="#000000" android:textSize="10sp" android:insetTop="0dp" android:insetBottom="0dp"/>
              </LinearLayout>
              
              <LinearLayout android:id="@+id/sidebar" android:layout_width="150dp" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_alignParentRight="true" android:background="#1A1A1A" android:orientation="vertical">
                  <TextView android:layout_width="match_parent" android:layout_height="24dp" android:text=" Проводник" android:textColor="#FFFFFF" android:gravity="center_vertical" android:textSize="10sp" android:background="#333333"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:background="#1A1A1A"><LinearLayout android:id="@+id/explorer" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"/></ScrollView>
                  <TextView android:layout_width="match_parent" android:layout_height="24dp" android:text=" Свойства" android:textColor="#FFFFFF" android:gravity="center_vertical" android:textSize="10sp" android:background="#333333"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1.3" android:background="#121212"><LinearLayout android:id="@+id/properties" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="8dp"/></ScrollView>
              </LinearLayout>

              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_toLeftOf="@id/sidebar">
                  <com.jsai.studio.GameView android:id="@+id/gameView" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000"/>
                  <EditText android:id="@+id/codeEditor" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000" android:textColor="#00FF44" android:fontFamily="monospace" android:gravity="top" android:padding="10dp" android:visibility="gone" android:textSize="13sp" />
              </FrameLayout>
          </RelativeLayout>
          EOF

          # --- ENGINE CLASSES ---
          cat > app/src/main/java/com/jsai/studio/Instance.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          public class Instance {
              public String name, type, luaCode = "";
              public float x=300, y=300, scale=1, startX, startY;
              public int color = 0xFFFFFFFF;
              public Instance parent;
              public List<Instance> children = new ArrayList<>();
              public Instance(String n, String t) { name=n; type=t; }
              public void setX(float v) { x=v; } public float getX() { return x; }
              public void setY(float v) { y=v; } public float getY() { return y; }
              public void setScale(float v) { scale=v; }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EngineCore.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          import org.luaj.vm2.*;
          import org.luaj.vm2.lib.*;
          import org.luaj.vm2.lib.jse.*;
          public class EngineCore {
              public static List<Instance> instances = new ArrayList<>();
              public static boolean isPlaying = false;
              private static List<LuaValue> scripts = new ArrayList<>();
              public static void prepare() {
                  scripts.clear();
                  for(Instance i : instances) {
                      i.startX = i.x; i.startY = i.y;
                      if(i.type.equals("Скрипт") && i.parent != null) {
                          Globals g = JsePlatform.standardGlobals();
                          g.set("script", CoerceJavaToLua.coerce(i));
                          g.set("parent", CoerceJavaToLua.coerce(i.parent));
                          try { g.load(i.luaCode).call(); scripts.add(g.get("update")); } catch(Exception e) {}
                      }
                  }
              }
              public static void stop() {
                  for(Instance i : instances) { i.x = i.startX; i.y = i.startY; }
                  isPlaying = false;
              }
              public static void update(float dt) {
                  if(!isPlaying) return;
                  LuaValue d = LuaValue.valueOf(dt);
                  for(LuaValue f : scripts) if(!f.isnil()) try { f.call(d); } catch(Exception e) {}
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/GameView.java << 'EOF'
          package com.jsai.studio;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class GameView extends View {
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              public GameView(Context c, AttributeSet a) { super(c, a); }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  for (Instance i : EngineCore.instances) {
                      if(i.type.equals("Спрайт") || i.type.equals("Папка")) {
                          p.setColor(i.color);
                          canvas.save();
                          canvas.translate(i.x, i.y);
                          if(i.type.equals("Спрайт")) canvas.drawRect(-50*i.scale, -50*i.scale, 50*i.scale, 50*i.scale, p);
                          else { p.setStyle(Paint.Style.STROKE); p.setStrokeWidth(3); canvas.drawCircle(0, 0, 20, p); p.setStyle(Paint.Style.FILL); }
                          canvas.restore();
                      }
                  }
                  invalidate();
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EditorActivity.java << 'EOF'
          package com.jsai.studio;
          import android.app.*;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;

          public class EditorActivity extends Activity {
              LinearLayout explorer, props; EditText codeEd; Instance sel;
              protected void onCreate(Bundle b) {
                  super.onCreate(b); requestWindowFeature(1); setContentView(R.layout.editor_main);
                  explorer = findViewById(R.id.explorer); props = findViewById(R.id.properties); codeEd = findViewById(R.id.codeEditor);
                  findViewById(R.id.btnAdd).setOnClickListener(v -> {
                      PopupMenu pm = new PopupMenu(this, v); 
                      pm.getMenu().add("Спрайт"); pm.getMenu().add("Папка"); pm.getMenu().add("Скрипт");
                      pm.setOnMenuItemClickListener(item -> {
                          Instance i = new Instance(item.getTitle().toString(), item.getTitle().toString());
                          if(sel != null && (item.getTitle().equals("Скрипт") || sel.type.equals("Папка"))) i.parent = sel;
                          EngineCore.instances.add(i); updateExp(); return true;
                      });
                      pm.show();
                  });
                  findViewById(R.id.btnPlay).setOnClickListener(v -> {
                      if(!EngineCore.isPlaying) { EngineCore.prepare(); EngineCore.isPlaying=true; ((Button)v).setText("Стоп"); }
                      else { EngineCore.stop(); ((Button)v).setText("Запуск"); }
                  });
              }
              void updateExp() {
                  explorer.removeAllViews();
                  for(Instance i : EngineCore.instances) {
                      Button b = new Button(this); b.setText((i.parent!=null?" > ":"")+i.name); b.setAllCaps(false);
                      b.setTextSize(10); b.setTextColor(sel == i ? Color.BLACK : Color.WHITE);
                      b.setBackgroundColor(sel == i ? Color.WHITE : 0x00000000);
                      b.setOnClickListener(v -> { sel = i; showProps(i); });
                      explorer.addView(b);
                  }
              }
              void showProps(Instance i) {
                  props.removeAllViews(); updateExp();
                  codeEd.setVisibility(i.type.equals("Скрипт") ? View.VISIBLE : View.GONE);
                  if(i.type.equals("Скрипт")) {
                      codeEd.setText(i.luaCode);
                      codeEd.addTextChangedListener(new android.text.TextWatcher() {
                          public void afterTextChanged(android.text.Editable s) { i.luaCode = s.toString(); }
                          public void beforeTextChanged(CharSequence s, int st, int c, int a) {}
                          public void onTextChanged(CharSequence s, int st, int b, int c) {}
                      });
                  }
                  Button ren = new Button(this); ren.setText("Переименовать"); ren.setTextSize(9);
                  ren.setBackgroundTintList(android.content.res.ColorStateList.valueOf(Color.WHITE)); ren.setTextColor(Color.BLACK);
                  ren.setOnClickListener(v -> {
                      EditText et = new EditText(this); et.setText(i.name);
                      new AlertDialog.Builder(this).setTitle("Новое Имя").setView(et)
                          .setPositiveButton("Готово", (d, w) -> { i.name = et.getText().toString(); updateExp(); }).show();
                  });
                  props.addView(ren);
                  addS("Позиция X", 0, 1200, i.x, v -> i.x = v);
                  addS("Позиция Y", 0, 1200, i.y, v -> i.y = v);
                  EditText col = new EditText(this); col.setHint("Цвет #FFFFFF"); col.setTextSize(10); col.setTextColor(Color.WHITE);
                  col.setOnEditorActionListener((v, a, e) -> {
                      try { i.color = Color.parseColor(col.getText().toString()); } catch(Exception ex) {}
                      return true;
                  });
                  props.addView(col);
              }
              void addS(String l, float min, float max, float cur, Upd u) {
                  TextView t = new TextView(this); t.setText(l); t.setTextColor(Color.WHITE); t.setTextSize(9); props.addView(t);
                  SeekBar s = new SeekBar(this); s.setMax(100); s.setProgress((int)((cur-min)/(max-min)*100));
                  s.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      public void onProgressChanged(SeekBar sb, int p, boolean b) { u.u(min+(max-min)*(p/100f)); }
                      public void onStartTrackingTouch(SeekBar sb) {} public void onStopTrackingTouch(SeekBar sb) {}
                  });
                  props.addView(s);
              }
              interface Upd { void u(float v); }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI Retro" android:theme="@android:style/Theme.NoTitleBar" android:icon="@android:drawable/ic_menu_edit">
                  <activity android:name=".EditorActivity" android:exported="true" android:screenOrientation="landscape" android:configChanges="orientation|screenSize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI_Retro_Studio
          path: app/build/outputs/apk/debug/app-debug.apk
