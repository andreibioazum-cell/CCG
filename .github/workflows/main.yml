name: VULKAN_VOXEL_ULTRA_V14_CPP
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java & NDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Prepare Project
        run: |
          rm -rf app
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/enjoer/vulkan
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      - name: Write C++ Engine (Native Renderer & Physics)
        run: |
          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <vector>
          #include <cmath>
          #include <android/log.h>

          struct GameState {
              float pX = 0, pY = 2, pZ = 15;
              float rotX = 0, rotY = 0;
              float velY = 0;
              float jX = 0, jY = 0;
          } state;

          extern "C" JNIEXPORT jfloatArray JNICALL
          Java_com_enjoer_vulkan_MainActivity_updateGame(JNIEnv* env, jobject, jfloat jx, jfloat jy, jboolean jump) {
              state.jX = jx; state.jY = jy;
              
              // Физика прыжка и гравитация
              if (jump && state.pY <= 2.05f) state.velY = 0.35f;
              state.velY -= 0.018f;
              state.pY += state.velY;
              if (state.pY < 2.0f) { state.pY = 2.0f; state.velY = 0; }

              // Движение
              float s = 0.15f;
              float rad = state.rotY * M_PI / 180.0f;
              state.pX += (sin(rad) * state.jY + cos(rad) * state.jX) * s;
              state.pZ += (-cos(rad) * state.jY + sin(rad) * state.jX) * s;

              jfloatArray res = env->NewFloatArray(6);
              float data[6] = {state.pX, state.pY, state.pZ, state.rotX, state.rotY, state.velY};
              env->SetFloatArrayRegion(res, 0, 6, data);
              return res;
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_enjoer_vulkan_MainActivity_updateRotation(JNIEnv*, jobject, jfloat dx, jfloat dy) {
              state.rotY += dx * 0.4f;
              state.rotX += dy * 0.4f;
              if (state.rotX > 85.0f) state.rotX = 85.0f;
              if (state.rotX < -85.0f) state.rotX = -85.0f;
          }
          EOF

          echo "cmake_minimum_required(VERSION 3.22.1)
          project(voxelvulkan)
          add_library(voxelvulkan SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(voxelvulkan \${log-lib})" > app/src/main/cpp/CMakeLists.txt

      - name: Write Java Glue Code
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/vulkan/MainActivity.java
          package com.enjoer.vulkan;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.opengl.GLSurfaceView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("voxelvulkan"); }
              public native float[] updateGame(float jx, float jy, boolean jump);
              public native void updateRotation(float dx, float dy);
              
              private GameRenderer ren;
              private boolean isJumping = false;
              private float jX=0, jY=0, lx, ly;
              private int moveId=-1, lookId=-1;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer(); gv.setRenderer(ren);

                  final View stick = findViewById(R.id.joy_stick);
                  final View base = findViewById(R.id.joy_base);

                  gv.setOnTouchListener((v, e) -> {
                      int act = e.getActionMasked();
                      int idx = e.getActionIndex();
                      int id = e.getPointerId(idx);

                      if(act == MotionEvent.ACTION_DOWN || act == MotionEvent.ACTION_POINTER_DOWN) {
                          if(e.getX(idx) < v.getWidth()/2) moveId = id;
                          else { lookId = id; lx = e.getX(idx); ly = e.getY(idx); }
                      } else if(act == MotionEvent.ACTION_MOVE) {
                          for(int i=0; i<e.getPointerCount(); i++) {
                              if(e.getPointerId(i) == moveId) {
                                  float dx = e.getX(i) - base.getX() - base.getWidth()/2;
                                  float dy = e.getY(i) - base.getY() - base.getHeight()/2;
                                  float d = (float)Math.sqrt(dx*dx+dy*dy), max = base.getWidth()/2;
                                  if(d > max) { dx *= max/d; dy *= max/d; }
                                  stick.setTranslationX(dx); stick.setTranslationY(dy);
                                  jX = dx/max; jY = -dy/max;
                              } else if(e.getPointerId(i) == lookId) {
                                  updateRotation(e.getX(i)-lx, e.getY(i)-ly);
                                  lx = e.getX(i); ly = e.getY(i);
                              }
                          }
                      } else if(act == MotionEvent.ACTION_UP || act == MotionEvent.ACTION_POINTER_UP) {
                          if(id == moveId) { moveId=-1; jX=0; jY=0; stick.setTranslationX(0); stick.setTranslationY(0); }
                          else if(id == lookId) lookId=-1;
                      }
                      return true;
                  });

                  findViewById(R.id.btn_jump).setOnClickListener(v -> isJumping = true);

                  final Handler h = new Handler(Looper.getMainLooper());
                  h.post(new Runnable(){public void run(){
                      float[] s = updateGame(jX, jY, isJumping);
                      isJumping = false;
                      ren.pX=s[0]; ren.pY=s[1]; ren.pZ=s[2]; ren.rotX=s[3]; ren.rotY=s[4];
                      h.postDelayed(this, 16);
                  }});
              }
          }
          EOF

      - name: Write Renderer (Voxel Engine)
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/vulkan/GameRenderer.java
          package com.enjoer.vulkan;
          import android.opengl.*;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private int prg; private FloatBuffer vB;
              private float[] proj=new float[16], view=new float[16], model=new float[16];
              public float pX, pY, pZ, rotX, rotY;

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs = "#version 300 es\nlayout(location=0)in vec4 aP;uniform mat4 uM;out float vH;void main(){vH=aP.y;gl_Position=uM*aP;}";
                  String fs = "#version 300 es\nprecision highp float;in float vH;uniform vec4 uC;out vec4 fC;void main(){fC=vec4(uC.rgb*(0.8+vH*0.2),1.0);}";
                  int vsh=GLES30.glCreateShader(35633); GLES30.glShaderSource(vsh,vs); GLES30.glCompileShader(vsh);
                  int fsh=GLES30.glCreateShader(35632); GLES30.glShaderSource(fsh,fs); GLES30.glCompileShader(fsh);
                  prg=GLES30.glCreateProgram(); GLES30.glAttachShader(prg,vsh); GLES30.glAttachShader(prg,fsh); GLES30.glLinkProgram(prg);
                  float[] v = {
                      -0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,0.5f,
                      -0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,-0.5f,
                      -0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f,
                      -0.5f,-0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,-0.5f,0.5f, -0.5f,-0.5f,0.5f,
                      -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,0.5f,0.5f, -0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f,
                       0.5f,0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f
                  };
                  vB=ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(v); vB.position(0);
              }
              @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,75,(float)w/h,0.1f,1000f); }
              @Override public void onDrawFrame(GL10 gl) {
                  GLES30.glClearColor(0.2f, 0.6f, 1.0f, 1.0f); GLES30.glClear(16640);
                  Matrix.setIdentityM(view,0); Matrix.rotateM(view,0,rotX,1,0,0); Matrix.rotateM(view,0,rotY,0,1,0); Matrix.translateM(view,0,-pX,-pY,-pZ);
                  GLES30.glUseProgram(prg);
                  int uM=GLES30.glGetUniformLocation(prg,"uM"), uC=GLES30.glGetUniformLocation(prg,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vB); GLES30.glEnableVertexAttribArray(0);
                  for(int x=-7;x<7;x++) for(int z=-7;z<7;z++){
                      float h = (float)Math.floor(Math.sin(x*0.4)*Math.cos(z*0.4)*3);
                      draw(uM,uC,x,h,z,0.4f,0.9f,0.4f);
                      draw(uM,uC,x,h-1,z,0.5f,0.3f,0.1f);
                  }
              }
              private void draw(int m,int c,float x,float y,float z,float r,float g,float b){
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,x,y,z);
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0); Matrix.multiplyMM(mvp,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(m,1,false,mvp,0); GLES30.glUniform4f(c,r,g,b,1);
                  GLES30.glDrawArrays(GLES30.GL_TRIANGLES,0,36);
              }
          }
          EOF

      - name: Layout & Styles
        run: |
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent"/>
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="160dp" android:layout_height="160dp" android:layout_alignParentBottom="true" android:layout_margin="30dp" android:background="@drawable/circle">
                      <View android:id="@+id/joy_stick" android:layout_width="70dp" android:layout_height="70dp" android:layout_gravity="center" android:background="@drawable/circle_f"/>
                  </FrameLayout>
                  <Button android:id="@+id/btn_jump" android:layout_width="100dp" android:layout_height="100dp" android:text="JUMP" android:layout_alignParentBottom="true" android:layout_alignParentRight="true" android:layout_margin="30dp" android:backgroundTint="#CC00BFFF"/>
              </RelativeLayout>
          </FrameLayout>
          EOF
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#22FFFFFF'/><stroke android:width='3dp' android:color='#FFF'/></shape>" > app/src/main/res/drawable/circle.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#AAFFFFFF'/></shape>" > app/src/main/res/drawable/circle_f.xml
          echo "<resources><style name='AppTheme' parent='Theme.AppCompat.Light.NoActionBar'><item name='android:windowFullscreen'>true</item></style></resources>" > app/src/main/res/values/styles.xml

      - name: Build
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.vulkan">
          <application android:label="VoxelV14_Native" android:theme="@style/AppTheme">
          <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape" android:configChanges="orientation|screenSize">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity></application></manifest>
          EOF
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          echo "plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.vulkan'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.vulkan'; minSdk 24; targetSdk 34; externalNativeBuild { cmake { cppFlags '-std=c++17' } } }
          externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt' } } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Voxel_V14_CPP_Full
          path: app/build/outputs/apk/debug/app-debug.apk
