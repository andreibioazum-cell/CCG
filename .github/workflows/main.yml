          # -- JAVA CLASSES --
          
          # FirebaseManager.java
          cat <<'JAVA' > app/src/main/java/com/tgui/app/FirebaseManager.java
          package com.tgui.app;
          
          import com.google.firebase.database.*;
          import java.util.*;
          
          public class FirebaseManager {
              private static FirebaseManager instance;
              private DatabaseReference database;
              private String currentUserId;
              
              private FirebaseManager() {
                  database = FirebaseDatabase.getInstance().getReference();
                  currentUserId = "user_" + System.currentTimeMillis(); // Временный ID
              }
              
              public static FirebaseManager getInstance() {
                  if (instance == null) {
                      instance = new FirebaseManager();
                  }
                  return instance;
              }
              
              public String getCurrentUserId() {
                  return currentUserId;
              }
              
              // Модель чата
              public static class Chat {
                  public String id;
                  public String name;
                  public String lastMessage;
                  public long lastMessageTime;
                  public int unreadCount;
                  public String avatarColor;
                  public boolean isOnline;
                  
                  public Chat() {}
                  
                  public Chat(String name, String lastMessage) {
                      this.name = name;
                      this.lastMessage = lastMessage;
                      this.lastMessageTime = System.currentTimeMillis();
                      this.unreadCount = 0;
                      this.avatarColor = "0";
                      this.isOnline = false;
                  }
              }
              
              // Модель сообщения
              public static class Message {
                  public String id;
                  public String text;
                  public String senderId;
                  public long timestamp;
                  public boolean isRead;
                  
                  public Message() {}
                  
                  public Message(String text, String senderId) {
                      this.text = text;
                      this.senderId = senderId;
                      this.timestamp = System.currentTimeMillis();
                      this.isRead = false;
                  }
              }
              
              // Получение списка чатов
              public void getChats(ChatsCallback callback) {
                  database.child("chats").child(currentUserId)
                      .addValueEventListener(new ValueEventListener() {
                          @Override
                          public void onDataChange(DataSnapshot snapshot) {
                              List<Chat> chats = new ArrayList<>();
                              for (DataSnapshot chatSnapshot : snapshot.getChildren()) {
                                  Chat chat = chatSnapshot.getValue(Chat.class);
                                  if (chat != null) {
                                      chat.id = chatSnapshot.getKey();
                                      chats.add(chat);
                                  }
                              }
                              callback.onSuccess(chats);
                          }
                          
                          @Override
                          public void onCancelled(DatabaseError error) {
                              callback.onError(error.getMessage());
                          }
                      });
              }
              
              // Получение сообщений в чате
              public void getMessages(String chatId, MessagesCallback callback) {
                  database.child("messages").child(chatId)
                      .orderByChild("timestamp")
                      .addChildEventListener(new ChildEventListener() {
                          @Override
                          public void onChildAdded(DataSnapshot snapshot, String previousChildName) {
                              Message message = snapshot.getValue(Message.class);
                              if (message != null) {
                                  message.id = snapshot.getKey();
                                  callback.onMessageAdded(message);
                              }
                          }
                          
                          @Override
                          public void onChildChanged(DataSnapshot snapshot, String previousChildName) {
                              Message message = snapshot.getValue(Message.class);
                              if (message != null) {
                                  callback.onMessageChanged(message);
                              }
                          }
                          
                          @Override
                          public void onChildRemoved(DataSnapshot snapshot) {
                              callback.onMessageRemoved(snapshot.getKey());
                          }
                          
                          @Override
                          public void onChildMoved(DataSnapshot snapshot, String previousChildName) {}
                          
                          @Override
                          public void onCancelled(DatabaseError error) {
                              callback.onError(error.getMessage());
                          }
                      });
              }
              
              // Отправка сообщения
              public void sendMessage(String chatId, Message message) {
                  String messageId = database.child("messages").child(chatId).push().getKey();
                  if (messageId != null) {
                      message.id = messageId;
                      database.child("messages").child(chatId).child(messageId).setValue(message);
                      
                      // Обновляем последнее сообщение в чате
                      Map<String, Object> updates = new HashMap<>();
                      updates.put("lastMessage", message.text);
                      updates.put("lastMessageTime", message.timestamp);
                      database.child("chats").child(currentUserId).child(chatId).updateChildren(updates);
                  }
              }
              
              // Обновление онлайн статуса
              public void updateOnlineStatus(boolean isOnline) {
                  DatabaseReference statusRef = database.child("users").child(currentUserId).child("status");
                  if (isOnline) {
                      statusRef.setValue("online");
                      statusRef.onDisconnect().setValue("offline");
                  } else {
                      statusRef.setValue("offline");
                  }
              }
              
              // Интерфейсы обратного вызова
              public interface ChatsCallback {
                  void onSuccess(List<Chat> chats);
                  void onError(String error);
              }
              
              public interface MessagesCallback {
                  void onMessageAdded(Message message);
                  void onMessageChanged(Message message);
                  void onMessageRemoved(String messageId);
                  void onError(String error);
              }
          }
          JAVA
          
          # MainActivity.java с Firebase интеграцией
          cat <<'JAVA' > app/src/main/java/com/tgui/app/MainActivity.java
          package com.tgui.app;
          
          import android.os.Bundle;
          import android.text.*;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.*;
          import androidx.drawerlayout.widget.DrawerLayout;
          import androidx.core.view.GravityCompat;
          import java.text.SimpleDateFormat;
          import java.util.*;
          
          public class MainActivity extends AppCompatActivity {
              FrameLayout root;
              List<String[]> allChats = new ArrayList<>();
              List<String[]> displayChats = new ArrayList<>();
              List<String[]> msgs = new ArrayList<>();
              RecyclerView.Adapter<?> msgAd;
              RecyclerView.Adapter<?> chatAd;
              RecyclerView msgRv;
              int cur = -1;
              int[] avBg = {R.drawable.bg_avatar, R.drawable.bg_avatar_g, R.drawable.bg_avatar_o, R.drawable.bg_avatar_p, R.drawable.bg_avatar_r};
              FirebaseManager firebaseManager;
              String currentChatId = null;
              
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  root = findViewById(R.id.container);
                  
                  firebaseManager = FirebaseManager.getInstance();
                  
                  // Инициализация демо-данных (для теста без Firebase)
                  initDemoData();
                  showChats();
              }
              
              private void initDemoData() {
                  allChats.add(new String[]{"Pavel Durov", "Telegram is the best!", "12:45", "0", "0", "1"});
                  allChats.add(new String[]{"Saved Messages", "Photo", "11:30", "0", "1", "0"});
                  allChats.add(new String[]{"John Smith", "See you tomorrow!", "10:15", "3", "2", "1"});
                  allChats.add(new String[]{"Alice Johnson", "Thanks! 😊", "Yesterday", "0", "3", "0"});
                  allChats.add(new String[]{"Tech News", "Breaking: New AI...", "Yesterday", "12", "4", "0"});
                  allChats.add(new String[]{"Family Group", "Mom: Dinner!", "Monday", "5", "1", "0"});
                  allChats.add(new String[]{"Work Chat", "Meeting at 3pm", "Monday", "0", "0", "0"});
                  allChats.add(new String[]{"Mike", "👍", "Sunday", "0", "2", "0"});
                  displayChats.addAll(allChats);
              }
              
              @Override
              protected void onResume() {
                  super.onResume();
                  firebaseManager.updateOnlineStatus(true);
              }
              
              @Override
              protected void onPause() {
                  super.onPause();
                  firebaseManager.updateOnlineStatus(false);
              }
              
              void showChats() {
                  View v = LayoutInflater.from(this).inflate(R.layout.screen_chats, root, false);
                  root.removeAllViews();
                  root.addView(v);
                  
                  DrawerLayout drawer = v.findViewById(R.id.drawer_layout);
                  v.findViewById(R.id.btn_menu).setOnClickListener(view -> drawer.openDrawer(GravityCompat.START));
                  
                  View tbNormal = v.findViewById(R.id.toolbar_normal);
                  View tbSearch = v.findViewById(R.id.toolbar_search);
                  EditText searchInput = v.findViewById(R.id.search_input);
                  
                  v.findViewById(R.id.btn_search).setOnClickListener(view -> {
                      tbNormal.setVisibility(View.GONE);
                      tbSearch.setVisibility(View.VISIBLE);
                      searchInput.requestFocus();
                  });
                  
                  v.findViewById(R.id.btn_search_back).setOnClickListener(view -> {
                      searchInput.setText("");
                      tbSearch.setVisibility(View.GONE);
                      tbNormal.setVisibility(View.VISIBLE);
                  });
                  
                  searchInput.addTextChangedListener(new TextWatcher() {
                      public void beforeTextChanged(CharSequence s, int a, int b, int c) {}
                      public void onTextChanged(CharSequence s, int a, int b, int c) {
                          filterChats(s.toString());
                      }
                      public void afterTextChanged(Editable s) {}
                  });
                  
                  RecyclerView rv = v.findViewById(R.id.list);
                  rv.setLayoutManager(new LinearLayoutManager(this));
                  chatAd = new RecyclerView.Adapter<VH>() {
                      @Override
                      public VH onCreateViewHolder(ViewGroup p, int t) {
                          return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_chat, p, false));
                      }
                      
                      @Override
                      public void onBindViewHolder(VH h, int i) {
                          String[] c = displayChats.get(i);
                          ((TextView) h.v.findViewById(R.id.name)).setText(c[0]);
                          ((TextView) h.v.findViewById(R.id.msg)).setText(c[1]);
                          ((TextView) h.v.findViewById(R.id.time)).setText(c[2]);
                          TextView av = h.v.findViewById(R.id.avatar);
                          av.setText(c[0].substring(0, 1));
                          av.setBackgroundResource(avBg[Integer.parseInt(c[4]) % 5]);
                          h.v.findViewById(R.id.online).setVisibility(c[5].equals("1") ? View.VISIBLE : View.GONE);
                          TextView bd = h.v.findViewById(R.id.badge);
                          int u = Integer.parseInt(c[3]);
                          if (u > 0) {
                              bd.setVisibility(View.VISIBLE);
                              bd.setText(c[3]);
                          } else bd.setVisibility(View.GONE);
                          h.v.setOnClickListener(x -> openChat(allChats.indexOf(c)));
                      }
                      
                      @Override
                      public int getItemCount() {
                          return displayChats.size();
                      }
                  };
                  rv.setAdapter(chatAd);
                  
                  v.findViewById(R.id.fab).setOnClickListener(view -> {
                      Toast.makeText(this, "Creating New Chat", Toast.LENGTH_SHORT).show();
                      String[] newChat = new String[]{"New Contact", "Hello!", "Now", "0", "3", "1"};
                      allChats.add(0, newChat);
                      searchInput.setText("");
                      filterChats("");
                      if(tbSearch.getVisibility() == View.VISIBLE) {
                          tbSearch.setVisibility(View.GONE);
                          tbNormal.setVisibility(View.VISIBLE);
                      }
                  });
              }
              
              void filterChats(String query) {
                  displayChats.clear();
                  if (query.isEmpty()) {
                      displayChats.addAll(allChats);
                  } else {
                      for (String[] c : allChats) {
                          if (c[0].toLowerCase().contains(query.toLowerCase())) {
                              displayChats.add(c);
                          }
                      }
                  }
                  if (chatAd != null) chatAd.notifyDataSetChanged();
              }
              
              void openChat(int i) {
                  if(i < 0) return;
                  cur = i;
                  String[] c = allChats.get(i);
                  c[3] = "0";
                  
                  msgs.clear();
                  msgs.add(new String[]{"Hey! How are you?", "10:30", "0"});
                  msgs.add(new String[]{"I'm good, thanks!", "10:31", "1"});
                  msgs.add(new String[]{"Did you see the news?", "10:32", "0"});
                  msgs.add(new String[]{"No, what happened?", "10:33", "1"});
                  msgs.add(new String[]{"Check Telegram News!", "10:34", "0"});
                  msgs.add(new String[]{"Will do! 👍", "10:35", "1"});
                  
                  View v = LayoutInflater.from(this).inflate(R.layout.screen_chat, root, false);
                  root.removeAllViews();
                  root.addView(v);
                  
                  ((TextView) v.findViewById(R.id.t_name)).setText(c[0]);
                  TextView av = v.findViewById(R.id.av);
                  av.setText(c[0].substring(0, 1));
                  av.setBackgroundResource(avBg[Integer.parseInt(c[4]) % 5]);
                  ((TextView) v.findViewById(R.id.t_status)).setText(c[5].equals("1") ? "online" : "last seen recently");
                  
                  v.findViewById(R.id.btn_back).setOnClickListener(x -> showChats());
                  
                  msgRv = v.findViewById(R.id.msgs);
                  LinearLayoutManager lm = new LinearLayoutManager(this);
                  lm.setStackFromEnd(true);
                  msgRv.setLayoutManager(lm);
                  
                  msgAd = new RecyclerView.Adapter<VH>() {
                      @Override
                      public int getItemViewType(int p) {
                          return msgs.get(p)[2].equals("1") ? 1 : 0;
                      }
                      
                      @Override
                      public VH onCreateViewHolder(ViewGroup p, int t) {
                          return new VH(LayoutInflater.from(p.getContext()).inflate(t == 1 ? R.layout.item_msg_out : R.layout.item_msg_in, p, false));
                      }
                      
                      @Override
                      public void onBindViewHolder(VH h, int p) {
                          ((TextView) h.v.findViewById(R.id.text)).setText(msgs.get(p)[0]);
                          ((TextView) h.v.findViewById(R.id.time)).setText(msgs.get(p)[1]);
                      }
                      
                      @Override
                      public int getItemCount() {
                          return msgs.size();
                      }
                  };
                  msgRv.setAdapter(msgAd);
                  
                  EditText inp = v.findViewById(R.id.input);
                  View btnS = v.findViewById(R.id.btn_send), btnM = v.findViewById(R.id.btn_mic);
                  inp.addTextChangedListener(new TextWatcher() {
                      public void beforeTextChanged(CharSequence s, int a, int b, int c) {}
                      public void onTextChanged(CharSequence s, int a, int b, int c) {}
                      public void afterTextChanged(Editable s) {
                          btnS.setVisibility(s.length() > 0 ? View.VISIBLE : View.GONE);
                          btnM.setVisibility(s.length() > 0 ? View.GONE : View.VISIBLE);
                      }
                  });
                  btnS.setOnClickListener(x -> {
                      String t = inp.getText().toString().trim();
                      if (!t.isEmpty()) {
                          String tm = new SimpleDateFormat("HH:mm", Locale.getDefault()).format(new Date());
                          msgs.add(new String[]{t, tm, "1"});
                          msgAd.notifyItemInserted(msgs.size() - 1);
                          msgRv.scrollToPosition(msgs.size() - 1);
                          inp.setText("");
                          allChats.get(cur)[1] = t;
                          allChats.get(cur)[2] = tm;
                      }
                  });
              }
              
              @Override
              public void onBackPressed() {
                  if (cur >= 0) {
                      cur = -1;
                      showChats();
                  } else {
                      super.onBackPressed();
                  }
              }
              
              class VH extends RecyclerView.ViewHolder {
                  View v;
                  VH(View x) {
                      super(x);
                      v = x;
                  }
              }
          }
