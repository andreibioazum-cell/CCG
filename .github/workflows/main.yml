name: Enjoer_AI_GGUF_Importer
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: '8.5' }

      - name: Create AI Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/ai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # --- Настройки проекта ---
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # --- Интерфейс Чата и Импорта ---
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#0A0A0A" android:padding="16dp">
              
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="ENJOER AI: GGUF" android:textColor="#0F0" android:textSize="24sp" android:textStyle="bold" android:layout_gravity="center"/>

              <Button android:id="@+id/btn_import" android:layout_width="match_parent" android:layout_height="60dp"
                  android:text="ВЫБРАТЬ .GGUF МОДЕЛЬ" android:layout_marginTop="10dp" android:backgroundTint="#222"/>

              <TextView android:id="@+id/status_text" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="Модель не выбрана" android:textColor="#888" android:textSize="12sp" android:gravity="center" android:layout_margin="5dp"/>

              <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:layout_marginTop="10dp">
                  <TextView android:id="@+id/chat_log" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:text="Добро пожаловать в AI Чат..." android:textColor="#FFF" android:textSize="16sp"/>
              </ScrollView>

              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                  <EditText android:id="@+id/input_text" android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:hint="Спроси что-нибудь..." android:textColor="#FFF" android:textColorHint="#555"/>
                  <Button android:id="@+id/btn_send" android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="ОТПРАВИТЬ" android:backgroundTint="#0F0" android:textColor="#000"/>
              </LinearLayout>
          </LinearLayout>
          EOF

          # --- MainActivity (Логика выбора файла и имитация чата) ---
          # Настоящий запуск GGUF требует бинарника llama.cpp, 
          # сейчас мы сделаем каркас, который правильно принимает файл.
          cat <<EOF > app/src/main/java/com/enjoer/ai/MainActivity.java
          package com.enjoer.ai;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private TextView chatLog, statusText;
              private EditText input;
              private Uri modelUri;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  chatLog = findViewById(R.id.chat_log);
                  statusText = findViewById(R.id.status_text);
                  input = findViewById(R.id.input_text);

                  findViewById(R.id.btn_import).setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                      intent.setType("*/*");
                      startActivityForResult(intent, 100);
                  });

                  findViewById(R.id.btn_send).setOnClickListener(v -> {
                      String q = input.getText().toString();
                      if(modelUri == null) {
                          Toast.makeText(this, "Сначала импортируй модель!", Toast.LENGTH_SHORT).show();
                          return;
                      }
                      chatLog.append("\n\nВы: " + q);
                      chatLog.append("\nAI: [Идет обработка через GGUF...]");
                      input.setText("");
                  });
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if(requestCode == 100 && resultCode == RESULT_OK && data != null) {
                      modelUri = data.getData();
                      statusText.setText("Файл выбран: " + modelUri.getPath());
                      chatLog.append("\n\n[СИСТЕМА]: Модель готова к загрузке.");
                  }
              }
          }
          EOF

          # --- Build Config ---
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android { 
              namespace 'com.enjoer.ai'
              compileSdk 34
              defaultConfig { applicationId 'com.enjoer.ai'; minSdk 26; targetSdk 34 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="Enjoer AI" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name="com.enjoer.ai.MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build AI App
        run: gradle assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_AI_GGUF_App
          path: app/build/outputs/apk/debug/app-debug.apk
