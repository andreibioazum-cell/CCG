                  View jz=findViewById(R.id.jz), jh=findViewById(R.id.jh);
                  jz.setOnTouchListener((v,e)->{
                      if(e.getAction()==1){jh.setTranslationX(0);jh.setTranslationY(0);r.mx=r.mz=0;}else{
                      float rad=v.getWidth()/2f, dx=e.getX()-rad, dy=e.getY()-rad, d=(float)Math.sqrt(dx*dx+dy*dy);
                      if(d>rad){dx=dx/d*rad;dy=dy/d*rad;} jh.setTranslationX(dx);jh.setTranslationY(dy);r.mx=dx/rad;r.mz=-dy/rad;}return true;
                  });
