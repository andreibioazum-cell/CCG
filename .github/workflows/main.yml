                      b.arg1 = e1.getText().toString();
                      b.arg2 = e2.getText().toString();
                      ProjectStore.save(MainActivity.this, projects);
                      showScripts();
                  });
                  builder.setNegativeButton("Отмена", null);
                  builder.show();
