name: Enjoer_APK_Builder_Pro
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Project Files
        run: |
          mkdir -p app/src/main/java/com/enjoer/builder
          mkdir -p app/src/main/res/values
          
          # 1. Глобальные настройки
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # 2. Корневой build.gradle (Здесь мы объявляем версию плагина!)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. Модульный build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.enjoer.builder'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.builder'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # 4. Манифест с ЛАУНЧЕРОМ (чтобы иконка была!)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="Enjoer Patcher" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name="com.enjoer.builder.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name="com.enjoer.builder.ModMenuService" android:enabled="true" android:exported="false"/>
              </application>
          </manifest>
          EOF

      - name: Create Java Source
        run: |
          # Главное окно (MainActivity)
          cat <<'EOF' > app/src/main/java/com/enjoer/builder/MainActivity.java
          package com.enjoer.builder;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.*;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  Button b = new Button(this);
                  b.setText("ВЫБРАТЬ APK И ПАТЧИТЬ");
                  setContentView(b);
                  b.setOnClickListener(v -> Toast.makeText(this, "Выбери файл Chicken Gun...", Toast.LENGTH_LONG).show());
              }
          }
          EOF

          # Сервис меню (ModMenuService)
          cat <<'EOF' > app/src/main/java/com/enjoer/builder/ModMenuService.java
          package com.enjoer.builder;
          import android.app.Service;
          import android.content.Intent;
          import android.os.IBinder;
          public class ModMenuService extends Service {
              public IBinder onBind(Intent i) { return null; }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Patcher_Final
          path: app/build/outputs/apk/debug/*.apk
