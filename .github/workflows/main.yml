name: Build Fabric Mod 1.21.1

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Create Fabric mod project files
        shell: bash
        run: |
          mkdir -p src/main/java/com/example/givemod
          mkdir -p src/main/resources
          mkdir -p src/main/resources/assets/utilitymod1211

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  maven { url = 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }

          rootProject.name = 'fabric-utility-mod-1211'
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2G
          org.gradle.parallel=true

          minecraft_version=1.21.1
          yarn_mappings=1.21.1+build.3
          loader_version=0.16.10
          fabric_version=0.116.0+1.21.1

          mod_version=1.0.0
          maven_group=com.example
          archives_base_name=fabric-utility-mod-1211
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'fabric-loom' version '1.8'
              id 'maven-publish'
          }

          version = project.mod_version
          group = project.maven_group

          base {
              archivesName = project.archives_base_name
          }

          repositories {
              maven { url = 'https://maven.fabricmc.net/' }
              mavenCentral()
          }

          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
          }

          java {
              toolchain {
                  languageVersion = JavaLanguageVersion.of(21)
              }
              withSourcesJar()
          }

          tasks.withType(JavaCompile).configureEach {
              options.release = 21
              options.encoding = "UTF-8"
          }

          processResources {
              inputs.property "version", project.version
              filesMatching("fabric.mod.json") {
                  expand "version": project.version
              }
          }

          publishing {
              publications {
                  mavenJava(MavenPublication) {
                      from components.java
                  }
              }
          }
          EOF

          cat > src/main/resources/fabric.mod.json <<'EOF'
          {
            "schemaVersion": 1,
            "id": "utilitymod1211",
            "version": "${version}",
            "name": "Utility Mod 1.21.1",
            "description": "Commands: /givem, /godm, /fly, /crm",
            "authors": ["GitHub Actions"],
            "license": "MIT",
            "environment": "*",
            "entrypoints": {
              "main": [
                "com.example.givemod.UtilityMod"
              ]
            },
            "depends": {
              "fabricloader": ">=0.16.10",
              "minecraft": "~1.21.1",
              "java": ">=21",
              "fabric-api": "*"
            }
          }
          EOF

          cat > src/main/java/com/example/givemod/UtilityMod.java <<'EOF'
          package com.example.givemod;

          import net.fabricmc.api.ModInitializer;

          public class UtilityMod implements ModInitializer {
              @Override
              public void onInitialize() {
                  ModCommands.register();
              }
          }
          EOF

          cat > src/main/java/com/example/givemod/ModCommands.java <<'EOF'
          package com.example.givemod;

          import com.mojang.brigadier.CommandDispatcher;
          import com.mojang.brigadier.arguments.IntegerArgumentType;
          import com.mojang.brigadier.arguments.StringArgumentType;
          import net.fabricmc.fabric.api.command.v2.CommandRegistrationCallback;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.command.CommandRegistryAccess;
          import net.minecraft.entity.effect.StatusEffectInstance;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.Items;
          import net.minecraft.server.command.CommandManager;
          import net.minecraft.server.command.ServerCommandSource;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;
          import net.minecraft.world.GameMode;

          import java.util.HashMap;
          import java.util.HashSet;
          import java.util.Map;
          import java.util.Set;
          import java.util.UUID;

          public class ModCommands {
              private static final Set<UUID> GOD_MODE = new HashSet<>();
              private static final Set<UUID> FLY_MODE = new HashSet<>();
              private static final Map<String, Item> ALIASES = new HashMap<>();

              static {
                  ALIASES.put("dirt", Items.DIRT);
                  ALIASES.put("stone", Items.STONE);
                  ALIASES.put("diamond", Items.DIAMOND);
                  ALIASES.put("iron", Items.IRON_INGOT);
                  ALIASES.put("gold", Items.GOLD_INGOT);
                  ALIASES.put("emerald", Items.EMERALD);
                  ALIASES.put("coal", Items.COAL);
                  ALIASES.put("netherite", Items.NETHERITE_INGOT);
                  ALIASES.put("sword", Items.DIAMOND_SWORD);
                  ALIASES.put("pickaxe", Items.DIAMOND_PICKAXE);
                  ALIASES.put("axe", Items.DIAMOND_AXE);
                  ALIASES.put("elytra", Items.ELYTRA);
                  ALIASES.put("totem", Items.TOTEM_OF_UNDYING);
                  ALIASES.put("bread", Items.BREAD);
                  ALIASES.put("steak", Items.COOKED_BEEF);
                  ALIASES.put("apple", Items.APPLE);
                  ALIASES.put("stick", Items.STICK);
              }

              public static void register() {
                  CommandRegistrationCallback.EVENT.register(ModCommands::registerCommands);

                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity player : server.getPlayerManager().getPlayerList()) {
                          UUID uuid = player.getUuid();

                          if (GOD_MODE.contains(uuid)) {
                              player.setInvulnerable(true);
                              if (player.getHealth() < player.getMaxHealth()) {
                                  player.setHealth(player.getMaxHealth());
                              }
                              player.getHungerManager().setFoodLevel(20);
                              player.getHungerManager().setSaturationLevel(20.0f);
                              player.clearStatusEffects();
                              player.setAir(player.getMaxAir());
                              player.extinguish();
                          } else {
                              player.setInvulnerable(false);
                          }

                          boolean allowFly = FLY_MODE.contains(uuid) || player.isCreative();
                          if (allowFly) {
                              player.getAbilities().allowFlying = true;
                          } else {
                              player.getAbilities().allowFlying = false;
                              player.getAbilities().flying = false;
                          }
                          player.sendAbilitiesUpdate();
                      }
                  });
              }

              private static void registerCommands(
                      CommandDispatcher<ServerCommandSource> dispatcher,
                      CommandRegistryAccess registryAccess,
                      CommandManager.RegistrationEnvironment environment
              ) {
                  dispatcher.register(
                          CommandManager.literal("givem")
                                  .then(CommandManager.argument("item", StringArgumentType.word())
                                          .executes(ctx -> giveItem(
                                                  ctx.getSource().getPlayerOrThrow(),
                                                  StringArgumentType.getString(ctx, "item"),
                                                  1
                                          ))
                                          .then(CommandManager.argument("amount", IntegerArgumentType.integer(1, 64))
                                                  .executes(ctx -> giveItem(
                                                          ctx.getSource().getPlayerOrThrow(),
                                                          StringArgumentType.getString(ctx, "item"),
                                                          IntegerArgumentType.getInteger(ctx, "amount")
                                                  ))
                                          )
                                  )
                  );

                  dispatcher.register(
                          CommandManager.literal("godm")
                                  .executes(ctx -> toggleGod(ctx.getSource().getPlayerOrThrow()))
                  );

                  dispatcher.register(
                          CommandManager.literal("fly")
                                  .executes(ctx -> toggleFly(ctx.getSource().getPlayerOrThrow()))
                  );

                  dispatcher.register(
                          CommandManager.literal("crm")
                                  .executes(ctx -> toggleCreative(ctx.getSource().getPlayerOrThrow()))
                  );
              }

              private static int giveItem(ServerPlayerEntity player, String alias, int amount) {
                  Item item = ALIASES.get(alias.toLowerCase());

                  if (item == null) {
                      player.sendMessage(Text.literal("Неизвестный предмет/алиас: " + alias), false);
                      return 0;
                  }

                  ItemStack stack = new ItemStack(item, amount);
                  boolean inserted = player.getInventory().insertStack(stack);

                  if (!inserted || !stack.isEmpty()) {
                      player.dropItem(stack, false);
                  }

                  player.sendMessage(Text.literal("Вы получили: " + amount + " x " + item.getName().getString()), false);
                  return 1;
              }

              private static int toggleGod(ServerPlayerEntity player) {
                  UUID uuid = player.getUuid();

                  if (GOD_MODE.contains(uuid)) {
                      GOD_MODE.remove(uuid);
                      player.setInvulnerable(false);
                      player.sendMessage(Text.literal("Режим бога: выключен"), false);
                  } else {
                      GOD_MODE.add(uuid);
                      player.setInvulnerable(true);
                      player.setHealth(player.getMaxHealth());
                      player.getHungerManager().setFoodLevel(20);
                      player.getHungerManager().setSaturationLevel(20.0f);
                      for (StatusEffectInstance effect : player.getStatusEffects()) {
                      }
                      player.clearStatusEffects();
                      player.extinguish();
                      player.sendMessage(Text.literal("Режим бога: включен"), false);
                  }

                  return 1;
              }

              private static int toggleFly(ServerPlayerEntity player) {
                  UUID uuid = player.getUuid();

                  if (FLY_MODE.contains(uuid)) {
                      FLY_MODE.remove(uuid);
                      if (!player.isCreative()) {
                          player.getAbilities().allowFlying = false;
                          player.getAbilities().flying = false;
                      }
                      player.sendAbilitiesUpdate();
                      player.sendMessage(Text.literal("Полет: выключен"), false);
                  } else {
                      FLY_MODE.add(uuid);
                      player.getAbilities().allowFlying = true;
                      player.sendAbilitiesUpdate();
                      player.sendMessage(Text.literal("Полет: включен"), false);
                  }

                  return 1;
              }

              private static int toggleCreative(ServerPlayerEntity player) {
                  if (player.interactionManager.getGameMode() == GameMode.CREATIVE) {
                      player.changeGameMode(GameMode.SURVIVAL);
                      FLY_MODE.remove(player.getUuid());
                      player.getAbilities().allowFlying = false;
                      player.getAbilities().flying = false;
                      player.sendAbilitiesUpdate();
                      player.sendMessage(Text.literal("Creative mode: выключен"), false);
                  } else {
                      player.changeGameMode(GameMode.CREATIVE);
                      FLY_MODE.add(player.getUuid());
                      player.getAbilities().allowFlying = true;
                      player.getAbilities().flying = true;
                      player.sendAbilitiesUpdate();
                      player.sendMessage(Text.literal("Creative mode: включен"), false);
                  }

                  return 1;
              }
          }
          EOF

          cat > LICENSE <<'EOF'
          MIT License
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.8

      - name: Build mod
        run: ./gradlew build --stacktrace

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: fabric-utility-mod-1211
          path: build/libs/*.jar
