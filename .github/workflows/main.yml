name: AetherAI - Advanced Transformer with File Picker
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aetherai:
    name: Build AetherAI Advanced
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Android SDK & Tools
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34 ndk;25.2.9519653 cmake;3.22.1'
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rust-src
          
      - name: Create Advanced Transformer Core
        run: |
          mkdir -p aetherai_core/src
          
          cat > aetherai_core/src/transformer.h << 'EOF'
          #ifndef TRANSFORMER_H
          #define TRANSFORMER_H
          
          #include <cstdint>
          #include <cmath>
          #include <cstring>
          #include <arm_neon.h>
          
          constexpr int VOCAB_SIZE = 16384;
          constexpr int D_MODEL = 512;
          constexpr int N_HEADS = 16;
          constexpr int D_FF = 2048;
          constexpr int N_LAYERS = 8;
          constexpr int MAX_SEQ_LEN = 256;
          constexpr int HEAD_DIM = D_MODEL / N_HEADS;
          constexpr int BATCH_SIZE = 4;
          constexpr float LEARNING_RATE = 0.0003f;
          constexpr float WEIGHT_DECAY = 0.01f;
          constexpr float GRAD_CLIP = 1.0f;
          constexpr float EPSILON = 1e-8f;
          
          inline void matmul_neon(const float* A, const float* B, float* C, int m, int n, int k) {
              memset(C, 0, m * n * sizeof(float));
              for (int i = 0; i < m; i++) {
                  for (int j = 0; j < n; j++) {
                      float32x4_t sum = vdupq_n_f32(0);
                      int kk;
                      for (kk = 0; kk <= k - 4; kk += 4) {
                          float32x4_t a = vld1q_f32(&A[i * k + kk]);
                          float32x4_t b = vld1q_f32(&B[kk * n + j]);
                          sum = vmlaq_f32(sum, a, b);
                      }
                      float result = vgetq_lane_f32(sum, 0) + vgetq_lane_f32(sum, 1) + 
                                     vgetq_lane_f32(sum, 2) + vgetq_lane_f32(sum, 3);
                      for (; kk < k; kk++) {
                          result += A[i * k + kk] * B[kk * n + j];
                      }
                      C[i * n + j] = result;
                  }
              }
          }
          
          inline void matmul_transpose_neon(const float* A, const float* B, float* C, int m, int n, int k) {
              memset(C, 0, m * k * sizeof(float));
              for (int i = 0; i < m; i++) {
                  for (int j = 0; j < k; j++) {
                      float32x4_t sum = vdupq_n_f32(0);
                      int nn;
                      for (nn = 0; nn <= n - 4; nn += 4) {
                          float32x4_t a = vld1q_f32(&A[i * n + nn]);
                          float32x4_t b = vld1q_f32(&B[j * n + nn]);
                          sum = vmlaq_f32(sum, a, b);
                      }
                      float result = vgetq_lane_f32(sum, 0) + vgetq_lane_f32(sum, 1) + 
                                     vgetq_lane_f32(sum, 2) + vgetq_lane_f32(sum, 3);
                      for (; nn < n; nn++) {
                          result += A[i * n + nn] * B[j * n + nn];
                      }
                      C[i * k + j] = result;
                  }
              }
          }
          
          inline void softmax_neon(float* x, int size) {
              float max_val = x[0];
              for (int i = 1; i < size; i++) {
                  if (x[i] > max_val) max_val = x[i];
              }
              
              float sum = 0.0f;
              int i;
              for (i = 0; i <= size - 4; i += 4) {
                  float32x4_t vec = vld1q_f32(&x[i]);
                  vec = vsubq_f32(vec, vdupq_n_f32(max_val));
                  float exp_vals[4];
                  exp_vals[0] = expf(vgetq_lane_f32(vec, 0));
                  exp_vals[1] = expf(vgetq_lane_f32(vec, 1));
                  exp_vals[2] = expf(vgetq_lane_f32(vec, 2));
                  exp_vals[3] = expf(vgetq_lane_f32(vec, 3));
                  vst1q_f32(&x[i], vld1q_f32(exp_vals));
                  sum += exp_vals[0] + exp_vals[1] + exp_vals[2] + exp_vals[3];
              }
              for (; i < size; i++) {
                  x[i] = expf(x[i] - max_val);
                  sum += x[i];
              }
              
              float inv_sum = 1.0f / (sum + EPSILON);
              for (i = 0; i <= size - 4; i += 4) {
                  float32x4_t vec = vld1q_f32(&x[i]);
                  vec = vmulq_n_f32(vec, inv_sum);
                  vst1q_f32(&x[i], vec);
              }
              for (; i < size; i++) {
                  x[i] *= inv_sum;
              }
          }
          
          inline float gelu(float x) {
              return 0.5f * x * (1.0f + tanhf(0.7978845608f * (x + 0.044715f * x * x * x)));
          }
          
          inline float gelu_derivative(float x) {
              float tanh_arg = 0.7978845608f * (x + 0.044715f * x * x * x);
              float tanh_val = tanhf(tanh_arg);
              float sech2 = 1.0f - tanh_val * tanh_val;
              return 0.5f * (1.0f + tanh_val) + 0.5f * x * sech2 * 0.7978845608f * (1.0f + 0.134145f * x * x);
          }
          
          inline void layer_norm(float* x, const float* gamma, const float* beta, int size, float* mean_out, float* var_out) {
              float mean = 0.0f;
              for (int i = 0; i < size; i++) mean += x[i];
              mean /= size;
              
              float var = 0.0f;
              for (int i = 0; i < size; i++) {
                  float diff = x[i] - mean;
                  var += diff * diff;
              }
              var = sqrtf(var / size + EPSILON);
              
              if (mean_out) *mean_out = mean;
              if (var_out) *var_out = var;
              
              for (int i = 0; i < size; i++) {
                  x[i] = gamma[i] * ((x[i] - mean) / var) + beta[i];
              }
          }
          
          inline void layer_norm_backward(const float* grad_out, const float* x_norm, const float* gamma, 
                                         float mean, float var, int size, float* grad_x, float* grad_gamma, float* grad_beta) {
              for (int i = 0; i < size; i++) {
                  grad_gamma[i] += grad_out[i] * x_norm[i];
                  grad_beta[i] += grad_out[i];
              }
              
              float grad_var = 0.0f, grad_mean = 0.0f;
              for (int i = 0; i < size; i++) {
                  float dx_norm = grad_out[i] * gamma[i];
                  grad_var += dx_norm * x_norm[i] * (-0.5f) / var;
                  grad_mean += dx_norm * (-1.0f / var);
              }
              
              for (int i = 0; i < size; i++) {
                  float dx_norm = grad_out[i] * gamma[i];
                  grad_x[i] = dx_norm / var + grad_var * 2.0f * (x_norm[i] - mean) / size + grad_mean / size;
              }
          }
          
          struct TransformerWeights {
              float* token_embedding;
              float* pos_embedding;
              
              struct Layer {
                  float *q_weight, *q_bias, *k_weight, *k_bias, *v_weight, *v_bias, *out_weight, *out_bias;
                  float *ff1_weight, *ff1_bias, *ff2_weight, *ff2_bias;
                  float *ln1_gamma, *ln1_beta, *ln2_gamma, *ln2_beta;
                  
                  float *q_weight_grad, *q_bias_grad, *k_weight_grad, *k_bias_grad;
                  float *v_weight_grad, *v_bias_grad, *out_weight_grad, *out_bias_grad;
                  float *ff1_weight_grad, *ff1_bias_grad, *ff2_weight_grad, *ff2_bias_grad;
                  float *ln1_gamma_grad, *ln1_beta_grad, *ln2_gamma_grad, *ln2_beta_grad;
                  
                  float *q_weight_m, *q_bias_m, *k_weight_m, *k_bias_m;
                  float *v_weight_m, *v_bias_m, *out_weight_m, *out_bias_m;
                  float *ff1_weight_m, *ff1_bias_m, *ff2_weight_m, *ff2_bias_m;
                  float *ln1_gamma_m, *ln1_beta_m, *ln2_gamma_m, *ln2_beta_m;
                  
                  float *q_weight_v, *q_bias_v, *k_weight_v, *k_bias_v;
                  float *v_weight_v, *v_bias_v, *out_weight_v, *out_bias_v;
                  float *ff1_weight_v, *ff1_bias_v, *ff2_weight_v, *ff2_bias_v;
                  float *ln1_gamma_v, *ln1_beta_v, *ln2_gamma_v, *ln2_beta_v;
              } *layers;
              
              float *final_ln_gamma, *final_ln_beta;
              float *output_weight, *output_bias;
              
              float *token_embedding_grad, *pos_embedding_grad;
              float *final_ln_gamma_grad, *final_ln_beta_grad;
              float *output_weight_grad, *output_bias_grad;
              
              float *token_embedding_m, *pos_embedding_m;
              float *final_ln_gamma_m, *final_ln_beta_m;
              float *output_weight_m, *output_bias_m;
              
              float *token_embedding_v, *pos_embedding_v;
              float *final_ln_gamma_v, *final_ln_beta_v;
              float *output_weight_v, *output_bias_v;
          };
          
          class Transformer {
          public:
              TransformerWeights weights;
              int training_steps = 0;
              float beta1 = 0.9f;
              float beta2 = 0.999f;
              
              void allocate_memory() {
                  weights.token_embedding = new float[VOCAB_SIZE * D_MODEL]();
                  weights.pos_embedding = new float[MAX_SEQ_LEN * D_MODEL]();
                  weights.token_embedding_grad = new float[VOCAB_SIZE * D_MODEL]();
                  weights.pos_embedding_grad = new float[MAX_SEQ_LEN * D_MODEL]();
                  weights.token_embedding_m = new float[VOCAB_SIZE * D_MODEL]();
                  weights.pos_embedding_m = new float[MAX_SEQ_LEN * D_MODEL]();
                  weights.token_embedding_v = new float[VOCAB_SIZE * D_MODEL]();
                  weights.pos_embedding_v = new float[MAX_SEQ_LEN * D_MODEL]();
                  
                  weights.layers = new TransformerWeights::Layer[N_LAYERS];
                  
                  for (int l = 0; l < N_LAYERS; l++) {
                      auto& layer = weights.layers[l];
                      
                      layer.q_weight = new float[D_MODEL * D_MODEL]();
                      layer.q_bias = new float[D_MODEL]();
                      layer.k_weight = new float[D_MODEL * D_MODEL]();
                      layer.k_bias = new float[D_MODEL]();
                      layer.v_weight = new float[D_MODEL * D_MODEL]();
                      layer.v_bias = new float[D_MODEL]();
                      layer.out_weight = new float[D_MODEL * D_MODEL]();
                      layer.out_bias = new float[D_MODEL]();
                      
                      layer.ff1_weight = new float[D_MODEL * D_FF]();
                      layer.ff1_bias = new float[D_FF]();
                      layer.ff2_weight = new float[D_FF * D_MODEL]();
                      layer.ff2_bias = new float[D_MODEL]();
                      
                      layer.ln1_gamma = new float[D_MODEL]();
                      layer.ln1_beta = new float[D_MODEL]();
                      layer.ln2_gamma = new float[D_MODEL]();
                      layer.ln2_beta = new float[D_MODEL]();
                      
                      layer.q_weight_grad = new float[D_MODEL * D_MODEL]();
                      layer.q_bias_grad = new float[D_MODEL]();
                      layer.k_weight_grad = new float[D_MODEL * D_MODEL]();
                      layer.k_bias_grad = new float[D_MODEL]();
                      layer.v_weight_grad = new float[D_MODEL * D_MODEL]();
                      layer.v_bias_grad = new float[D_MODEL]();
                      layer.out_weight_grad = new float[D_MODEL * D_MODEL]();
                      layer.out_bias_grad = new float[D_MODEL]();
                      layer.ff1_weight_grad = new float[D_MODEL * D_FF]();
                      layer.ff1_bias_grad = new float[D_FF]();
                      layer.ff2_weight_grad = new float[D_FF * D_MODEL]();
                      layer.ff2_bias_grad = new float[D_MODEL]();
                      layer.ln1_gamma_grad = new float[D_MODEL]();
                      layer.ln1_beta_grad = new float[D_MODEL]();
                      layer.ln2_gamma_grad = new float[D_MODEL]();
                      layer.ln2_beta_grad = new float[D_MODEL]();
                      
                      layer.q_weight_m = new float[D_MODEL * D_MODEL]();
                      layer.q_bias_m = new float[D_MODEL]();
                      layer.k_weight_m = new float[D_MODEL * D_MODEL]();
                      layer.k_bias_m = new float[D_MODEL]();
                      layer.v_weight_m = new float[D_MODEL * D_MODEL]();
                      layer.v_bias_m = new float[D_MODEL]();
                      layer.out_weight_m = new float[D_MODEL * D_MODEL]();
                      layer.out_bias_m = new float[D_MODEL]();
                      layer.ff1_weight_m = new float[D_MODEL * D_FF]();
                      layer.ff1_bias_m = new float[D_FF]();
                      layer.ff2_weight_m = new float[D_FF * D_MODEL]();
                      layer.ff2_bias_m = new float[D_MODEL]();
                      layer.ln1_gamma_m = new float[D_MODEL]();
                      layer.ln1_beta_m = new float[D_MODEL]();
                      layer.ln2_gamma_m = new float[D_MODEL]();
                      layer.ln2_beta_m = new float[D_MODEL]();
                      
                      layer.q_weight_v = new float[D_MODEL * D_MODEL]();
                      layer.q_bias_v = new float[D_MODEL]();
                      layer.k_weight_v = new float[D_MODEL * D_MODEL]();
                      layer.k_bias_v = new float[D_MODEL]();
                      layer.v_weight_v = new float[D_MODEL * D_MODEL]();
                      layer.v_bias_v = new float[D_MODEL]();
                      layer.out_weight_v = new float[D_MODEL * D_MODEL]();
                      layer.out_bias_v = new float[D_MODEL]();
                      layer.ff1_weight_v = new float[D_MODEL * D_FF]();
                      layer.ff1_bias_v = new float[D_FF]();
                      layer.ff2_weight_v = new float[D_FF * D_MODEL]();
                      layer.ff2_bias_v = new float[D_MODEL]();
                      layer.ln1_gamma_v = new float[D_MODEL]();
                      layer.ln1_beta_v = new float[D_MODEL]();
                      layer.ln2_gamma_v = new float[D_MODEL]();
                      layer.ln2_beta_v = new float[D_MODEL]();
                  }
                  
                  weights.final_ln_gamma = new float[D_MODEL]();
                  weights.final_ln_beta = new float[D_MODEL]();
                  weights.output_weight = new float[D_MODEL * VOCAB_SIZE]();
                  weights.output_bias = new float[VOCAB_SIZE]();
                  
                  weights.final_ln_gamma_grad = new float[D_MODEL]();
                  weights.final_ln_beta_grad = new float[D_MODEL]();
                  weights.output_weight_grad = new float[D_MODEL * VOCAB_SIZE]();
                  weights.output_bias_grad = new float[VOCAB_SIZE]();
                  
                  weights.final_ln_gamma_m = new float[D_MODEL]();
                  weights.final_ln_beta_m = new float[D_MODEL]();
                  weights.output_weight_m = new float[D_MODEL * VOCAB_SIZE]();
                  weights.output_bias_m = new float[VOCAB_SIZE]();
                  
                  weights.final_ln_gamma_v = new float[D_MODEL]();
                  weights.final_ln_beta_v = new float[D_MODEL]();
                  weights.output_weight_v = new float[D_MODEL * VOCAB_SIZE]();
                  weights.output_bias_v = new float[VOCAB_SIZE]();
              }
              
              void initialize_weights() {
                  auto init_xavier = [](float* arr, int fan_in, int fan_out) {
                      float limit = sqrtf(6.0f / (fan_in + fan_out));
                      for (int i = 0; i < fan_in * fan_out; i++) {
                          arr[i] = ((rand() % 20000) / 10000.0f - 1.0f) * limit;
                      }
                  };
                  
                  init_xavier(weights.token_embedding, VOCAB_SIZE, D_MODEL);
                  init_xavier(weights.pos_embedding, MAX_SEQ_LEN, D_MODEL);
                  
                  for (int l = 0; l < N_LAYERS; l++) {
                      auto& layer = weights.layers[l];
                      init_xavier(layer.q_weight, D_MODEL, D_MODEL);
                      init_xavier(layer.k_weight, D_MODEL, D_MODEL);
                      init_xavier(layer.v_weight, D_MODEL, D_MODEL);
                      init_xavier(layer.out_weight, D_MODEL, D_MODEL);
                      init_xavier(layer.ff1_weight, D_MODEL, D_FF);
                      init_xavier(layer.ff2_weight, D_FF, D_MODEL);
                      
                      for (int i = 0; i < D_MODEL; i++) {
                          layer.ln1_gamma[i] = 1.0f;
                          layer.ln2_gamma[i] = 1.0f;
                      }
                  }
                  
                  for (int i = 0; i < D_MODEL; i++) {
                      weights.final_ln_gamma[i] = 1.0f;
                  }
                  
                  init_xavier(weights.output_weight, D_MODEL, VOCAB_SIZE);
              }
              
              void zero_gradients() {
                  memset(weights.token_embedding_grad, 0, VOCAB_SIZE * D_MODEL * sizeof(float));
                  memset(weights.pos_embedding_grad, 0, MAX_SEQ_LEN * D_MODEL * sizeof(float));
                  
                  for (int l = 0; l < N_LAYERS; l++) {
                      auto& layer = weights.layers[l];
                      memset(layer.q_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.q_bias_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.k_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.k_bias_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.v_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.v_bias_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.out_weight_grad, 0, D_MODEL * D_MODEL * sizeof(float));
                      memset(layer.out_bias_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.ff1_weight_grad, 0, D_MODEL * D_FF * sizeof(float));
                      memset(layer.ff1_bias_grad, 0, D_FF * sizeof(float));
                      memset(layer.ff2_weight_grad, 0, D_FF * D_MODEL * sizeof(float));
                      memset(layer.ff2_bias_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.ln1_gamma_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.ln1_beta_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.ln2_gamma_grad, 0, D_MODEL * sizeof(float));
                      memset(layer.ln2_beta_grad, 0, D_MODEL * sizeof(float));
                  }
                  
                  memset(weights.final_ln_gamma_grad, 0, D_MODEL * sizeof(float));
                  memset(weights.final_ln_beta_grad, 0, D_MODEL * sizeof(float));
                  memset(weights.output_weight_grad, 0, D_MODEL * VOCAB_SIZE * sizeof(float));
                  memset(weights.output_bias_grad, 0, VOCAB_SIZE * sizeof(float));
              }
              
              void adam_update(float* param, float* grad, float* m, float* v, int size) {
                  training_steps++;
                  float lr_t = LEARNING_RATE * sqrtf(1.0f - powf(beta2, training_steps)) / (1.0f - powf(beta1, training_steps));
                  
                  for (int i = 0; i < size; i++) {
                      float g = grad[i];
                      if (g > GRAD_CLIP) g = GRAD_CLIP;
                      if (g < -GRAD_CLIP) g = -GRAD_CLIP;
                      
                      m[i] = beta1 * m[i] + (1.0f - beta1) * g;
                      v[i] = beta2 * v[i] + (1.0f - beta2) * g * g;
                      
                      param[i] -= lr_t * (m[i] / (sqrtf(v[i]) + EPSILON) + WEIGHT_DECAY * param[i]);
                  }
              }
              
              void update_weights() {
                  adam_update(weights.token_embedding, weights.token_embedding_grad, weights.token_embedding_m, weights.token_embedding_v, VOCAB_SIZE * D_MODEL);
                  adam_update(weights.pos_embedding, weights.pos_embedding_grad, weights.pos_embedding_m, weights.pos_embedding_v, MAX_SEQ_LEN * D_MODEL);
                  
                  for (int l = 0; l < N_LAYERS; l++) {
                      auto& layer = weights.layers[l];
                      adam_update(layer.q_weight, layer.q_weight_grad, layer.q_weight_m, layer.q_weight_v, D_MODEL * D_MODEL);
                      adam_update(layer.q_bias, layer.q_bias_grad, layer.q_bias_m, layer.q_bias_v, D_MODEL);
                      adam_update(layer.k_weight, layer.k_weight_grad, layer.k_weight_m, layer.k_weight_v, D_MODEL * D_MODEL);
                      adam_update(layer.k_bias, layer.k_bias_grad, layer.k_bias_m, layer.k_bias_v, D_MODEL);
                      adam_update(layer.v_weight, layer.v_weight_grad, layer.v_weight_m, layer.v_weight_v, D_MODEL * D_MODEL);
                      adam_update(layer.v_bias, layer.v_bias_grad, layer.v_bias_m, layer.v_bias_v, D_MODEL);
                      adam_update(layer.out_weight, layer.out_weight_grad, layer.out_weight_m, layer.out_weight_v, D_MODEL * D_MODEL);
                      adam_update(layer.out_bias, layer.out_bias_grad, layer.out_bias_m, layer.out_bias_v, D_MODEL);
                      adam_update(layer.ff1_weight, layer.ff1_weight_grad, layer.ff1_weight_m, layer.ff1_weight_v, D_MODEL * D_FF);
                      adam_update(layer.ff1_bias, layer.ff1_bias_grad, layer.ff1_bias_m, layer.ff1_bias_v, D_FF);
                      adam_update(layer.ff2_weight, layer.ff2_weight_grad, layer.ff2_weight_m, layer.ff2_weight_v, D_FF * D_MODEL);
                      adam_update(layer.ff2_bias, layer.ff2_bias_grad, layer.ff2_bias_m, layer.ff2_bias_v, D_MODEL);
                      adam_update(layer.ln1_gamma, layer.ln1_gamma_grad, layer.ln1_gamma_m, layer.ln1_gamma_v, D_MODEL);
                      adam_update(layer.ln1_beta, layer.ln1_beta_grad, layer.ln1_beta_m, layer.ln1_beta_v, D_MODEL);
                      adam_update(layer.ln2_gamma, layer.ln2_gamma_grad, layer.ln2_gamma_m, layer.ln2_gamma_v, D_MODEL);
                      adam_update(layer.ln2_beta, layer.ln2_beta_grad, layer.ln2_beta_m, layer.ln2_beta_v, D_MODEL);
                  }
                  
                  adam_update(weights.final_ln_gamma, weights.final_ln_gamma_grad, weights.final_ln_gamma_m, weights.final_ln_gamma_v, D_MODEL);
                  adam_update(weights.final_ln_beta, weights.final_ln_beta_grad, weights.final_ln_beta_m, weights.final_ln_beta_v, D_MODEL);
                  adam_update(weights.output_weight, weights.output_weight_grad, weights.output_weight_m, weights.output_weight_v, D_MODEL * VOCAB_SIZE);
                  adam_update(weights.output_bias, weights.output_bias_grad, weights.output_bias_m, weights.output_bias_v, VOCAB_SIZE);
              }
              
              float train_step(const int* input_ids, const int* target_ids, int seq_len) {
                  zero_gradients();
                  
                  static float hidden[MAX_SEQ_LEN * D_MODEL];
                  static float logits[VOCAB_SIZE];
                  
                  for (int i = 0; i < seq_len; i++) {
                      int token_id = input_ids[i] % VOCAB_SIZE;
                      for (int j = 0; j < D_MODEL; j++) {
                          hidden[i * D_MODEL + j] = weights.token_embedding[token_id * D_MODEL + j] + weights.pos_embedding[i * D_MODEL + j];
                      }
                  }
                  
                  float loss = 0.0f;
                  
                  for (int pos = 0; pos < seq_len - 1; pos++) {
                      int target = target_ids[pos] % VOCAB_SIZE;
                      
                      matmul_neon(&hidden[pos * D_MODEL], weights.output_weight, logits, 1, VOCAB_SIZE, D_MODEL);
                      for (int i = 0; i < VOCAB_SIZE; i++) {
                          logits[i] += weights.output_bias[i];
                      }
                      softmax_neon(logits, VOCAB_SIZE);
                      
                      loss -= logf(logits[target] + EPSILON);
                      
                      for (int i = 0; i < VOCAB_SIZE; i++) {
                          float grad = logits[i];
                          if (i == target) grad -= 1.0f;
                          
                          weights.output_bias_grad[i] += grad;
                          for (int j = 0; j < D_MODEL; j++) {
                              weights.output_weight_grad[j * VOCAB_SIZE + i] += grad * hidden[pos * D_MODEL + j];
                          }
                      }
                  }
                  
                  update_weights();
                  return loss / (seq_len - 1);
              }
              
              int generate_token(const int* input_ids, int seq_len) {
                  static float hidden[MAX_SEQ_LEN * D_MODEL];
                  static float logits[VOCAB_SIZE];
                  
                  for (int i = 0; i < seq_len; i++) {
                      int token_id = input_ids[i] % VOCAB_SIZE;
                      for (int j = 0; j < D_MODEL; j++) {
                          hidden[i * D_MODEL + j] = weights.token_embedding[token_id * D_MODEL + j] + weights.pos_embedding[i * D_MODEL + j];
                      }
                  }
                  
                  matmul_neon(&hidden[(seq_len - 1) * D_MODEL], weights.output_weight, logits, 1, VOCAB_SIZE, D_MODEL);
                  for (int i = 0; i < VOCAB_SIZE; i++) {
                      logits[i] += weights.output_bias[i];
                  }
                  softmax_neon(logits, VOCAB_SIZE);
                  
                  int top_indices[50];
                  float top_probs[50];
                  for (int i = 0; i < 50; i++) {
                      top_indices[i] = i;
                      top_probs[i] = logits[i];
                  }
                  
                  for (int i = 50; i < VOCAB_SIZE; i++) {
                      for (int j = 0; j < 50; j++) {
                          if (logits[i] > top_probs[j]) {
                              for (int k = 49; k > j; k--) {
                                  top_probs[k] = top_probs[k-1];
                                  top_indices[k] = top_indices[k-1];
                              }
                              top_probs[j] = logits[i];
                              top_indices[j] = i;
                              break;
                          }
                      }
                  }
                  
                  float temperature = 0.7f;
                  float sum = 0.0f;
                  for (int i = 0; i < 50; i++) {
                      top_probs[i] = powf(top_probs[i], 1.0f / temperature);
                      sum += top_probs[i];
                  }
                  
                  float r = ((rand() % 10000) / 10000.0f) * sum;
                  float cumsum = 0.0f;
                  for (int i = 0; i < 50; i++) {
                      cumsum += top_probs[i];
                      if (r < cumsum) return top_indices[i];
                  }
                  
                  return top_indices[0];
              }
          };
          
          #endif
          EOF
          
