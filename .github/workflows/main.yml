name: ENJOER_ULTRA_V18_FIXED
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Init Folders
        run: |
          mkdir -p app/src/main/cpp app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout app/src/main/res/values app/src/main/res/drawable

      - name: Write C++ Engine
        run: |
          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <vector>
          #include <cmath>
          #include <algorithm>

          struct Engine {
              float x=0, y=1, z=5, rx=0, ry=0, vy=0;
              float walkTime = 0;
              float handBobX = 0, handBobY = 0;
              bool grounded = true;
          } e;

          extern "C" JNIEXPORT jfloatArray JNICALL
          Java_com_enjoer_game_MainActivity_tick(JNIEnv* env, jobject, jfloat jx, jfloat jy, jboolean jump, jfloat dx, jfloat dy) {
              e.ry += dx * 0.15f;
              e.rx = std::max(-85.0f, std::min(85.0f, e.rx + dy * 0.15f));
              if (jump && e.grounded) { e.vy = 0.22f; e.grounded = false; }
              e.vy -= 0.012f;
              e.y += e.vy;
              if (e.y <= 1.0f) { e.y = 1.0f; e.vy = 0; e.grounded = true; }
              float moveLen = sqrt(jx*jx + jy*jy);
              if (moveLen > 0.1f && e.grounded) {
                  e.walkTime += 0.18f;
                  e.handBobX = sin(e.walkTime * 0.5f) * 0.04f;
                  e.handBobY = abs(cos(e.walkTime)) * 0.025f;
              } else {
                  e.walkTime *= 0.5f; e.handBobX *= 0.8f; e.handBobY *= 0.8f;
              }
              float rad = e.ry * M_PI / 180.0f;
              e.x += (sin(rad) * jy + cos(rad) * jx) * 0.08f;
              e.z += (-cos(rad) * jy + sin(rad) * jx) * 0.08f;
              float data[8] = {e.x, e.y, e.z, e.rx, e.ry, e.handBobX, e.handBobY, e.vy};
              jfloatArray res = env->NewFloatArray(8);
              env->SetFloatArrayRegion(res, 0, 8, data);
              return res;
          }
          EOF

          echo "cmake_minimum_required(VERSION 3.22.1)
          project(enjoer_v18)
          add_library(enjoer_v18 SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(enjoer_v18 \${log-lib})" > app/src/main/cpp/CMakeLists.txt

      - name: Write Renderer
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.*;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private int prg; private FloatBuffer vB;
              private float[] proj=new float[16], view=new float[16], mod=new float[16];
              public float pX, pY, pZ, rX, rY, bX, bY, vY;

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="#version 300 es\nlayout(location=0)in vec4 aP;uniform mat4 uM;out vec3 vP;void main(){vP=aP.xyz;gl_Position=uM*aP;}";
                  String fs="#version 300 es\nprecision highp float;in vec3 vP;uniform vec4 uC;out vec4 fC;void main(){fC=vec4(uC.rgb*(0.8+vP.y*0.2),1.0);}";
                  int vsh=GLES30.glCreateShader(35633); GLES30.glShaderSource(vsh,vs); GLES30.glCompileShader(vsh);
                  int fsh=GLES30.glCreateShader(35632); GLES30.glShaderSource(fsh,fs); GLES30.glCompileShader(fsh);
                  prg=GLES30.glCreateProgram(); GLES30.glAttachShader(prg,vsh); GLES30.glAttachShader(prg,fsh); GLES30.glLinkProgram(prg);
                  float[] v = {-0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,0.5f,
                               -0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,-0.5f,
                               -0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f,
                               -0.5f,-0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,-0.5f,0.5f, -0.5f,-0.5f,0.5f,
                               -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,0.5f,0.5f, -0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f,
                                0.5f,0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f};
                  vB=ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(v); vB.position(0);
              }
              @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,75,(float)w/h,0.01f,100f); }
              @Override public void onDrawFrame(GL10 gl) {
                  GLES30.glClearColor(0, 0, 0, 1); GLES30.glClear(16640);
                  GLES30.glUseProgram(prg);
                  int uM=GLES30.glGetUniformLocation(prg,"uM"), uC=GLES30.glGetUniformLocation(prg,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vB); GLES30.glEnableVertexAttribArray(0);
                  Matrix.setIdentityM(view,0); Matrix.rotateM(view,0,rX,1,0,0); Matrix.rotateM(view,0,rY,0,1,0); Matrix.translateM(view,0,-pX,-pY,-pZ);
                  for(int x=-4;x<=4;x++) for(int z=-4;z<=4;z++) {
                      Matrix.setIdentityM(mod,0); Matrix.translateM(mod,0,x,0,z); draw(uM,uC,mod,0.1f,0.1f,0.2f);
                  }
                  GLES30.glClear(GLES30.GL_DEPTH_BUFFER_BIT);
                  Matrix.setIdentityM(view,0);
                  Matrix.setIdentityM(mod,0); Matrix.translateM(mod,0,-0.45f+bX, -0.4f+bY-(vY*0.15f), -0.7f);
                  Matrix.scaleM(mod,0,0.12f,0.12f,0.4f); draw(uM,uC,mod,0.8f,0.6f,0.5f);
                  Matrix.setIdentityM(mod,0); Matrix.translateM(mod,0,0.45f-bX, -0.4f+bY-(vY*0.15f), -0.7f);
                  Matrix.scaleM(mod,0,0.12f,0.12f,0.4f); draw(uM,uC,mod,0.8f,0.6f,0.5f);
              }
              private void draw(int uM, int uC, float[] m, float r, float g, float b){
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0); Matrix.multiplyMM(mvp,0,mvp,0,m,0);
                  GLES30.glUniformMatrix4fv(uM,1,false,mvp,0); GLES30.glUniform4f(uC,r,g,b,1); GLES30.glDrawArrays(GLES30.GL_TRIANGLES,0,36);
              }
          }
          EOF

      - name: Write Activity & UI
        run: |
          cat <<'EOF' > app/src/main/res/drawable/btn_neon.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#000"/><corners android:radius="15dp"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gv" android:layout_width="match_parent" android:layout_height="match_parent"/>
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <FrameLayout android:id="@+id/pad" android:layout_width="120dp" android:layout_height="120dp" android:layout_alignParentBottom="true" android:layout_margin="30dp" android:background="@drawable/btn_neon">
                      <View android:id="@+id/stk" android:layout_width="45dp" android:layout_height="45dp" android:layout_gravity="center" android:background="@drawable/btn_neon" android:backgroundTint="#8800BFFF"/>
                  </FrameLayout>
                  <Button android:id="@+id/btn_j" android:layout_width="80dp" android:layout_height="80dp" android:text="UP" android:textColor="#00BFFF" android:layout_alignParentBottom="true" android:layout_alignParentRight="true" android:layout_margin="30dp" android:background="@drawable/btn_neon"/>
              </RelativeLayout>
          </FrameLayout>
          EOF
          cat <<'EOF' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.opengl.GLSurfaceView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("enjoer_v18"); }
              public native float[] tick(float jx, float jy, boolean jump, float dx, float dy);
              private GameRenderer ren; private float jX, jY, dX, dY, lx, ly;
              private int mId=-1, lId=-1; private boolean jump=false;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  GLSurfaceView gv = findViewById(R.id.gv);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer(); gv.setRenderer(ren);
                  gv.setOnTouchListener((v, e) -> {
                      int a=e.getActionMasked(), i=e.getActionIndex(), id=e.getPointerId(i);
                      if(a==0||a==5) {
                          if(e.getX(i)<v.getWidth()/2) mId=id; else { lId=id; lx=e.getX(i); ly=e.getY(i); }
                      } else if(a==2) {
                          for(int j=0; j<e.getPointerCount(); j++) {
                              int pId=e.getPointerId(j);
                              if(pId==mId) {
                                  float tx=e.getX(j)-200, ty=e.getY(j)-(v.getHeight()-200);
                                  float d=(float)Math.sqrt(tx*tx+ty*ty); if(d>55){tx*=55/d; ty*=55/d;}
                                  jX=tx/55; jY=-ty/55; findViewById(R.id.stk).setTranslationX(tx); findViewById(R.id.stk).setTranslationY(ty);
                              } else if(pId==lId) { dX=e.getX(j)-lx; dY=e.getY(j)-ly; lx=e.getX(j); ly=e.getY(j); }
                          }
                      } else if(a==1||a==6) {
                          if(id==mId){ mId=-1; jX=0; jY=0; findViewById(R.id.stk).setTranslationX(0); findViewById(R.id.stk).setTranslationY(0); }
                          else if(id==lId) lId=-1;
                      }
                      return true;
                  });
                  findViewById(R.id.btn_j).setOnClickListener(v -> jump=true);
                  final Handler h = new Handler(Looper.getMainLooper());
                  h.post(new Runnable(){public void run(){
                      float[] s = tick(jX, jY, jump, dX, dY);
                      jump=false; dX=0; dY=0;
                      ren.pX=s[0]; ren.pY=s[1]; ren.pZ=s[2]; ren.rX=s[3]; ren.rY=s[4];
                      ren.bX=s[5]; ren.bY=s[6]; ren.vY=s[7];
                      h.postDelayed(this, 16);
                  }});
              }
          }
          EOF

      - name: Configure Gradle & Manifest
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.game">
          <application android:label="EnjoerV18" android:theme="@style/Theme.AppCompat.NoActionBar">
          <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity></application></manifest>
          EOF
          
          # Настройка корневого build.gradle (ИСПРАВЛЕНО)
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          
          # Настройка app/build.gradle (ИСПРАВЛЕНО)
          cat <<'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt' } }
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_V18_Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
