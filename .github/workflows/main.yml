name: Build Mod Menu
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Обновили до v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Build with ndk-build
        run: |
          # Переходим в папку с кодом и запускаем сборку
          cd app/src/main/jni
          ndk-build

      - name: Upload Result
        uses: actions/upload-artifact@v4 # Тот самый фикс: заменили v3 на v4
        with:
          name: my-mod-library
          path: app/src/main/libs/
