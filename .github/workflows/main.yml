name: Fixed_Generator_Enjoer
on: [push, workflow_dispatch]

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch Logic and Fix Gradlew
        run: |
          # 1. Создаем рабочую копию
          cp build.txt build.yml

          # 2. ФИКС GRADLEW (чтобы билд не падал)
          sed -i '/.\/gradlew assembleDebug/i \          gradle wrapper --gradle-version 8.5' build.yml
          sed -i '/.\/gradlew assembleDebug/i \          chmod +x gradlew' build.yml

          # 3. ФИКС КНОПОК (Скрытие Delete и DeSelect)
          # Мы добавляем метод updateUI() в MainActivity и вызываем его при клике
          # Ищем закрывающую скобку onCreate и вставляем логику
          sed -i '/ren = new GameRenderer();/a \                  axisPanel = findViewById(R.id.axis_panel); \n                  btnDelete = findViewById(R.id.btn_delete); \n                  updateUI();' build.yml
          
          # Добавляем сам метод обновления UI перед концом класса
          sed -i '/public void onDrawFrame/i \              private void updateUI() { runOnUiThread(() -> { int vis = (ren.selectedIndex >= 0) ? View.VISIBLE : View.GONE; axisPanel.setVisibility(vis); btnDelete.setVisibility(vis); }); }' build.yml

          # 4. Убираем лишние символы
          sed -i 's/\r$//' build.yml

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Fixed_Enjoer_Workflow
          path: build.yml
