                                      s.objects.get(idx).name = input.getText().toString();
                                      saveAll();
                                      renderObjects();
                                  })
                                  .setNegativeButton("Cancel", null)
                                  .show();
                          } else {
                              s.objects.remove(idx);
                              saveAll();
                              renderObjects();
                          }
                      }).show();
              }

              private LinearLayout makeCard(){
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setBackgroundResource(R.drawable.bg_panel);
                  card.setPadding(dp(12), dp(12), dp(12), dp(12));
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  );
                  lp.topMargin = dp(10);
                  card.setLayoutParams(lp);
                  return card;
              }

              private TextView title(String s){
                  TextView tv = new TextView(this);
                  tv.setText(s);
                  tv.setTextSize(18f);
                  tv.setTextColor(Color.parseColor("#2E648F"));
                  tv.setTypeface(null, android.graphics.Typeface.BOLD);
                  return tv;
              }

              private TextView subtitle(String s){
                  TextView tv = new TextView(this);
                  tv.setText(s);
                  tv.setTextSize(13f);
                  tv.setTextColor(Color.parseColor("#5D88A8"));
                  return tv;
              }

              private int dp(int v){
                  return (int)(v * getResources().getDisplayMetrics().density);
              }
          }
