name: JsAI_2D_Studio_Background_Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Studio Structure
        run: |
          mkdir -p app/src/main/java/com/jsai/studio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # --- SETTINGS ---
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal(); maven { url "https://chaquo.com/maven" } }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url "https://chaquo.com/maven" } }
          }
          include ':app'
          EOF
          
          # --- ROOT BUILD.GRADLE ---
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); maven { url "https://chaquo.com/maven" } }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'com.chaquo.python:gradle:15.0.1'
              }
          }
          EOF

          # --- APP BUILD.GRADLE ---
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'com.chaquo.python'

          android {
              namespace 'com.jsai.studio'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.jsai.studio"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  ndk { abiFilters "arm64-v8a", "x86_64" }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }

          chaquopy {
              defaultConfig {
                  version = "3.10"
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # --- UI LAYOUT ---
          cat > app/src/main/res/layout/editor_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#1B1B1B">
              <LinearLayout android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="45dp" android:background="#2D2D2D" android:orientation="horizontal" android:padding="5dp">
                  <Button android:id="@+id/btnAdd" android:layout_width="45dp" android:layout_height="match_parent" android:text="+" android:backgroundTint="#00A2FF"/>
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  <Button android:id="@+id/tabScene" android:layout_width="70dp" android:layout_height="match_parent" android:text="SCENE" android:textSize="8sp"/>
                  <Button android:id="@+id/tabScript" android:layout_width="70dp" android:layout_height="match_parent" android:text="PYTHON" android:textSize="8sp" android:layout_marginLeft="5dp"/>
                  <Button android:id="@+id/btnPlay" android:layout_width="80dp" android:layout_height="match_parent" android:text="PLAY" android:backgroundTint="#00CC44" android:layout_marginLeft="15dp"/>
              </LinearLayout>
              <LinearLayout android:id="@+id/rightSidebar" android:layout_width="160dp" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_alignParentRight="true" android:background="#252525" android:orientation="vertical">
                  <TextView android:layout_width="match_parent" android:layout_height="25dp" android:text=" Explorer" android:textColor="#FFF" android:background="#333" android:gravity="center_vertical" android:textSize="10sp"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"><LinearLayout android:id="@+id/explorer" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"/></ScrollView>
                  <TextView android:layout_width="match_parent" android:layout_height="25dp" android:text=" Properties" android:textColor="#FFF" android:background="#333" android:gravity="center_vertical" android:textSize="10sp"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1.5" android:background="#202020"><LinearLayout android:id="@+id/properties" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="5dp"/></ScrollView>
              </LinearLayout>
              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_toLeftOf="@id/rightSidebar">
                  <com.jsai.studio.GameView android:id="@+id/gameView" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#121212"/>
                  <EditText android:id="@+id/codeEditor" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#1E1E1E" android:textColor="#D4D4D4" android:fontFamily="monospace" android:gravity="top" android:padding="10dp" android:visibility="gone" android:text="part = Workspace.Find('Sprite 0')&#10;def update(dt):&#10;    if part:&#10;        part.x += 100 * dt&#10;        if part.x > 800: part.x = 0" />
              </FrameLayout>
          </RelativeLayout>
          EOF

          # --- JAVA CLASSES ---
          cat > app/src/main/java/com/jsai/studio/Instance.java << 'EOF'
          package com.jsai.studio;
          public class Instance {
              public String name, type;
              public float x=100, y=100, rotation=0, scale=1;
              public int color = 0xFF00A2FF;
              public Instance(String n, String t) { name=n; type=t; }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/GameView.java << 'EOF'
          package com.jsai.studio;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          public class GameView extends View {
              private Paint paint = new Paint();
              public GameView(Context context, AttributeSet attrs) { super(context, attrs); }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  for (Instance i : EngineCore.instances) {
                      if (i.type.equals("Sprite")) {
                          paint.setColor(i.color);
                          canvas.save();
                          canvas.translate(i.x, i.y);
                          canvas.rotate(i.rotation);
                          canvas.drawRect(-50 * i.scale, -50 * i.scale, 50 * i.scale, 50 * i.scale, paint);
                          canvas.restore();
                      }
                  }
                  invalidate();
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/GameService.java << 'EOF'
          package com.jsai.studio;
          import android.app.*;
          import android.content.Intent;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;
          public class GameService extends Service {
              private boolean running = true;
              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  createNotificationChannel();
                  Notification notification = new NotificationCompat.Builder(this, "game")
                          .setContentTitle("JsAI Studio").setContentText("Engine running").setSmallIcon(android.R.drawable.ic_media_play).build();
                  startForeground(1, notification);
                  new Thread(() -> {
                      long lastTime = System.currentTimeMillis();
                      while(running) {
                          long now = System.currentTimeMillis();
                          float dt = (now - lastTime) / 1000f; lastTime = now;
                          EngineCore.update(dt);
                          try { Thread.sleep(16); } catch (Exception e) {}
                      }
                  }).start();
                  return START_STICKY;
              }
              private void createNotificationChannel() {
                  NotificationChannel channel = new NotificationChannel("game", "Engine", NotificationManager.IMPORTANCE_LOW);
                  getSystemService(NotificationManager.class).createNotificationChannel(channel);
              }
              @Override public void onDestroy() { running = false; super.onDestroy(); }
              @Override public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EngineCore.java << 'EOF'
          package com.jsai.studio;
          import java.util.*; import com.chaquo.python.*;
          public class EngineCore {
              public static List<Instance> instances = new ArrayList<>();
              public static boolean isPlaying = false;
              private static PyObject pyUpdate = null;
              public static void startPython(String code) {
                  try {
                      Python py = Python.getInstance(); PyObject globals = py.getModule("builtins").callAttr("dict");
                      globals.put("Workspace", new Object() { 
                          public Instance Find(String n) { for(Instance i:instances) if(i.name.equals(n)) return i; return null; } 
                      });
                      py.getModule("builtins").callAttr("exec", code, globals);
                      pyUpdate = globals.get("update");
                  } catch(Exception e) { e.printStackTrace(); }
              }
              public static void update(float dt) {
                  if(!isPlaying) return;
                  if(pyUpdate != null) try { pyUpdate.call(dt); } catch(Exception e){}
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EditorActivity.java << 'EOF'
          package com.jsai.studio;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import com.chaquo.python.*;
          import com.chaquo.python.android.AndroidPlatform;
          public class EditorActivity extends Activity {
              LinearLayout explorer; EditText codeEd;
              protected void onCreate(Bundle b) {
                  super.onCreate(b); requestWindowFeature(1);
                  if(!Python.isStarted()) Python.start(new AndroidPlatform(this));
                  setContentView(R.layout.editor_main);
                  explorer = findViewById(R.id.explorer); codeEd = findViewById(R.id.codeEditor);
                  findViewById(R.id.btnAdd).setOnClickListener(v -> {
                      Instance i = new Instance("Sprite " + EngineCore.instances.size(), "Sprite");
                      EngineCore.instances.add(i); updateExplorer();
                  });
                  findViewById(R.id.btnPlay).setOnClickListener(v -> {
                      if(!EngineCore.isPlaying) {
                          EngineCore.startPython(codeEd.getText().toString());
                          EngineCore.isPlaying = true;
                          startForegroundService(new Intent(this, GameService.class));
                          ((Button)v).setText("STOP");
                      } else {
                          EngineCore.isPlaying = false;
                          stopService(new Intent(this, GameService.class));
                          ((Button)v).setText("PLAY");
                      }
                  });
                  findViewById(R.id.tabScript).setOnClickListener(v -> { findViewById(R.id.gameView).setVisibility(View.GONE); codeEd.setVisibility(View.VISIBLE); });
                  findViewById(R.id.tabScene).setOnClickListener(v -> { findViewById(R.id.gameView).setVisibility(View.VISIBLE); codeEd.setVisibility(View.GONE); });
              }
              private void updateExplorer() {
                  explorer.removeAllViews();
                  for(Instance i : EngineCore.instances) {
                      Button b = new Button(this); b.setText(i.name); b.setOnClickListener(v -> select(i));
                      explorer.addView(b);
                  }
              }
              private void select(Instance i) {
                  LinearLayout props = findViewById(R.id.properties); props.removeAllViews();
                  TextView t = new TextView(this); t.setText("Pos X: " + i.name); t.setTextColor(-1); props.addView(t);
                  SeekBar s = new SeekBar(this); s.setMax(1000); s.setProgress((int)i.x);
                  s.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      public void onProgressChanged(SeekBar sb, int p, boolean u) { i.x = p; }
                      public void onStartTrackingTouch(SeekBar sb) {} public void onStopTrackingTouch(SeekBar sb) {}
                  });
                  props.addView(s);
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application android:label="JsAI 2D Studio" android:theme="@android:style/Theme.NoTitleBar">
                  <service android:name=".GameService" android:foregroundServiceType="specialUse" android:exported="false" />
                  <activity android:name=".EditorActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle Build
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --build-cache --parallel --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI_2D_Studio_Background
          path: app/build/outputs/apk/debug/app-debug.apk
