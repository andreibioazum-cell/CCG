                  float r=.5f,g=.5f,b=.5f; if(t==1){r=.35f;g=.75f;b=.25f;}else if(t==2){r=.6f;g=.6f;b=.6f;}else if(t==3){r=.55f;g=.35f;b=.2f;}else if(t==4){r=.54f;g=.35f;b=.17f;}else if(t==5){r=.9f;g=.2f;b=.2f;}
