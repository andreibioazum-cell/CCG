name: Enjoer_Studio_Pro_Files_and_3D
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: '8.5' }

      - name: Create Engine
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- UI Редактора (Консоль и Сетка) ---
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
              <LinearLayout android:layout_width="320dp" android:layout_height="match_parent"
                  android:background="#DD000000" android:orientation="vertical" android:padding="12dp">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" 
                      android:text="ENJOER PRO ENGINE (3D & FILES)" android:textColor="#0F0" android:textStyle="bold"/>
                  <EditText android:id="@+id/js_input" android:layout_width="match_parent" android:layout_height="0dp"
                      android:layout_weight="1" android:gravity="top" android:hint="// context.saveLevel('sav1');\n// context.importModel('tree.obj', 0,0,0);" android:textColor="#FFF" android:background="#111" android:layout_marginTop="10dp"/>
                  <Button android:id="@+id/btn_run" android:layout_width="match_parent" android:layout_height="60dp" 
                      android:text="EXECUTE JAVA CODE" android:backgroundTint="#00FF00" android:textColor="#000"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # --- Парсер .OBJ моделей (Упрощенный) ---
          cat <<EOF > app/src/main/java/com/enjoer/game/ObjParser.java
          package com.enjoer.game;
          import java.io.*;
          import java.util.*;
          import java.nio.*;

          public class ObjParser {
              public static FloatBuffer parse(String filePath) throws IOException {
                  List<Float> vertices = new ArrayList<>();
                  BufferedReader br = new BufferedReader(new FileReader(filePath));
                  String line;
                  while ((line = br.readLine()) != null) {
                      if (line.startsWith("v ")) {
                          String[] parts = line.split(" +");
                          vertices.add(Float.parseFloat(parts[1]));
                          vertices.add(Float.parseFloat(parts[2]));
                          vertices.add(Float.parseFloat(parts[3]));
                      }
                  }
                  br.close();
                  FloatBuffer buffer = ByteBuffer.allocateDirect(vertices.size() * 4).order(ByteOrder.nativeOrder()).asFloatBuffer();
                  for (float v : vertices) buffer.put(v);
                  buffer.position(0);
                  return buffer;
              }
          }
          EOF

          # --- Рендерер с поддержкой 3D моделей и сетки ---
          cat <<EOF > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.*;
          import java.nio.FloatBuffer;
          import java.util.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public float pX=0, pY=2, pZ=5;
              public List<float[]> objects = new ArrayList<>(); // x,y,z, r,g,b (Блоки)
              public List<FloatBuffer> importedModels = new ArrayList<>(); // Кастомные 3D модели

              // Метод создания блока по сетке (Snapping)
              public void addGridBlock(float x, float y, float z, float r, float g, float b) {
                  objects.add(new float[]{(float)Math.round(x), (float)Math.round(y), (float)Math.round(z), r, g, b});
              }

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig c) { GLES30.glEnable(GLES30.GL_DEPTH_TEST); }
              @Override public void onSurfaceChanged(GL10 gl, int w, int h) { GLES30.glViewport(0,0,w,h); }
              @Override public void onDrawFrame(GL10 gl) {
                  GLES30.glClearColor(0.02f, 0.02f, 0.03f, 1);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  // Отрисовка пола, блоков и импортированных моделей...
              }
          }
          EOF

          # --- MainActivity с Full Java Access и Системой Сейвов ---
          # (Добавил GSON вручную через стрингу, чтобы не тянуть зависимости)
          cat <<EOF > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.os.Environment;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import org.mozilla.javascript.*;
          import java.io.*;
          import java.nio.FloatBuffer;

          public class MainActivity extends AppCompatActivity {
              public GameRenderer renderer;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  renderer = new GameRenderer();
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  gv.setRenderer(renderer);

                  findViewById(R.id.btn_run).setOnClickListener(v -> {
                      String code = ((EditText)findViewById(R.id.js_input)).getText().toString();
                      executeJava(code);
                  });
              }

              // --- Full Java Bridge API ---
              public void saveLevel(String saveName) {
                  File path = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOCUMENTS);
                  File file = new File(path, saveName + ".sav");
                  try (ObjectOutputStream oos = new ObjectOutputStream(new FileOutputStream(file))) {
                      oos.writeObject(renderer.objects);
                      Toast.makeText(this, "Уровень сохранен в Documents", Toast.LENGTH_SHORT).show();
                  } catch (IOException e) { Toast.makeText(this, "Ошибка сохранения", Toast.LENGTH_SHORT).show(); }
              }

              public void loadLevel(String saveName) {
                  File path = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOCUMENTS);
                  File file = new File(path, saveName + ".sav");
                  try (ObjectInputStream ois = new ObjectInputStream(new FileInputStream(file))) {
                      renderer.objects = (List<float[]>) ois.readObject();
                      Toast.makeText(this, "Уровень загружен", Toast.LENGTH_SHORT).show();
                  } catch (Exception e) { Toast.makeText(this, "Ошибка загрузки", Toast.LENGTH_SHORT).show(); }
              }

              public void importModel(String modelName, double x, double y, double z) {
                  File path = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS);
                  File file = new File(path, modelName);
                  try {
                      FloatBuffer modelBuffer = ObjParser.parse(file.getAbsolutePath());
                      renderer.importedModels.add(modelBuffer);
                      Toast.makeText(this, "Модель импортирована из Downloads", Toast.LENGTH_SHORT).show();
                  } catch (IOException e) { Toast.makeText(this, "Файл не найден в Downloads", Toast.LENGTH_SHORT).show(); }
              }

              private void executeJava(String code) {
                  Context rhino = Context.enter();
                  rhino.setOptimizationLevel(-1);
                  try {
                      Scriptable scope = rhino.initStandardObjects();
                      ScriptableObject.putProperty(scope, "renderer", Context.javaToJS(renderer, scope));
                      ScriptableObject.putProperty(scope, "context", Context.javaToJS(this, scope));
                      rhino.evaluateString(scope, code, "JavaModCore", 1, null);
                  } catch (Exception e) {
                      Toast.makeText(this, "Java Error: " + e.getMessage(), Toast.LENGTH_LONG).show();
                  } finally { Context.exit(); }
              }
          }
          EOF

          # --- Build Config ---
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 } }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.mozilla:rhino:1.7.14' 
          }
          EOF
          
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          
          # ПЕРМИШЕНЫ ДЛЯ ФАЙЛОВ
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <application android:label="Enjoer Pro Modder" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build Engine
        run: gradle assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Pro_Files_v1
          path: app/build/outputs/apk/debug/app-debug.apk
