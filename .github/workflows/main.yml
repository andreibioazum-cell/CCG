name: JsAI_Craft_V11_OpenGL46_GLOBAL_MMO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ШАГ 1: СНАЧАЛА СОЗДАЕМ ФАЙЛЫ ПРОЕКТА
      - name: Create Project Files
        run: |
          mkdir -p app/src/main/java/com/jsai/craft
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > app/src/main/res/drawable/joy_bg.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#12FFFFFF"/><stroke android:width="1.5dp" android:color="#20FFFFFF"/>
          </shape>
          EOF
          cat > app/src/main/res/drawable/joy_handle.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#50FFFFFF"/></shape>
          EOF
          cat > app/src/main/res/drawable/dot.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#FFFFFF"/></shape>
          EOF
          cat > app/src/main/res/drawable/btn_grass.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#59BF40"/></shape>
          EOF
          cat > app/src/main/res/drawable/btn_stone.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#999999"/></shape>
          EOF
          cat > app/src/main/res/drawable/btn_dirt.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#8B4513"/></shape>
          EOF

          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.jsai.craft'
              compileSdk 34
              defaultConfig { applicationId 'com.jsai.craft'; minSdk 24; targetSdk 34 }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1' 
              implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5'
          }
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:clipChildren="false" android:clipToPadding="false">
              <android.opengl.GLSurfaceView android:id="@+id/glView"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
              <View android:layout_width="3dp" android:layout_height="3dp" 
                  android:background="@drawable/dot" android:layout_centerInParent="true" />
              
              <TextView android:id="@+id/tvOnline" android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_margin="10dp" android:text="Поиск серверов..." android:textColor="#00FF00" android:textSize="18sp"
                  android:shadowColor="#000" android:shadowDx="2" android:shadowDy="2" android:shadowRadius="2" />
              
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_alignParentTop="true" android:layout_centerHorizontal="true"
                  android:layout_marginTop="10dp" android:orientation="horizontal">
                  <Button android:id="@+id/btnGrass" android:layout_width="50dp" android:layout_height="50dp" 
                      android:background="@drawable/btn_grass" android:text="1" android:textColor="#FFF"/>
                  <Button android:id="@+id/btnStone" android:layout_width="50dp" android:layout_height="50dp" 
                      android:background="@drawable/btn_stone" android:text="2" android:textColor="#FFF" android:layout_marginLeft="5dp"/>
                  <Button android:id="@+id/btnDirt" android:layout_width="50dp" android:layout_height="50dp" 
                      android:background="@drawable/btn_dirt" android:text="3" android:textColor="#FFF" android:layout_marginLeft="5dp"/>
              </LinearLayout>

              <FrameLayout android:id="@+id/joyZone"
                  android:layout_width="90dp" android:layout_height="90dp"
                  android:layout_alignParentBottom="true" android:layout_margin="35dp"
                  android:background="@drawable/joy_bg" android:clipChildren="false">
                  <View android:id="@+id/joyHandle"
                      android:layout_width="34dp" android:layout_height="34dp"
                      android:layout_gravity="center" android:background="@drawable/joy_handle"/>
              </FrameLayout>
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_alignParentBottom="true" android:layout_alignParentRight="true"
                  android:layout_margin="10dp" android:orientation="vertical">
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content">
                      <Button android:id="@+id/btnBreak" android:layout_width="65dp" android:layout_height="65dp" android:text="BRK" />
                      <Button android:id="@+id/btnPlace" android:layout_width="65dp" android:layout_height="65dp" android:text="PLC" android:layout_marginLeft="5dp" />
                  </LinearLayout>
                  <Button android:id="@+id/btnJump" android:layout_width="135dp" android:layout_height="70dp" android:text="JUMP" android:layout_marginTop="5dp" />
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat > app/src/main/java/com/jsai/craft/GlobalManager.java << 'EOF'
          package com.jsai.craft;
          import org.eclipse.paho.client.mqttv3.*;
          import org.eclipse.paho.client.mqttv3.persist.MemoryPersistence;
          import java.util.concurrent.ConcurrentHashMap;

          public class GlobalManager {
              public static ConcurrentHashMap<String, float[]> peers = new ConcurrentHashMap<>();
              public static String myId = java.util.UUID.randomUUID().toString().substring(0, 6);
              private float curX, curY, curZ;
              private MqttClient client;
              public static boolean isConnected = false;

              public GlobalManager(CraftRenderer renderer) {
                  new Thread(() -> {
                      while(true) {
                          try {
                              client = new MqttClient("ssl://broker.hivemq.com:8883", "JsAICraft_" + myId, new MemoryPersistence());
                              MqttConnectOptions opts = new MqttConnectOptions();
                              opts.setCleanSession(true);
                              opts.setConnectionTimeout(10);
                              opts.setKeepAliveInterval(20);
                              
                              client.connect(opts);
                              isConnected = true;
                              
                              client.setCallback(new MqttCallback() {
                                  public void connectionLost(Throwable cause) { isConnected = false; }
                                  public void messageArrived(String topic, MqttMessage msg) {
                                      try {
                                          String[] parts = new String(msg.getPayload()).split(",");
                                          if(parts[1].equals(myId)) return;
                                          
                                          if(parts[0].equals("P")) { 
                                              peers.put(parts[1], new float[]{
                                                  Float.parseFloat(parts[2]), Float.parseFloat(parts[3]), Float.parseFloat(parts[4]), System.currentTimeMillis()
                                              });
                                          } else if(parts[0].equals("B")) { 
                                              renderer.setBRemote(Integer.parseInt(parts[2]), Integer.parseInt(parts[3]), Integer.parseInt(parts[4]), Byte.parseByte(parts[5]));
                                          }
                                      } catch(Exception e) {}
                                  }
                                  public void deliveryComplete(IMqttDeliveryToken token) {}
                              });
                              
                              client.subscribe("jsaicraft/global/v11/#");
                              
                              while(client.isConnected()) {
                                  Thread.sleep(80); 
                                  String msg = "P," + myId + "," + curX + "," + curY + "," + curZ;
                                  client.publish("jsaicraft/global/v11/pos", msg.getBytes(), 0, false);
                                  
                                  long now = System.currentTimeMillis();
                                  peers.entrySet().removeIf(e -> now - e.getValue()[3] > 3000);
                              }
                          } catch(Exception e) {
                              isConnected = false;
                              try { Thread.sleep(3000); } catch(Exception ignored) {}
                          }
                      }
                  }).start();
              }

              public void updatePos(float x, float y, float z) { curX = x; curY = y; curZ = z; }
              
              public void sendBlock(int x, int y, int z, byte type) {
                  new Thread(() -> {
                      try {
                          if(client != null && client.isConnected()) {
                              String msg = "B," + myId + "," + x + "," + y + "," + z + "," + type;
                              client.publish("jsaicraft/global/v11/blocks", msg.getBytes(), 0, false);
                          }
                      } catch(Exception e) {}
                  }).start();
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/craft/MainActivity.java << 'EOF'
          package com.jsai.craft;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.*;
          import android.widget.*;
          public class MainActivity extends Activity {
              private GameView gv;
              private Button btnGrass, btnStone, btnDirt;
              private TextView tvOnline;
              
              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  setContentView(R.layout.activity_main);
                  
                  tvOnline = findViewById(R.id.tvOnline);
                  Handler h = new Handler();
                  h.post(new Runnable() {
                      public void run() {
                          if(GlobalManager.isConnected) {
                              tvOnline.setText("ГЛОБАЛЬНЫЙ ОНЛАЙН: " + (GlobalManager.peers.size() + 1));
                              tvOnline.setTextColor(0xFF00FF00);
                          } else {
                              tvOnline.setText("Подключение к серверу...");
                              tvOnline.setTextColor(0xFFFF0000);
                          }
                          h.postDelayed(this, 1000);
                      }
                  });
                  
                  gv = new GameView(this, findViewById(R.id.glView));
                  
                  findViewById(R.id.btnJump).setOnClickListener(v -> gv.renderer.jump());
                  findViewById(R.id.btnBreak).setOnTouchListener((v, e) -> {
                      if(e.getAction() == MotionEvent.ACTION_DOWN) gv.renderer.startBreak();
                      else if(e.getAction() == MotionEvent.ACTION_UP) gv.renderer.stopBreak();
                      return true;
                  });
                  findViewById(R.id.btnPlace).setOnClickListener(v -> gv.renderer.place());
                  
                  btnGrass = findViewById(R.id.btnGrass);
                  btnStone = findViewById(R.id.btnStone);
                  btnDirt = findViewById(R.id.btnDirt);
                  
                  btnGrass.setOnClickListener(v -> selectBlock(1));
                  btnStone.setOnClickListener(v -> selectBlock(2));
                  btnDirt.setOnClickListener(v -> selectBlock(3));
                  
                  selectBlock(1);
                  
                  View jZ = findViewById(R.id.joyZone), jH = findViewById(R.id.joyHandle);
                  jZ.setOnTouchListener((v, e) -> {
                      if(e.getAction() == MotionEvent.ACTION_UP) {
                          jH.setTranslationX(0); jH.setTranslationY(0); gv.renderer.setMove(0, 0);
                      } else {
                          float r = v.getWidth()/2f, dx = e.getX()-r, dy = e.getY()-r, d = (float)Math.sqrt(dx*dx+dy*dy);
                          if(d>r) { dx=dx/d*r; dy=dy/d*r; }
                          jH.setTranslationX(dx); jH.setTranslationY(dy);
                          gv.renderer.setMove(dx/r, -dy/r);
                      }
                      return true;
                  });
              }
              
              private void selectBlock(int type) {
                  gv.renderer.selectedBlock = (byte)type;
                  btnGrass.setAlpha(type==1?1f:0.5f);
                  btnStone.setAlpha(type==2?1f:0.5f);
                  btnDirt.setAlpha(type==3?1f:0.5f);
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/craft/GameView.java << 'EOF'
          package com.jsai.craft;
          import android.content.Context;
          import android.opengl.GLSurfaceView;
          import android.view.MotionEvent;
          public class GameView {
              public CraftRenderer renderer;
              private float lx, ly;
              private boolean isPanning = false;

              public GameView(Context ctx, GLSurfaceView gl) {
                  gl.setEGLContextClientVersion(3);
                  gl.setEGLConfigChooser(8, 8, 8, 8, 16, 0);
                  renderer = new CraftRenderer();
                  gl.setRenderer(renderer);
                  gl.setRenderMode(GLSurfaceView.RENDERMODE_CONTINUOUSLY);
                  gl.setOnTouchListener((v, e) -> {
                      float x = e.getX(), y = e.getY();
                      switch(e.getAction()) {
                          case MotionEvent.ACTION_DOWN:
                              if(x > v.getWidth()/2f) { isPanning = true; lx = x; ly = y; }
                              break;
                          case MotionEvent.ACTION_MOVE:
                              if(isPanning) {
                                  renderer.yaw -= (x - lx) * 0.3f;
                                  renderer.pitch += (y - ly) * 0.3f;
                                  if(renderer.pitch > 89) renderer.pitch = 89;
                                  if(renderer.pitch < -89) renderer.pitch = -89;
                                  lx = x; ly = y;
                              }
                              break;
                          case MotionEvent.ACTION_UP:
                              isPanning = false;
                              break;
                      }
                      return true;
                  });
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/craft/CraftRenderer.java << 'EOF'
          package com.jsai.craft;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class CraftRenderer implements GLSurfaceView.Renderer {
              public float yaw = 0, pitch = 0;
              private float px = 64, py = 25, pz = 64, vy = 0, mvX = 0, mvZ = 0;
              private final float[] proj = new float[16], view = new float[16], mvp = new float[16];
              private Block block;
              private byte[] world = new byte[128 * 64 * 128];
              private int[] sel = null, plc = null;
              public byte selectedBlock = 1;
              public GlobalManager net;
              
              public boolean isBreaking = false;
              public float breakProgress = 0;
              private long breakStart = 0;
              private static final long BREAK_TIME = 800;
              
              private int[] lastPlaced = null;
              private long placeStart = 0;
              private static final long PLACE_TIME = 400;
              
              private int lastChunkX = -999, lastChunkZ = -999;
              private int[][] visibleBlocks = new int[15000][3];
              private int visibleCount = 0;

              public void onSurfaceCreated(GL10 g, EGLConfig c) {
                  GLES30.glClearColor(0.5f, 0.8f, 1.0f, 1.0f);
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  GLES30.glEnable(GLES30.GL_CULL_FACE);
                  GLES30.glDepthFunc(GLES30.GL_LEQUAL);
                  GLES30.glCullFace(GLES30.GL_BACK);
                  GLES30.glEnable(GLES30.GL_BLEND);
                  GLES30.glBlendFunc(GLES30.GL_SRC_ALPHA, GLES30.GL_ONE_MINUS_SRC_ALPHA);
                  block = new Block();
                  
                  net = new GlobalManager(this);
                  
                  for(int x=0; x<128; x++) for(int z=0; z<128; z++) {
                      int h = (int)(Math.sin(x*0.12)*Math.cos(z*0.12)*4 + 10);
                      for(int y=0; y<h; y++) setB(x,y,z,(byte)(y==h-1?1:y<h-3?2:3));
                  }
                  
                  for(int x=15; x<110; x+=22) {
                      for(int z=15; z<110; z+=22) {
                          if((x*z) % 7 > 2) { 
                              int baseY = (int)(Math.sin(x*0.12)*Math.cos(z*0.12)*4 + 10);
                              buildHouse(x, baseY, z);
                          }
                      }
                  }
              }
              
              private void buildHouse(int cx, int cy, int cz) {
                  for(int i=-2; i<=2; i++) {
                      for(int j=-2; j<=2; j++) {
                          for(int h=0; h<4; h++) {
                              if(i==-2 || i==2 || j==-2 || j==2) setB(cx+i, cy+h, cz+j, (byte)2);
                              else setB(cx+i, cy+h, cz+j, (byte)0);
                          }
                          setB(cx+i, cy+4, cz+j, (byte)4);
                      }
                  }
                  setB(cx, cy, cz+2, (byte)0); setB(cx, cy+1, cz+2, (byte)0);
              }
              
              private void setB(int x, int y, int z, byte t) { 
                  if(x>=0&&x<128&&y>=0&&y<64&&z>=0&&z<128) {
                      world[x+y*128+z*128*64]=t;
                      lastChunkX = -999;
                  }
              }
              
              public void setBRemote(int x, int y, int z, byte t) {
                  setB(x, y, z, t); 
              }
              
              private byte getB(int x, int y, int z) { 
                  if(x>=0&&x<128&&y>=0&&y<64&&z>=0&&z<128) return world[x+y*128+z*128*64]; 
                  return 0; 
              }

              public void setMove(float x, float z) { mvX = x; mvZ = z; }
              public void jump() { if(Math.abs(vy) < 0.02f) vy = 0.218f; }

              public void startBreak() { 
                  if(sel != null) { 
                      isBreaking = true; 
                      breakStart = System.currentTimeMillis(); 
                  } 
              }
              
              public void stopBreak() { 
                  isBreaking = false; 
                  breakProgress = 0; 
              }
              
              public void place() {
                  if(plc != null && sel != null) {
                      int pX = plc[0], pY = plc[1], pZ = plc[2];
                      if(getB(pX,pY,pZ) == 0 && 
                         !(Math.abs(this.px-pX)<0.8f && Math.abs(this.py-pY)<1.8f && Math.abs(this.pz-pZ)<0.8f)) {
                          setB(pX, pY, pZ, selectedBlock);
                          net.sendBlock(pX, pY, pZ, selectedBlock); 
                          lastPlaced = new int[]{pX, pY, pZ};
                          placeStart = System.currentTimeMillis();
                      }
                  }
              }

              public void onDrawFrame(GL10 g) {
                  update();
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  
                  float lx=(float)(Math.cos(Math.toRadians(pitch))*Math.sin(Math.toRadians(yaw))), 
                        ly=(float)(-Math.sin(Math.toRadians(pitch))), 
                        lz=(float)(Math.cos(Math.toRadians(pitch))*Math.cos(Math.toRadians(yaw)));
                  
                  Matrix.setLookAtM(view, 0, px, py+1.6f, pz, px+lx, py+1.6f+ly, pz+lz, 0, 1, 0);
                  Matrix.multiplyMM(mvp, 0, proj, 0, view, 0);

                  sel=null; plc=null;
                  for(float d=0; d<6; d+=0.1f) {
                      int tx=(int)Math.floor(px+lx*d), ty=(int)Math.floor(py+1.6f+ly*d), tz=(int)Math.floor(pz+lz*d);
                      if(getB(tx,ty,tz)>0) {
                          sel=new int[]{tx,ty,tz};
                          float ox=px+lx*(d-0.1f), oy=py+1.6f+ly*(d-0.1f), oz=pz+lz*(d-0.1f);
                          plc=new int[]{(int)Math.floor(ox), (int)Math.floor(oy), (int)Math.floor(oz)};
                          break;
                      }
                  }
                  
                  if(isBreaking && sel != null) {
                      long elapsed = System.currentTimeMillis() - breakStart;
                      breakProgress = Math.min(1.0f, elapsed / (float)BREAK_TIME);
                      if(breakProgress >= 1.0f) {
                          setB(sel[0], sel[1], sel[2], (byte)0);
                          net.sendBlock(sel[0], sel[1], sel[2], (byte)0); 
                          isBreaking = false;
                          breakProgress = 0;
                      }
                  }

                  int chunkX = ((int)px) >> 3, chunkZ = ((int)pz) >> 3;
                  if(chunkX != lastChunkX || chunkZ != lastChunkZ) {
                      rebuildVisibleBlocks(lx, lz);
                      lastChunkX = chunkX;
                      lastChunkZ = chunkZ;
                  }

                  int bX = -1, bY = -1, bZ = -1, pX = -1, pY = -1, pZ = -1;
                  float bScale = 1.0f, bAlpha = 1.0f, pScale = 1.0f, pAlpha = 1.0f;
                  byte bType = 0, pType = 0;

                  if(isBreaking && sel != null) {
                      bX = sel[0]; bY = sel[1]; bZ = sel[2];
                      bScale = 1.0f - (breakProgress * 0.7f);
                      bAlpha = 1.0f - breakProgress;
                      bType = getB(bX, bY, bZ);
                  }
                  if(lastPlaced != null) {
                      long pElaps = System.currentTimeMillis() - placeStart;
                      if(pElaps < PLACE_TIME) {
                          float prog = pElaps / (float)PLACE_TIME;
                          pX = lastPlaced[0]; pY = lastPlaced[1]; pZ = lastPlaced[2];
                          pScale = 0.3f + (prog * 0.7f);
                          pAlpha = prog;
                          pType = getB(pX, pY, pZ);
                      } else { lastPlaced = null; }
                  }

                  for(int i = 0; i < visibleCount; i++) {
                      int x = visibleBlocks[i][0], y = visibleBlocks[i][1], z = visibleBlocks[i][2];
                      byte t = getB(x,y,z);
                      if(t > 0) {
                          if((x==bX && y==bY && z==bZ) || (x==pX && y==pY && z==pZ)) continue;
                          block.draw(mvp, x, y, z, (sel!=null && x==sel[0] && y==sel[1] && z==sel[2]), t, 1.0f, 1.0f);
                      }
                  }
                  
                  for (float[] pos : GlobalManager.peers.values()) {
                      block.draw(mvp, pos[0]-0.5f, pos[1], pos[2]-0.5f, false, 5, 0.95f, 1.0f); 
                      block.draw(mvp, pos[0]-0.5f, pos[1]+1, pos[2]-0.5f, false, 5, 0.95f, 1.0f); 
                  }
                  
                  if(bType > 0) block.draw(mvp, bX, bY, bZ, true, bType, bScale, bAlpha);
                  if(pType > 0) block.draw(mvp, pX, pY, pZ, false, pType, pScale, pAlpha);
              }
              
              private void rebuildVisibleBlocks(float lx, float lz) {
                  visibleCount = 0;
                  int r = 36;
                  
                  for(int x=(int)px-r; x<(int)px+r && visibleCount<14999; x++) {
                      for(int z=(int)pz-r; z<(int)pz+r && visibleCount<14999; z++) {
                          for(int y=Math.max(0,(int)py-r); y<Math.min(64,(int)py+r) && visibleCount<14999; y++) {
                              if(getB(x,y,z) == 0) continue;
                              float dx = x - px, dy = y - py, dz = z - pz;
                              float distSq = dx*dx + dy*dy + dz*dz;
                              if(distSq > r*r) continue;
                              float dist2D = (float)Math.sqrt(dx*dx + dz*dz);
                              float dot = (dx * lx + dz * lz) / (dist2D == 0 ? 1 : dist2D);
                              if(dot < -0.3f && distSq > 25.0f) continue; 
                              
                              if(getB(x+1,y,z)>0 && getB(x-1,y,z)>0 && 
                                 getB(x,y+1,z)>0 && getB(x,y-1,z)>0 && 
                                 getB(x,y,z+1)>0 && getB(x,y,z-1)>0) continue;
                              
                              visibleBlocks[visibleCount][0] = x;
                              visibleBlocks[visibleCount][1] = y;
                              visibleBlocks[visibleCount][2] = z;
                              visibleCount++;
                          }
                      }
                  }
              }

              private void update() {
                  float s=(float)Math.sin(Math.toRadians(yaw)), c=(float)Math.cos(Math.toRadians(yaw));
                  float dx = (mvZ * s - mvX * c) * 0.108f;
                  float dz = (mvZ * c + mvX * s) * 0.108f;
                  float hb = 0.5075f; 
                  
                  if(getB((int)Math.floor(px+dx+(dx>0?hb:-hb)), (int)py, (int)pz)==0 && 
                     getB((int)Math.floor(px+dx+(dx>0?hb:-hb)), (int)py+1, (int)pz)==0) px+=dx;
                  if(getB((int)px, (int)py, (int)Math.floor(pz+dz+(dz>0?hb:-hb)))==0 &&
                     getB((int)px, (int)py+1, (int)Math.floor(pz+dz+(dz>0?hb:-hb)))==0) pz+=dz;

                  vy-=0.0115f; py+=vy;
                  if(getB((int)px, (int)Math.floor(py), (int)pz)>0) { py=(int)Math.floor(py)+1; vy=0; }
                  if(py < -10) { px=64; py=30; pz=64; vy=0; }
                  
                  if(net != null) net.updatePos(px, py, pz);
              }
              
              public void onSurfaceChanged(GL10 g, int w, int h) { 
                  GLES30.glViewport(0,0,w,h); 
                  Matrix.perspectiveM(proj, 0, 75, (float)w/h, 0.1f, 150f); 
              }
          }
