name: JsAI Quantum Infinity - Fixed Resource Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Генерация структуры проекта
      - name: Generate Project
        run: |
          mkdir -p app/src/main/java/com/jsai/quantum
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # Настройки AndroidX
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "JsAIQuantum"
          include ':app'
          EOF

          # build.gradle (Root)
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          EOF

          # app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.jsai.quantum'
              compileSdk 34
              defaultConfig {
                  applicationId "com.jsai.quantum"
                  minSdk 26
                  targetSdk 34
                  versionCode 14
                  versionName "Quantum-Infinity-4.7"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          # layout/activity_main.xml (ИСПРАВЛЕНО: android:textColorHint)
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="16dp">
              <TextView android:id="@+id/stats" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:textColor="#00FF00" android:fontFamily="monospace" android:textSize="10sp" android:text="READY"/>
              <ProgressBar android:id="@+id/progress" style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent" android:layout_height="wrap_content"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1">
                  <TextView android:id="@+id/console" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:textColor="#00E5FF" android:fontFamily="monospace" android:textSize="12sp"/>
              </ScrollView>
              <EditText android:id="@+id/input" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:textColor="#FFFFFF" android:hint="Prompt..." android:textColorHint="#444444"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                  <Button android:id="@+id/loadBtn" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="DATA"/>
                  <Button android:id="@+id/trainBtn" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="TRAIN"/>
                  <Button android:id="@+id/sendBtn" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="SEND"/>
              </LinearLayout>
          </LinearLayout>
          EOF

          # Ресурсы
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">JsAI Infinity</string></resources>
          EOF
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources><style name="Theme.JsAI" parent="Theme.AppCompat.NoActionBar"/></resources>
          EOF

          # MainActivity.kt
          cat > app/src/main/java/com/jsai/quantum/MainActivity.kt << 'EOF'
          package com.jsai.quantum
          import android.app.Activity
          import android.content.Intent
          import android.os.Bundle
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*
          import java.util.*
          import java.io.InputStream
          import android.net.Uri

          class MainActivity : AppCompatActivity() {
              private lateinit var console: TextView
              private lateinit var bar: ProgressBar
              private lateinit var stats: TextView
              private val brain = mutableMapOf<List<String>, MutableMap<String, Int>>()
              private var isTraining = false
              private val contextOrder = 4 
              private var selectedFileUri: Uri? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  console = findViewById(R.id.console)
                  bar = findViewById(R.id.progress)
                  stats = findViewById(R.id.stats)
                  val input = findViewById<EditText>(R.id.input)
                  findViewById<Button>(R.id.loadBtn).setOnClickListener {
                      startActivityForResult(Intent(Intent.ACTION_OPEN_DOCUMENT).apply { type = "text/*" }, 101)
                  }
                  findViewById<Button>(R.id.trainBtn).setOnClickListener {
                      if(!isTraining && selectedFileUri != null) startInfinityTraining()
                  }
                  findViewById<Button>(R.id.sendBtn).setOnClickListener {
                      val p = input.text.toString()
                      if(p.isNotBlank()) {
                          console.append("\n\nUSER: $p")
                          input.setText("")
                          generateResponse(p)
                      }
                  }
                  console.text = ">>> JSAI QUANTUM INFINITY 4.7 READY\n"
              }

              private fun startInfinityTraining() = CoroutineScope(Dispatchers.Main).launch {
                  isTraining = true
                  val uri = selectedFileUri ?: return@launch
                  console.append("\n[PROCESSING STREAM...]")
                  withContext(Dispatchers.Default) {
                      try {
                          contentResolver.openInputStream(uri)?.use { stream ->
                              val scanner = Scanner(stream).useDelimiter("[^a-zA-Zа-яА-Я0-9']+")
                              val buffer = LinkedList<String>()
                              var count = 0
                              while(scanner.hasNext()) {
                                  val word = scanner.next().lowercase()
                                  if (word.length < 2) continue
                                  if (buffer.size == contextOrder) {
                                      val context = buffer.toList()
                                      val nextMap = brain.getOrPut(context) { mutableMapOf() }
                                      nextMap[word] = (nextMap[word] ?: 0) + 1
                                      buffer.removeFirst()
                                      count++
                                  }
                                  buffer.add(word)
                                  if (count % 10000 == 0) {
                                      withContext(Dispatchers.Main) { stats.text = "TOKENS: $count | NODES: ${brain.size}" }
                                  }
                              }
                          }
                      } catch(e: Exception) {
                          withContext(Dispatchers.Main) { console.append("\nError: ${e.message}") }
                      }
                  }
                  console.append("\n[TRAINING COMPLETE: ${brain.size} nodes mapped]")
                  isTraining = false
              }

              private fun generateResponse(prompt: String) {
                  if (brain.isEmpty()) return
                  val tokens = prompt.lowercase().split(" ").filter { it.length > 1 }
                  var currentContext = brain.keys.random()
                  for (token in tokens) {
                      val match = brain.keys.find { it.contains(token) }
                      if (match != null) { currentContext = match; break }
                  }
                  val result = currentContext.toMutableList()
                  repeat(60) {
                      val nextWords = brain[currentContext]
                      if (nextWords != null) {
                          val nextWord = nextWords.maxByOrNull { it.value + (0..1).random() }?.key ?: brain.keys.random()[0]
                          result.add(nextWord)
                          currentContext = result.subList(result.size - contextOrder, result.size)
                      } else {
                          val jump = brain.keys.random()
                          result.addAll(jump); currentContext = jump
                      }
                  }
                  console.append("\nJSAI: ${result.joinToString(" ")}")
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (resultCode == Activity.RESULT_OK) {
                      selectedFileUri = data?.data
                      console.append("\n[FILE SELECTED: ${selectedFileUri?.path}]")
                  }
              }
          }
          EOF

          # Manifest
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI Infinity" android:theme="@style/Theme.JsAI" android:largeHeap="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI-Infinity-Final
          path: app/build/outputs/apk/debug/app-debug.apk
