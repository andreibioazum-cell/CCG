name: JsAI_Russian_Retro_Studio_Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Studio Structure
        run: |
          mkdir -p app/src/main/java/com/jsai/studio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- CONFIG (FIXED) ---
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal(); } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); } }
          include ':app'
          EOF
          
          # Самое важное исправление для ошибки AndroidX
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.jsai.studio'
              compileSdk 34
              defaultConfig { applicationId "com.jsai.studio"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.luaj:luaj-jse:3.0.1'
          }
          EOF

          # --- UI (RETRO РУССКИЙ) ---
          cat > app/src/main/res/layout/editor_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#121212">
              <LinearLayout android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="36dp" android:background="#222" android:orientation="horizontal" android:padding="2dp">
                  <Button android:id="@+id/btnPlay" android:layout_width="wrap_content" android:layout_height="match_parent" android:text="ЗАПУСК" android:backgroundTint="#FFF" android:textColor="#000" android:textSize="10sp" android:insetTop="0dp" android:insetBottom="0dp"/>
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="match_parent" android:text="Ретро Студия v1.0" android:textColor="#666" android:gravity="center" android:textSize="10sp" android:layout_marginRight="10dp"/>
              </LinearLayout>
              
              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/toolbar">
                  <com.jsai.studio.GameView android:id="@+id/gameView" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000"/>
                  <EditText android:id="@+id/codeEditor" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000" android:textColor="#00FF44" android:fontFamily="monospace" android:gravity="top" android:padding="12dp" android:textSize="14sp" 
                    android:text="очки = 0&#10;размер = 60&#10;&#10;клик&#10;  очки = очки + 1&#10;  размер = 30&#10;конец&#10;&#10;игра&#10;  фон черный&#10;  цвет малиновый&#10;  круг 400, 300, размер&#10;  цвет белый&#10;  текст &quot;ОЧКИ: &quot; .. очки, 50, 80&#10;  если размер меньше 60 тогда&#10;    размер = размер + 1&#10;  конец&#10;конец" />
              </FrameLayout>
          </RelativeLayout>
          EOF

          # --- ENGINE (ТРАНСЛЯТОР) ---
          cat > app/src/main/java/com/jsai/studio/EngineCore.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          import org.luaj.vm2.*;
          import org.luaj.vm2.lib.*;
          import org.luaj.vm2.lib.jse.*;

          public class EngineCore {
              public static boolean isPlaying = false;
              public static int backgroundColor = 0xFF000000;
              public static List<DrawCmd> drawQueue = new ArrayList<>();
              private static Globals globals;
              private static LuaValue loopFunc, clickFunc;

              public static class DrawCmd {
                  String type; float x, y, r; int color; String text;
                  DrawCmd(String t, float x, float y, float r, int c, String txt) { 
                      this.type=t; this.x=x; this.y=y; this.r=r; this.color=c; this.text=txt; 
                  }
              }

              public static String compileToLua(String ruCode) {
                  return ruCode
                      .replace("игра", "function loop()")
                      .replace("клик", "function onClick(mx, my)")
                      .replace("конец", "end")
                      .replace("если", "if")
                      .replace("тогда", "then")
                      .replace("иначе", "else")
                      .replace("меньше", "<")
                      .replace("больше", ">")
                      .replace("равно", "==")
                      .replace(" или ", " or ")
                      .replace(" и ", " and ")
                      // Команды
                      .replaceAll("фон (\\w+)", "setBackground('$1')")
                      .replaceAll("цвет (\\w+)", "setColor('$1')")
                      .replaceAll("круг ([^,\\n]+),\\s*([^,\\n]+),\\s*([^\\n]+)", "drawCircle($1, $2, $3)")
                      .replaceAll("текст ([^,\\n]+),\\s*([^,\\n]+),\\s*([^\\n]+)", "drawText($1, $2, $3)");
              }

              public static void start(String ruCode) {
                  globals = JsePlatform.standardGlobals();
                  globals.set("_curCol", LuaValue.valueOf(0xFFFFFFFF));
                  
                  globals.set("setBackground", new OneArgFunction() {
                      @Override public LuaValue call(LuaValue a) { backgroundColor = parseCol(a.tojstring()); return NIL; }
                  });
                  globals.set("setColor", new OneArgFunction() {
                      @Override public LuaValue call(LuaValue a) { globals.set("_curCol", LuaValue.valueOf(parseCol(a.tojstring()))); return NIL; }
                  });
                  globals.set("drawCircle", new ThreeArgFunction() {
                      @Override public LuaValue call(LuaValue x, LuaValue y, LuaValue r) {
                          drawQueue.add(new DrawCmd("circle", (float)x.todouble(), (float)y.todouble(), (float)r.todouble(), globals.get("_curCol").toint(), ""));
                          return NIL;
                      }
                  });
                  globals.set("drawText", new ThreeArgFunction() {
                      @Override public LuaValue call(LuaValue t, LuaValue x, LuaValue y) {
                          drawQueue.add(new DrawCmd("text", (float)x.todouble(), (float)y.todouble(), 0, globals.get("_curCol").toint(), t.tojstring()));
                          return NIL;
                      }
                  });

                  try {
                      globals.load(compileToLua(ruCode)).call();
                      loopFunc = globals.get("loop");
                      clickFunc = globals.get("onClick");
                      isPlaying = true;
                  } catch (Exception e) { isPlaying = false; }
              }

              private static int parseCol(String n) {
                  if(n.equals("белый")) return 0xFFFFFFFF; if(n.equals("черный")) return 0xFF000000;
                  if(n.equals("малиновый")) return 0xFFDC143C; if(n.equals("синий")) return 0xFF0000FF;
                  return 0xFF888888;
              }

              public static void update() {
                  if(!isPlaying || loopFunc == null || loopFunc.isnil()) return;
                  drawQueue.clear();
                  try { loopFunc.call(); } catch(Exception e) {}
              }
              public static void click(float x, float y) {
                  if(!isPlaying || clickFunc == null || clickFunc.isnil()) return;
                  try { clickFunc.call(LuaValue.valueOf(x), LuaValue.valueOf(y)); } catch(Exception e) {}
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/GameView.java << 'EOF'
          package com.jsai.studio;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;

          public class GameView extends View {
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              public GameView(Context c, AttributeSet a) { super(c, a); }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  if(!EngineCore.isPlaying) return;
                  canvas.drawColor(EngineCore.backgroundColor);
                  EngineCore.update();
                  for(EngineCore.DrawCmd cmd : new java.util.ArrayList<>(EngineCore.drawQueue)) {
                      p.setColor(cmd.color);
                      if(cmd.type.equals("circle")) canvas.drawCircle(cmd.x, cmd.y, cmd.r, p);
                      else if(cmd.type.equals("text")) { p.setTextSize(50); canvas.drawText(cmd.text, cmd.x, cmd.y, p); }
                  }
                  invalidate();
              }
              @Override public boolean onTouchEvent(MotionEvent e) {
                  if(e.getAction() == MotionEvent.ACTION_DOWN) EngineCore.click(e.getX(), e.getY());
                  return true;
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EditorActivity.java << 'EOF'
          package com.jsai.studio;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.*;

          public class EditorActivity extends Activity {
              protected void onCreate(Bundle b) {
                  super.onCreate(b); requestWindowFeature(1);
                  setContentView(R.layout.editor_main);
                  EditText codeEd = findViewById(R.id.codeEditor);
                  Button play = findViewById(R.id.btnPlay);

                  play.setOnClickListener(v -> {
                      if(!EngineCore.isPlaying) {
                          EngineCore.start(codeEd.getText().toString());
                          play.setText("СТОП");
                          codeEd.setVisibility(View.GONE);
                      } else {
                          EngineCore.isPlaying = false;
                          play.setText("ЗАПУСК");
                          codeEd.setVisibility(View.VISIBLE);
                      }
                  });
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Ретро Студия" android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".EditorActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI_Russian_Retro_Final
          path: app/build/outputs/apk/debug/app-debug.apk
