name: JsAI_Raw_Studio
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Studio Structure
        run: |
          mkdir -p app/src/main/java/com/jsai/studio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal(); } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); } }
          include ':app'
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.1.1' apply false }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.jsai.studio'
              compileSdk 34
              defaultConfig { applicationId "com.jsai.studio"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.luaj:luaj-jse:3.0.1'
          }
          EOF

          # --- МИНИМАЛЬНЫЙ UI ---
          cat > app/src/main/res/layout/editor_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#111">
              <LinearLayout android:id="@+id/t" android:layout_width="match_parent" android:layout_height="35dp" android:background="#222" android:paddingHorizontal="5dp" android:gravity="center_vertical">
                  <Button android:id="@+id/add" android:layout_width="35dp" android:layout_height="30dp" android:text="+" android:backgroundTint="#FFF" android:textColor="#000" android:padding="0dp"/>
                  <Button android:id="@+id/play" android:layout_width="70dp" android:layout_height="30dp" android:text="ПУСК" android:backgroundTint="#FFF" android:textColor="#000" android:textSize="10sp" android:layout_marginLeft="5dp"/>
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RAW STUDIO" android:textColor="#444" android:textSize="10sp"/>
              </LinearLayout>
              <LinearLayout android:id="@+id/s" android:layout_width="150dp" android:layout_height="match_parent" android:layout_below="@id/t" android:layout_alignParentRight="true" android:background="#151515" android:orientation="vertical">
                  <TextView android:layout_width="match_parent" android:layout_height="20dp" android:text=" ПРОВОДНИК" android:textColor="#666" android:textSize="8sp" android:background="#222"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"><LinearLayout android:id="@+id/exp" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"/></ScrollView>
                  <TextView android:layout_width="match_parent" android:layout_height="20dp" android:text=" СВОЙСТВА" android:textColor="#666" android:textSize="8sp" android:background="#222"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"><LinearLayout android:id="@+id/props" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="5dp"/></ScrollView>
              </LinearLayout>
              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/t" android:layout_toLeftOf="@id/s">
                  <com.jsai.studio.GameView android:id="@+id/gv" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <EditText android:id="@+id/ed" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000" android:textColor="#0F0" android:gravity="top" android:padding="10dp" android:visibility="gone" android:textSize="14sp" android:fontFamily="monospace"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          # --- CORE ENGINE ( RAW ) ---
          cat > app/src/main/java/com/jsai/studio/Instance.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          import org.luaj.vm2.LuaValue;
          public class Instance {
              public String name, type, code = "";
              public float x=400, y=400, r=100, rot=0; // r - размер
              public int c = 0xFFFFFFFF; // c - цвет
              public float sx, sy, sr;
              public Instance p; // parent
              public List<Instance> kids = new ArrayList<>();
              public LuaValue loop = LuaValue.NIL;
              public Instance(String n, String t) { name=n; type=t; }
              public void save() { sx=x; sy=y; sr=r; }
              public void reset() { x=sx; y=sy; r=sr; loop=LuaValue.NIL; }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EngineCore.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          import org.luaj.vm2.*;
          import org.luaj.vm2.lib.jse.*;
          public class EngineCore {
              public static List<Instance> root = new ArrayList<>();
              public static boolean active = false;
              public static float mx, my;
              public static String compile(String s) {
                  return s.replace("игра", "function update()").replace("конец", "end")
                          .replace("я.х", "я.x").replace("я.у", "я.y").replace("я.р", "я.r").replace("я.ц", "я.c")
                          .replace("мх", "mx").replace("му", "my");
              }
              public static void start() {
                  active = true;
                  for(Instance i : all()) {
                      i.save();
                      if(i.type.equals("Script") && i.p != null) {
                          Globals g = JsePlatform.standardGlobals();
                          g.set("я", CoerceJavaToLua.coerce(i.p));
                          try { g.load(compile(i.code)).call(); i.p.loop = g.get("update"); } catch(Exception e){}
                      }
                  }
              }
              public static void stop() { active=false; for(Instance i:all()) i.reset(); }
              public static List<Instance> all() { List<Instance> a = new ArrayList<>(); fill(root, a); return a; }
              private static void fill(List<Instance> s, List<Instance> d) { for(Instance i:s){ d.add(i); fill(i.kids, d); }}
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/GameView.java << 'EOF'
          package com.jsai.studio;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;
          public class GameView extends View {
              Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              public GameView(Context c, AttributeSet a) { super(c, a); }
              @Override protected void onDraw(Canvas canvas) {
                  canvas.drawColor(Color.BLACK);
                  if(EngineCore.active) {
                      for(Instance i : EngineCore.all()) {
                          if(!i.loop.isnil()) {
                              Globals g = i.loop.getfenv();
                              g.set("mx", LuaValue.valueOf(EngineCore.mx)); g.set("my", LuaValue.valueOf(EngineCore.my));
                              try { i.loop.call(); } catch(Exception e){}
                          }
                      }
                  }
                  for(Instance i : EngineCore.all()) {
                      if(i.type.equals("Блок") || i.type.equals("Шар")) {
                          p.setColor(i.c);
                          if(i.type.equals("Блок")) canvas.drawRect(i.x, i.y, i.x+i.r, i.y+i.r, p);
                          else canvas.drawCircle(i.x+i.r/2, i.y+i.r/2, i.r/2, p);
                      }
                  }
                  invalidate();
              }
              @Override public boolean onTouchEvent(MotionEvent e) { EngineCore.mx=e.getX(); EngineCore.my=e.getY(); return true; }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EditorActivity.java << 'EOF'
          package com.jsai.studio;
          import android.app.*;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          public class EditorActivity extends Activity {
              LinearLayout exp, props; EditText ed; View gv; Instance sel;
              protected void onCreate(Bundle b) {
                  super.onCreate(b); requestWindowFeature(1); setContentView(R.layout.editor_main);
                  exp=findViewById(R.id.exp); props=findViewById(R.id.props); ed=findViewById(R.id.ed); gv=findViewById(R.id.gv);
                  findViewById(R.id.add).setOnClickListener(v -> {
                      PopupMenu pm = new PopupMenu(this, v); pm.getMenu().add("Блок"); pm.getMenu().add("Шар"); pm.getMenu().add("Script");
                      pm.setOnMenuItemClickListener(item -> {
                          Instance i = new Instance(item.getTitle().toString(), item.getTitle().toString());
                          if(sel != null) { i.p = sel; sel.kids.add(i); } else EngineCore.root.add(i);
                          upd(); return true;
                      }); pm.show();
                  });
                  findViewById(R.id.play).setOnClickListener(v -> {
                      if(!EngineCore.active) { EngineCore.start(); ((Button)v).setText("СТОП"); }
                      else { EngineCore.stop(); ((Button)v).setText("ПУСК"); }
                  });
              }
              void upd() {
                  exp.removeAllViews();
                  for(Instance i : EngineCore.all()) {
                      TextView t = new TextView(this); t.setText((i.p!=null?" > ":"") + i.name);
                      t.setTextColor(sel==i?Color.BLACK:Color.WHITE); t.setBackgroundColor(sel==i?Color.WHITE:0);
                      t.setOnClickListener(v -> { sel=i; show(); upd(); });
                      t.setOnLongClickListener(v -> { if(i.p!=null) i.p.kids.remove(i); else EngineCore.root.remove(i); upd(); return true; });
                      exp.addView(t);
                  }
              }
              void show() {
                  props.removeAllViews();
                  boolean isS = sel.type.equals("Script");
                  ed.setVisibility(isS?View.VISIBLE:View.GONE); gv.setVisibility(isS?View.GONE:View.VISIBLE);
                  if(isS) {
                      ed.setText(sel.code);
                      ed.addTextChangedListener(new android.text.TextWatcher() {
                          public void afterTextChanged(android.text.Editable s) { sel.code = s.toString(); }
                          public void beforeTextChanged(CharSequence s, int t, int c, int a) {} public void onTextChanged(CharSequence s, int t, int b, int c) {}
                      });
                  } else {
                      addS("X", v->sel.x=v); addS("Y", v->sel.y=v); addS("P", v->sel.r=v);
                      EditText c = new EditText(this); c.setHint("HEX Цвет"); c.setTextColor(-1);
                      c.setOnEditorActionListener((v,a,e)->{ try{ sel.c=(int)Long.parseLong(v.getText().toString().replace("#",""), 16); }catch(Exception ex){} return true; });
                      props.addView(c);
                  }
              }
              void addS(String l, Upd u) {
                  SeekBar s = new SeekBar(this); s.setMax(1500);
                  s.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      public void onProgressChanged(SeekBar b, int p, boolean h) { u.u(p); }
                      public void onStartTrackingTouch(SeekBar b) {} public void onStopTrackingTouch(SeekBar b) {}
                  }); props.addView(s);
              }
              interface Upd { void u(float v); }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI Raw" android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".EditorActivity" android:exported="true" android:screenOrientation="landscape" android:windowSoftInputMode="adjustPan">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI_Raw_Studio
          path: app/build/outputs/apk/debug/app-debug.apk
