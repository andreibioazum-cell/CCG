          cat <<'EOF' > app/src/main/res/layout/item_msg_in.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:paddingTop="2dp" android:paddingBottom="2dp">
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:background="@drawable/bg_msg_in" android:maxWidth="280dp" android:orientation="horizontal" android:paddingLeft="10dp" android:paddingTop="6dp" android:paddingRight="8dp" android:paddingBottom="6dp">
                  <TextView android:id="@+id/text" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#000" android:textSize="15sp"/>
                  <TextView android:id="@+id/time" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom" android:layout_marginLeft="6dp" android:textColor="#8E8E93" android:textSize="11sp"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat <<'JAVA' > app/src/main/java/com/tgui/app/MainActivity.java
          package com.tgui.app;
          import android.os.Bundle;
          import android.text.*;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.*;
          import java.text.SimpleDateFormat;
          import java.util.*;
          public class MainActivity extends AppCompatActivity {
              FrameLayout root;
              List<String[]> chats=new ArrayList<>();
              List<String[]> msgs=new ArrayList<>();
              RecyclerView.Adapter<?> msgAd;
              RecyclerView msgRv;
              int cur=-1;
              int[] avBg={R.drawable.bg_avatar,R.drawable.bg_avatar_g,R.drawable.bg_avatar_o,R.drawable.bg_avatar_p,R.drawable.bg_avatar_r};
              @Override protected void onCreate(Bundle b){
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  root=findViewById(R.id.container);
                  chats.add(new String[]{"Pavel Durov","Telegram is the best!","12:45","0","0","1"});
                  chats.add(new String[]{"Saved Messages","Photo","11:30","0","1","0"});
                  chats.add(new String[]{"John Smith","See you tomorrow!","10:15","3","2","1"});
                  chats.add(new String[]{"Alice Johnson","Thanks! 😊","Yesterday","0","3","0"});
                  chats.add(new String[]{"Tech News","Breaking: New AI...","Yesterday","12","4","0"});
                  chats.add(new String[]{"Family Group","Mom: Dinner!","Monday","5","1","0"});
                  chats.add(new String[]{"Work Chat","Meeting at 3pm","Monday","0","0","0"});
                  chats.add(new String[]{"Mike","👍","Sunday","0","2","0"});
                  showChats();
              }
              void showChats(){
                  View v=LayoutInflater.from(this).inflate(R.layout.screen_chats,root,false);
                  root.removeAllViews();root.addView(v);
                  RecyclerView rv=v.findViewById(R.id.list);
                  rv.setLayoutManager(new LinearLayoutManager(this));
                  rv.setAdapter(new RecyclerView.Adapter<VH>(){
                      @Override public VH onCreateViewHolder(ViewGroup p,int t){return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_chat,p,false));}
                      @Override public void onBindViewHolder(VH h,int i){
                          String[] c=chats.get(i);
                          ((TextView)h.v.findViewById(R.id.name)).setText(c[0]);
                          ((TextView)h.v.findViewById(R.id.msg)).setText(c[1]);
                          ((TextView)h.v.findViewById(R.id.time)).setText(c[2]);
                          TextView av=h.v.findViewById(R.id.avatar);
                          av.setText(c[0].substring(0,1));
                          av.setBackgroundResource(avBg[Integer.parseInt(c[4])%5]);
                          h.v.findViewById(R.id.online).setVisibility(c[5].equals("1")?View.VISIBLE:View.GONE);
                          TextView bd=h.v.findViewById(R.id.badge);
                          int u=Integer.parseInt(c[3]);
                          if(u>0){bd.setVisibility(View.VISIBLE);bd.setText(c[3]);}else bd.setVisibility(View.GONE);
                          h.v.setOnClickListener(x->openChat(i));
                      }
                      @Override public int getItemCount(){return chats.size();}
                  });
              }
              void openChat(int i){
                  cur=i;String[] c=chats.get(i);c[3]="0";
                  msgs.clear();
                  msgs.add(new String[]{"Hey! How are you?","10:30","0"});
                  msgs.add(new String[]{"I'm good, thanks!","10:31","1"});
                  msgs.add(new String[]{"Did you see the news?","10:32","0"});
                  msgs.add(new String[]{"No, what happened?","10:33","1"});
                  msgs.add(new String[]{"Check Telegram News!","10:34","0"});
                  msgs.add(new String[]{"Will do! 👍","10:35","1"});
                  View v=LayoutInflater.from(this).inflate(R.layout.screen_chat,root,false);
                  root.removeAllViews();root.addView(v);
                  ((TextView)v.findViewById(R.id.t_name)).setText(c[0]);
                  TextView av=v.findViewById(R.id.av);
                  av.setText(c[0].substring(0,1));
                  av.setBackgroundResource(avBg[Integer.parseInt(c[4])%5]);
                  ((TextView)v.findViewById(R.id.t_status)).setText(c[5].equals("1")?"online":"last seen recently");
                  v.findViewById(R.id.btn_back).setOnClickListener(x->showChats());
                  msgRv=v.findViewById(R.id.msgs);
                  LinearLayoutManager lm=new LinearLayoutManager(this);lm.setStackFromEnd(true);
                  msgRv.setLayoutManager(lm);
                  msgAd=new RecyclerView.Adapter<VH>(){
                      @Override public int getItemViewType(int p){return msgs.get(p)[2].equals("1")?1:0;}
                      @Override public VH onCreateViewHolder(ViewGroup p,int t){return new VH(LayoutInflater.from(p.getContext()).inflate(t==1?R.layout.item_msg_out:R.layout.item_msg_in,p,false));}
                      @Override public void onBindViewHolder(VH h,int p){((TextView)h.v.findViewById(R.id.text)).setText(msgs.get(p)[0]);((TextView)h.v.findViewById(R.id.time)).setText(msgs.get(p)[1]);}
                      @Override public int getItemCount(){return msgs.size();}
                  };
                  msgRv.setAdapter(msgAd);
                  EditText inp=v.findViewById(R.id.input);
                  View btnS=v.findViewById(R.id.btn_send),btnM=v.findViewById(R.id.btn_mic);
                  inp.addTextChangedListener(new TextWatcher(){
                      public void beforeTextChanged(CharSequence s,int a,int b,int c){}
                      public void onTextChanged(CharSequence s,int a,int b,int c){}
                      public void afterTextChanged(Editable s){btnS.setVisibility(s.length()>0?View.VISIBLE:View.GONE);btnM.setVisibility(s.length()>0?View.GONE:View.VISIBLE);}
                  });
                  btnS.setOnClickListener(x->{
                      String t=inp.getText().toString().trim();
                      if(!t.isEmpty()){
                          String tm=new SimpleDateFormat("HH:mm",Locale.getDefault()).format(new Date());
                          msgs.add(new String[]{t,tm,"1"});
                          msgAd.notifyItemInserted(msgs.size()-1);
                          msgRv.scrollToPosition(msgs.size()-1);
                          inp.setText("");
                          chats.get(cur)[1]=t;chats.get(cur)[2]=tm;
                      }
                  });
              }
              @Override public void onBackPressed(){if(cur>=0){cur=-1;showChats();}else super.onBackPressed();}
              class VH extends RecyclerView.ViewHolder{View v;VH(View x){super(x);v=x;}}
          }
          JAVA

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Messenger" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TelegramUI
          path: app/build/outputs/apk/debug/app-debug.apk
