name: Generate_Fixed_Workflow
on: [push, workflow_dispatch]

jobs:
  repair_yml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process build.txt
        run: |
          # 1. Берем основу из твоего файла
          cp build.txt ready_to_use.yml

          # 2. Исправляем ошибку "No such file or directory" для gradlew
          # Мы ищем строку с ./gradlew и добавляем перед ней генерацию wrapper
          sed -i '/.\/gradlew assembleDebug/i \          gradle wrapper --gradle-version 8.5' ready_to_use.yml
          sed -i '/.\/gradlew assembleDebug/i \          chmod +x gradlew' ready_to_use.yml

          # 3. Убираем лишние пробелы или артефакты, если они есть
          sed -i 's/\r$//' ready_to_use.yml

      - name: Upload Fixed YAML
        uses: actions/upload-artifact@v4
        with:
          name: Fixed_Workflow_for_Other_Repo
          path: ready_to_use.yml
