name: TelegramUI_Working

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project with Firebase
        run: |
          mkdir -p app/src/main/java/com/tgui/app
          mkdir -p app/src/main/res/{layout,values,drawable}
          
          # Создаем google-services.json с вашими данными
          cat <<'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "241175838082",
              "firebase_url": "https://nasksel-9104c-default-rtdb.firebaseio.com",
              "project_id": "nasksel-9104c",
              "storage_bucket": "nasksel-9104c.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:241175838082:android:490053f510bf069ae2a39b",
                  "android_client_info": {
                    "package_name": "com.tgui.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyDLi0qSpDtqpaVnh7SDXy31TIPi11BaxLE"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > settings.gradle
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.tgui.app'
              compileSdk 34
              
              defaultConfig {
                  applicationId 'com.tgui.app'
                  minSdk 24
                  targetSdk 34
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'com.google.android.material:material:1.11.0'
              implementation platform('com.google.firebase:firebase-bom:32.7.0')
              implementation 'com.google.firebase:firebase-database'
              implementation 'com.google.firebase:firebase-auth'
          }
          
          apply plugin: 'com.google.gms.google-services'
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:statusBarColor">#517DA2</item>
                  <item name="colorPrimary">#517DA2</item>
              </style>
          </resources>
          EOF

