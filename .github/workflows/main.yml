name: Cubic_Battle_Lua_Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/cubic/battle
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- CONFIG (FIXED REPOS) ---
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal(); } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); } 
          }
          include ':app'
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.cubic.battle'
              compileSdk 34
              defaultConfig { applicationId "com.cubic.battle"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.luaj:luaj-jse:3.0.1'
          }
          EOF

          # --- UI: MENU ---
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#111">
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_centerInParent="true" android:gravity="center">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="CUBIC BATTLE" android:textColor="#FFF" android:textSize="42sp" android:textStyle="bold"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="В новых красках 🎨" android:textColor="#FF3333" android:textSize="18sp" android:layout_marginBottom="40dp"/>
                  <Button android:id="@+id/btnStart" android:layout_width="280dp" android:layout_height="60dp" android:text="Режимы" android:backgroundTint="#8A2BE2" android:textColor="#FFF" android:textSize="18sp"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # --- ENGINE LOGIC (JAVA HOST) ---
          cat > app/src/main/java/com/cubic/battle/GameView.java << 'EOF'
          package com.cubic.battle;
          import android.content.Context;
          import android.graphics.*;
          import android.view.*;
          import org.luaj.vm2.*;
          import org.luaj.vm2.lib.jse.*;

          public class GameView extends View {
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Globals globals;
              private LuaValue updateFunc;
              private float mx, my;
              private boolean pressed;

              public GameView(Context c) {
                  super(c);
                  globals = JsePlatform.standardGlobals();
                  
                  // Lua Script (Логика на Луа)
                  String script = 
                      "player = {x=200, y=500, angle=0, aim=0, isAtk=false} " +
                      "enemies = {{x=800,y=300}, {x=1000,y=600}} " +
                      "function update(dt, mx, my, pressed) " +
                      "  if pressed and mx < 800 then " + // Движение (левая часть)
                      "    dx = mx - player.x " +
                      "    dy = my - player.y " +
                      "    dist = math.sqrt(dx*dx + dy*dy) " +
                      "    if dist > 5 then " +
                      "      player.x = player.x + (dx/dist)*8 " +
                      "      player.y = player.y + (dy/dist)*8 " +
                      "      player.angle = math.atan2(dy, dx) " +
                      "    end " +
                      "  end " +
                      "  if pressed and mx > 800 then " + // Прицел (правая часть)
                      "    player.isAtk = true " +
                      "    target_aim = math.atan2(my - player.y, mx - player.x) " +
                      "    diff = target_aim - player.angle " +
                      "    while diff > math.pi do diff = diff - 2*math.pi end " +
                      "    while diff < -math.pi do diff = diff + 2*math.pi end " +
                      "    limit = 35 * (math.pi/180) " + // Лимит 35 градусов
                      "    if math.abs(diff) < limit then player.aim = target_aim else " +
                      "      if diff > 0 then player.aim = player.angle + limit else player.aim = player.angle - limit end " +
                      "    end " +
                      "  else player.isAtk = false end " +
                      "end";

                  globals.load(script).call();
                  updateFunc = globals.get("update");
              }

              @Override protected void onDraw(Canvas canvas) {
                  // Фон песок
                  canvas.drawColor(Color.parseColor("#D2B48C"));
                  p.setColor(Color.parseColor("#C2A47C"));
                  p.setStrokeWidth(2);
                  for(int i=0; i<getHeight(); i+=100) canvas.drawLine(0, i, getWidth(), i, p);

                  // Данные из Lua
                  updateFunc.call(LuaValue.valueOf(0.016), LuaValue.valueOf(mx), LuaValue.valueOf(my), LuaValue.valueOf(pressed));
                  LuaValue pl = globals.get("player");
                  float px = pl.get("x").tofloat();
                  float py = pl.get("y").tofloat();
                  float pa = pl.get("angle").tofloat();
                  float aim = pl.get("aim").tofloat();
                  boolean isAtk = pl.get("isAtk").toboolean();

                  // Рисуем врагов (Черные кубы)
                  p.setColor(Color.BLACK);
                  LuaValue en = globals.get("enemies");
                  for(int i=1; i<=en.length(); i++) {
                      float ex = en.get(i).get("x").tofloat();
                      float ey = en.get(i).get("y").tofloat();
                      canvas.drawRect(ex, ey, ex+100, ey+100, p);
                  }

                  // Рисуем игрока
                  canvas.save();
                  canvas.translate(px, py);
                  canvas.rotate((float)Math.toDegrees(pa));
                  p.setColor(Color.BLACK);
                  canvas.drawRect(-50, -50, 50, 50, p);
                  p.setColor(Color.WHITE); // Глаза
                  canvas.drawRect(-35, -35, -10, -10, p);
                  canvas.drawRect(10, -35, 35, -10, p);
                  canvas.restore();

                  // Линия прицела (только если нажата атака)
                  if(isAtk) {
                      p.setColor(Color.RED);
                      p.setStrokeWidth(8);
                      float lx = (float)(px + Math.cos(aim)*400);
                      float ly = (float)(py + Math.sin(aim)*400);
                      canvas.drawLine(px, py, lx, ly, p);
                  }

                  // Джойстик (визуальный)
                  p.setColor(Color.argb(80, 0,0,0));
                  canvas.drawCircle(250, getHeight()-250, 150, p);
                  p.setColor(Color.WHITE);
                  p.setTextSize(40);
                  canvas.drawText("АТАКА (Справа)", getWidth()-400, getHeight()-100, p);

                  invalidate();
              }

              @Override public boolean onTouchEvent(MotionEvent e) {
                  mx = e.getX(); my = e.getY();
                  pressed = (e.getAction() != MotionEvent.ACTION_UP);
                  return true;
              }
          }
          EOF

          cat > app/src/main/java/com/cubic/battle/MainActivity.java << 'EOF'
          package com.cubic.battle;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.View;

          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  findViewById(R.id.btnStart).setOnClickListener(v -> {
                      setContentView(new GameView(this));
                  });
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Cubic Battle Lua" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cubic_Battle_Lua
          path: app/build/outputs/apk/debug/app-debug.apk
