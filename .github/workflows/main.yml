name: MadGPT_V13_Hybrid_Engine
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Hybrid AI Project
        run: |
          PACKAGE_PATH="app/src/main/java/com/madgpt/v13"
          mkdir -p $PACKAGE_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- CONFIG ---
          cat > $PACKAGE_PATH/Config.java << 'EOF'
          package com.madgpt.v13;
          public class Config {
              public static final int D_MODEL = 256;
              public static final int N_HEADS = 8;
              public static final int N_LAYERS = 4;
          }
          EOF

          # --- MATH ENGINE ---
          cat > $PACKAGE_PATH/MatrixMath.java << 'EOF'
          package com.madgpt.v13;
          public class MatrixMath {
              public static void softmax(float[] x) {
                  float max = -1e9f;
                  for (float v : x) if (v > max) max = v;
                  float sum = 0;
                  for (int i = 0; i < x.length; i++) {
                      x[i] = (float) Math.exp(x[i] - max);
                      sum += x[i];
                  }
                  for (int i = 0; i < x.length; i++) x[i] /= sum;
              }
              public static float silu(float x) { return x * (float)(1.0 / (1.0 + Math.exp(-x))); }
          }
          EOF

          # --- ГИБРИДНЫЙ ТОКЕНИЗАТОР ---
          cat > $PACKAGE_PATH/FastTokenizer.java << 'EOF'
          package com.madgpt.v13;
          import java.util.*;
          import java.util.regex.*;

          public class FastTokenizer {
              public Map<String, Integer> t2i = new HashMap<>();
              public List<String> i2t = new ArrayList<>();
              
              public List<Integer> botMemory = new ArrayList<>(); // Для <BOT>...<END>
              public List<Integer> generalMemory = new ArrayList<>(); // Для обычного текста

              public FastTokenizer() {
                  String[] spec = {"<USER>", "<BOT>", "<END>", "<UNK>"};
                  for(String s : spec) add(s);
              }

              private int add(String s) {
                  if(!t2i.containsKey(s)) {
                      t2i.put(s, i2t.size());
                      i2t.add(s);
                  }
                  return t2i.get(s);
              }

              public void train(String text) {
                  // Логика определения формата: есть ли тег <BOT>
                  boolean hasTags = text.contains("<BOT>");
                  
                  Pattern p = Pattern.compile("<\\w+>|\\w+|[^\\w\\s]");
                  Matcher m = p.matcher(text);
                  
                  boolean isInsideBot = false;

                  while(m.find()) {
                      String t = m.group();
                      int id = add(t);
                      
                      if(hasTags) {
                          if(t.equals("<BOT>")) { isInsideBot = true; continue; }
                          if(t.equals("<END>")) { isInsideBot = false; continue; }
                          if(isInsideBot) botMemory.add(id);
                      } else {
                          // Если тегов нет - просто валим всё в общую кучу
                          if(!t.trim().isEmpty()) generalMemory.add(id);
                      }
                  }
              }
          }
          EOF

          # --- MAIN ACTIVITY (С ЛОГИКОЙ ГИБРИДНОЙ ГЕНЕРАЦИИ) ---
          cat > $PACKAGE_PATH/MainActivity.java << 'EOF'
          package com.madgpt.v13;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import java.io.*;
          import java.util.*;

          public class MainActivity extends Activity {
              FastTokenizer tokenizer = new FastTokenizer();
              TextView terminal; ProgressBar pb;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setupUI();
              }

              private void setupUI() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(0xFF050505);
                  root.setPadding(20, 20, 20, 20);

                  terminal = new TextView(this);
                  terminal.setTextColor(0xFF00FFCC);
                  terminal.setTypeface(android.graphics.Typeface.MONOSPACE);
                  terminal.setText("--- MadGPT V13 Hybrid Engine ---\n[SYSTEM]: Поддержка Тегов и Текста активна.\n");
                  
                  ScrollView scroll = new ScrollView(this);
                  root.addView(scroll, new LinearLayout.LayoutParams(-1, 0, 1));
                  scroll.addView(terminal);

                  pb = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  pb.setVisibility(View.GONE);
                  root.addView(pb);

                  Button btn = new Button(this);
                  btn.setText("ЗАГРУЗИТЬ ДАННЫЕ");
                  btn.setOnClickListener(v -> {
                      Intent i = new Intent(Intent.ACTION_GET_CONTENT);
                      i.setType("text/plain"); i.putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true);
                      startActivityForResult(i, 1);
                  });
                  root.addView(btn);

                  EditText input = new EditText(this);
                  input.setHint("Запрос к ИИ...");
                  input.setTextColor(-1);
                  root.addView(input);

                  Button send = new Button(this);
                  send.setText("ГЕНЕРАЦИЯ");
                  send.setOnClickListener(v -> {
                      String q = input.getText().toString();
                      terminal.append("\n[YOU]: " + q + "\n[BOT]: ");
                      generate();
                      input.setText("");
                  });
                  root.addView(send);
                  setContentView(root);
              }

              private void generate() {
                  // Выбираем из какой памяти брать слова
                  List<Integer> targetMemory = tokenizer.botMemory.isEmpty() ? tokenizer.generalMemory : tokenizer.botMemory;
                  
                  if(targetMemory.isEmpty()) {
                      terminal.append("Ошибка: Память пуста. Загрузите файлы.");
                      return;
                  }

                  new Thread(() -> {
                      Random r = new Random();
                      for(int i=0; i<20; i++) {
                          int id = targetMemory.get(r.nextInt(targetMemory.size()));
                          final String word = tokenizer.i2t.get(id) + " ";
                          runOnUiThread(() -> terminal.append(word));
                          try { Thread.sleep(40); } catch(Exception e){}
                      }
                  }).start();
              }

              @Override
              protected void onActivityResult(int req, int res, Intent d) {
                  if(res == RESULT_OK && d != null) {
                      pb.setVisibility(View.VISIBLE);
                      new Thread(() -> {
                          try {
                              if(d.getClipData() != null) {
                                  for(int i=0; i<d.getClipData().getItemCount(); i++) read(d.getClipData().getItemAt(i).getUri());
                              } else read(d.getData());
                              
                              runOnUiThread(() -> {
                                  pb.setVisibility(View.GONE);
                                  terminal.append("\n[SUCCESS]: Обучение завершено.");
                                  terminal.append("\n[Memory]: " + tokenizer.botMemory.size() + " ответов, " + tokenizer.generalMemory.size() + " фактов.\n");
                              });
                          } catch(Exception e){}
                      }).start();
                  }
              }

              private void read(Uri uri) throws Exception {
                  BufferedReader br = new BufferedReader(new InputStreamReader(getContentResolver().openInputStream(uri)));
                  String line;
                  while((line = br.readLine()) != null) tokenizer.train(line);
                  br.close();
              }
          }
          EOF

          # --- ANDROID MANIFEST ---
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="MadGPT V13" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # --- BUILD FILES ---
          cat > settings.gradle << 'EOF'
          include ':app'
          EOF
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.madgpt.v13'; compileSdk 34; defaultConfig { applicationId "com.madgpt.v13"; minSdk 26; targetSdk 34; versionCode 13; versionName "13.0-HYBRID" } }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Build Hybrid APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MadGPT_V13_Hybrid
          path: app/build/outputs/apk/debug/app-debug.apk
