          cat > app/src/main/java/com/aetherai/MainActivity.java << 'EOF'
          package com.aetherai;
          
          import android.app.Activity;
          import android.app.AlertDialog;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.*;
          import android.view.View;
          import java.io.*;
          import java.util.ArrayList;
          
          public class MainActivity extends Activity {
              private static final int PICK_FILES_REQUEST = 1;
              
              private AIEngine ai;
              private EditText inputText, outputText, epochsInput;
              private TextView statusText, modelInfoText, filesListText;
              private Button selectFilesButton, trainButton, generateButton, infoButton, clearFilesButton;
              private ProgressBar progressBar;
              private ArrayList<String> loadedFiles = new ArrayList<>();
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  ai = new AIEngine();
                  
                  inputText = findViewById(R.id.inputText);
                  outputText = findViewById(R.id.outputText);
                  epochsInput = findViewById(R.id.epochsInput);
                  statusText = findViewById(R.id.statusText);
                  modelInfoText = findViewById(R.id.modelInfoText);
                  filesListText = findViewById(R.id.filesListText);
                  selectFilesButton = findViewById(R.id.selectFilesButton);
                  trainButton = findViewById(R.id.trainButton);
                  generateButton = findViewById(R.id.generateButton);
                  infoButton = findViewById(R.id.infoButton);
                  clearFilesButton = findViewById(R.id.clearFilesButton);
                  progressBar = findViewById(R.id.progressBar);
                  
                  epochsInput.setText("7");
                  
                  statusText.setText("⏳ Initializing model...");
                  new Thread(() -> {
                      ai.initModel();
                      runOnUiThread(() -> {
                          statusText.setText("✅ Model ready! Select TXT files to train.");
                          selectFilesButton.setEnabled(true);
                      });
                  }).start();
                  
                  selectFilesButton.setOnClickListener(v -> selectFiles());
                  clearFilesButton.setOnClickListener(v -> clearFiles());
                  trainButton.setOnClickListener(v -> trainModel());
                  generateButton.setOnClickListener(v -> generateText());
                  infoButton.setOnClickListener(v -> showModelInfo());
              }
              
              private void selectFiles() {
                  Intent intent = new Intent(Intent.ACTION_OPEN_DOCUMENT);
                  intent.addCategory(Intent.CATEGORY_OPENABLE);
                  intent.setType("text/plain");
                  intent.putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true);
                  startActivityForResult(intent, PICK_FILES_REQUEST);
              }
              
              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  
                  if (requestCode == PICK_FILES_REQUEST && resultCode == RESULT_OK) {
                      if (data != null) {
                          if (data.getClipData() != null) {
                              int count = data.getClipData().getItemCount();
                              for (int i = 0; i < count && loadedFiles.size() < 15; i++) {
                                  Uri uri = data.getClipData().getItemAt(i).getUri();
                                  loadFile(uri);
                              }
                          } else if (data.getData() != null) {
                              loadFile(data.getData());
                          }
                          
                          updateFilesList();
                          if (loadedFiles.size() > 0) {
                              trainButton.setEnabled(true);
                              statusText.setText("✅ " + loadedFiles.size() + " file(s) loaded. Ready to train!");
                          }
                      }
                  }
              }
              
              private void loadFile(Uri uri) {
                  try {
                      InputStream inputStream = getContentResolver().openInputStream(uri);
                      BufferedReader reader = new BufferedReader(new InputStreamReader(inputStream));
                      
                      File tempFile = new File(getCacheDir(), "temp_" + System.currentTimeMillis() + ".txt");
                      FileWriter writer = new FileWriter(tempFile);
                      
                      String line;
                      while ((line = reader.readLine()) != null) {
                          writer.write(line + "\n");
                      }
                      
                      writer.close();
                      reader.close();
                      
                      String result = ai.addTrainingFile(tempFile.getAbsolutePath());
                      loadedFiles.add(uri.getLastPathSegment() + " - " + result);
                      
                      tempFile.delete();
                      
                  } catch (Exception e) {
                      Toast.makeText(this, "Error loading file: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }
              
              private void updateFilesList() {
                  StringBuilder sb = new StringBuilder();
                  sb.append("📁 Loaded Files (" + loadedFiles.size() + "/15):\n\n");
                  for (int i = 0; i < loadedFiles.size(); i++) {
                      sb.append((i + 1) + ". " + loadedFiles.get(i) + "\n");
                  }
                  filesListText.setText(sb.toString());
              }
              
              private void clearFiles() {
                  loadedFiles.clear();
                  ai.clearTrainingData();
                  filesListText.setText("No files loaded");
                  trainButton.setEnabled(false);
                  statusText.setText("🗑️ Files cleared. Select new files to train.");
                  Toast.makeText(this, "Training data cleared", Toast.LENGTH_SHORT).show();
              }
              
              private void trainModel() {
                  if (loadedFiles.isEmpty()) {
                      Toast.makeText(this, "Please select training files first!", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  int epochs = Integer.parseInt(epochsInput.getText().toString());
                  
                  progressBar.setVisibility(View.VISIBLE);
                  trainButton.setEnabled(false);
                  selectFilesButton.setEnabled(false);
                  clearFilesButton.setEnabled(false);
                  statusText.setText("🔥 Training in progress... This may take a while.");
                  
                  new Thread(() -> {
                      String result = ai.startTraining(epochs);
                      runOnUiThread(() -> {
                          progressBar.setVisibility(View.GONE);
                          statusText.setText("✅ " + result);
                          generateButton.setEnabled(true);
                          trainButton.setEnabled(true);
                          selectFilesButton.setEnabled(true);
                          clearFilesButton.setEnabled(true);
                          
                          AlertDialog.Builder builder = new AlertDialog.Builder(MainActivity.this);
                          builder.setTitle("🎉 Training Complete!");
                          builder.setMessage(result);
                          builder.setPositiveButton("OK", null);
                          builder.show();
                      });
                  }).start();
              }
              
              private void generateText() {
                  String prompt = inputText.getText().toString();
                  if (prompt.isEmpty()) {
                      Toast.makeText(this, "Enter a prompt!", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  progressBar.setVisibility(View.VISIBLE);
                  statusText.setText("🤖 Generating...");
                  
                  new Thread(() -> {
                      String response = ai.generate(prompt, 100);
                      runOnUiThread(() -> {
                          outputText.setText(response);
                          progressBar.setVisibility(View.GONE);
                          statusText.setText("✅ Generation complete!");
                      });
                  }).start();
              }
              
              private void showModelInfo() {
                  String info = ai.getModelInfo();
                  modelInfoText.setText(info);
                  modelInfoText.setVisibility(View.VISIBLE);
              }
          }
