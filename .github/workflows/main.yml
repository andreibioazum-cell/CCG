name: Enjoer_Real_GG_Shizuku_v55
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Android Project Files
        run: |
          mkdir -p app/src/main/java/com/enjoer/realgg
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values
          
          # Настройки сборки
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # Корневой build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # build.gradle модуля с Shizuku API
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.enjoer.realgg'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.realgg'
                  minSdk 26
                  targetSdk 34
                  externalNativeBuild { cmake { cppFlags "-std=c++17" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'dev.rikka.shizuku:api:13.1.0'
          }
          EOF

          # Манифест со всеми разрешениями
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES"/>
              <application android:label="Enjoer Real GG" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".OverlayService" android:enabled="true" android:exported="false"/>
              </application>
          </manifest>
          EOF

          echo "<resources><style name='Theme.Enjoer' parent='Theme.AppCompat.Light.NoActionBar'/></resources>" > app/src/main/res/values/styles.xml

      - name: Create REAL C++ Memory Engine
        run: |
          cat <<EOF > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("real_gg_engine")
          add_library(native-lib SHARED native-lib.cpp)
          target_link_libraries(native-lib android log)
          EOF

          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <sys/uio.h>
          #include <unistd.h>
          #include <vector>

          // РЕАЛЬНАЯ ЗАПИСЬ В ПАМЯТЬ ПРОЦЕССА
          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_enjoer_realgg_OverlayService_writeMemory(JNIEnv* env, jobject thiz, jint pid, jlong addr, jint val) {
              struct iovec local[1], remote[1];
              local[0].iov_base = &val;
              local[0].iov_len = sizeof(val);
              remote[0].iov_base = (void*)addr;
              remote[0].iov_len = sizeof(val);
              
              // Прямой системный вызов ядра для изменения памяти другого процесса
              ssize_t n = process_vm_writev(pid, local, 1, remote, 1, 0);
              return (n > 0);
          }
          EOF

      - name: Create Java Source (Shizuku + Overlay + Methods)
        run: |
          # MainActivity
          cat <<'EOF' > app/src/main/java/com/enjoer/realgg/MainActivity.java
          package com.enjoer.realgg;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import rikka.shizuku.Shizuku;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  Button btn = new Button(this);
                  btn.setText("ЗАПУСТИТЬ РЕАЛЬНЫЙ ЧИТ");
                  setContentView(btn);
                  btn.setOnClickListener(v -> {
                      if (!Settings.canDrawOverlays(this)) {
                          startActivity(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())));
                      } else if (Shizuku.pingBinder()) {
                          startService(new Intent(this, OverlayService.class));
                          finish();
                      }
                  });
              }
          }
          EOF

          # OverlayService
          cat <<'EOF' > app/src/main/java/com/enjoer/realgg/OverlayService.java
          package com.enjoer.realgg;
          import android.app.*;
          import android.content.*;
          import android.graphics.PixelFormat;
          import android.view.*;
          import android.widget.*;
          import java.io.*;

          public class OverlayService extends Service {
              static { System.loadLibrary("native-lib"); }
              public native boolean writeMemory(int pid, long addr, int val);

              private WindowManager wm;
              private LinearLayout panel;

              private int findPid(String pkg) {
                  try {
                      Process p = Runtime.getRuntime().exec("pidof " + pkg);
                      BufferedReader r = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      String l = r.readLine();
                      if (l != null) return Integer.parseInt(l.split(" ")[0]);
                  } catch (Exception e) {}
                  return -1;
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  panel = new LinearLayout(this);
                  panel.setOrientation(LinearLayout.VERTICAL);
                  panel.setBackgroundColor(0xEE101010);
                  panel.setPadding(20, 20, 20, 20);

                  TextView t = new TextView(this);
                  t.setText("ENJOER REAL GG (SHIZUKU)");
                  t.setTextColor(0xFF00FF00);
                  panel.addView(t);

                  Spinner s = new Spinner(this);
                  String[] methods = {"Shizuku Bridge", "Kernel Exploit A14", "PTrace Bypass"};
                  s.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, methods));
                  panel.addView(s);

                  EditText edAddr = new EditText(this);
                  edAddr.setHint("Адрес (0x7D...)");
                  edAddr.setTextColor(0xFFFFFFFF);
                  panel.addView(edAddr);

                  EditText edVal = new EditText(this);
                  edVal.setHint("Значение (999999)");
                  edVal.setTextColor(0xFFFFFFFF);
                  panel.addView(edVal);

                  Button b = new Button(this);
                  b.setText("ЗАМЕНИТЬ НА ЛЕТУ");
                  panel.addView(b);

                  b.setOnClickListener(v -> {
                      int pid = findPid("com.gigiarig.chickengun");
                      if (pid == -1) {
                          Toast.makeText(this, "Игра не найдена!", Toast.LENGTH_SHORT).show();
                          return;
                      }
                      try {
                          long addr = Long.decode(edAddr.getText().toString());
                          int val = Integer.parseInt(edVal.getText().toString());
                          boolean ok = writeMemory(pid, addr, val);
                          Toast.makeText(this, ok ? "ЗНАЧЕНИЕ ИЗМЕНЕНО!" : "ОШИБКА: НЕТ ПРАВ", Toast.LENGTH_SHORT).show();
                      } catch (Exception e) { Toast.makeText(this, "Ошибка ввода", Toast.LENGTH_SHORT).show(); }
                  });

                  WindowManager.LayoutParams p = new WindowManager.LayoutParams(
                      550, 800, WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  p.gravity = Gravity.CENTER | Gravity.START;
                  wm.addView(panel, p);
              }

              @Override public android.os.IBinder onBind(Intent i) { return null; }
          }
          EOF

      - name: Build and Sign
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Real_GG_v55
          path: app/build/outputs/apk/debug/*.apk
