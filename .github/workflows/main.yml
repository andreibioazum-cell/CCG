name: TelegramUI
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/tgui/app
          mkdir -p app/src/main/res/{layout,values,drawable}

          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > settings.gradle
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.tgui.app'
              compileSdk 34
              defaultConfig { applicationId 'com.tgui.app'; minSdk 24; targetSdk 34 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
          }
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:statusBarColor">#517DA2</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_toolbar.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#517DA2"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_avatar.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#0088CC"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_avatar_g.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#4CAF50"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_avatar_o.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#FF9800"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_avatar_p.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#9C27B0"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_avatar_r.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#F44336"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_badge.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#0088CC"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_online.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#4CAF50"/><stroke android:width="2dp" android:color="#FFF"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_fab.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#0088CC"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_send.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#0088CC"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_msg_out.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#EFFDDE"/><corners android:topLeftRadius="16dp" android:topRightRadius="16dp" android:bottomLeftRadius="16dp" android:bottomRightRadius="4dp"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_msg_in.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#FFFFFF"/><corners android:topLeftRadius="4dp" android:topRightRadius="16dp" android:bottomLeftRadius="16dp" android:bottomRightRadius="16dp"/></shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_menu.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFF" android:pathData="M3,18h18v-2H3v2zm0,-5h18v-2H3v2zm0,-7v2h18V6H3z"/></vector>
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_search.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24"><path android:fillColor="#FFF" android:pathData="M15.5,14h-0.79l-0.28,-0.27A6.47,6.47 0,0 0,16 9.5,6.5 6.5,0 1,0,9.5 16c1.61,0 3.09,-0.59 4.23,-1.57l0.27,0.28v0.79l5,5L20.49,19l-5,-5zM9.5,14C7.01,14 5,11.99 5,9.5S7.01,5 9.5,5 14,7.01 14,9.5 11.99,14 9.5,14z"/></vector>
