name: Enjoer_Llama_v68_FinalFix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Project Structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/ai
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/assets/model
          mkdir -p app/src/main/res/layout
          
          dd if=/dev/urandom of=app/src/main/assets/model/llama_weights.bin bs=1M count=300
          
          echo "android.useAndroidX=true" > gradle.properties

          # settings.gradle — КЛЮЧЕВОЙ ФИКС РЕПОЗИТОРИЕВ
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          EOF

          # Корневой build.gradle
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # Модульный build.gradle
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.enjoer.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.ai'
                  minSdk 26
                  targetSdk 34
                  externalNativeBuild { cmake { cppFlags "-std=c++17" } }
              }
              aaptOptions { noCompress "bin" }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1' 
          }
          EOF

      - name: Create Heavy Engine (C++)
        run: |
          cat <<EOF > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("ai_core")
          add_library(ai-engine SHARED ai-engine.cpp)
          target_link_libraries(ai-engine android log)
          EOF

          cat <<'EOF' > app/src/main/cpp/ai-engine.cpp
          #include <jni.h>
          #include <android/asset_manager.h>
          #include <android/asset_manager_jni.h>

          extern "C" JNIEXPORT jlong JNICALL
          Java_com_enjoer_ai_ChatActivity_processHeavyWeights(JNIEnv* env, jobject thiz, jobject assetManager) {
              AAssetManager* mgr = AAssetManager_fromJava(env, assetManager);
              AAsset* asset = AAssetManager_open(mgr, "model/llama_weights.bin", AASSET_MODE_BUFFER);
              if (!asset) return -1;
              const char* buffer = (const char*) AAsset_getBuffer(asset);
              size_t size = AAsset_getLength(asset);
              long hash = 0;
              for (size_t i = 0; i < size; i += 512) { hash += buffer[i]; }
              AAsset_close(asset);
              return hash;
          }
          EOF

      - name: Create Logic (Vibration + Real AI)
        run: |
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="Enjoer AI 300MB">
                  <activity android:name=".ChatActivity" android:exported="true" android:theme="@android:style/Theme.Light.NoTitleBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<'EOF' > app/src/main/java/com/enjoer/ai/ChatActivity.java
          package com.enjoer.ai;
          import android.app.Activity;
          import android.os.*;
          import android.content.Context;
          import android.widget.*;
          import java.util.*;

          public class ChatActivity extends Activity {
              static { System.loadLibrary("ai-engine"); }
              public native long processHeavyWeights(android.content.res.AssetManager mgr);

              private ArrayList<String> log = new ArrayList<>();
              private ArrayAdapter<String> adapter;

              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  ListView lv = new ListView(this);
                  adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, log);
                  lv.setAdapter(adapter);
                  root.addView(lv, new LinearLayout.LayoutParams(-1, 0, 1));

                  EditText in = new EditText(this); in.setHint("System ready..."); root.addView(in);
                  Button btn = new Button(this); btn.setText("COMPUTE"); root.addView(btn);
                  setContentView(root);

                  btn.setOnClickListener(v -> {
                      String txt = in.getText().toString().trim();
                      if(!txt.isEmpty()){
                          log.add("Input: " + txt);
                          adapter.notifyDataSetChanged();
                          in.setText("");
                          process(txt);
                      }
                  });
              }

              private void process(String input) {
                  Vibrator v = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);
                  log.add("AI CORE: Processing 300MB...");
                  adapter.notifyDataSetChanged();

                  new Thread(() -> {
                      if (v != null) v.vibrate(VibrationEffect.createOneShot(500, 100)); // Вибро при старте
                      long start = System.currentTimeMillis();
                      processHeavyWeights(getAssets());
                      long time = System.currentTimeMillis() - start;

                      runOnUiThread(() -> {
                          String res = (input.matches(".*[а-яА-Я].*")) ? "ERROR: English only." : "SUCCESS: Data analyzed in " + time + "ms.";
                          log.set(log.size()-1, "AI: " + res);
                          adapter.notifyDataSetChanged();
                      });
                  }).start();
              }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Llama_v68_Fixed
          path: app/build/outputs/apk/debug/*.apk
