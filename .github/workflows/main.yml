name: Cubic_Battle_Game
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/cubic/battle
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- CONFIG ---
          cat > settings.gradle << 'EOF'
          include ':app'
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.cubic.battle'
              compileSdk 34
              defaultConfig { applicationId "com.cubic.battle"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          # --- UI: MENU ---
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_centerInParent="true" android:gravity="center">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="CUBIC BATTLE" android:textColor="#FFF" android:textSize="40sp" android:textStyle="bold" android:fontFamily="sans-serif-black"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="В новых красках 🎨" android:textColor="#FF4444" android:textSize="18sp" android:layout_marginBottom="30dp"/>
                  <Button android:id="@+id/btnModes" android:layout_width="250dp" android:layout_height="50dp" android:text="Режимы" android:backgroundTint="#8A2BE2" android:textColor="#FFF"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # --- GAME ENGINE CODE ---
          cat > app/src/main/java/com/cubic/battle/GameView.java << 'EOF'
          package com.cubic.battle;
          import android.content.Context;
          import android.graphics.*;
          import android.view.*;
          import java.util.*;

          public class GameView extends View {
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              private float px=200, py=200, pAngle=0; // Игрок
              private float joyX=200, joyY=800, curJoyX=200, curJoyY=800; // Джойстик
              private boolean joyActive = false, atkActive = false;
              private float atkX, atkY, aimAngle = 0;
              
              private List<PointF> enemies = new ArrayList<>();
              private float score = 10079;

              public GameView(Context c) {
                  super(c);
                  for(int i=0; i<5; i++) enemies.add(new PointF(600 + i*200, 300 + i*100));
              }

              @Override protected void onDraw(Canvas canvas) {
                  // 1. Фон (Песок) - Исправлен баг черного фона
                  canvas.drawColor(Color.parseColor("#D2B48C"));
                  p.setColor(Color.parseColor("#C2A47C"));
                  for(int i=0; i<2000; i+=100) canvas.drawLine(0, i, 2000, i, p);

                  // 2. Отрисовка Врагов
                  p.setColor(Color.BLACK);
                  for(PointF e : enemies) {
                      canvas.drawRect(e.x, e.y, e.x+80, e.y+80, p);
                      p.setColor(Color.WHITE);
                      canvas.drawRect(e.x+15, e.y+15, e.x+35, e.y+35, p);
                      canvas.drawRect(e.x+45, e.y+15, e.x+65, e.y+35, p);
                      p.setColor(Color.BLACK);
                  }

                  // 3. Игрок
                  canvas.save();
                  canvas.translate(px+40, py+40);
                  canvas.rotate((float)Math.toDegrees(pAngle));
                  p.setColor(Color.BLACK);
                  canvas.drawRect(-40, -40, 40, 40, p);
                  p.setColor(Color.WHITE);
                  canvas.drawRect(-25, -25, -5, -5, p);
                  canvas.drawRect(5, -25, 25, -5, p);
                  
                  // Прицел (Линия)
                  if(atkActive) {
                      p.setColor(Color.RED);
                      p.setStrokeWidth(5);
                      canvas.drawLine(0, 0, 300, 0, p); // Линия направления
                      canvas.drawCircle(300, 0, 10, p);
                  }
                  canvas.restore();

                  // 4. Интерфейс (Джойстик и кнопки)
                  p.setColor(Color.argb(100, 0, 0, 0));
                  canvas.drawCircle(joyX, joyY, 100, p);
                  canvas.drawCircle(curJoyX, curJoyY, 50, p);

                  p.setColor(atkActive ? Color.RED : Color.parseColor("#8A2BE2"));
                  canvas.drawCircle(getWidth()-200, getHeight()-200, 80, p); // Кнопка атаки
                  p.setColor(Color.WHITE); p.setTextSize(30);
                  canvas.drawText("АТАКА", getWidth()-250, getHeight()-190, p);

                  // Текст сверху
                  p.setColor(Color.BLACK); p.setTextSize(50);
                  canvas.drawText("Счет: " + (int)score, 50, 80, p);

                  update();
                  invalidate();
              }

              private void update() {
                  if(joyActive) {
                      float dx = curJoyX - joyX;
                      float dy = curJoyY - joyY;
                      float dist = (float)Math.sqrt(dx*dx + dy*dy);
                      if(dist > 0) {
                          float speed = 5;
                          px += (dx/dist) * speed;
                          py += (dy/dist) * speed;
                          pAngle = (float)Math.atan2(dy, dx);
                      }
                  }
              }

              @Override public boolean onTouchEvent(MotionEvent e) {
                  int action = e.getActionMasked();
                  int index = e.getActionIndex();
                  float tx = e.getX(index);
                  float ty = e.getY(index);

                  switch(action) {
                      case MotionEvent.ACTION_DOWN:
                      case MotionEvent.ACTION_POINTER_DOWN:
                          if(tx < getWidth()/2) {
                              joyActive = true;
                              curJoyX = tx; curJoyY = ty;
                          } else {
                              atkActive = true;
                          }
                          break;
                      case MotionEvent.ACTION_MOVE:
                          for(int i=0; i<e.getPointerCount(); i++) {
                              float x = e.getX(i);
                              float y = e.getY(i);
                              if(x < getWidth()/2) {
                                  curJoyX = x; curJoyY = y;
                              } else if(atkActive) {
                                  // Механика прицела с лимитом 35 градусов
                                  float targetAngle = (float)Math.atan2(y - (py+40), x - (px+40));
                                  float diff = targetAngle - pAngle;
                                  // Нормализация угла
                                  while (diff > Math.PI) diff -= 2*Math.PI;
                                  while (diff < -Math.PI) diff += 2*Math.PI;

                                  float limit = (float)Math.toRadians(35);
                                  if(Math.abs(diff) < limit) {
                                      pAngle = targetAngle; // Позволяем вращать игрока в секторе
                                  }
                              }
                          }
                          break;
                      case MotionEvent.ACTION_UP:
                      case MotionEvent.ACTION_POINTER_UP:
                          if(tx < getWidth()/2) joyActive = false; curJoyX = joyX; curJoyY = joyY;
                          if(tx > getWidth()/2) atkActive = false;
                          break;
                  }
                  return true;
              }
          }
          EOF

          cat > app/src/main/java/com/cubic/battle/MainActivity.java << 'EOF'
          package com.cubic.battle;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.Button;

          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  Button btn = findViewById(R.id.btnModes);
                  btn.setOnClickListener(v -> {
                      setContentView(new GameView(this));
                  });
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Cubic Battle" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cubic_Battle_Alpha
          path: app/build/outputs/apk/debug/app-debug.apk
