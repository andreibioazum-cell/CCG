                  blocks.add(new Block(-12,2,-20, 5,4,5, 0.2f,0.8f,0.2f));
                  blocks.add(new Block(12,2,-20, 5,4,5, 0.2f,0.2f,0.8f));
                  blocks.add(new Block(0,1,-35, 12,2,12, 0.8f,0.8f,0.2f));
                  blocks.add(new Block(-18,5,-45, 5,10,5, 0.8f,0.2f,0.8f));
