              private void showAssignTextureDialog(int objectIndex){
                  ProjectItem p = currentProject();
                  SceneItem s = currentScene();
                  if(p == null || s == null) return;

                  String[] items = new String[p.textures.size()+1];
                  items[0] = "+ Импортировать новую";
                  for(int i=0;i<p.textures.size();i++) items[i+1] = p.textures.get(i).name;

                  new AlertDialog.Builder(this)
                      .setTitle("Назначить текстуру")
                      .setItems(items, (d,w) -> {
                          ObjectItem o = s.objects.get(objectIndex);
                          if(w == 0){
                              pendingTextureProject = currentProject;
                              pendingAssignProject = currentProject;
                              pendingAssignScene = currentScene;
                              pendingAssignObject = objectIndex;
                              openImagePicker();
                          } else {
                              TextureItem tx = p.textures.get(w-1);
                              o.spriteType = "texture";
                              o.textureId = tx.id;
                              saveAll();
                              renderObjects();
                          }
                      })
                      .show();
              }

