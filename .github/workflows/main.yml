name: Enjoer_5.0_Save_System
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
          </style></resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/><solid android:color="#101820"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue_filled.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/><solid android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_red.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/><solid android:color="#101820"/><stroke android:width="2dp" android:color="#FF4444"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_green.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/><solid android:color="#44FF44"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_orange.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/><solid android:color="#FF8800"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#CC101820"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/panel_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="8dp"/><solid android:color="#E6101820"/><stroke android:width="1dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/color_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#FFF"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          # === LAYOUT ===
          cat <<'LAYOUTEOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#050A12">
              
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent"/>
              
              <!-- Game UI -->
              <RelativeLayout android:id="@+id/game_ui" android:layout_width="match_parent" 
                  android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <Button android:id="@+id/btn_menu" android:layout_width="50dp" android:layout_height="50dp"
                      android:layout_margin="10dp" android:text="≡" android:textSize="24sp" 
                      android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="140dp" android:layout_height="140dp"
                      android:layout_alignParentBottom="true" android:layout_alignParentLeft="true"
                      android:layout_marginLeft="40dp" android:layout_marginBottom="40dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/joy_stick" android:layout_width="60dp" android:layout_height="60dp"
                      android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="40dp" android:layout_marginTop="40dp" android:background="@drawable/joy_stick"/>
                  <Button android:id="@+id/btn_jump" android:layout_width="100dp" android:layout_height="100dp"
                      android:layout_alignParentRight="true" android:layout_alignParentBottom="true"
                      android:layout_marginRight="40dp" android:layout_marginBottom="40dp"
                      android:text="JUMP" android:textSize="16sp" android:background="@drawable/btn_blue" android:textColor="#FFF"/>
              </RelativeLayout>

              <!-- Engine UI -->
              <RelativeLayout android:id="@+id/engine_ui" android:layout_width="match_parent" 
                  android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/engine_touch_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:layout_alignParentTop="true" android:orientation="horizontal" android:padding="10dp">
                      <Button android:id="@+id/btn_engine_menu" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="≡" android:textSize="24sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                      <View android:layout_width="0dp" android:layout_height="1dp" android:layout_weight="1"/>
                      <Button android:id="@+id/btn_save" android:layout_width="70dp" android:layout_height="50dp"
                          android:text="SAVE" android:textSize="12sp" android:background="@drawable/btn_orange" android:textColor="#000"/>
                      <Button android:id="@+id/btn_load" android:layout_width="70dp" android:layout_height="50dp"
                          android:text="LOAD" android:textSize="12sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="10dp"/>
                      <Button android:id="@+id/btn_play_level" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="▶" android:textSize="20sp" android:background="@drawable/btn_green" android:textColor="#000" android:layout_marginLeft="10dp"/>
                  </LinearLayout>

                  <FrameLayout android:id="@+id/engine_joy_base" android:layout_width="130dp" android:layout_height="130dp"
                      android:layout_alignParentBottom="true" android:layout_alignParentLeft="true"
                      android:layout_marginLeft="30dp" android:layout_marginBottom="30dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/engine_joy_stick" android:layout_width="55dp" android:layout_height="55dp"
                      android:layout_alignLeft="@id/engine_joy_base" android:layout_alignTop="@id/engine_joy_base"
                      android:layout_marginLeft="37dp" android:layout_marginTop="37dp" android:background="@drawable/joy_stick"/>

                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_above="@id/engine_joy_base" android:layout_alignParentLeft="true"
                      android:layout_marginLeft="45dp" android:layout_marginBottom="10dp" android:orientation="horizontal">
                      <Button android:id="@+id/btn_down" android:layout_width="55dp" android:layout_height="55dp"
                          android:text="▼" android:textSize="20sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                      <Button android:id="@+id/btn_up" android:layout_width="55dp" android:layout_height="55dp"
                          android:text="▲" android:textSize="20sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="10dp"/>
                  </LinearLayout>

                  <ScrollView android:id="@+id/tools_scroll" android:layout_width="180dp" android:layout_height="match_parent"
                      android:layout_alignParentRight="true" android:layout_marginRight="10dp" android:layout_marginTop="70dp" android:layout_marginBottom="10dp">
                      <LinearLayout android:id="@+id/tools_panel" android:layout_width="match_parent" android:layout_height="wrap_content"
                          android:orientation="vertical" android:background="@drawable/panel_bg" android:padding="10dp">
                          
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="SHAPE" android:textColor="#00BFFF" android:textSize="11sp" android:layout_marginBottom="5dp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                              <Button android:id="@+id/shape_cube" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="■" android:textSize="16sp" android:background="@drawable/btn_blue_filled" android:textColor="#000"/>
                              <Button android:id="@+id/shape_flat" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="▬" android:textSize="16sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                              <Button android:id="@+id/shape_tall" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="▮" android:textSize="16sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="SIZE" android:textColor="#00BFFF" android:textSize="11sp" android:layout_marginTop="8dp" android:layout_marginBottom="5dp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                              <Button android:id="@+id/size_s" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="S" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                              <Button android:id="@+id/size_m" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="M" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginLeft="4dp"/>
                              <Button android:id="@+id/size_l" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="L" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="COLOR" android:textColor="#00BFFF" android:textSize="11sp" android:layout_marginTop="8dp" android:layout_marginBottom="5dp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center">
                              <View android:id="@+id/color_red" android:layout_width="28dp" android:layout_height="28dp" android:background="@drawable/color_btn" android:backgroundTint="#FF4444"/>
                              <View android:id="@+id/color_green" android:layout_width="28dp" android:layout_height="28dp" android:background="@drawable/color_btn" android:backgroundTint="#44FF44" android:layout_marginLeft="6dp"/>
                              <View android:id="@+id/color_blue" android:layout_width="28dp" android:layout_height="28dp" android:background="@drawable/color_btn" android:backgroundTint="#4444FF" android:layout_marginLeft="6dp"/>
                              <View android:id="@+id/color_yellow" android:layout_width="28dp" android:layout_height="28dp" android:background="@drawable/color_btn" android:backgroundTint="#FFFF44" android:layout_marginLeft="6dp"/>
                              <View android:id="@+id/color_white" android:layout_width="28dp" android:layout_height="28dp" android:background="@drawable/color_btn" android:backgroundTint="#FFFFFF" android:layout_marginLeft="6dp"/>
                          </LinearLayout>
                          
                          <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                              android:text="DISTANCE" android:textColor="#00BFFF" android:textSize="11sp" android:layout_marginTop="8dp" android:layout_marginBottom="5dp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                              <Button android:id="@+id/dist_near" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="3" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                              <Button android:id="@+id/dist_mid" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="6" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginLeft="4dp"/>
                              <Button android:id="@+id/dist_far" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1"
                                  android:text="12" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          
                          <Button android:id="@+id/btn_place" android:layout_width="match_parent" android:layout_height="44dp"
                              android:text="+ PLACE" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginTop="12dp"/>
                          <Button android:id="@+id/btn_delete" android:layout_width="match_parent" android:layout_height="36dp"
                              android:text="DELETE" android:background="@drawable/btn_red" android:textColor="#FF4444" android:layout_marginTop="8dp"/>
                          <Button android:id="@+id/btn_deselect" android:layout_width="match_parent" android:layout_height="36dp"
                              android:text="DESELECT" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="8dp"/>
                      </LinearLayout>
                  </ScrollView>

                  <LinearLayout android:id="@+id/axis_panel" android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="20dp"
                      android:orientation="horizontal" android:background="@drawable/panel_bg" android:padding="8dp" android:visibility="gone">
                      <Button android:id="@+id/axis_x_minus" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="X-" android:background="@drawable/btn_blue" android:textColor="#FF4444"/>
                      <Button android:id="@+id/axis_x_plus" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="X+" android:background="@drawable/btn_blue" android:textColor="#FF4444" android:layout_marginLeft="4dp"/>
                      <Button android:id="@+id/axis_y_minus" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="Y-" android:background="@drawable/btn_blue" android:textColor="#44FF44" android:layout_marginLeft="12dp"/>
                      <Button android:id="@+id/axis_y_plus" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="Y+" android:background="@drawable/btn_blue" android:textColor="#44FF44" android:layout_marginLeft="4dp"/>
                      <Button android:id="@+id/axis_z_minus" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="Z-" android:background="@drawable/btn_blue" android:textColor="#4444FF" android:layout_marginLeft="12dp"/>
                      <Button android:id="@+id/axis_z_plus" android:layout_width="50dp" android:layout_height="50dp"
                          android:text="Z+" android:background="@drawable/btn_blue" android:textColor="#4444FF" android:layout_marginLeft="4dp"/>
                  </LinearLayout>

                  <View android:id="@+id/crosshair" android:layout_width="8dp" android:layout_height="8dp"
                      android:layout_centerInParent="true" android:background="#00BFFF"/>
              </RelativeLayout>

              <!-- Playtest UI -->
              <RelativeLayout android:id="@+id/playtest_ui" android:layout_width="match_parent" 
                  android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/playtest_look_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <Button android:id="@+id/btn_stop_playtest" android:layout_width="50dp" android:layout_height="50dp"
                      android:layout_margin="10dp" android:text="■" android:textSize="20sp" android:background="@drawable/btn_red" android:textColor="#FFF"/>
                  <FrameLayout android:id="@+id/playtest_joy_base" android:layout_width="140dp" android:layout_height="140dp"
                      android:layout_alignParentBottom="true" android:layout_alignParentLeft="true"
                      android:layout_marginLeft="40dp" android:layout_marginBottom="40dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/playtest_joy_stick" android:layout_width="60dp" android:layout_height="60dp"
                      android:layout_alignLeft="@id/playtest_joy_base" android:layout_alignTop="@id/playtest_joy_base"
                      android:layout_marginLeft="40dp" android:layout_marginTop="40dp" android:background="@drawable/joy_stick"/>
                  <Button android:id="@+id/btn_playtest_jump" android:layout_width="100dp" android:layout_height="100dp"
                      android:layout_alignParentRight="true" android:layout_alignParentBottom="true"
                      android:layout_marginRight="40dp" android:layout_marginBottom="40dp"
                      android:text="JUMP" android:textSize="16sp" android:background="@drawable/btn_blue" android:textColor="#FFF"/>
              </RelativeLayout>

              <!-- Menu UI -->
              <LinearLayout android:id="@+id/menu_ui" android:layout_width="match_parent" android:layout_height="match_parent"
                  android:orientation="vertical" android:gravity="center" android:background="#F0050A12">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="ENJOER" android:textSize="48sp" android:textColor="#00BFFF" android:textStyle="bold"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="ENGINE" android:textSize="24sp" android:textColor="#0088CC" android:layout_marginBottom="60dp"/>
                  <Button android:id="@+id/btn_play" android:layout_width="280dp" android:layout_height="60dp"
                      android:text="PLAY" android:textSize="18sp" android:textColor="#FFF" android:background="@drawable/btn_blue_filled" android:layout_marginBottom="20dp"/>
                  <Button android:id="@+id/btn_engine" android:layout_width="280dp" android:layout_height="60dp"
                      android:text="ENGINE" android:textSize="18sp" android:textColor="#00BFFF" android:background="@drawable/btn_blue" android:layout_marginBottom="20dp"/>
                  <Button android:id="@+id/btn_load_and_play" android:layout_width="280dp" android:layout_height="60dp"
                      android:text="LOAD LEVEL" android:textSize="18sp" android:textColor="#FF8800" android:background="@drawable/btn_blue"/>
              </LinearLayout>

              <!-- Save Dialog -->
              <LinearLayout android:id="@+id/save_dialog" android:layout_width="300dp" android:layout_height="wrap_content"
                  android:layout_gravity="center" android:orientation="vertical" android:background="@drawable/panel_bg"
                  android:padding="20dp" android:visibility="gone">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="SAVE LEVEL" android:textColor="#00BFFF" android:textSize="18sp" android:layout_marginBottom="15dp"/>
                  <EditText android:id="@+id/level_name_input" android:layout_width="match_parent" android:layout_height="50dp"
                      android:hint="Level name" android:textColor="#FFF" android:textColorHint="#666" android:background="@drawable/btn_blue"
                      android:padding="10dp" android:inputType="text"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="horizontal" android:layout_marginTop="15dp">
                      <Button android:id="@+id/btn_cancel_save" android:layout_width="0dp" android:layout_height="45dp" android:layout_weight="1"
                          android:text="CANCEL" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                      <Button android:id="@+id/btn_confirm_save" android:layout_width="0dp" android:layout_height="45dp" android:layout_weight="1"
                          android:text="SAVE" android:background="@drawable/btn_green" android:textColor="#000" android:layout_marginLeft="10dp"/>
                  </LinearLayout>
              </LinearLayout>

              <!-- Load Dialog -->
              <LinearLayout android:id="@+id/load_dialog" android:layout_width="350dp" android:layout_height="wrap_content"
                  android:layout_gravity="center" android:orientation="vertical" android:background="@drawable/panel_bg"
                  android:padding="20dp" android:visibility="gone">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="LOAD LEVEL" android:textColor="#00BFFF" android:textSize="18sp" android:layout_marginBottom="15dp"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="200dp">
                      <LinearLayout android:id="@+id/levels_list" android:layout_width="match_parent" android:layout_height="wrap_content"
                          android:orientation="vertical"/>
                  </ScrollView>
                  <Button android:id="@+id/btn_cancel_load" android:layout_width="match_parent" android:layout_height="45dp"
                      android:text="CANCEL" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="15dp"/>
              </LinearLayout>
          </FrameLayout>
          LAYOUTEOF

          # === Block.java ===
          cat <<'BLOCKEOF' > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;

          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) {
                  this.x = x; this.y = y; this.z = z;
                  this.sx = sx; this.sy = sy; this.sz = sz;
                  this.r = r; this.g = g; this.b = b;
              }
              
              public float minX() { return x - sx/2; }
              public float maxX() { return x + sx/2; }
              public float minY() { return y - sy/2; }
              public float maxY() { return y + sy/2; }
              public float minZ() { return z - sz/2; }
              public float maxZ() { return z + sz/2; }
          }
          BLOCKEOF

          # === LevelManager.java ===
          cat <<'LEVELMGREOF' > app/src/main/java/com/enjoer/game/LevelManager.java
          package com.enjoer.game;

          import android.content.Context;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.*;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.concurrent.CopyOnWriteArrayList;

          public class LevelManager {
              private static final String DIR = "levels";
              
              public static void saveLevel(Context ctx, String name, CopyOnWriteArrayList<Block> blocks) {
                  try {
                      File dir = new File(ctx.getFilesDir(), DIR);
                      if(!dir.exists()) dir.mkdirs();
                      JSONObject level = new JSONObject();
                      level.put("name", name);
                      JSONArray arr = new JSONArray();
                      for(Block b : blocks) {
                          JSONObject o = new JSONObject();
                          o.put("x", b.x); o.put("y", b.y); o.put("z", b.z);
                          o.put("sx", b.sx); o.put("sy", b.sy); o.put("sz", b.sz);
                          o.put("r", b.r); o.put("g", b.g); o.put("b", b.b);
                          arr.put(o);
                      }
                      level.put("blocks", arr);
                      FileWriter w = new FileWriter(new File(dir, name + ".json"));
                      w.write(level.toString(2));
                      w.close();
                  } catch(Exception e) { e.printStackTrace(); }
              }
              
              public static CopyOnWriteArrayList<Block> loadLevel(Context ctx, String name) {
                  CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
                  try {
                      File f = new File(new File(ctx.getFilesDir(), DIR), name + ".json");
                      BufferedReader r = new BufferedReader(new FileReader(f));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while((line = r.readLine()) != null) sb.append(line);
                      r.close();
                      JSONArray arr = new JSONObject(sb.toString()).getJSONArray("blocks");
                      for(int i = 0; i < arr.length(); i++) {
                          JSONObject o = arr.getJSONObject(i);
                          blocks.add(new Block(
                              (float)o.getDouble("x"), (float)o.getDouble("y"), (float)o.getDouble("z"),
                              (float)o.getDouble("sx"), (float)o.getDouble("sy"), (float)o.getDouble("sz"),
                              (float)o.getDouble("r"), (float)o.getDouble("g"), (float)o.getDouble("b")));
                      }
                  } catch(Exception e) { e.printStackTrace(); }
                  return blocks;
              }
              
              public static List<String> getLevelsList(Context ctx) {
                  List<String> list = new ArrayList<>();
                  File dir = new File(ctx.getFilesDir(), DIR);
                  if(dir.exists()) {
                      File[] files = dir.listFiles((d, n) -> n.endsWith(".json"));
                      if(files != null) for(File f : files) list.add(f.getName().replace(".json", ""));
                  }
                  return list;
              }
          }
          LEVELMGREOF

          # === GameRenderer.java ===
          cat <<'RENDEREREOF' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;

          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
