name: Pocket_Code_Ultra_RU_v3_Fixed2
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/pocketultra/ruv3
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowBackground">#F2F8FD</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_panel.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFFFFF"/>
            <corners android:radius="16dp"/>
            <stroke android:width="1dp" android:color="#D6E6F2"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_stage.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#D8F0FF"/>
            <corners android:radius="18dp"/>
            <stroke android:width="2dp" android:color="#8AC4E8"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#4C97FF"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_green.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#5FD36E"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_red.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FF6F6F"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_orange.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFAB19"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_purple.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#9966FF"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_gray.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#5F7080"/>
            <corners android:radius="12dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_event.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFBF00"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_motion.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#4C97FF"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_looks.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#9966FF"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_control.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFAB19"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_data.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FF8C1A"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_signal.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#E1A91A"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#F2F8FD">

              <LinearLayout
                  android:id="@+id/screen_projects"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp">

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Проекты"
                      android:textSize="26sp"
                      android:textStyle="bold"
                      android:textColor="#2D678F"/>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:layout_marginTop="10dp">

                      <Button
                          android:id="@+id/btn_new_project"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:text="+ Новый проект"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_blue"/>

                      <Button
                          android:id="@+id/btn_data_manager"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:layout_marginLeft="8dp"
                          android:text="Данные"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_orange"/>
                  </LinearLayout>

                  <ScrollView
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:id="@+id/projects_list"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"/>
                  </ScrollView>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/screen_scenes"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp"
                  android:visibility="gone">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/back_to_projects"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="←"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_red"/>

                      <TextView
                          android:id="@+id/txt_project_title"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Сцены"
                          android:textSize="24sp"
                          android:textStyle="bold"
                          android:textColor="#2D678F"
                          android:gravity="center_vertical"
                          android:paddingLeft="12dp"/>
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:layout_marginTop="12dp">

                      <Button
                          android:id="@+id/btn_new_scene"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:text="+ Новая сцена"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_purple"/>

                      <Button
                          android:id="@+id/btn_texture_library"
                          android:layout_width="0dp"
                          android:layout_height="48dp"
                          android:layout_weight="1"
                          android:layout_marginLeft="8dp"
                          android:text="Текстуры"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_blue"/>
                  </LinearLayout>

                  <ScrollView
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:id="@+id/scenes_list"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"/>
                  </ScrollView>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/screen_objects"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp"
                  android:visibility="gone">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/back_to_scenes"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="←"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_red"/>

                      <TextView
                          android:id="@+id/txt_scene_title"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Объекты"
                          android:textSize="24sp"
                          android:textStyle="bold"
                          android:textColor="#2D678F"
                          android:gravity="center_vertical"
                          android:paddingLeft="12dp"/>

                      <Button
                          android:id="@+id/btn_play_scene"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="Запуск"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_green"/>
                  </LinearLayout>

                  <Button
                      android:id="@+id/btn_new_object"
                      android:layout_width="match_parent"
                      android:layout_height="48dp"
                      android:text="+ Новый объект"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/btn_blue"
                      android:layout_marginTop="12dp"/>

                  <ScrollView
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:id="@+id/objects_list"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"/>
                  </ScrollView>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/screen_scripts"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp"
                  android:visibility="gone">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/back_to_objects"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="←"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_red"/>

                      <TextView
                          android:id="@+id/txt_object_title"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Скрипты"
                          android:textSize="24sp"
                          android:textStyle="bold"
                          android:textColor="#2D678F"
                          android:gravity="center_vertical"
                          android:paddingLeft="12dp"/>

                      <Button
                          android:id="@+id/btn_formula_manager"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="Формулы"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_orange"/>
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:orientation="vertical"
                      android:background="@drawable/bg_panel"
                      android:padding="10dp"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal">

                          <TextView
                              android:layout_width="0dp"
                              android:layout_height="wrap_content"
                              android:layout_weight="1"
                              android:text="Блоки"
                              android:textStyle="bold"
                              android:textSize="18sp"
                              android:textColor="#356D99"/>

                          <Button
                              android:id="@+id/btn_add_block"
                              android:layout_width="44dp"
                              android:layout_height="44dp"
                              android:text="+"
                              android:textColor="#FFFFFF"
                              android:textSize="24sp"
                              android:background="@drawable/btn_blue"/>
                      </LinearLayout>

                      <ScrollView
                          android:layout_width="match_parent"
                          android:layout_height="0dp"
                          android:layout_weight="1"
                          android:layout_marginTop="8dp">

                          <LinearLayout
                              android:id="@+id/blocks_list"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="vertical"/>
                      </ScrollView>
                  </LinearLayout>
              </LinearLayout>

              <FrameLayout
                  android:id="@+id/screen_player"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone"
                  android:background="#101820">

                  <FrameLayout
                      android:id="@+id/player_stage"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:layout_margin="12dp"
                      android:background="@drawable/bg_stage">

                      <FrameLayout
                          android:id="@+id/player_stage_layer"
                          android:layout_width="match_parent"
                          android:layout_height="match_parent"/>
                  </FrameLayout>

                  <Button
                      android:id="@+id/btn_stop_player"
                      android:layout_width="80dp"
                      android:layout_height="48dp"
                      android:layout_margin="16dp"
                      android:text="Стоп"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/btn_red"/>
              </FrameLayout>
          </FrameLayout>
          LAYOUT

          cat <<EOF > app/src/main/java/com/pocketultra/ruv3/BlockItem.java
          package com.pocketultra.ruv3;

          public class BlockItem {
              public String type;
              public String label;
              public String arg1;
              public String arg2;

              public BlockItem(String type, String label, String arg1, String arg2){
                  this.type = type;
                  this.label = label;
                  this.arg1 = arg1;
                  this.arg2 = arg2;
              }
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketultra/ruv3/ObjectItem.java
          package com.pocketultra.ruv3;

          public class ObjectItem {
              public String name = "Объект";
              public String spriteType = "emoji";
              public String emoji = "🐱";
              public String text = "Текст";
              public String textureId = "";
              public String shape = "square";
              public String color = "#FFFFFF";

              public float startX = 100f;
              public float startY = 80f;
              public float x = 100f;
              public float y = 80f;
              public float w = 72f;
              public float h = 72f;

              public boolean visible = true;
              public String say = "";

              public java.util.ArrayList<BlockItem> blocks = new java.util.ArrayList<>();
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketultra/ruv3/SceneItem.java
          package com.pocketultra.ruv3;

          public class SceneItem {
              public String name = "Сцена";
              public String bgColor = "#D8F0FF";
              public java.util.ArrayList<ObjectItem> objects = new java.util.ArrayList<>();
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketultra/ruv3/VariableItem.java
          package com.pocketultra.ruv3;

          public class VariableItem {
              public String name = "переменная";
              public String value = "0";
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketultra/ruv3/ListItemModel.java
          package com.pocketultra.ruv3;

          public class ListItemModel {
              public String name = "список";
              public java.util.ArrayList<String> items = new java.util.ArrayList<>();
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketultra/ruv3/ProjectItem.java
          package com.pocketultra.ruv3;

          public class ProjectItem {
              public String name = "Проект";
              public java.util.ArrayList<SceneItem> scenes = new java.util.ArrayList<>();
              public java.util.ArrayList<TextureItem> textures = new java.util.ArrayList<>();
              public java.util.ArrayList<VariableItem> variables = new java.util.ArrayList<>();
              public java.util.ArrayList<ListItemModel> lists = new java.util.ArrayList<>();
          }
          EOF

          cat <<'MAINACT' > app/src/main/java/com/pocketultra/ruv3/MainActivity.java
          package com.pocketultra.ruv3;

          import android.annotation.SuppressLint;
          import android.app.AlertDialog;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.net.Uri;
          import android.os.Bundle;
          import android.text.InputType;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.FrameLayout;
          import android.widget.GridLayout;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.ArrayList;
          import java.util.UUID;

          public class MainActivity extends AppCompatActivity implements ScriptRuntime.Host {
              private View screenProjects, screenScenes, screenObjects, screenScripts, screenPlayer;
              private LinearLayout projectsList, scenesList, objectsList, blocksList;
              private FrameLayout playerStage, playerStageLayer;
              private TextView txtProjectTitle, txtSceneTitle, txtObjectTitle;

              private final ArrayList<ProjectItem> projects = new ArrayList<>();
              private int currentProject = -1, currentScene = -1, currentObject = -1;
              private int pendingTextureProject = -1;
              private int pendingAssignProject = -1, pendingAssignScene = -1, pendingAssignObject = -1;
              private boolean stopFlag = false;
              private float touchX = 0f, touchY = 0f, touchCount = 0f;

              private ActivityResultLauncher<Intent> imagePickerTexture;
              private int dragIndex = -1;

              @Override public void renderPlayerScene() { runOnUiThread(this::drawPlayerScene); }
              @Override public boolean stopped() { return stopFlag; }
              @Override public SceneItem scene() { return currentScene(); }
              @Override public ProjectItem project() { return currentProject(); }
              @Override public ObjectItem object() { return currentObject(); }
              @Override public float touchX() { return touchX; }
              @Override public float touchY() { return touchY; }
              @Override public float touchCount() { return touchCount; }

              @Override
              public void goToSceneByName(String name) {
                  ProjectItem p = currentProject();
                  if(p == null) return;
                  for(int i=0;i<p.scenes.size();i++){
                      if(p.scenes.get(i).name.equals(name)){
                          currentScene = i;
                          runOnUiThread(() -> {
                              SceneItem sc = currentScene();
                              if(sc != null){
                                  for(ObjectItem o : sc.objects){
                                      o.x = o.startX;
                                      o.y = o.startY;
                                      o.visible = true;
                                      o.say = "";
                                  }
                                  drawPlayerScene();
                                  ScriptRuntime.runScene(this);
                              }
                          });
                          break;
                      }
                  }
              }

              @SuppressLint("ClickableViewAccessibility")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  screenProjects = findViewById(R.id.screen_projects);
                  screenScenes = findViewById(R.id.screen_scenes);
                  screenObjects = findViewById(R.id.screen_objects);
                  screenScripts = findViewById(R.id.screen_scripts);
                  screenPlayer = findViewById(R.id.screen_player);

                  projectsList = findViewById(R.id.projects_list);
                  scenesList = findViewById(R.id.scenes_list);
                  objectsList = findViewById(R.id.objects_list);
                  blocksList = findViewById(R.id.blocks_list);

                  playerStage = findViewById(R.id.player_stage);
                  playerStageLayer = findViewById(R.id.player_stage_layer);

                  txtProjectTitle = findViewById(R.id.txt_project_title);
                  txtSceneTitle = findViewById(R.id.txt_scene_title);
                  txtObjectTitle = findViewById(R.id.txt_object_title);

                  projects.addAll(ProjectStore.load(this));

                  imagePickerTexture = registerForActivityResult(new ActivityResultContracts.StartActivityForResult(), res -> {
                      if(res.getResultCode() == RESULT_OK && res.getData() != null && res.getData().getData() != null){
                          try{
                              Uri uri = res.getData().getData();
                              getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION);

                              if(pendingTextureProject >= 0 && pendingTextureProject < projects.size()){
                                  TextureItem t = new TextureItem();
                                  t.id = UUID.randomUUID().toString();
                                  t.name = "Текстура " + (projects.get(pendingTextureProject).textures.size()+1);
                                  t.uri = uri.toString();
                                  projects.get(pendingTextureProject).textures.add(t);
                                  saveAll();
                              }

                              if(pendingAssignProject >= 0 && pendingAssignScene >= 0 && pendingAssignObject >= 0){
                                  ProjectItem p = projects.get(pendingAssignProject);
                                  if(!p.textures.isEmpty() && pendingAssignObject < p.scenes.get(pendingAssignScene).objects.size()){
                                      TextureItem last = p.textures.get(p.textures.size()-1);
                                      ObjectItem o = p.scenes.get(pendingAssignScene).objects.get(pendingAssignObject);
                                      o.spriteType = "texture";
                                      o.textureId = last.id;
                                      saveAll();
                                  }
                              }

                              renderObjects();
                          }catch(Exception e){
                              toast("Ошибка импорта");
                          }
                      }
                  });

                  playerStage.setOnTouchListener((v, e) -> {
                      touchCount = e.getPointerCount();
                      touchX = e.getX();
                      touchY = e.getY();
                      return false;
                  });

                  findViewById(R.id.btn_new_project).setOnClickListener(v -> createProjectDialog());
                  findViewById(R.id.btn_data_manager).setOnClickListener(v -> showDataManager());

                  findViewById(R.id.back_to_projects).setOnClickListener(v -> showProjects());
                  findViewById(R.id.back_to_scenes).setOnClickListener(v -> showScenes());
                  findViewById(R.id.back_to_objects).setOnClickListener(v -> showObjects());

                  findViewById(R.id.btn_new_scene).setOnClickListener(v -> createSceneDialog());
                  findViewById(R.id.btn_texture_library).setOnClickListener(v -> showTextureLibrary());

                  findViewById(R.id.btn_new_object).setOnClickListener(v -> createObjectDialog());
                  findViewById(R.id.btn_play_scene).setOnClickListener(v -> startPlayer());
                  findViewById(R.id.btn_stop_player).setOnClickListener(v -> stopPlayer());

                  findViewById(R.id.btn_add_block).setOnClickListener(v -> showCategoryDialog());
                  findViewById(R.id.btn_formula_manager).setOnClickListener(v -> showFormulaHelp());

                  renderProjects();
                  showProjects();
              }

              private void saveAll(){ ProjectStore.save(this, projects); }
              private void toast(String s){ Toast.makeText(this, s, Toast.LENGTH_SHORT).show(); }

              private ProjectItem currentProject(){
                  if(currentProject < 0 || currentProject >= projects.size()) return null;
                  return projects.get(currentProject);
              }

              private SceneItem currentScene(){
                  ProjectItem p = currentProject();
                  if(p == null || currentScene < 0 || currentScene >= p.scenes.size()) return null;
                  return p.scenes.get(currentScene);
              }

              private ObjectItem currentObject(){
                  SceneItem s = currentScene();
                  if(s == null || currentObject < 0 || currentObject >= s.objects.size()) return null;
                  return s.objects.get(currentObject);
              }

              private void showProjects(){
                  screenProjects.setVisibility(View.VISIBLE);
                  screenScenes.setVisibility(View.GONE);
                  screenObjects.setVisibility(View.GONE);
                  screenScripts.setVisibility(View.GONE);
                  screenPlayer.setVisibility(View.GONE);
                  renderProjects();
              }

              private void showScenes(){
                  screenProjects.setVisibility(View.GONE);
                  screenScenes.setVisibility(View.VISIBLE);
                  screenObjects.setVisibility(View.GONE);
                  screenScripts.setVisibility(View.GONE);
                  screenPlayer.setVisibility(View.GONE);
                  renderScenes();
              }

              private void showObjects(){
                  screenProjects.setVisibility(View.GONE);
                  screenScenes.setVisibility(View.GONE);
                  screenObjects.setVisibility(View.VISIBLE);
                  screenScripts.setVisibility(View.GONE);
                  screenPlayer.setVisibility(View.GONE);
                  renderObjects();
              }

              private void showScripts(){
                  screenProjects.setVisibility(View.GONE);
                  screenScenes.setVisibility(View.GONE);
                  screenObjects.setVisibility(View.GONE);
                  screenScripts.setVisibility(View.VISIBLE);
                  screenPlayer.setVisibility(View.GONE);
                  renderBlocks();
              }

              private void startPlayer(){
                  SceneItem sc = currentScene();
                  if(sc == null) return;

                  for(ObjectItem o : sc.objects){
                      o.x = o.startX;
                      o.y = o.startY;
                      o.visible = true;
                      o.say = "";
                  }

                  stopFlag = false;
                  screenProjects.setVisibility(View.GONE);
                  screenScenes.setVisibility(View.GONE);
                  screenObjects.setVisibility(View.GONE);
                  screenScripts.setVisibility(View.GONE);
                  screenPlayer.setVisibility(View.VISIBLE);

                  drawPlayerScene();
                  ScriptRuntime.runScene(this);
              }

              private void stopPlayer(){
                  stopFlag = true;
                  showObjects();
              }

