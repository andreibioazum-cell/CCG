              private void renderBlocks(){
                  ObjectItem o = currentObject();
                  if(o == null) return;
                  txtObjectTitle.setText(o.name + " / Скрипты");

                  blocksList.removeAllViews();
                  for(int i=0;i<o.blocks.size();i++){
                      BlockItem b = o.blocks.get(i);

                      TextView tv = new TextView(this);
                      String text = b.label;
                      if(b.arg1 != null && !b.arg1.isEmpty()) text += " " + b.arg1;
                      if(b.arg2 != null && !b.arg2.isEmpty()) text += " " + b.arg2;
                      tv.setText(text);
                      tv.setTextColor(Color.WHITE);
                      tv.setTextSize(16f);
                      tv.setPadding(dp(14), dp(10), dp(14), dp(10));

                      if(b.type.startsWith("event_")) tv.setBackgroundResource(R.drawable.block_event);
                      else if(b.type.startsWith("move") || "go_xy".equals(b.type) || "goto_scene".equals(b.type)) tv.setBackgroundResource(R.drawable.block_motion);
                      else if("wait".equals(b.type) || "forever".equals(b.type) || "end_forever".equals(b.type)) tv.setBackgroundResource(R.drawable.block_control);
                      else if(b.type.startsWith("set_var") || b.type.startsWith("change_var") || b.type.startsWith("list_")) tv.setBackgroundResource(R.drawable.block_data);
                      else if(b.type.startsWith("signal")) tv.setBackgroundResource(R.drawable.block_signal);
                      else tv.setBackgroundResource(R.drawable.block_looks);

                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      );
                      lp.topMargin = dp(8);
                      tv.setLayoutParams(lp);

                      final int idx = i;

                      tv.setOnClickListener(v -> showBlockMenu(idx));

                      tv.setOnLongClickListener(v -> {
                          dragIndex = idx;
                          toast("Выбран блок для перемещения: " + b.label);
                          return true;
                      });

                      tv.setOnTouchListener((v, e) -> {
                          if(dragIndex >= 0 && e.getAction() == MotionEvent.ACTION_UP){
                              if(dragIndex != idx){
                                  BlockItem moved = o.blocks.remove(dragIndex);
                                  if(idx >= o.blocks.size()) o.blocks.add(moved);
                                  else o.blocks.add(idx, moved);
                                  dragIndex = -1;
                                  saveAll();
                                  renderBlocks();
                              }
                          }
                          return false;
                      });

                      blocksList.addView(tv);
                  }
              }

              private void drawPlayerScene(){
                  SceneItem sc = currentScene();
                  if(sc == null) return;

                  try{
                      GradientDrawable bg = new GradientDrawable();
                      bg.setColor(Color.parseColor(sc.bgColor));
                      bg.setCornerRadius(dp(18));
                      bg.setStroke(dp(2), Color.parseColor("#8AC4E8"));
                      playerStage.setBackground(bg);
                  }catch(Exception ignored){}

                  playerStageLayer.removeAllViews();

                  for(int i=0;i<sc.objects.size();i++){
                      ObjectItem o = sc.objects.get(i);

                      FrameLayout wrap = new FrameLayout(this);
                      wrap.setTranslationX(o.x);
                      wrap.setTranslationY(o.y);

                      View spriteView = buildSpriteView(o);
                      spriteView.setVisibility(o.visible ? View.VISIBLE : View.INVISIBLE);

                      final int idx = i;
                      spriteView.setOnClickListener(v -> {
                          if(!stopFlag){
                              ScriptRuntime.tapped(this, sc.objects.get(idx));
                          }
                      });

                      wrap.addView(spriteView);

                      if(o.say != null && !o.say.isEmpty()){
                          TextView speech = new TextView(this);
                          speech.setText(o.say);
                          speech.setTextSize(14f);
                          speech.setTextColor(Color.BLACK);
                          speech.setPadding(dp(8), dp(4), dp(8), dp(4));
                          speech.setBackgroundResource(R.drawable.bg_panel);

                          FrameLayout.LayoutParams slp = new FrameLayout.LayoutParams(
                              FrameLayout.LayoutParams.WRAP_CONTENT,
                              FrameLayout.LayoutParams.WRAP_CONTENT
                          );
                          slp.leftMargin = dp(40);
                          slp.topMargin = -dp(10);
                          speech.setLayoutParams(slp);
                          wrap.addView(speech);
                      }

                      playerStageLayer.addView(wrap);
                  }
              }

              private View buildSpriteView(ObjectItem o){
                  if("texture".equals(o.spriteType)){
                      ImageView img = new ImageView(this);
                      TextureItem t = findTextureById(o.textureId);
                      if(t != null && t.uri != null && !t.uri.isEmpty()){
                          img.setImageURI(Uri.parse(t.uri));
                      }
                      img.setAdjustViewBounds(true);
                      img.setLayoutParams(new FrameLayout.LayoutParams((int)o.w, (int)o.h));
                      return img;
                  }

                  if("text".equals(o.spriteType)){
                      TextView tv = new TextView(this);
                      tv.setText(o.text);
                      tv.setTextSize(24f);
                      try { tv.setTextColor(Color.parseColor(o.color)); } catch(Exception ignored){}
                      return tv;
                  }

                  if("shape".equals(o.spriteType)){
                      View v = new View(this);
                      GradientDrawable g = new GradientDrawable();
                      try { g.setColor(Color.parseColor(o.color)); } catch(Exception e){ g.setColor(Color.WHITE); }
                      if("circle".equals(o.shape)) g.setShape(GradientDrawable.OVAL);
                      else g.setShape(GradientDrawable.RECTANGLE);
                      g.setCornerRadius("square".equals(o.shape) ? 0f : dp(12));
                      v.setBackground(g);
                      v.setLayoutParams(new FrameLayout.LayoutParams((int)o.w, (int)o.h));
                      return v;
                  }

                  TextView tv = new TextView(this);
                  tv.setText(o.emoji);
                  tv.setTextSize(42f);
                  return tv;
              }

              private TextureItem findTextureById(String id){
                  ProjectItem p = currentProject();
                  if(p == null) return null;
                  for(TextureItem t : p.textures){
                      if(t.id.equals(id)) return t;
                  }
                  return null;
              }

