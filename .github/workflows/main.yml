                      Block b=blocks.get(selectedIndex);
                      b.x+=dx; b.y+=dy; b.z+=dz;
                      if(b.y-b.sy/2<FLOOR_Y) b.y=FLOOR_Y+b.sy/2;
                  }
              }
              
              public int raycastBlock(float tx, float ty) {
                  float ndcX=(2f*tx/screenW)-1f, ndcY=1f-(2f*ty/screenH);
                  float[] invProj=new float[16], invView=new float[16];
                  Matrix.invertM(invProj,0,proj,0); Matrix.invertM(invView,0,view,0);
                  float[] tmp=new float[4], nearW=new float[4], farW=new float[4];
                  float[] near={ndcX,ndcY,-1,1}, far={ndcX,ndcY,1,1};
                  Matrix.multiplyMV(tmp,0,invProj,0,near,0); for(int i=0;i<4;i++)tmp[i]/=tmp[3];
                  Matrix.multiplyMV(nearW,0,invView,0,tmp,0);
                  Matrix.multiplyMV(tmp,0,invProj,0,far,0); for(int i=0;i<4;i++)tmp[i]/=tmp[3];
                  Matrix.multiplyMV(farW,0,invView,0,tmp,0);
                  float dx=farW[0]-nearW[0], dy=farW[1]-nearW[1], dz=farW[2]-nearW[2];
                  float len=(float)Math.sqrt(dx*dx+dy*dy+dz*dz); dx/=len; dy/=len; dz/=len;
                  int closest=-1; float closestDist=Float.MAX_VALUE;
                  for(int i=0;i<blocks.size();i++) {
                      float t=rayBox(nearW[0],nearW[1],nearW[2],dx,dy,dz,blocks.get(i));
                      if(t>0 && t<closestDist) { closestDist=t; closest=i; }
                  }
                  return closest;
              }
              
              private float rayBox(float ox,float oy,float oz,float dx,float dy,float dz,Block b) {
                  float tmin=(b.minX()-ox)/(dx==0?0.0001f:dx), tmax=(b.maxX()-ox)/(dx==0?0.0001f:dx);
                  if(tmin>tmax){float t=tmin;tmin=tmax;tmax=t;}
                  float tymin=(b.minY()-oy)/(dy==0?0.0001f:dy), tymax=(b.maxY()-oy)/(dy==0?0.0001f:dy);
                  if(tymin>tymax){float t=tymin;tymin=tymax;tymax=t;}
                  if(tmin>tymax||tymin>tmax)return -1;
                  if(tymin>tmin)tmin=tymin; if(tymax<tmax)tmax=tymax;
                  float tzmin=(b.minZ()-oz)/(dz==0?0.0001f:dz), tzmax=(b.maxZ()-oz)/(dz==0?0.0001f:dz);
                  if(tzmin>tzmax){float t=tzmin;tzmin=tzmax;tzmax=t;}
                  if(tmin>tzmax||tzmin>tmax)return -1;
                  if(tzmin>tmin)tmin=tzmin;
                  return tmin;
              }

