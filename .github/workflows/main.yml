              }
          }

          class Rnd implements GLSurfaceView.Renderer {
              float yw=0, pt=0, px=64, py=25, pz=64, vy=0, mx=0, mz=0, lx, ly; boolean isP=false;
              float[] m=new float[16], pr=new float[16], v=new float[16]; byte[] w=new byte[1048576];
              int[] vis=new int[15000]; int vC=0, lCx=-1, lCz=-1, lbI=-1;
              int[] sel, pA, lP; long brk=0, pSt=0; byte sb=1; Blk b; Net n;
              
              public void onSurfaceCreated(GL10 g, EGLConfig c) {
