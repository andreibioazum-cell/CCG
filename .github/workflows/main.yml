name: Enjoer_Llama_v64_Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Prepare Assets and Structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/ai
          mkdir -p app/src/main/assets/model
          mkdir -p app/src/main/res/layout
          
          # Генерируем "тело" нейросети (300 МБ)
          dd if=/dev/urandom of=app/src/main/assets/model/llama_weights.bin bs=1M count=300
          
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # Корневой билд-файл с четкими версиями
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # Модульный билд-файл
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.enjoer.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.ai'
                  minSdk 26
                  targetSdk 34
              }
              aaptOptions { noCompress "bin" }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer Llama v64">
                  <activity android:name=".ChatActivity" android:exported="true" android:theme="@android:style/Theme.Light.NoTitleBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create Logic with AI Animation
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/ai/ChatActivity.java
          package com.enjoer.ai;
          import android.app.Activity;
          import android.os.*;
          import android.widget.*;
          import java.util.*;

          public class ChatActivity extends Activity {
              private ArrayList<String> log = new ArrayList<>();
              private ArrayAdapter<String> adapter;
              private Handler handler = new Handler(Looper.getMainLooper());

              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(0xFFFFFFFF);

                  ListView lv = new ListView(this);
                  adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, log);
                  lv.setAdapter(adapter);
                  root.addView(lv, new LinearLayout.LayoutParams(-1, 0, 1));

                  EditText in = new EditText(this);
                  in.setHint("English only, no code...");
                  root.addView(in);

                  Button btn = new Button(this);
                  btn.setText("SEND");
                  root.addView(btn);
                  setContentView(root);

                  btn.setOnClickListener(v -> {
                      String txt = in.getText().toString().trim();
                      if(!txt.isEmpty()){
                          log.add("User: " + txt);
                          adapter.notifyDataSetChanged();
                          in.setText("");
                          startAiThinking(txt);
                      }
                  });
              }

              private void startAiThinking(String input) {
                  log.add("AI is thinking...");
                  int pos = log.size() - 1;
                  adapter.notifyDataSetChanged();

                  // Имитация инференса Llama
                  handler.postDelayed(() -> {
                      String res;
                      String q = input.toLowerCase();
                      if(q.contains("code") || q.contains("script")) {
                          res = "AI: Error. Programming tasks are restricted.";
                      } else if (input.matches(".*[а-яА-Я].*")) {
                          res = "AI: English language only, please.";
                      } else {
                          res = "AI: [Llama 300MB Response] I understand. Proceed in English.";
                      }
                      log.set(pos, res);
                      adapter.notifyDataSetChanged();
                  }, 2000);
              }
          }
          EOF

      - name: Build and Sign
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Llama_Fixed_300MB
          path: app/build/outputs/apk/debug/*.apk
