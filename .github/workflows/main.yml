name: ENJOER_ULTRA_V15_CPP
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Create Structure
        run: |
          rm -rf app
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      - name: Write C++ Native Core
        run: |
          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <vector>
          #include <cmath>
          #include <random>

          struct Star { float x, y, z; };
          struct Player { 
              float x = 0, y = 2, z = 15;
              float rx = 0, ry = 0;
              float vy = 0;
          } p;

          std::vector<Star> stars;

          extern "C" JNIEXPORT void JNICALL
          Java_com_enjoer_game_MainActivity_initGame(JNIEnv*, jobject) {
              stars.clear();
              std::mt19937 gen(42);
              std::uniform_real_distribution<float> dist(-50.0f, 50.0f);
              for(int i=0; i<500; i++) stars.push_back({dist(gen), dist(gen), dist(gen)});
          }

          extern "C" JNIEXPORT jfloatArray JNICALL
          Java_com_enjoer_game_MainActivity_step(JNIEnv* env, jobject, jfloat jx, jfloat jy, jboolean jump, jfloat dx, jfloat dy) {
              // Вращение
              p.ry += dx * 0.4f;
              p.rx = std::max(-85.0f, std::min(85.0f, p.rx + dy * 0.4f));

              // Прыжок
              if (jump && p.y <= 2.05f) p.vy = 0.35f;
              p.vy -= 0.018f;
              p.y += p.vy;
              if (p.y < 2.0f) { p.y = 2.0f; p.vy = 0; }

              // Движение (математика векторов на C++)
              float s = 0.15f;
              float rad = p.ry * M_PI / 180.0f;
              p.x += (sin(rad) * jy + cos(rad) * jx) * s;
              p.z += (-cos(rad) * jy + sin(rad) * jx) * s;

              float data[5] = {p.x, p.y, p.z, p.rx, p.ry};
              jfloatArray res = env->NewFloatArray(5);
              env->SetFloatArrayRegion(res, 0, 5, data);
              return res;
          }

          extern "C" JNIEXPORT jfloatArray JNICALL
          Java_com_enjoer_game_MainActivity_getStars(JNIEnv* env, jobject) {
              jfloatArray res = env->NewFloatArray(stars.size() * 3);
              env->SetFloatArrayRegion(res, 0, stars.size() * 3, (float*)stars.data());
              return res;
          }
          EOF

          echo "cmake_minimum_required(VERSION 3.22.1)
          project(enjoer_native)
          add_library(enjoer_native SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(enjoer_native \${log-lib})" > app/src/main/cpp/CMakeLists.txt

      - name: Write Java Glue Code
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.opengl.GLSurfaceView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("enjoer_native"); }
              public native void initGame();
              public native float[] step(float jx, float jy, boolean jump, float dx, float dy);
              public native float[] getStars();

              private GameRenderer ren;
              private boolean jumpReq = false;
              private float jX=0, jY=0, dx=0, dy=0, lx, ly;
              private int mId=-1, lId=-1;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  initGame();
                  GLSurfaceView gv = findViewById(R.id.gv);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer(); 
                  ren.starsData = getStars();
                  gv.setRenderer(ren);

                  gv.setOnTouchListener((v, e) -> {
                      int a = e.getActionMasked(), i = e.getActionIndex(), id = e.getPointerId(i);
                      if(a==0 || a==5) {
                          if(e.getX(i) < v.getWidth()/2) mId=id;
                          else { lId=id; lx=e.getX(i); ly=e.getY(i); }
                      } else if(a==2) {
                          dx=0; dy=0;
                          for(int j=0; j<e.getPointerCount(); j++) {
                              int pId = e.getPointerId(j);
                              if(pId==mId) {
                                  float tx = e.getX(j)-230, ty = e.getY(j)-(v.getHeight()-230);
                                  float d = (float)Math.sqrt(tx*tx+ty*ty), m=100;
                                  if(d>m){ tx*=m/d; ty*=m/d; }
                                  jX=tx/m; jY=-ty/m;
                                  findViewById(R.id.stick).setTranslationX(tx);
                                  findViewById(R.id.stick).setTranslationY(ty);
                              } else if(pId==lId) {
                                  dx=e.getX(j)-lx; dy=e.getY(j)-ly; lx=e.getX(j); ly=e.getY(j);
                              }
                          }
                      } else if(a==1 || a==6) {
                          if(id==mId){ mId=-1; jX=0; jY=0; findViewById(R.id.stick).setTranslationX(0); findViewById(R.id.stick).setTranslationY(0); }
                          else if(id==lId) lId=-1;
                      }
                      return true;
                  });

                  findViewById(R.id.btn_j).setOnClickListener(v -> jumpReq=true);

                  final Handler h = new Handler(Looper.getMainLooper());
                  h.post(new Runnable(){public void run(){
                      float[] s = step(jX, jY, jumpReq, dx, dy);
                      jumpReq=false; dx=0; dy=0;
                      ren.pX=s[0]; ren.pY=s[1]; ren.pZ=s[2]; ren.rX=s[3]; ren.rY=s[4];
                      h.postDelayed(this, 16);
                  }});
              }
          }
          EOF

      - name: Write Voxel & Stars Renderer
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.*;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private int prg, sPrg; private FloatBuffer vB, sB;
              private float[] proj=new float[16], view=new float[16], mod=new float[16];
              public float pX, pY, pZ, rX, rY, starsData[];

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="extern \"C\" #version 300 es\nlayout(location=0)in vec4 aP;uniform mat4 uM;out float vH;void main(){vH=aP.y;gl_Position=uM*aP;}";
                  String fs="#version 300 es\nprecision highp float;in float vH;uniform vec4 uC;out vec4 fC;void main(){fC=vec4(uC.rgb*(0.8+vH*0.2),1.0);}";
                  prg = build(vs, fs);
                  String svs="#version 300 es\nlayout(location=0)in vec3 aP;uniform mat4 uM;void main(){gl_Position=uM*vec4(aP,1.0);gl_PointSize=4.0;}";
                  String sfs="#version 300 es\nprecision highp float;out vec4 fC;void main(){fC=vec4(1.0,1.0,1.0,1.0);}";
                  sPrg = build(svs, sfs);
                  float[] v = {-0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,0.5f,
                               -0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,-0.5f,
                               -0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f,
                               -0.5f,-0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,-0.5f,0.5f, -0.5f,-0.5f,0.5f,
                               -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,0.5f,0.5f, -0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f,
                                0.5f,0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f};
                  vB=ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(v); vB.position(0);
                  sB=ByteBuffer.allocateDirect(starsData.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(starsData); sB.position(0);
              }
              private int build(String v, String f){
                  int vs=GLES30.glCreateShader(35633); GLES30.glShaderSource(vs,v); GLES30.glCompileShader(vs);
                  int fs=GLES30.glCreateShader(35632); GLES30.glShaderSource(fs,f); GLES30.glCompileShader(fs);
                  int p=GLES30.glCreateProgram(); GLES30.glAttachShader(p,vs); GLES30.glAttachShader(p,fs); GLES30.glLinkProgram(p); return p;
              }
              @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,75,(float)w/h,0.1f,1000f); }
              @Override public void onDrawFrame(GL10 gl) {
                  GLES30.glClearColor(0.05f, 0.05f, 0.15f, 1.0f); GLES30.glClear(16640);
                  Matrix.setIdentityM(view,0); Matrix.rotateM(view,0,rX,1,0,0); Matrix.rotateM(view,0,rY,0,1,0); Matrix.translateM(view,0,-pX,-pY,-pZ);
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0);
                  
                  GLES30.glUseProgram(sPrg); GLES30.glUniformMatrix4fv(GLES30.glGetUniformLocation(sPrg,"uM"),1,false,mvp,0);
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,sB); GLES30.glEnableVertexAttribArray(0);
                  GLES30.glDrawArrays(GLES30.GL_POINTS,0,starsData.length/3);

                  GLES30.glUseProgram(prg); int uM=GLES30.glGetUniformLocation(prg,"uM"), uC=GLES30.glGetUniformLocation(prg,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vB); GLES30.glEnableVertexAttribArray(0);
                  for(int x=-6;x<6;x++) for(int z=-6;z<6;z++){
                      float h = (float)Math.floor(Math.sin(x*0.4)*Math.cos(z*0.4)*3);
                      Matrix.setIdentityM(mod,0); Matrix.translateM(mod,0,x,h,z);
                      float[] finalM=new float[16]; Matrix.multiplyMM(finalM,0,mvp,0,mod,0);
                      GLES30.glUniformMatrix4fv(uM,1,false,finalM,0); GLES30.glUniform4f(uC,0.2f,0.4f,0.8f,1);
                      GLES30.glDrawArrays(GLES30.GL_TRIANGLES,0,36);
                  }
              }
          }
          EOF

      - name: UI Resources
        run: |
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gv" android:layout_width="match_parent" android:layout_height="match_parent"/>
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <FrameLayout android:id="@+id/base" android:layout_width="160dp" android:layout_height="160dp" android:layout_alignParentBottom="true" android:layout_margin="30dp" android:background="@drawable/c">
                      <View android:id="@+id/stick" android:layout_width="60dp" android:layout_height="60dp" android:layout_gravity="center" android:background="@drawable/cf"/>
                  </FrameLayout>
                  <Button android:id="@+id/btn_j" android:layout_width="100dp" android:layout_height="100dp" android:text="JUMP" android:layout_alignParentBottom="true" android:layout_alignParentRight="true" android:layout_margin="30dp" android:backgroundTint="#4400BFFF"/>
              </RelativeLayout>
          </FrameLayout>
          EOF
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#11FFFFFF'/><stroke android:width='2dp' android:color='#FFF'/></shape>" > app/src/main/res/drawable/c.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#66FFFFFF'/></shape>" > app/src/main/res/drawable/cf.xml
          echo "<resources><style name='T' parent='Theme.AppCompat.Light.NoActionBar'><item name='android:windowFullscreen'>true</item></style></resources>" > app/src/main/res/values/styles.xml

      - name: Manifest & Build
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.game">
          <application android:label="EnjoerNative" android:theme="@style/T">
          <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape" android:configChanges="orientation|screenSize">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity></application></manifest>
          EOF
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          echo "plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34; externalNativeBuild { cmake { cppFlags '-std=c++17' } } }
          externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt' } } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Native_V15
          path: app/build/outputs/apk/debug/app-debug.apk
