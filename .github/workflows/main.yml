                      }
                      pX=nX;pY=nY;pZ=nZ;
                  }
              }
              
              public boolean isOnGround(){
                  float footY=pY-PLAYER_HEIGHT;
                  if(footY<=FLOOR_Y+0.1f)return true;
                  for(Block b:blocks){
                      boolean h=pX+PLAYER_RADIUS>b.minX()&&pX-PLAYER_RADIUS<b.maxX()&&pZ+PLAYER_RADIUS>b.minZ()&&pZ-PLAYER_RADIUS<b.maxZ();
                      if(h&&Math.abs(footY-b.maxY())<0.15f)return true;
                  }
                  return false;
              }
              
              private void draw(int uM,int uMVP,int uC,float r,float g,float b,float a){
