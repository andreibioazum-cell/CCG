name: Enjoer_APK_Builder_Pro
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/builder
          mkdir -p app/src/main/res/layout
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # --- МАНИФЕСТ (Разрешения на файлы) ---
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.builder">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>
              <application android:label="Enjoer APK Patcher" android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".ModMenuService" android:enabled="true" android:exported="false"/>
              </application>
          </manifest>
          EOF

          # --- ИНТЕРФЕЙС ПРИЛОЖЕНИЯ ---
          cat <<EOF > app/src/main/java/com/enjoer/builder/MainActivity.java
          package com.enjoer.builder;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.*;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  
                  TextView info = new TextView(this);
                  info.setText("1. Выбери оригинал Chicken Gun\n2. Нажми 'ПАТЧИТЬ'\n3. Забирай мод в папке Download");
                  root.addView(info);

                  Button btnLoad = new Button(this);
                  btnLoad.setText("ЗАГРУЗИТЬ APK");
                  root.addView(btnLoad);

                  Button btnPatch = new Button(this);
                  btnPatch.setText("ПАТЧИТЬ И СОХРАНИТЬ");
                  root.addView(btnPatch);

                  setContentView(root);

                  btnLoad.setOnClickListener(v -> {
                      // Тут открывается выбор файла
                      Toast.makeText(this, "Выбери файл .apk", Toast.LENGTH_SHORT).show();
                  });

                  btnPatch.setOnClickListener(v -> {
                      // Здесь запускается процесс инъекции
                      Toast.makeText(this, "Начинаю вшивку чита...", Toast.LENGTH_LONG).show();
                  });
              }
          }
          EOF

          # --- ГРАДЛ ---
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.builder'
              compileSdk 34
              defaultConfig { applicationId 'com.enjoer.builder'; minSdk 26; targetSdk 34 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build Builder APK
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Builder_App
          path: app/build/outputs/apk/debug/*.apk
