              private void createTextureObject(){
                  SceneItem s = currentScene();
                  ProjectItem p = currentProject();
                  if(s == null || p == null) return;

                  if(p.textures.isEmpty()){
                      pendingTextureProject = currentProject;
                      pendingAssignProject = -1;
                      pendingAssignScene = -1;
                      pendingAssignObject = -1;
                      openImagePicker();
                      toast("Сначала импортируется текстура");
                      return;
                  }

                  String[] names = new String[p.textures.size()];
                  for(int i=0;i<p.textures.size();i++) names[i] = p.textures.get(i).name;

                  new AlertDialog.Builder(this)
                      .setTitle("Выбери текстуру")
                      .setItems(names, (d,w) -> {
                          TextureItem tx = p.textures.get(w);
                          ObjectItem o = new ObjectItem();
                          o.name = tx.name;
                          o.spriteType = "texture";
                          o.textureId = tx.id;
                          s.objects.add(o);
                          saveAll();
                          renderObjects();
                      })
                      .setNegativeButton("Импортировать новую", (d,w) -> {
                          pendingTextureProject = currentProject;
                          pendingAssignProject = currentProject;
                          pendingAssignScene = currentScene;
                          pendingAssignObject = s.objects.size();
                          ObjectItem o = new ObjectItem();
                          o.name = "Текстура";
                          o.spriteType = "texture";
                          s.objects.add(o);
                          saveAll();
                          openImagePicker();
                          renderObjects();
                      })
                      .show();
              }

              private void openImagePicker(){
                  Intent i = new Intent(Intent.ACTION_OPEN_DOCUMENT);
