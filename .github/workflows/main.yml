name: YML_Editor_App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/ymleditor/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
              <item name="colorPrimary">#2196F3</item>
              <item name="colorPrimaryDark">#1976D2</item>
              <item name="colorAccent">#FF9800</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
            <color name="primary">#2196F3</color>
            <color name="primary_dark">#1976D2</color>
            <color name="accent">#FF9800</color>
            <color name="background">#FAFAFA</color>
            <color name="card_bg">#FFFFFF</color>
            <color name="text_primary">#212121</color>
            <color name="text_secondary">#757575</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_primary.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#2196F3"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_secondary.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#FF9800"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_danger.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#F44336"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/card_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#FFFFFF"/>
            <stroke android:width="1dp" android:color="#E0E0E0"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/edit_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#F5F5F5"/>
            <stroke android:width="1dp" android:color="#BDBDBD"/>
          </shape>
          EOF

          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="@color/background">

              <!-- Toolbar -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:background="@color/primary"
                  android:gravity="center_vertical"
                  android:paddingLeft="16dp"
                  android:paddingRight="16dp"
                  android:orientation="horizontal">

                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="YML Editor"
                      android:textColor="#FFFFFF"
                      android:textSize="20sp"
                      android:textStyle="bold"/>

                  <Button
                      android:id="@+id/btn_save"
                      android:layout_width="wrap_content"
                      android:layout_height="36dp"
                      android:text="Save"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/btn_secondary"
                      android:paddingLeft="16dp"
                      android:paddingRight="16dp"/>
              </LinearLayout>

              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:padding="16dp">

                      <!-- File Operations Card -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:background="@drawable/card_bg"
                          android:padding="16dp"
                          android:layout_marginBottom="16dp">

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="File Operations"
                              android:textColor="@color/text_primary"
                              android:textSize="16sp"
                              android:textStyle="bold"
                              android:layout_marginBottom="12dp"/>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal">

                              <Button
                                  android:id="@+id/btn_load"
                                  android:layout_width="0dp"
                                  android:layout_height="48dp"
                                  android:layout_weight="1"
                                  android:text="Load YML"
                                  android:textColor="#FFFFFF"
                                  android:background="@drawable/btn_primary"
                                  android:layout_marginRight="8dp"/>

                              <Button
                                  android:id="@+id/btn_clear"
                                  android:layout_width="0dp"
                                  android:layout_height="48dp"
                                  android:layout_weight="1"
                                  android:text="Clear"
                                  android:textColor="#FFFFFF"
                                  android:background="@drawable/btn_danger"/>
                          </LinearLayout>
                      </LinearLayout>

                      <!-- YML Content Card -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:background="@drawable/card_bg"
                          android:padding="16dp"
                          android:layout_marginBottom="16dp">

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="YML Content"
                              android:textColor="@color/text_primary"
                              android:textSize="16sp"
                              android:textStyle="bold"
                              android:layout_marginBottom="12dp"/>

                          <EditText
                              android:id="@+id/edit_yml"
                              android:layout_width="match_parent"
                              android:layout_height="300dp"
                              android:background="@drawable/edit_bg"
                              android:padding="12dp"
                              android:gravity="top|left"
                              android:inputType="textMultiLine"
                              android:fontFamily="monospace"
                              android:textSize="12sp"
                              android:hint="Paste or type your YML here..."
                              android:textColorHint="@color/text_secondary"/>
                      </LinearLayout>

                      <!-- Commands Card -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:background="@drawable/card_bg"
                          android:padding="16dp"
                          android:layout_marginBottom="16dp">

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Commands"
                              android:textColor="@color/text_primary"
                              android:textSize="16sp"
                              android:textStyle="bold"
                              android:layout_marginBottom="12dp"/>

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Type your command:"
                              android:textColor="@color/text_secondary"
                              android:textSize="14sp"
                              android:layout_marginBottom="8dp"/>

                          <EditText
                              android:id="@+id/edit_command"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:background="@drawable/edit_bg"
                              android:padding="12dp"
                              android:hint="e.g., add line 10 'new line content'"
                              android:textColorHint="@color/text_secondary"
                              android:layout_marginBottom="12dp"/>

                          <Button
                              android:id="@+id/btn_execute"
                              android:layout_width="match_parent"
                              android:layout_height="48dp"
                              android:text="Execute Command"
                              android:textColor="#FFFFFF"
                              android:background="@drawable/btn_primary"
                              android:layout_marginBottom="16dp"/>

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Available Commands:"
                              android:textColor="@color/text_primary"
                              android:textSize="14sp"
                              android:textStyle="bold"
                              android:layout_marginBottom="8dp"/>

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="• add line [num] 'text' - Insert line\n• delete line [num] - Remove line\n• replace line [num] 'text' - Replace line\n• insert after [num] 'text' - Insert after line\n• insert before [num] 'text' - Insert before line\n• find 'text' - Find text\n• replace all 'old' 'new' - Replace all occurrences\n• indent line [num] - Add 2 spaces indent\n• unindent line [num] - Remove 2 spaces indent"
                              android:textColor="@color/text_secondary"
                              android:textSize="12sp"
                              android:fontFamily="monospace"
                              android:lineSpacingMultiplier="1.2"/>
                      </LinearLayout>

                      <!-- Quick Actions Card -->
                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:background="@drawable/card_bg"
                          android:padding="16dp">

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Quick Actions"
                              android:textColor="@color/text_primary"
                              android:textSize="16sp"
                              android:textStyle="bold"
                              android:layout_marginBottom="12dp"/>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginBottom="8dp">

                              <Button
                                  android:id="@+id/btn_format"
                                  android:layout_width="0dp"
                                  android:layout_height="48dp"
                                  android:layout_weight="1"
                                  android:text="Format"
                                  android:textColor="#FFFFFF"
                                  android:background="@drawable/btn_primary"
                                  android:layout_marginRight="8dp"/>

                              <Button
                                  android:id="@+id/btn_validate"
                                  android:layout_width="0dp"
                                  android:layout_height="48dp"
                                  android:layout_weight="1"
                                  android:text="Validate"
                                  android:textColor="#FFFFFF"
                                  android:background="@drawable/btn_primary"/>
                          </LinearLayout>

                          <Button
                              android:id="@+id/btn_copy"
                              android:layout_width="match_parent"
                              android:layout_height="48dp"
                              android:text="Copy to Clipboard"
                              android:textColor="#FFFFFF"
                              android:background="@drawable/btn_secondary"/>
                      </LinearLayout>
                  </LinearLayout>
              </ScrollView>
          </LinearLayout>
          LAYOUT

          cat <<'MAIN' > app/src/main/java/com/ymleditor/app/MainActivity.java
          package com.ymleditor.app;

          import android.content.ClipData;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Toast;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.*;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class MainActivity extends AppCompatActivity {
              private EditText editYml, editCommand;
              private ActivityResultLauncher<Intent> loadLauncher, saveLauncher;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  editYml = findViewById(R.id.edit_yml);
                  editCommand = findViewById(R.id.edit_command);

                  loadLauncher = registerForActivityResult(
                      new ActivityResultContracts.StartActivityForResult(),
                      result -> {
                          if (result.getResultCode() == RESULT_OK && result.getData() != null) {
                              loadFile(result.getData());
                          }
                      }
                  );

                  saveLauncher = registerForActivityResult(
                      new ActivityResultContracts.StartActivityForResult(),
                      result -> {
                          if (result.getResultCode() == RESULT_OK && result.getData() != null) {
                              saveFile(result.getData());
                          }
                      }
                  );

                  findViewById(R.id.btn_load).setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_OPEN_DOCUMENT);
                      intent.addCategory(Intent.CATEGORY_OPENABLE);
                      intent.setType("*/*");
                      loadLauncher.launch(intent);
                  });

                  findViewById(R.id.btn_save).setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_CREATE_DOCUMENT);
                      intent.addCategory(Intent.CATEGORY_OPENABLE);
                      intent.setType("text/yaml");
                      intent.putExtra(Intent.EXTRA_TITLE, "edited.yml");
                      saveLauncher.launch(intent);
                  });

                  findViewById(R.id.btn_clear).setOnClickListener(v -> {
                      editYml.setText("");
                      editCommand.setText("");
                      toast("Cleared");
                  });

                  findViewById(R.id.btn_execute).setOnClickListener(v -> executeCommand());

                  findViewById(R.id.btn_format).setOnClickListener(v -> formatYml());

                  findViewById(R.id.btn_validate).setOnClickListener(v -> validateYml());

                  findViewById(R.id.btn_copy).setOnClickListener(v -> {
                      ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                      ClipData clip = ClipData.newPlainText("YML", editYml.getText().toString());
                      clipboard.setPrimaryClip(clip);
                      toast("Copied to clipboard");
                  });
              }

              private void loadFile(Intent data) {
                  try {
                      InputStream in = getContentResolver().openInputStream(data.getData());
                      BufferedReader reader = new BufferedReader(new InputStreamReader(in));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while ((line = reader.readLine()) != null) {
                          sb.append(line).append("\n");
                      }
                      reader.close();
                      editYml.setText(sb.toString());
                      toast("File loaded");
                  } catch (Exception e) {
                      toast("Error loading file: " + e.getMessage());
                  }
              }

              private void saveFile(Intent data) {
                  try {
                      OutputStream out = getContentResolver().openOutputStream(data.getData());
                      out.write(editYml.getText().toString().getBytes());
                      out.close();
                      toast("File saved");
                  } catch (Exception e) {
                      toast("Error saving file: " + e.getMessage());
                  }
              }

              private void executeCommand() {
                  String command = editCommand.getText().toString().trim();
                  if (command.isEmpty()) {
                      toast("Enter a command");
                      return;
                  }

                  String content = editYml.getText().toString();
                  List<String> lines = new ArrayList<>();
                  for (String line : content.split("\n", -1)) {
                      lines.add(line);
                  }

                  try {
                      if (command.startsWith("add line ")) {
                          Pattern p = Pattern.compile("add line (\\d+) '(.*)'");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              int lineNum = Integer.parseInt(m.group(1));
                              String text = m.group(2);
                              if (lineNum >= 1 && lineNum <= lines.size() + 1) {
                                  lines.add(lineNum - 1, text);
                                  updateYml(lines);
                                  toast("Line added at " + lineNum);
                              } else {
                                  toast("Invalid line number");
                              }
                          } else {
                              toast("Invalid format. Use: add line [num] 'text'");
                          }
                      } else if (command.startsWith("delete line ")) {
                          Pattern p = Pattern.compile("delete line (\\d+)");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              int lineNum = Integer.parseInt(m.group(1));
                              if (lineNum >= 1 && lineNum <= lines.size()) {
                                  lines.remove(lineNum - 1);
                                  updateYml(lines);
                                  toast("Line " + lineNum + " deleted");
                              } else {
                                  toast("Invalid line number");
                              }
                          } else {
                              toast("Invalid format. Use: delete line [num]");
                          }
                      } else if (command.startsWith("replace line ")) {
                          Pattern p = Pattern.compile("replace line (\\d+) '(.*)'");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              int lineNum = Integer.parseInt(m.group(1));
                              String text = m.group(2);
                              if (lineNum >= 1 && lineNum <= lines.size()) {
                                  lines.set(lineNum - 1, text);
                                  updateYml(lines);
                                  toast("Line " + lineNum + " replaced");
                              } else {
                                  toast("Invalid line number");
                              }
                          } else {
                              toast("Invalid format. Use: replace line [num] 'text'");
                          }
                      } else if (command.startsWith("insert after ")) {
                          Pattern p = Pattern.compile("insert after (\\d+) '(.*)'");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              int lineNum = Integer.parseInt(m.group(1));
                              String text = m.group(2);
                              if (lineNum >= 1 && lineNum <= lines.size()) {
                                  lines.add(lineNum, text);
                                  updateYml(lines);
                                  toast("Line inserted after " + lineNum);
                              } else {
                                  toast("Invalid line number");
                              }
                          } else {
                              toast("Invalid format. Use: insert after [num] 'text'");
                          }
                      } else if (command.startsWith("insert before ")) {
                          Pattern p = Pattern.compile("insert before (\\d+) '(.*)'");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              int lineNum = Integer.parseInt(m.group(1));
                              String text = m.group(2);
                              if (lineNum >= 1 && lineNum <= lines.size()) {
                                  lines.add(lineNum - 1, text);
                                  updateYml(lines);
                                  toast("Line inserted before " + lineNum);
                              } else {
                                  toast("Invalid line number");
                              }
                          } else {
                              toast("Invalid format. Use: insert before [num] 'text'");
                          }
                      } else if (command.startsWith("find '")) {
                          Pattern p = Pattern.compile("find '(.*)'");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              String searchText = m.group(1);
                              StringBuilder result = new StringBuilder("Found at lines: ");
                              boolean found = false;
                              for (int i = 0; i < lines.size(); i++) {
                                  if (lines.get(i).contains(searchText)) {
                                      result.append(i + 1).append(", ");
                                      found = true;
                                  }
                              }
                              if (found) {
                                  toast(result.substring(0, result.length() - 2));
                              } else {
                                  toast("Text not found");
                              }
                          } else {
                              toast("Invalid format. Use: find 'text'");
                          }
                      } else if (command.startsWith("replace all '")) {
                          Pattern p = Pattern.compile("replace all '(.*)' '(.*)'");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              String oldText = m.group(1);
                              String newText = m.group(2);
                              int count = 0;
                              for (int i = 0; i < lines.size(); i++) {
                                  if (lines.get(i).contains(oldText)) {
                                      lines.set(i, lines.get(i).replace(oldText, newText));
                                      count++;
                                  }
                              }
                              updateYml(lines);
                              toast("Replaced " + count + " occurrences");
                          } else {
                              toast("Invalid format. Use: replace all 'old' 'new'");
                          }
                      } else if (command.startsWith("indent line ")) {
                          Pattern p = Pattern.compile("indent line (\\d+)");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              int lineNum = Integer.parseInt(m.group(1));
                              if (lineNum >= 1 && lineNum <= lines.size()) {
                                  lines.set(lineNum - 1, "  " + lines.get(lineNum - 1));
                                  updateYml(lines);
                                  toast("Line " + lineNum + " indented");
                              } else {
                                  toast("Invalid line number");
                              }
                          } else {
                              toast("Invalid format. Use: indent line [num]");
                          }
                      } else if (command.startsWith("unindent line ")) {
                          Pattern p = Pattern.compile("unindent line (\\d+)");
                          Matcher m = p.matcher(command);
                          if (m.find()) {
                              int lineNum = Integer.parseInt(m.group(1));
                              if (lineNum >= 1 && lineNum <= lines.size()) {
                                  String line = lines.get(lineNum - 1);
                                  if (line.startsWith("  ")) {
                                      lines.set(lineNum - 1, line.substring(2));
                                      updateYml(lines);
                                      toast("Line " + lineNum + " unindented");
                                  } else {
                                      toast("Line has no indent to remove");
                                  }
                              } else {
                                  toast("Invalid line number");
                              }
                          } else {
                              toast("Invalid format. Use: unindent line [num]");
                          }
                      } else {
                          toast("Unknown command");
                      }
                  } catch (Exception e) {
                      toast("Error: " + e.getMessage());
                  }
              }

              private void updateYml(List<String> lines) {
                  StringBuilder sb = new StringBuilder();
                  for (int i = 0; i < lines.size(); i++) {
                      sb.append(lines.get(i));
                      if (i < lines.size() - 1) {
                          sb.append("\n");
                      }
                  }
                  editYml.setText(sb.toString());
              }

              private void formatYml() {
                  String content = editYml.getText().toString();
                  String[] lines = content.split("\n");
                  StringBuilder formatted = new StringBuilder();
                  
                  for (String line : lines) {
                      String trimmed = line.trim();
                      if (!trimmed.isEmpty()) {
                          formatted.append(trimmed).append("\n");
                      }
                  }
                  
                  editYml.setText(formatted.toString());
                  toast("Formatted (removed extra spaces)");
              }

              private void validateYml() {
                  String content = editYml.getText().toString();
                  String[] lines = content.split("\n");
                  
                  StringBuilder errors = new StringBuilder();
                  for (int i = 0; i < lines.length; i++) {
                      String line = lines[i];
                      if (line.contains("\t")) {
                          errors.append("Line ").append(i + 1).append(": Contains tab (use spaces)\n");
                      }
                  }
                  
                  if (errors.length() > 0) {
                      toast("Validation errors:\n" + errors.toString());
                  } else {
                      toast("✓ No obvious errors found");
                  }
              }

              private void toast(String msg) {
                  Toast.makeText(this, msg, Toast.LENGTH_SHORT).show();
              }
          }
          MAIN

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              
              <application
                  android:label="YML Editor"
                  android:theme="@style/AppTheme"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.ymleditor.app'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.ymleditor.app'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildFeatures {
                  buildConfig true
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle --version
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: YML_Editor_App
