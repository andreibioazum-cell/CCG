name: Enjoer_6.2_Updated
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

          # Сохраняю твои стили кнопок
          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/><solid android:color="#101820"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent"/>
              
              <RelativeLayout android:id="@+id/ui_layer" android:layout_width="match_parent" android:layout_height="match_parent">
                  <Button android:id="@+id/btn_place" android:layout_width="100dp" android:layout_height="50dp" 
                      android:text="PLACE" android:layout_alignParentTop="true" android:layout_margin="10dp" android:background="@drawable/btn_blue"/>
                  
                  <Button android:id="@+id/btn_deselect" android:layout_width="100dp" android:layout_height="50dp" 
                      android:text="DESELECT" android:layout_below="@id/btn_place" android:layout_margin="10dp" 
                      android:background="@drawable/btn_blue" android:visibility="gone"/>
              </RelativeLayout>
          </FrameLayout>
          LAYOUT

          # Класс для связи JS и Java
          cat <<EOF > app/src/main/java/com/enjoer/game/ScriptBridge.java
          package com.enjoer.game;
          import android.webkit.JavascriptInterface;

          public class ScriptBridge {
              private GameRenderer renderer;
              public ScriptBridge(GameRenderer renderer) { this.renderer = renderer; }

              @JavascriptInterface
              public void tp(float x, float y, float z) {
                  renderer.pX = x; renderer.pY = y; renderer.pZ = z;
              }
              
              @JavascriptInterface
              public void spawnBlock(float x, float y, float z) {
                  renderer.blocks.add(new Block(x, y, z, 4, 4, 4, 1, 1, 1));
              }
          }
          EOF

          # Твой основной код с улучшениями (Сетка + Скриптинг)
          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public float pX=0, pY=5, pZ=15, rY=0, rX=0;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              public int selectedIndex = -1;

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) { GLES30.glClearColor(0.05f, 0.05f, 0.1f, 1); }
              @Override public void onSurfaceChanged(GL10 gl, int w, int h) { GLES30.glViewport(0,0,w,h); }
              @Override public void onDrawFrame(GL10 gl) { GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT); }

              public void placeBlock() {
                  float vx = (float)Math.sin(Math.toRadians(rY));
                  float vz = (float)-Math.cos(Math.toRadians(rY));
                  
                  // ПИКСЕЛЬНАЯ СЕТКА: округляем до целых чисел
                  float nx = Math.round(pX + vx * 10f);
                  float ny = Math.round(pY);
                  float nz = Math.round(pZ + vz * 10f);
                  
                  blocks.add(new Block(nx, ny, nz, 4, 4, 4, 0.5f, 0.5f, 1.0f));
              }
          }
          RENDERER

          cat <<'MAIN' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.view.View;
          import android.webkit.WebView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private WebView jsEngine;

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  ren = new GameRenderer();
                  View deselectBtn = findViewById(R.id.btn_deselect);

                  // Настройка JS Скриптинга
                  jsEngine = new WebView(this);
                  jsEngine.getSettings().setJavaScriptEnabled(true);
                  jsEngine.addJavascriptInterface(new ScriptBridge(ren), "Game");

                  findViewById(R.id.btn_place).setOnClickListener(v -> {
                      ren.placeBlock();
                      updateUI();
                  });

                  deselectBtn.setOnClickListener(v -> {
                      ren.selectedIndex = -1;
                      updateUI();
                  });
              }

              private void updateUI() {
                  runOnUiThread(() -> {
                      // Скрываем кнопку, если ничего не выбрано
                      findViewById(R.id.btn_deselect).setVisibility(
                          ren.selectedIndex >= 0 ? View.VISIBLE : View.GONE
                      );
                  });
              }
              
              // Метод для запуска любого JS кода
              public void runJS(String code) {
                  jsEngine.post(() -> jsEngine.evaluateJavascript(code, null));
              }
          }
          MAIN

          # Манифест и сборка (без изменений структуры)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer Studio" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
