name: Enjoer_6.2_Fixed_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Настройки Gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "6.2"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          # Стили и ресурсы
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/><solid android:color="#101820"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          # Верстка UI
          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent"/>
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <Button android:id="@+id/btn_place" android:layout_width="100dp" android:layout_height="50dp" 
                      android:text="PLACE" android:layout_margin="10dp" android:background="@drawable/btn_blue"/>
                  <Button android:id="@+id/btn_deselect" android:layout_width="100dp" android:layout_height="50dp" 
                      android:text="DESELECT" android:layout_below="@id/btn_place" android:layout_margin="10dp" 
                      android:background="@drawable/btn_blue" android:visibility="gone"/>
              </RelativeLayout>
          </FrameLayout>
          LAYOUT

          # Логика блоков
          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;
          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) 
              { this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b; }
          }
          EOF

          # JS Мост
          cat <<EOF > app/src/main/java/com/enjoer/game/ScriptBridge.java
          package com.enjoer.game;
          import android.webkit.JavascriptInterface;
          public class ScriptBridge {
              private GameRenderer ren;
              public ScriptBridge(GameRenderer ren) { this.ren = ren; }
              @JavascriptInterface
              public void tp(float x, float y, float z) { ren.pX = x; ren.pY = y; ren.pZ = z; }
          }
          EOF

          # Рендерер с сеткой
          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public float pX=0, pY=5, pZ=20, rY=0, rX=0;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              public int selectedIndex = -1;

              public void placeBlock() {
                  float vx = (float)Math.sin(Math.toRadians(rY));
                  float vz = (float)-Math.cos(Math.toRadians(rY));
                  // СЕТКА (Grid Snap)
                  float nx = Math.round(pX + vx * 8f);
                  float ny = Math.round(pY);
                  float nz = Math.round(pZ + vz * 8f);
                  blocks.add(new Block(nx, ny, nz, 4, 4, 4, 0.5f, 0.8f, 1f));
              }

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) { GLES30.glClearColor(0, 0, 0.1f, 1); }
              @Override public void onSurfaceChanged(GL10 gl, int w, int h) { GLES30.glViewport(0,0,w,h); }
              @Override public void onDrawFrame(GL10 gl) { GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT); }
          }
          RENDERER

          # MainActivity с JS и умным UI
          cat <<'MAIN' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.view.View;
          import android.webkit.WebView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private WebView jsEngine;

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  ren = new GameRenderer();
                  
                  jsEngine = new WebView(this);
                  jsEngine.getSettings().setJavaScriptEnabled(true);
                  jsEngine.addJavascriptInterface(new ScriptBridge(ren), "Game");

                  findViewById(R.id.btn_place).setOnClickListener(v -> {
                      ren.placeBlock();
                      updateUI();
                  });

                  findViewById(R.id.btn_deselect).setOnClickListener(v -> {
                      ren.selectedIndex = -1;
                      updateUI();
                  });
              }

              private void updateUI() {
                  runOnUiThread(() -> {
                      findViewById(R.id.btn_deselect).setVisibility(
                          ren.selectedIndex >= 0 ? View.VISIBLE : View.GONE
                      );
                  });
              }
          }
          MAIN

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer Studio" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Fixed_Build
          path: app/build/outputs/apk/debug/app-debug.apk
