name: Enjoer_Llama_Project_v63
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Build AI Engine
        run: |
          mkdir -p app/src/main/java/com/enjoer/ai
          mkdir -p app/src/main/assets/model
          
          # Генерируем "бинарное тело" нейросети (300 МБ)
          # В реальном проекте сюда кладется .bin файл от TinyLlama
          dd if=/dev/urandom of=app/src/main/assets/model/llama_weights.bin bs=1M count=300

          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # Конфиг с поддержкой MediaPipe (движок для Llama на Android)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.ai'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.ai'
                  minSdk 26
                  targetSdk 34
              }
              aaptOptions { noCompress "bin" }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              // Официальный движок для запуска Llama на Android
              implementation 'com.google.mediapipe:tasks-genai:0.10.14'
          }
          EOF

      - name: Create AI Logic (The Personality)
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/ai/ChatActivity.java
          package com.enjoer.ai;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.*;
          import java.util.*;

          public class ChatActivity extends Activity {
              private ArrayList<String> messages = new ArrayList<>();
              private ArrayAdapter<String> adapter;

              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  // Чистый UI без тем
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(0xFFFFFFFF);

                  ListView list = new ListView(this);
                  adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, messages);
                  list.setAdapter(adapter);
                  root.addView(list, new LinearLayout.LayoutParams(-1, 0, 1));

                  EditText input = new EditText(this);
                  input.setHint("English only...");
                  root.addView(input);

                  Button send = new Button(this);
                  send.setText("SEND TO AI");
                  root.addView(send);
                  setContentView(root);

                  send.setOnClickListener(v -> {
                      String txt = input.getText().toString();
                      if(!txt.isEmpty()){
                          messages.add("Me: " + txt);
                          processLlama(txt);
                          input.setText("");
                          adapter.notifyDataSetChanged();
                      }
                  });
              }

              private void processLlama(String text) {
                  new android.os.Handler().postDelayed(() -> {
                      String response;
                      String query = text.toLowerCase();
                      
                      // Фильтр на программирование
                      if(query.contains("code") || query.contains("python") || query.contains("script")) {
                          response = "ENJOER-AI: Access Denied. I am not a coder. I am a talker.";
                      } 
                      // Фильтр на язык
                      else if (text.matches(".*[а-яА-Я].*")) {
                          response = "ENJOER-AI: Sorry, I only operate in English.";
                      }
                      else {
                          response = "ENJOER-AI: " + getLlamaResponse(query);
                      }
                      
                      messages.add(response);
                      adapter.notifyDataSetChanged();
                  }, 1200);
              }

              private String getLlamaResponse(String q) {
                  // Здесь имитация инференса из llama_weights.bin
                  return "I am processing your English request using my 300MB local model. Proceed.";
              }
          }
          EOF

      - name: Build Final APK
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Llama_v63
          path: app/build/outputs/apk/debug/*.apk
