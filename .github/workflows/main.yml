name: VULKAN_VOXEL_ULTRA_V13
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Clean & Create
        run: |
          rm -rf app
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/enjoer/vulkan
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      - name: Write C++ Physics
        run: |
          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          extern "C" JNIEXPORT jfloatArray JNICALL
          Java_com_enjoer_vulkan_MainActivity_calculatePhysics(JNIEnv* env, jobject, jfloat y, jfloat velY) {
              float gravity = -0.018f;
              float newVel = velY + gravity;
              float newY = y + newVel;
              if (newY < 2.0f) { newY = 2.0f; newVel = 0; }
              float res[2] = {newY, newVel};
              jfloatArray out = env->NewFloatArray(2);
              env->SetFloatArrayRegion(out, 0, 2, res);
              return out;
          }
          EOF
          echo "cmake_minimum_required(VERSION 3.22.1)
          project(voxelvulkan)
          add_library(voxelvulkan SHARED native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(voxelvulkan \${log-lib})" > app/src/main/cpp/CMakeLists.txt

      - name: Write Renderer (No Transparency)
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/vulkan/GameRenderer.java
          package com.enjoer.vulkan;
          import android.opengl.*;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private int prg; private FloatBuffer vB;
              private float[] proj=new float[16], view=new float[16], model=new float[16];
              public float pX=0, pY=2, pZ=15, rotY=0, rotX=0, jX=0, jY=0;

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs = "#version 300 es\nlayout(location=0)in vec4 aP;uniform mat4 uM;out float vD;void main(){vD=aP.y;gl_Position=uM*aP;}";
                  String fs = "#version 300 es\nprecision highp float;in float vD;uniform vec4 uC;out vec4 fC;void main(){fC=vec4(uC.rgb*(0.7+vD*0.3),1.0);}";
                  int vsh=GLES30.glCreateShader(35633); GLES30.glShaderSource(vsh,vs); GLES30.glCompileShader(vsh);
                  int fsh=GLES30.glCreateShader(35632); GLES30.glShaderSource(fsh,fs); GLES30.glCompileShader(fsh);
                  prg=GLES30.glCreateProgram(); GLES30.glAttachShader(prg,vsh); GLES30.glAttachShader(prg,fsh); GLES30.glLinkProgram(prg);
                  
                  float[] v = {
                      -0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,0.5f, // Front
                      -0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, 0.5f,0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,-0.5f, // Back
                      -0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,-0.5f, 0.5f,0.5f,-0.5f, -0.5f,0.5f,0.5f, 0.5f,0.5f,0.5f, // Top
                      -0.5f,-0.5f,-0.5f, 0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,-0.5f,0.5f, -0.5f,-0.5f,0.5f, // Bottom
                      -0.5f,0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,0.5f,0.5f, -0.5f,0.5f,0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,0.5f, // Left
                       0.5f,0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,-0.5f, 0.5f,0.5f,0.5f, 0.5f,-0.5f,0.5f, 0.5f,-0.5f,-0.5f  // Right
                  };
                  vB=ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(v); vB.position(0);
              }
              @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,70,(float)w/h,0.1f,500f); }
              @Override public void onDrawFrame(GL10 gl) {
                  GLES30.glClearColor(0.6f, 0.85f, 1.0f, 1.0f); GLES30.glClear(16640);
                  Matrix.setIdentityM(view,0); Matrix.rotateM(view,0,rotX,1,0,0); Matrix.rotateM(view,0,rotY,0,1,0); Matrix.translateM(view,0,-pX,-pY,-pZ);
                  GLES30.glUseProgram(prg);
                  int uM=GLES30.glGetUniformLocation(prg,"uM"), uC=GLES30.glGetUniformLocation(prg,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vB); GLES30.glEnableVertexAttribArray(0);
                  for(int x=-8;x<8;x++) for(int z=-8;z<8;z++) {
                      float h = (float)Math.floor(Math.sin(x*0.5)*Math.cos(z*0.5)*2);
                      drawCube(uM,uC,x,h,z,0.3f,0.8f,0.3f);
                      drawCube(uM,uC,x,h-1,z,0.5f,0.3f,0.1f);
                  }
              }
              private void drawCube(int mLoc,int cLoc,float x,float y,float z,float r,float g,float b){
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,x,y,z);
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0); Matrix.multiplyMM(mvp,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(mLoc,1,false,mvp,0); GLES30.glUniform4f(cLoc,r,g,b,1);
                  GLES30.glDrawArrays(GLES30.GL_TRIANGLES,0,36);
              }
          }
          EOF

      - name: Write Multi-Touch & UI
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/vulkan/MainActivity.java
          package com.enjoer.vulkan;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import android.opengl.GLSurfaceView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("voxelvulkan"); }
              public native float[] calculatePhysics(float y, float velY);
              private GameRenderer ren; private float velY=0, lx, ly;
              private int moveId = -1, lookId = -1;

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer(); gv.setRenderer(ren);

                  View joy = findViewById(R.id.joy_base);
                  View stick = findViewById(R.id.joy_stick);

                  gv.setOnTouchListener((v, e) -> {
                      int action = e.getActionMasked();
                      int idx = e.getActionIndex();
                      int id = e.getPointerId(idx);

                      switch(action) {
                          case MotionEvent.ACTION_DOWN:
                          case MotionEvent.ACTION_POINTER_DOWN:
                              if (e.getX(idx) < v.getWidth()/2) {
                                  moveId = id;
                              } else {
                                  lookId = id; lx = e.getX(idx); ly = e.getY(idx);
                              }
                              break;
                          case MotionEvent.ACTION_MOVE:
                              for(int i=0; i<e.getPointerCount(); i++) {
                                  int pId = e.getPointerId(i);
                                  if(pId == moveId) {
                                      float dx = e.getX(i) - joy.getX() - joy.getWidth()/2;
                                      float dy = e.getY(i) - joy.getY() - joy.getHeight()/2;
                                      float d = (float)Math.sqrt(dx*dx+dy*dy), max = joy.getWidth()/2;
                                      if(d > max) { dx *= max/d; dy *= max/d; }
                                      stick.setTranslationX(dx); stick.setTranslationY(dy);
                                      ren.jX = dx/max; ren.jY = -dy/max;
                                  } else if(pId == lookId) {
                                      ren.rotY += (e.getX(i) - lx) * 0.4f;
                                      ren.rotX = Math.max(-85, Math.min(85, ren.rotX + (e.getY(i) - ly) * 0.4f));
                                      lx = e.getX(i); ly = e.getY(i);
                                  }
                              }
                              break;
                          case MotionEvent.ACTION_UP:
                          case MotionEvent.ACTION_POINTER_UP:
                          case MotionEvent.ACTION_CANCEL:
                              if(id == moveId) { moveId = -1; ren.jX = 0; ren.jY = 0; stick.setTranslationX(0); stick.setTranslationY(0); }
                              else if(id == lookId) lookId = -1;
                              break;
                      }
                      return true;
                  });

                  findViewById(R.id.btn_jump).setOnClickListener(v -> { if(ren.pY <= 2.05f) velY = 0.35f; });

                  final Handler h = new Handler(Looper.getMainLooper());
                  h.post(new Runnable(){public void run(){
                      float[] res = calculatePhysics(ren.pY, velY);
                      ren.pY = res[0]; velY = res[1];
                      float s=0.15f; float rad=(float)Math.toRadians(ren.rotY);
                      ren.pX += (float)(Math.sin(rad)*ren.jY + Math.cos(rad)*ren.jX)*s;
                      ren.pZ += (float)(-Math.cos(rad)*ren.jY + Math.sin(rad)*ren.jX)*s;
                      h.postDelayed(this, 16);
                  }});
              }
          }
          EOF

      - name: Layout & Resources
        run: |
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent"/>
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="140dp" android:layout_height="140dp" android:layout_alignParentBottom="true" android:layout_margin="40dp" android:background="@drawable/circle">
                      <View android:id="@+id/joy_stick" android:layout_width="60dp" android:layout_height="60dp" android:layout_gravity="center" android:background="@drawable/circle_f"/>
                  </FrameLayout>
                  <Button android:id="@+id/btn_jump" android:layout_width="90dp" android:layout_height="90dp" android:text="JUMP" android:layout_alignParentBottom="true" android:layout_alignParentRight="true" android:layout_margin="40dp" android:backgroundTint="#AA00BFFF"/>
              </RelativeLayout>
          </FrameLayout>
          EOF
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#33FFFFFF'/><stroke android:width='2dp' android:color='#FFF'/></shape>" > app/src/main/res/drawable/circle.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#88FFFFFF'/></shape>" > app/src/main/res/drawable/circle_f.xml
          echo "<resources><style name='Theme.App' parent='Theme.AppCompat.Light.NoActionBar'><item name='android:windowFullscreen'>true</item></style></resources>" > app/src/main/res/values/styles.xml

      - name: Manifest & Build
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.vulkan">
          <application android:label="VoxelV13" android:theme="@style/Theme.App">
          <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape" android:configChanges="orientation|screenSize">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity></application></manifest>
          EOF
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          echo "plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.vulkan'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.vulkan'; minSdk 24; targetSdk 34; externalNativeBuild { cmake { cppFlags '-std=c++17' } } }
          externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt' } } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Voxel_V13_Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
