name: Build CheatMod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate and Build
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=1.21.1
          yarn_mappings=1.21.1+build.3
          loader_version=0.16.14
          fabric_version=0.115.0+1.21.1
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  maven { url "https://maven.fabricmc.net/" }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "cheatmod"
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'fabric-loom' version '1.9-SNAPSHOT'
              id 'java'
          }
          version = "1.0.0"
          group = "com.mymod"
          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }
          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
          }
          processResources {
              inputs.property "version", project.version
              filesMatching("fabric.mod.json") { expand "version": project.version }
          }
          tasks.withType(JavaCompile).configureEach { options.release = 21 }
          java {
              sourceCompatibility = JavaVersion.VERSION_21
              targetCompatibility = JavaVersion.VERSION_21
          }
          EOF

          echo "MIT" > LICENSE

          mkdir -p src/main/resources
          cat > src/main/resources/fabric.mod.json << 'EOF'
          {
            "schemaVersion": 1,
            "id": "cheatmod",
            "version": "${version}",
            "name": "CheatMod",
            "description": "Cheat commands",
            "authors": ["Dev"],
            "license": "MIT",
            "environment": "*",
            "entrypoints": { "main": ["com.mymod.cheatmod.CheatMod"] },
            "mixins": ["cheatmod.mixins.json"],
            "depends": {
              "fabricloader": ">=0.16.0",
              "minecraft": "~1.21.1",
              "java": ">=21",
              "fabric-api": "*"
            }
          }
          EOF

          cat > src/main/resources/cheatmod.mixins.json << 'EOF'
          {
            "required": true,
            "minVersion": "0.8",
            "package": "com.mymod.cheatmod.mixin",
            "compatibilityLevel": "JAVA_21",
            "mixins": ["ServerPlayerEntityMixin"],
            "injectors": { "defaultRequire": 1 }
          }
          EOF

          mkdir -p src/main/java/com/mymod/cheatmod/command
          mkdir -p src/main/java/com/mymod/cheatmod/handler
          mkdir -p src/main/java/com/mymod/cheatmod/mixin

          cat > src/main/java/com/mymod/cheatmod/CheatMod.java << 'EOF'
          package com.mymod.cheatmod;

          import com.mymod.cheatmod.command.*;
          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.command.v2.CommandRegistrationCallback;

          public class CheatMod implements ModInitializer {
              @Override
              public void onInitialize() {
                  CommandRegistrationCallback.EVENT.register((dispatcher, registryAccess, environment) -> {
                      GivemCommand.register(dispatcher, registryAccess);
                      GodmCommand.register(dispatcher);
                      FlyCommand.register(dispatcher);
                      CrmCommand.register(dispatcher);
                  });
              }
          }
          EOF

          cat > src/main/java/com/mymod/cheatmod/handler/GodModeHandler.java << 'EOF'
          package com.mymod.cheatmod.handler;

          import java.util.HashSet;
          import java.util.Set;
          import java.util.UUID;

          public class GodModeHandler {
              private static final Set<UUID> gods = new HashSet<>();
              public static boolean has(UUID u) { return gods.contains(u); }
              public static boolean toggle(UUID u) {
                  if (gods.contains(u)) { gods.remove(u); return false; }
                  else { gods.add(u); return true; }
              }
          }
          EOF

          cat > src/main/java/com/mymod/cheatmod/mixin/ServerPlayerEntityMixin.java << 'EOF'
          package com.mymod.cheatmod.mixin;

          import com.mymod.cheatmod.handler.GodModeHandler;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.entity.damage.DamageSource;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

          @Mixin(ServerPlayerEntity.class)
          public abstract class ServerPlayerEntityMixin {
              @Inject(method = "damage", at = @At("HEAD"), cancellable = true)
              private void onDamage(DamageSource source, float amount, CallbackInfoReturnable<Boolean> cir) {
                  ServerPlayerEntity player = (ServerPlayerEntity)(Object)this;
                  if (GodModeHandler.has(player.getUuid())) cir.setReturnValue(false);
              }
          }
          EOF

          cat > src/main/java/com/mymod/cheatmod/command/GivemCommand.java << 'EOF'
          package com.mymod.cheatmod.command;

          import com.mojang.brigadier.CommandDispatcher;
          import com.mojang.brigadier.arguments.IntegerArgumentType;
          import com.mojang.brigadier.arguments.StringArgumentType;
          import com.mojang.brigadier.suggestion.SuggestionProvider;
          import net.minecraft.command.CommandRegistryAccess;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.Items;
          import net.minecraft.registry.Registries;
          import net.minecraft.server.command.CommandManager;
          import net.minecraft.server.command.ServerCommandSource;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;
          import net.minecraft.util.Identifier;
          import java.util.HashMap;
          import java.util.Map;

          public class GivemCommand {
              private static final Map<String, Item> A = new HashMap<>();
              static {
                  A.put("dirt", Items.DIRT);
                  A.put("stone", Items.STONE);
                  A.put("diamond", Items.DIAMOND);
                  A.put("iron", Items.IRON_INGOT);
                  A.put("gold", Items.GOLD_INGOT);
                  A.put("emerald", Items.EMERALD);
                  A.put("coal", Items.COAL);
                  A.put("netherite", Items.NETHERITE_INGOT);
                  A.put("sword", Items.NETHERITE_SWORD);
                  A.put("pickaxe", Items.NETHERITE_PICKAXE);
                  A.put("axe", Items.NETHERITE_AXE);
                  A.put("elytra", Items.ELYTRA);
                  A.put("totem", Items.TOTEM_OF_UNDYING);
                  A.put("bread", Items.BREAD);
                  A.put("steak", Items.COOKED_BEEF);
                  A.put("apple", Items.GOLDEN_APPLE);
                  A.put("stick", Items.STICK);
              }

              private static final SuggestionProvider<ServerCommandSource> SUG = (ctx, b) -> {
                  String r = b.getRemaining().toLowerCase();
                  for (String a : A.keySet()) if (a.startsWith(r)) b.suggest(a);
                  return b.buildFuture();
              };

              public static void register(CommandDispatcher<ServerCommandSource> d, CommandRegistryAccess ra) {
                  d.register(CommandManager.literal("givem")
                      .then(CommandManager.argument("item", StringArgumentType.string()).suggests(SUG)
                          .executes(c -> run(c.getSource(), StringArgumentType.getString(c, "item"), 1))
                          .then(CommandManager.argument("amount", IntegerArgumentType.integer(1, 6400))
                              .executes(c -> run(c.getSource(), StringArgumentType.getString(c, "item"),
                                  IntegerArgumentType.getInteger(c, "amount"))))));
              }

              private static int run(ServerCommandSource s, String name, int amt) {
                  ServerPlayerEntity p = s.getPlayer();
                  if (p == null) { s.sendError(Text.literal("§cPlayers only")); return 0; }
                  Item item = A.get(name.toLowerCase());
                  if (item == null) {
                      Identifier id = name.contains(":") ? Identifier.tryParse(name) : Identifier.tryParse("minecraft:" + name);
                      if (id != null && Registries.ITEM.containsId(id)) item = Registries.ITEM.get(id);
                  }
                  if (item == null || item == Items.AIR) { s.sendError(Text.literal("§cUnknown: " + name)); return 0; }
                  int left = amt;
                  while (left > 0) {
                      int sz = Math.min(left, item.getMaxCount());
                      ItemStack st = new ItemStack(item, sz);
                      if (!p.getInventory().insertStack(st) && !st.isEmpty()) p.dropItem(st, false);
                      left -= sz;
                  }
                  s.sendFeedback(() -> Text.literal("§aGave §e" + amt + "x §b" + name), false);
                  return 1;
              }
          }
          EOF

          cat > src/main/java/com/mymod/cheatmod/command/GodmCommand.java << 'EOF'
          package com.mymod.cheatmod.command;

          import com.mojang.brigadier.CommandDispatcher;
          import com.mymod.cheatmod.handler.GodModeHandler;
          import net.minecraft.server.command.CommandManager;
          import net.minecraft.server.command.ServerCommandSource;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;

          public class GodmCommand {
              public static void register(CommandDispatcher<ServerCommandSource> d) {
                  d.register(CommandManager.literal("godm").executes(c -> {
                      ServerCommandSource s = c.getSource();
                      ServerPlayerEntity p = s.getPlayer();
                      if (p == null) { s.sendError(Text.literal("§cPlayers only")); return 0; }
                      boolean on = GodModeHandler.toggle(p.getUuid());
                      if (on) {
                          p.setHealth(p.getMaxHealth());
                          p.getHungerManager().setFoodLevel(20);
                          p.getHungerManager().setSaturationLevel(20.0f);
                          p.clearStatusEffects();
                          s.sendFeedback(() -> Text.literal("§a§lGod Mode §aON"), false);
                      } else {
                          s.sendFeedback(() -> Text.literal("§c§lGod Mode §cOFF"), false);
                      }
                      return 1;
                  }));
              }
          }
          EOF

          cat > src/main/java/com/mymod/cheatmod/command/FlyCommand.java << 'EOF'
          package com.mymod.cheatmod.command;

          import com.mojang.brigadier.CommandDispatcher;
          import net.minecraft.server.command.CommandManager;
          import net.minecraft.server.command.ServerCommandSource;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;

          public class FlyCommand {
              public static void register(CommandDispatcher<ServerCommandSource> d) {
                  d.register(CommandManager.literal("fly").executes(c -> {
                      ServerCommandSource s = c.getSource();
                      ServerPlayerEntity p = s.getPlayer();
                      if (p == null) { s.sendError(Text.literal("§cPlayers only")); return 0; }
                      boolean nw = !p.getAbilities().allowFlying;
                      p.getAbilities().allowFlying = nw;
                      if (!nw) p.getAbilities().flying = false;
                      p.sendAbilitiesUpdate();
                      s.sendFeedback(() -> Text.literal(nw ? "§a§lFly §aON" : "§c§lFly §cOFF"), false);
                      return 1;
                  }));
              }
          }
          EOF

          cat > src/main/java/com/mymod/cheatmod/command/CrmCommand.java << 'EOF'
          package com.mymod.cheatmod.command;

          import com.mojang.brigadier.CommandDispatcher;
          import net.minecraft.server.command.CommandManager;
          import net.minecraft.server.command.ServerCommandSource;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.text.Text;
          import net.minecraft.world.GameMode;

          public class CrmCommand {
              public static void register(CommandDispatcher<ServerCommandSource> d) {
                  d.register(CommandManager.literal("crm").executes(c -> {
                      ServerCommandSource s = c.getSource();
                      ServerPlayerEntity p = s.getPlayer();
                      if (p == null) { s.sendError(Text.literal("§cPlayers only")); return 0; }
                      boolean cr = p.interactionManager.getGameMode() == GameMode.CREATIVE;
                      if (!cr) {
                          p.changeGameMode(GameMode.CREATIVE);
                          p.getAbilities().allowFlying = true;
                          p.getAbilities().flying = true;
                          p.sendAbilitiesUpdate();
                          s.sendFeedback(() -> Text.literal("§a§lCreative §aON"), false);
                      } else {
                          p.changeGameMode(GameMode.SURVIVAL);
                          p.getAbilities().allowFlying = false;
                          p.getAbilities().flying = false;
                          p.sendAbilitiesUpdate();
                          s.sendFeedback(() -> Text.literal("§c§lCreative §cOFF §7(Survival)"), false);
                      }
                      return 1;
                  }));
              }
          }
          EOF

          gradle wrapper --gradle-version 8.10
          ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: cheatmod-1.21.1
          path: build/libs/*.jar
