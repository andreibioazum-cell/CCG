name: Pocket_Code_Style
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/pocketstyle/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowBackground">#F3F8FC</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_panel.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#FFFFFF"/>
            <corners android:radius="16dp"/>
            <stroke android:width="1dp" android:color="#D6E6F2"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bg_stage.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#D8F0FF"/>
            <corners android:radius="18dp"/>
            <stroke android:width="2dp" android:color="#8AC4E8"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#4C97FF"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_green.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#5FD36E"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_orange.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#FFAB19"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_red.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#FF6F6F"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_purple.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#9966FF"/>
            <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_event.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#FFBF00"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_motion.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#4C97FF"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_looks.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#9966FF"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/block_control.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <solid android:color="#FFAB19"/>
            <corners android:radius="16dp"/>
          </shape>
          EOF

          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#F3F8FC">

              <LinearLayout
                  android:id="@+id/screen_projects"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp">

                  <TextView
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="Projects"
                      android:textSize="26sp"
                      android:textStyle="bold"
                      android:textColor="#2D678F"/>

                  <Button
                      android:id="@+id/btn_new_project"
                      android:layout_width="match_parent"
                      android:layout_height="48dp"
                      android:text="+ New Project"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/btn_blue"
                      android:layout_marginTop="12dp"/>

                  <ScrollView
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:id="@+id/projects_list"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"/>
                  </ScrollView>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/screen_scenes"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp"
                  android:visibility="gone">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/back_to_projects"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="←"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_red"/>

                      <TextView
                          android:id="@+id/txt_project_title"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Scenes"
                          android:textSize="24sp"
                          android:textStyle="bold"
                          android:textColor="#2D678F"
                          android:gravity="center_vertical"
                          android:paddingLeft="12dp"/>
                  </LinearLayout>

                  <Button
                      android:id="@+id/btn_new_scene"
                      android:layout_width="match_parent"
                      android:layout_height="48dp"
                      android:text="+ New Scene"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/btn_purple"
                      android:layout_marginTop="12dp"/>

                  <ScrollView
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:id="@+id/scenes_list"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"/>
                  </ScrollView>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/screen_objects"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp"
                  android:visibility="gone">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/back_to_scenes"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="←"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_red"/>

                      <TextView
                          android:id="@+id/txt_scene_title"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Objects"
                          android:textSize="24sp"
                          android:textStyle="bold"
                          android:textColor="#2D678F"
                          android:gravity="center_vertical"
                          android:paddingLeft="12dp"/>

                      <Button
                          android:id="@+id/btn_run_scene"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="Run"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_green"/>
                  </LinearLayout>

                  <Button
                      android:id="@+id/btn_new_object"
                      android:layout_width="match_parent"
                      android:layout_height="48dp"
                      android:text="+ New Object"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/btn_blue"
                      android:layout_marginTop="12dp"/>

                  <ScrollView
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:id="@+id/objects_list"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"/>
                  </ScrollView>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/screen_scripts"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:padding="12dp"
                  android:visibility="gone">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/back_to_objects"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="←"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_red"/>

                      <TextView
                          android:id="@+id/txt_object_title"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Scripts"
                          android:textSize="24sp"
                          android:textStyle="bold"
                          android:textColor="#2D678F"
                          android:gravity="center_vertical"
                          android:paddingLeft="12dp"/>

                      <Button
                          android:id="@+id/btn_run_object"
                          android:layout_width="wrap_content"
                          android:layout_height="44dp"
                          android:text="Run"
                          android:textColor="#FFFFFF"
                          android:background="@drawable/btn_green"/>
                  </LinearLayout>

                  <FrameLayout
                      android:id="@+id/stage"
                      android:layout_width="match_parent"
                      android:layout_height="220dp"
                      android:background="@drawable/bg_stage"
                      android:layout_marginTop="10dp">

                      <FrameLayout
                          android:id="@+id/stage_layer"
                          android:layout_width="match_parent"
                          android:layout_height="match_parent"/>
                  </FrameLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="0dp"
                      android:layout_weight="1"
                      android:orientation="vertical"
                      android:background="@drawable/bg_panel"
                      android:padding="10dp"
                      android:layout_marginTop="10dp">

                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="horizontal">

                          <TextView
                              android:layout_width="0dp"
                              android:layout_height="wrap_content"
                              android:layout_weight="1"
                              android:text="Blocks"
                              android:textStyle="bold"
                              android:textSize="18sp"
                              android:textColor="#356D99"/>

                          <Button
                              android:id="@+id/btn_add_block"
                              android:layout_width="44dp"
                              android:layout_height="44dp"
                              android:text="+"
                              android:textColor="#FFFFFF"
                              android:textSize="24sp"
                              android:background="@drawable/btn_blue"/>
                      </LinearLayout>

                      <ScrollView
                          android:layout_width="match_parent"
                          android:layout_height="0dp"
                          android:layout_weight="1"
                          android:layout_marginTop="8dp">

                          <LinearLayout
                              android:id="@+id/blocks_list"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="vertical"/>
                      </ScrollView>
                  </LinearLayout>
              </LinearLayout>
          </FrameLayout>
          LAYOUT

          cat <<EOF > app/src/main/java/com/pocketstyle/app/BlockItem.java
          package com.pocketstyle.app;

          public class BlockItem {
              public String type;
              public String label;
              public String arg1;
              public String arg2;

              public BlockItem(String type, String label, String arg1, String arg2){
                  this.type = type;
                  this.label = label;
                  this.arg1 = arg1;
                  this.arg2 = arg2;
              }
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketstyle/app/ObjectItem.java
          package com.pocketstyle.app;

          import java.util.ArrayList;

          public class ObjectItem {
              public String name = "Object";
              public String emoji = "🐱";
              public String imageUri = "";
              public float x = 100f;
              public float y = 80f;
              public boolean visible = true;
              public String say = "";
              public ArrayList<BlockItem> blocks = new ArrayList<>();
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketstyle/app/SceneItem.java
          package com.pocketstyle.app;

          import java.util.ArrayList;

          public class SceneItem {
              public String name = "Scene";
              public String bgColor = "#D8F0FF";
              public ArrayList<ObjectItem> objects = new ArrayList<>();
          }
          EOF

          cat <<EOF > app/src/main/java/com/pocketstyle/app/ProjectItem.java
          package com.pocketstyle.app;

          import java.util.ArrayList;

          public class ProjectItem {
              public String name = "Project";
              public ArrayList<SceneItem> scenes = new ArrayList<>();
          }
          EOF

          cat <<'STORE' > app/src/main/java/com/pocketstyle/app/ProjectStore.java
          package com.pocketstyle.app;

          import android.content.Context;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.*;
          import java.util.ArrayList;

          public class ProjectStore {
              private static File file(Context c){
                  return new File(c.getFilesDir(), "projects.json");
              }

              public static ArrayList<ProjectItem> load(Context c){
                  ArrayList<ProjectItem> out = new ArrayList<>();
                  try{
                      File f = file(c);
                      if(!f.exists()) return out;
                      BufferedReader rd = new BufferedReader(new FileReader(f));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while((line = rd.readLine()) != null) sb.append(line);
                      rd.close();

                      JSONArray arr = new JSONArray(sb.toString());
                      for(int i=0;i<arr.length();i++){
                          JSONObject p = arr.getJSONObject(i);
                          ProjectItem pr = new ProjectItem();
                          pr.name = p.optString("name", "Project");

                          JSONArray scenes = p.optJSONArray("scenes");
                          if(scenes != null){
                              for(int j=0;j<scenes.length();j++){
                                  JSONObject s = scenes.getJSONObject(j);
                                  SceneItem sc = new SceneItem();
                                  sc.name = s.optString("name", "Scene");
                                  sc.bgColor = s.optString("bgColor", "#D8F0FF");

                                  JSONArray objs = s.optJSONArray("objects");
                                  if(objs != null){
                                      for(int k=0;k<objs.length();k++){
                                          JSONObject o = objs.getJSONObject(k);
                                          ObjectItem ob = new ObjectItem();
                                          ob.name = o.optString("name", "Object");
                                          ob.emoji = o.optString("emoji", "🐱");
                                          ob.imageUri = o.optString("imageUri", "");
                                          ob.x = (float)o.optDouble("x", 100);
                                          ob.y = (float)o.optDouble("y", 80);
                                          ob.visible = o.optBoolean("visible", true);
                                          ob.say = o.optString("say", "");

                                          JSONArray blocks = o.optJSONArray("blocks");
                                          if(blocks != null){
                                              for(int z=0;z<blocks.length();z++){
                                                  JSONObject b = blocks.getJSONObject(z);
                                                  ob.blocks.add(new BlockItem(
                                                      b.optString("type"),
                                                      b.optString("label"),
                                                      b.optString("arg1"),
                                                      b.optString("arg2")
                                                  ));
                                              }
                                          }

                                          sc.objects.add(ob);
                                      }
                                  }

                                  pr.scenes.add(sc);
                              }
                          }

                          out.add(pr);
                      }
                  }catch(Exception ignored){}
                  return out;
              }

              public static void save(Context c, ArrayList<ProjectItem> projects){
                  try{
                      JSONArray arr = new JSONArray();
                      for(ProjectItem pr : projects){
                          JSONObject p = new JSONObject();
                          p.put("name", pr.name);

                          JSONArray scenes = new JSONArray();
                          for(SceneItem sc : pr.scenes){
                              JSONObject s = new JSONObject();
                              s.put("name", sc.name);
                              s.put("bgColor", sc.bgColor);

                              JSONArray objs = new JSONArray();
                              for(ObjectItem ob : sc.objects){
                                  JSONObject o = new JSONObject();
                                  o.put("name", ob.name);
                                  o.put("emoji", ob.emoji);
                                  o.put("imageUri", ob.imageUri);
                                  o.put("x", ob.x);
                                  o.put("y", ob.y);
                                  o.put("visible", ob.visible);
                                  o.put("say", ob.say);

                                  JSONArray blocks = new JSONArray();
                                  for(BlockItem b : ob.blocks){
                                      JSONObject bb = new JSONObject();
                                      bb.put("type", b.type);
                                      bb.put("label", b.label);
                                      bb.put("arg1", b.arg1);
                                      bb.put("arg2", b.arg2);
                                      blocks.put(bb);
                                  }
                                  o.put("blocks", blocks);
                                  objs.put(o);
                              }

                              s.put("objects", objs);
                              scenes.put(s);
                          }
                          p.put("scenes", scenes);
                          arr.put(p);
                      }

                      FileWriter wr = new FileWriter(file(c));
                      wr.write(arr.toString());
                      wr.close();
                  }catch(Exception ignored){}
              }
          }
          STORE

          cat <<'RUNNER' > app/src/main/java/com/pocketstyle/app/ScriptRunner.java
          package com.pocketstyle.app;

          import android.os.Handler;
          import android.os.Looper;
          import java.util.ArrayList;

          public class ScriptRunner {
              public interface Host {
                  void renderScene();
                  boolean stopped();
              }

              public static void runObject(Host host, ObjectItem obj){
                  runEvent(host, obj, "event_run");
              }

              public static void runTap(Host host, ObjectItem obj){
                  runEvent(host, obj, "event_tap");
              }

              public static void runScene(Host host, SceneItem scene){
                  for(ObjectItem o : scene.objects){
                      runObject(host, o);
                  }
              }

              private static void runEvent(Host host, ObjectItem obj, String eventType){
                  ArrayList<BlockItem> seq = new ArrayList<>();
                  boolean cap = false;
                  for(BlockItem b : obj.blocks){
                      if(eventType.equals(b.type)){
                          cap = true;
                          continue;
                      }
                      if(cap && b.type.startsWith("event_")) break;
                      if(cap) seq.add(b);
                  }
                  execute(host, obj, seq);
              }

              private static void execute(Host host, ObjectItem obj, ArrayList<BlockItem> seq){
                  Handler h = new Handler(Looper.getMainLooper());
                  long delay = 0;
                  for(BlockItem b : seq){
                      switch (b.type){
                          case "move_x":
                              final float dx = parse(b.arg1, 20);
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.x += dx;
                                  host.renderScene();
                              }, delay);
                              break;
                          case "move_y":
                              final float dy = parse(b.arg1, 20);
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.y += dy;
                                  host.renderScene();
                              }, delay);
                              break;
                          case "go_xy":
                              final float x = parse(b.arg1, 100);
                              final float y = parse(b.arg2, 80);
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.x = x;
                                  obj.y = y;
                                  host.renderScene();
                              }, delay);
                              break;
                          case "say":
                              final String txt = b.arg1 == null ? "" : b.arg1;
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.say = txt;
                                  host.renderScene();
                              }, delay);
                              break;
                          case "hide":
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.visible = false;
                                  host.renderScene();
                              }, delay);
                              break;
                          case "show":
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.visible = true;
                                  host.renderScene();
                              }, delay);
                              break;
                          case "wait":
                              delay += (long)(parse(b.arg1, 1) * 1000f);
                              break;
                      }
                  }
              }

              private static float parse(String s, float d){
                  try { return Float.parseFloat(s); } catch(Exception e){ return d; }
              }
          }
          RUNNER

          cat <<'MAINACT' > app/src/main/java/com/pocketstyle/app/MainActivity.java
          package com.pocketstyle.app;

          import android.app.AlertDialog;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.FrameLayout;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.appcompat.app.AppCompatActivity;
          import org.json.JSONObject;
          import java.util.ArrayList;

          public class MainActivity extends AppCompatActivity implements ScriptRunner.Host {
              private View screenProjects, screenScenes, screenObjects, screenScripts;
              private LinearLayout projectsList, scenesList, objectsList, blocksList;
              private FrameLayout stage, stageLayer;
              private TextView txtProjectTitle, txtSceneTitle, txtObjectTitle;

              private final ArrayList<ProjectItem> projects = new ArrayList<>();
              private int currentProject = -1, currentScene = -1, currentObject = -1;
              private boolean stopFlag = false;
              private int pendingImportProject = -1, pendingImportScene = -1, pendingImportObject = -1;

              private ActivityResultLauncher<Intent> imagePicker;

              @Override
              public void renderScene() {
                  runOnUiThread(this::renderStage);
              }

              @Override
              public boolean stopped() {
                  return stopFlag;
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  screenProjects = findViewById(R.id.screen_projects);
                  screenScenes = findViewById(R.id.screen_scenes);
                  screenObjects = findViewById(R.id.screen_objects);
                  screenScripts = findViewById(R.id.screen_scripts);

                  projectsList = findViewById(R.id.projects_list);
                  scenesList = findViewById(R.id.scenes_list);
                  objectsList = findViewById(R.id.objects_list);
                  blocksList = findViewById(R.id.blocks_list);

                  stage = findViewById(R.id.stage);
                  stageLayer = findViewById(R.id.stage_layer);

                  txtProjectTitle = findViewById(R.id.txt_project_title);
                  txtSceneTitle = findViewById(R.id.txt_scene_title);
                  txtObjectTitle = findViewById(R.id.txt_object_title);

                  projects.addAll(ProjectStore.load(this));

                  imagePicker = registerForActivityResult(new ActivityResultContracts.StartActivityForResult(), res -> {
                      if(res.getResultCode() == RESULT_OK && res.getData() != null && res.getData().getData() != null){
                          try{
                              Uri uri = res.getData().getData();
                              getContentResolver().takePersistableUriPermission(uri,
                                  Intent.FLAG_GRANT_READ_URI_PERMISSION);

                              if(pendingImportProject >= 0 && pendingImportScene >= 0 && pendingImportObject >= 0){
                                  projects.get(pendingImportProject).scenes.get(pendingImportScene).objects.get(pendingImportObject).imageUri = uri.toString();
                                  saveAll();
                                  renderObjects();
                              }
                          }catch(Exception e){
                              toast("Import failed");
                          }
                      }
                  });

                  findViewById(R.id.btn_new_project).setOnClickListener(v -> createProjectDialog());
                  findViewById(R.id.back_to_projects).setOnClickListener(v -> showProjects());
                  findViewById(R.id.back_to_scenes).setOnClickListener(v -> showScenes());
                  findViewById(R.id.back_to_objects).setOnClickListener(v -> showObjects());

                  findViewById(R.id.btn_new_scene).setOnClickListener(v -> createSceneDialog());
                  findViewById(R.id.btn_new_object).setOnClickListener(v -> createObjectDialog());

                  findViewById(R.id.btn_run_scene).setOnClickListener(v -> {
                      stopFlag = false;
                      SceneItem sc = currentScene();
                      if(sc != null) ScriptRunner.runScene(this, sc);
                  });

                  findViewById(R.id.btn_run_object).setOnClickListener(v -> {
                      stopFlag = false;
                      ObjectItem ob = currentObject();
                      if(ob != null) ScriptRunner.runObject(this, ob);
                  });

                  findViewById(R.id.btn_add_block).setOnClickListener(v -> showCategoryDialog());

                  renderProjects();
                  showProjects();
              }

              private void toast(String s){
                  Toast.makeText(this, s, Toast.LENGTH_SHORT).show();
              }

              private void saveAll(){
                  ProjectStore.save(this, projects);
              }

              private ProjectItem currentProject(){
                  if(currentProject < 0 || currentProject >= projects.size()) return null;
                  return projects.get(currentProject);
              }

              private SceneItem currentScene(){
                  ProjectItem p = currentProject();
                  if(p == null || currentScene < 0 || currentScene >= p.scenes.size()) return null;
                  return p.scenes.get(currentScene);
              }

              private ObjectItem currentObject(){
                  SceneItem s = currentScene();
                  if(s == null || currentObject < 0 || currentObject >= s.objects.size()) return null;
                  return s.objects.get(currentObject);
              }

              private void showProjects(){
                  screenProjects.setVisibility(View.VISIBLE);
                  screenScenes.setVisibility(View.GONE);
                  screenObjects.setVisibility(View.GONE);
                  screenScripts.setVisibility(View.GONE);
                  renderProjects();
              }

              private void showScenes(){
                  screenProjects.setVisibility(View.GONE);
                  screenScenes.setVisibility(View.VISIBLE);
                  screenObjects.setVisibility(View.GONE);
                  screenScripts.setVisibility(View.GONE);
                  renderScenes();
              }

              private void showObjects(){
                  screenProjects.setVisibility(View.GONE);
                  screenScenes.setVisibility(View.GONE);
                  screenObjects.setVisibility(View.VISIBLE);
                  screenScripts.setVisibility(View.GONE);
                  renderObjects();
              }

              private void showScripts(){
                  screenProjects.setVisibility(View.GONE);
                  screenScenes.setVisibility(View.GONE);
                  screenObjects.setVisibility(View.GONE);
                  screenScripts.setVisibility(View.VISIBLE);
                  renderBlocks();
                  renderStage();
              }

              private void renderProjects(){
                  projectsList.removeAllViews();
                  for(int i=0;i<projects.size();i++){
                      ProjectItem p = projects.get(i);
                      LinearLayout card = makeCard();
                      TextView tv = title(p.name);
                      TextView sub = subtitle("Scenes: " + p.scenes.size());

                      card.addView(tv);
                      card.addView(sub);

                      final int idx = i;
                      card.setOnClickListener(v -> {
                          currentProject = idx;
                          currentScene = -1;
                          currentObject = -1;
                          showScenes();
                      });

                      card.setOnLongClickListener(v -> {
                          showProjectMenu(idx);
                          return true;
                      });

                      projectsList.addView(card);
                  }
              }

              private void renderScenes(){
                  ProjectItem p = currentProject();
                  if(p == null) return;
                  txtProjectTitle.setText(p.name + " / Scenes");

                  scenesList.removeAllViews();
                  for(int i=0;i<p.scenes.size();i++){
                      SceneItem s = p.scenes.get(i);
                      LinearLayout card = makeCard();
                      TextView tv = title(s.name);
                      TextView sub = subtitle("Objects: " + s.objects.size());

                      card.addView(tv);
                      card.addView(sub);

                      final int idx = i;
                      card.setOnClickListener(v -> {
                          currentScene = idx;
                          currentObject = -1;
                          showObjects();
                      });

                      card.setOnLongClickListener(v -> {
                          showSceneMenu(idx);
                          return true;
                      });

                      scenesList.addView(card);
                  }
              }

              private void renderObjects(){
                  SceneItem s = currentScene();
                  if(s == null) return;
                  txtSceneTitle.setText(s.name + " / Objects");

                  objectsList.removeAllViews();
                  for(int i=0;i<s.objects.size();i++){
                      ObjectItem o = s.objects.get(i);
                      LinearLayout card = makeCard();
                      TextView tv = title(o.name + " " + o.emoji);
                      TextView sub = subtitle(o.imageUri.isEmpty() ? "Emoji sprite" : "Imported image");

                      card.addView(tv);
                      card.addView(sub);

                      LinearLayout btnRow = new LinearLayout(this);
                      btnRow.setOrientation(LinearLayout.HORIZONTAL);

                      Button importBtn = new Button(this);
                      importBtn.setText("Import");
                      importBtn.setTextColor(Color.WHITE);
                      importBtn.setBackgroundResource(R.drawable.btn_purple);

                      Button scriptsBtn = new Button(this);
                      scriptsBtn.setText("Scripts");
                      scriptsBtn.setTextColor(Color.WHITE);
                      scriptsBtn.setBackgroundResource(R.drawable.btn_blue);

                      LinearLayout.LayoutParams lp1 = new LinearLayout.LayoutParams(0, dp(40), 1f);
                      LinearLayout.LayoutParams lp2 = new LinearLayout.LayoutParams(0, dp(40), 1f);
                      lp2.leftMargin = dp(8);

                      importBtn.setLayoutParams(lp1);
                      scriptsBtn.setLayoutParams(lp2);

                      final int idx = i;
                      importBtn.setOnClickListener(v -> importSprite(idx));
                      scriptsBtn.setOnClickListener(v -> {
                          currentObject = idx;
                          showScripts();
                      });

                      btnRow.addView(importBtn);
                      btnRow.addView(scriptsBtn);
                      card.addView(btnRow);

                      card.setOnLongClickListener(v -> {
                          showObjectMenu(idx);
                          return true;
                      });

                      objectsList.addView(card);
                  }
              }

              private void renderBlocks(){
                  ObjectItem o = currentObject();
                  if(o == null) return;
                  txtObjectTitle.setText(o.name + " / Scripts");

                  blocksList.removeAllViews();
                  for(int i=0;i<o.blocks.size();i++){
                      BlockItem b = o.blocks.get(i);
                      TextView tv = new TextView(this);
                      String text = b.label;
                      if(b.arg1 != null && !b.arg1.isEmpty()) text += " " + b.arg1;
                      if(b.arg2 != null && !b.arg2.isEmpty()) text += " " + b.arg2;
                      tv.setText(text);
                      tv.setTextColor(Color.WHITE);
                      tv.setTextSize(16f);
                      tv.setPadding(dp(14), dp(10), dp(14), dp(10));

                      if(b.type.startsWith("event_")) tv.setBackgroundResource(R.drawable.block_event);
                      else if(b.type.startsWith("move") || "go_xy".equals(b.type)) tv.setBackgroundResource(R.drawable.block_motion);
                      else if("wait".equals(b.type)) tv.setBackgroundResource(R.drawable.block_control);
                      else tv.setBackgroundResource(R.drawable.block_looks);

                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT,
                          LinearLayout.LayoutParams.WRAP_CONTENT
                      );
                      lp.topMargin = dp(8);
                      tv.setLayoutParams(lp);

                      final int idx = i;
                      tv.setOnClickListener(v -> showBlockMenu(idx));

                      blocksList.addView(tv);
                  }
              }

              private void renderStage(){
                  SceneItem scene = currentScene();
                  if(scene == null) return;

                  try{
                      GradientDrawable bg = new GradientDrawable();
                      bg.setColor(Color.parseColor(scene.bgColor));
                      bg.setCornerRadius(dp(18));
                      bg.setStroke(dp(2), Color.parseColor("#8AC4E8"));
                      stage.setBackground(bg);
                  }catch(Exception ignored){}

                  stageLayer.removeAllViews();

                  for(int i=0;i<scene.objects.size();i++){
                      ObjectItem o = scene.objects.get(i);

                      FrameLayout wrap = new FrameLayout(this);
                      wrap.setTranslationX(o.x);
                      wrap.setTranslationY(o.y);

                      View spriteView;
                      if(o.imageUri != null && !o.imageUri.isEmpty()){
                          ImageView img = new ImageView(this);
                          img.setImageURI(Uri.parse(o.imageUri));
                          img.setAdjustViewBounds(true);
                          FrameLayout.LayoutParams ilp = new FrameLayout.LayoutParams(dp(72), dp(72));
                          img.setLayoutParams(ilp);
                          spriteView = img;
                      } else {
                          TextView tv = new TextView(this);
                          tv.setText(o.emoji);
                          tv.setTextSize(42f);
                          spriteView = tv;
                      }

                      spriteView.setVisibility(o.visible ? View.VISIBLE : View.INVISIBLE);
                      final int idx = i;
                      spriteView.setOnClickListener(v -> {
                          if(!stopFlag) ScriptRunner.runTap(this, scene.objects.get(idx));
                      });

                      wrap.addView(spriteView);

                      if(o.say != null && !o.say.isEmpty()){
                          TextView speech = new TextView(this);
                          speech.setText(o.say);
                          speech.setTextSize(14f);
                          speech.setTextColor(Color.BLACK);
                          speech.setPadding(dp(8), dp(4), dp(8), dp(4));
                          speech.setBackgroundResource(R.drawable.bg_panel);
                          FrameLayout.LayoutParams slp = new FrameLayout.LayoutParams(
                              FrameLayout.LayoutParams.WRAP_CONTENT,
                              FrameLayout.LayoutParams.WRAP_CONTENT
                          );
                          slp.leftMargin = dp(40);
                          slp.topMargin = -dp(10);
                          speech.setLayoutParams(slp);
                          wrap.addView(speech);
                      }

                      stageLayer.addView(wrap);
                  }
              }

              private void createProjectDialog(){
                  EditText input = new EditText(this);
                  input.setHint("Project name");
                  input.setText("My Project");

                  new AlertDialog.Builder(this)
                      .setTitle("Create Project")
                      .setView(input)
                      .setPositiveButton("Create", (d,w) -> {
                          ProjectItem p = new ProjectItem();
                          p.name = input.getText().toString().trim().isEmpty() ? "Project" : input.getText().toString();
                          projects.add(p);
                          saveAll();
                          renderProjects();
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              private void createSceneDialog(){
                  ProjectItem p = currentProject();
                  if(p == null) return;

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);

                  EditText name = new EditText(this);
                  name.setHint("Scene name");
                  name.setText("Scene " + (p.scenes.size()+1));

                  EditText color = new EditText(this);
                  color.setHint("#D8F0FF");
                  color.setText("#D8F0FF");

                  root.addView(name);
                  root.addView(color);

                  new AlertDialog.Builder(this)
                      .setTitle("Create Scene")
                      .setView(root)
                      .setPositiveButton("Create", (d,w) -> {
                          SceneItem s = new SceneItem();
                          s.name = name.getText().toString().trim().isEmpty() ? "Scene" : name.getText().toString();
                          s.bgColor = color.getText().toString().trim().isEmpty() ? "#D8F0FF" : color.getText().toString();
                          p.scenes.add(s);
                          saveAll();
                          renderScenes();
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              private void createObjectDialog(){
                  SceneItem s = currentScene();
                  if(s == null) return;

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);

                  EditText name = new EditText(this);
                  name.setHint("Object name");
                  name.setText("Object " + (s.objects.size()+1));

                  EditText emoji = new EditText(this);
                  emoji.setHint("Emoji");
                  emoji.setText("🐱");

                  root.addView(name);
                  root.addView(emoji);

                  new AlertDialog.Builder(this)
                      .setTitle("Create Object")
                      .setView(root)
                      .setPositiveButton("Create", (d,w) -> {
                          ObjectItem o = new ObjectItem();
                          o.name = name.getText().toString().trim().isEmpty() ? "Object" : name.getText().toString();
                          o.emoji = emoji.getText().toString().trim().isEmpty() ? "🐱" : emoji.getText().toString();
                          s.objects.add(o);
                          saveAll();
                          renderObjects();
                      })
                      .setNeutralButton("Create + Import", (d,w) -> {
                          ObjectItem o = new ObjectItem();
                          o.name = name.getText().toString().trim().isEmpty() ? "Object" : name.getText().toString();
                          o.emoji = emoji.getText().toString().trim().isEmpty() ? "🐱" : emoji.getText().toString();
                          s.objects.add(o);
                          saveAll();
                          pendingImportProject = currentProject;
                          pendingImportScene = currentScene;
                          pendingImportObject = s.objects.size()-1;
                          openImagePicker();
                          renderObjects();
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              private void importSprite(int objectIndex){
                  pendingImportProject = currentProject;
                  pendingImportScene = currentScene;
                  pendingImportObject = objectIndex;
                  openImagePicker();
              }

              private void openImagePicker(){
                  Intent i = new Intent(Intent.ACTION_OPEN_DOCUMENT);
                  i.addCategory(Intent.CATEGORY_OPENABLE);
                  i.setType("image/*");
                  i.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                  i.addFlags(Intent.FLAG_GRANT_PERSISTABLE_URI_PERMISSION);
                  imagePicker.launch(i);
              }

              private void showCategoryDialog(){
                  String[] cats = {"Events", "Motion", "Looks", "Control"};
                  new AlertDialog.Builder(this)
                      .setTitle("Choose Category")
                      .setItems(cats, (d,w) -> {
                          if(w == 0) showBlockTypeDialog("events");
                          else if(w == 1) showBlockTypeDialog("motion");
                          else if(w == 2) showBlockTypeDialog("looks");
                          else showBlockTypeDialog("control");
                      })
                      .show();
              }

              private void showBlockTypeDialog(String cat){
                  if("events".equals(cat)){
                      String[] items = {"when run", "when tapped"};
                      new AlertDialog.Builder(this)
                          .setTitle("Events")
                          .setItems(items, (d,w) -> {
                              if(w == 0) insertBlockDialog(new BlockItem("event_run", "when run", "", ""));
                              else insertBlockDialog(new BlockItem("event_tap", "when tapped", "", ""));
                          }).show();
                  } else if("motion".equals(cat)){
                      String[] items = {"move x", "move y", "go to x y"};
                      new AlertDialog.Builder(this)
                          .setTitle("Motion")
                          .setItems(items, (d,w) -> {
                              if(w == 0) askOneArg("move x", "20", v -> insertBlockDialog(new BlockItem("move_x", "move x", v, "")));
                              else if(w == 1) askOneArg("move y", "20", v -> insertBlockDialog(new BlockItem("move_y", "move y", v, "")));
                              else askTwoArg("go to x y", "100", "80", (a,b) -> insertBlockDialog(new BlockItem("go_xy", "go to", a, b)));
                          }).show();
                  } else if("looks".equals(cat)){
                      String[] items = {"say", "hide", "show"};
                      new AlertDialog.Builder(this)
                          .setTitle("Looks")
                          .setItems(items, (d,w) -> {
                              if(w == 0) askOneArg("say", "Hello!", v -> insertBlockDialog(new BlockItem("say", "say", v, "")));
                              else if(w == 1) insertBlockDialog(new BlockItem("hide", "hide", "", ""));
                              else insertBlockDialog(new BlockItem("show", "show", "", ""));
                          }).show();
                  } else if("control".equals(cat)){
                      String[] items = {"wait"};
                      new AlertDialog.Builder(this)
                          .setTitle("Control")
                          .setItems(items, (d,w) -> askOneArg("wait", "1", v -> insertBlockDialog(new BlockItem("wait", "wait", v, ""))))
                          .show();
                  }
              }

              private interface OneArg { void ok(String v); }
              private interface TwoArg { void ok(String a, String b); }

              private void askOneArg(String title, String def, OneArg cb){
                  EditText input = new EditText(this);
                  input.setText(def);
                  new AlertDialog.Builder(this)
                      .setTitle(title)
                      .setView(input)
                      .setPositiveButton("OK", (d,w) -> cb.ok(input.getText().toString()))
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              private void askTwoArg(String title, String d1, String d2, TwoArg cb){
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  EditText a = new EditText(this);
                  EditText b = new EditText(this);
                  a.setText(d1);
                  b.setText(d2);
                  a.setHint("x");
                  b.setHint("y");
                  root.addView(a);
                  root.addView(b);
                  new AlertDialog.Builder(this)
                      .setTitle(title)
                      .setView(root)
                      .setPositiveButton("OK", (d,w) -> cb.ok(a.getText().toString(), b.getText().toString()))
                      .setNegativeButton("Cancel", null)
                      .show();
              }

              private void insertBlockDialog(BlockItem block){
                  ObjectItem o = currentObject();
                  if(o == null) return;

                  String[] opts = new String[o.blocks.size()+1];
                  opts[0] = "At end";
                  for(int i=0;i<o.blocks.size();i++){
                      opts[i+1] = "Before: " + o.blocks.get(i).label;
                  }

                  new AlertDialog.Builder(this)
                      .setTitle("Where to insert?")
                      .setItems(opts, (d,w) -> {
                          if(w == 0) o.blocks.add(block);
                          else o.blocks.add(w-1, block);
                          saveAll();
                          renderBlocks();
                      })
                      .show();
              }

              private void showBlockMenu(int idx){
                  ObjectItem o = currentObject();
                  if(o == null) return;

                  String[] items = {"Delete"};
                  new AlertDialog.Builder(this)
                      .setTitle("Block")
                      .setItems(items, (d,w) -> {
                          o.blocks.remove(idx);
                          saveAll();
                          renderBlocks();
                      }).show();
              }

              private void showProjectMenu(int idx){
                  String[] items = {"Rename", "Delete"};
                  new AlertDialog.Builder(this)
                      .setTitle(projects.get(idx).name)
                      .setItems(items, (d,w) -> {
                          if(w == 0){
                              EditText input = new EditText(this);
                              input.setText(projects.get(idx).name);
                              new AlertDialog.Builder(this)
                                  .setTitle("Rename Project")
                                  .setView(input)
                                  .setPositiveButton("OK", (dd,ww) -> {
                                      projects.get(idx).name = input.getText().toString();
                                      saveAll();
                                      renderProjects();
                                  })
                                  .setNegativeButton("Cancel", null)
                                  .show();
                          } else {
                              projects.remove(idx);
                              saveAll();
                              renderProjects();
                          }
                      }).show();
              }

              private void showSceneMenu(int idx){
                  ProjectItem p = currentProject();
                  if(p == null) return;
                  String[] items = {"Rename", "Delete"};
                  new AlertDialog.Builder(this)
                      .setTitle(p.scenes.get(idx).name)
                      .setItems(items, (d,w) -> {
                          if(w == 0){
                              EditText input = new EditText(this);
                              input.setText(p.scenes.get(idx).name);
                              new AlertDialog.Builder(this)
                                  .setTitle("Rename Scene")
                                  .setView(input)
                                  .setPositiveButton("OK", (dd,ww) -> {
                                      p.scenes.get(idx).name = input.getText().toString();
                                      saveAll();
                                      renderScenes();
                                  })
                                  .setNegativeButton("Cancel", null)
                                  .show();
                          } else {
                              p.scenes.remove(idx);
                              saveAll();
                              renderScenes();
                          }
                      }).show();
              }

              private void showObjectMenu(int idx){
                  SceneItem s = currentScene();
                  if(s == null) return;
                  String[] items = {"Rename", "Delete"};
                  new AlertDialog.Builder(this)
                      .setTitle(s.objects.get(idx).name)
