name: Simple_Commands_1.21.1
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Fabric Mod Project
        run: |
          mkdir -p src/main/java/com/enjoer/commands
          mkdir -p src/main/resources
          mkdir -p src/main/resources/assets/enjoer/lang

          cat <<'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2G
          minecraft_version=1.21.1
          yarn_mappings=1.21.1+build.3
          loader_version=0.15.11
          fabric_version=0.96.0+1.21.1
          mod_version=1.0.0
          maven_group=com.enjoer
          archives_base_name=enjoer-commands
          EOF

          cat <<'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  maven {
                      name = 'Fabric'
                      url = 'https://maven.fabricmc.net/'
                  }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = 'EnjoerCommands'
          EOF

          cat <<'EOF' > build.gradle
          plugins {
              id 'fabric-loom' version '1.5.8'
          }
          
          version = project.mod_version
          group = project.maven_group
          
          base {
              archivesName = project.archives_base_name
          }
          
          repositories {
              mavenCentral()
          }
          
          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
          }
          
          processResources {
              inputs.property "version", project.version
              inputs.property "minecraft_version", project.minecraft_version
              inputs.property "loader_version", project.loader_version
              filteringCharset "UTF-8"
              
              filesMatching("fabric.mod.json") {
                  expand "version": project.version,
                          "minecraft_version": project.minecraft_version,
                          "loader_version": project.loader_version
              }
          }
          
          tasks.withType(JavaCompile).configureEach {
              it.options.release = 17
          }
          
          java {
              withSourcesJar()
              sourceCompatibility = JavaVersion.VERSION_17
              targetCompatibility = JavaVersion.VERSION_17
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "enjoer",
            "version": "${version}",
            "name": "Simple Commands",
            "description": "Basic commands: /givem, /godm, /fly, /crm",
            "authors": ["Enjoer"],
            "license": "MIT",
            "environment": "*",
            "entrypoints": {
              "main": [
                "com.enjoer.commands.SimpleCommandsMod"
              ]
            },
            "depends": {
              "fabricloader": ">=${loader_version}",
              "fabric-api": "*",
              "minecraft": "${minecraft_version}"
            }
          }
          EOF

          cat <<'EOF' > src/main/java/com/enjoer/commands/SimpleCommandsMod.java
          package com.enjoer.commands;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.command.v2.CommandRegistrationCallback;
          import net.minecraft.server.command.CommandManager;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.Items;
          import net.minecraft.util.Identifier;
          import net.minecraft.registry.Registries;
          import net.minecraft.text.Text;
          import net.minecraft.world.GameMode;
          import com.mojang.brigadier.arguments.StringArgumentType;
          import com.mojang.brigadier.arguments.IntegerArgumentType;
          import org.slf4j.Logger;
          import org.slf4j.LoggerFactory;

          public class SimpleCommandsMod implements ModInitializer {
              public static final String MOD_ID = "enjoer";
              public static final Logger LOGGER = LoggerFactory.getLogger(MOD_ID);

              @Override
              public void onInitialize() {
                  LOGGER.info("Simple Commands Mod initialized!");
                  
                  registerGiveCommand();
                  registerGodCommand();
                  registerFlyCommand();
                  registerCreativeCommand();
              }

              private void registerGiveCommand() {
                  CommandRegistrationCallback.EVENT.register((dispatcher, registryAccess, environment) -> {
                      dispatcher.register(CommandManager.literal("givem")
                          .then(CommandManager.argument("item", StringArgumentType.word())
                              .executes(context -> {
                                  ServerPlayerEntity player = context.getSource().getPlayer();
                                  String itemName = StringArgumentType.getString(context, "item");
                                  
                                  ItemStack itemStack = getItemByName(itemName);
                                  if (itemStack.isEmpty()) {
                                      player.sendMessage(Text.literal("§cItem not found: " + itemName), false);
                                      return 0;
                                  }
                                  
                                  itemStack.setCount(64);
                                  player.getInventory().offerOrDrop(itemStack);
                                  player.sendMessage(Text.literal("§aGave you §e" + itemName + " §ax64"), false);
                                  
                                  for (ServerPlayerEntity online : player.getServer().getPlayerManager().getPlayerList()) {
                                      if (online != player) {
                                          online.sendMessage(Text.literal("§7" + player.getName().getString() + " §agot §e" + itemName + " §ax64"), false);
                                      }
                                  }
                                  return 1;
                              })
                              .then(CommandManager.argument("amount", IntegerArgumentType.integer(1, 64))
                                  .executes(context -> {
                                      ServerPlayerEntity player = context.getSource().getPlayer();
                                      String itemName = StringArgumentType.getString(context, "item");
                                      int amount = IntegerArgumentType.getInteger(context, "amount");
                                      
                                      ItemStack itemStack = getItemByName(itemName);
                                      if (itemStack.isEmpty()) {
                                          player.sendMessage(Text.literal("§cItem not found: " + itemName), false);
                                          return 0;
                                      }
                                      
                                      itemStack.setCount(amount);
                                      player.getInventory().offerOrDrop(itemStack);
                                      player.sendMessage(Text.literal("§aGave you §e" + itemName + " §ax" + amount), false);
                                      
                                      for (ServerPlayerEntity online : player.getServer().getPlayerManager().getPlayerList()) {
                                          if (online != player) {
                                              online.sendMessage(Text.literal("§7" + player.getName().getString() + " §agot §e" + itemName + " §ax" + amount), false);
                                          }
                                      }
                                      return 1;
                                  })
                              )
                          )
                      );
                  });
              }

              private void registerGodCommand() {
                  CommandRegistrationCallback.EVENT.register((dispatcher, registryAccess, environment) -> {
                      dispatcher.register(CommandManager.literal("godm")
                          .executes(context -> {
                              ServerPlayerEntity player = context.getSource().getPlayer();
                              
                              if (player.isInvulnerable()) {
                                  player.setInvulnerable(false);
                                  player.sendMessage(Text.literal("§cGod mode disabled"), false);
                              } else {
                                  player.setInvulnerable(true);
                                  player.setHealth(player.getMaxHealth());
                                  player.getHungerManager().setFoodLevel(20);
                                  player.getHungerManager().setSaturationLevel(20);
                                  player.clearStatusEffects();
                                  player.sendMessage(Text.literal("§aGod mode enabled!"), false);
                              }
                              return 1;
                          })
                      );
                  });
              }

              private void registerFlyCommand() {
                  CommandRegistrationCallback.EVENT.register((dispatcher, registryAccess, environment) -> {
                      dispatcher.register(CommandManager.literal("fly")
                          .executes(context -> {
                              ServerPlayerEntity player = context.getSource().getPlayer();
                              
                              if (player.getAbilities().allowFlying) {
                                  player.getAbilities().allowFlying = false;
                                  player.getAbilities().flying = false;
                                  player.sendMessage(Text.literal("§cFlight disabled"), false);
                              } else {
                                  player.getAbilities().allowFlying = true;
                                  player.getAbilities().flying = true;
                                  player.sendMessage(Text.literal("§aFlight enabled!"), false);
                              }
                              player.sendAbilitiesUpdate();
                              return 1;
                          })
                      );
                  });
              }

              private void registerCreativeCommand() {
                  CommandRegistrationCallback.EVENT.register((dispatcher, registryAccess, environment) -> {
                      dispatcher.register(CommandManager.literal("crm")
                          .executes(context -> {
                              ServerPlayerEntity player = context.getSource().getPlayer();
                              GameMode currentMode = player.interactionManager.getGameMode();
                              
                              if (currentMode == GameMode.CREATIVE) {
                                  player.changeGameMode(GameMode.SURVIVAL);
                                  player.getAbilities().allowFlying = false;
                                  player.getAbilities().flying = false;
                                  player.sendAbilitiesUpdate();
                                  player.sendMessage(Text.literal("§cCreative mode disabled"), false);
                              } else {
                                  player.changeGameMode(GameMode.CREATIVE);
                                  player.getAbilities().allowFlying = true;
                                  player.getAbilities().flying = true;
                                  player.getAbilities().creativeMode = true;
                                  player.sendAbilitiesUpdate();
                                  player.sendMessage(Text.literal("§aCreative mode enabled!"), false);
                              }
                              return 1;
                          })
                      );
                  });
              }

              private ItemStack getItemByName(String name) {
                  Identifier id = Identifier.tryParse(name.toLowerCase());
                  if (id != null && Registries.ITEM.containsId(id)) {
                      return new ItemStack(Registries.ITEM.get(id));
                  }
                  
                  switch (name.toLowerCase()) {
                      case "dirt": return new ItemStack(Items.DIRT);
                      case "stone": return new ItemStack(Items.STONE);
                      case "cobblestone": return new ItemStack(Items.COBBLESTONE);
                      case "cobble": return new ItemStack(Items.COBBLESTONE);
                      case "wood": return new ItemStack(Items.OAK_PLANKS);
                      case "oak": return new ItemStack(Items.OAK_PLANKS);
                      case "diamond": return new ItemStack(Items.DIAMOND);
                      case "iron": return new ItemStack(Items.IRON_INGOT);
                      case "gold": return new ItemStack(Items.GOLD_INGOT);
                      case "emerald": return new ItemStack(Items.EMERALD);
                      case "coal": return new ItemStack(Items.COAL);
                      case "netherite": return new ItemStack(Items.NETHERITE_INGOT);
                      case "stick": return new ItemStack(Items.STICK);
                      case "apple": return new ItemStack(Items.APPLE);
                      case "bread": return new ItemStack(Items.BREAD);
                      case "steak": return new ItemStack(Items.COOKED_BEEF);
                      case "sword": return new ItemStack(Items.DIAMOND_SWORD);
                      case "pickaxe": return new ItemStack(Items.DIAMOND_PICKAXE);
                      case "axe": return new ItemStack(Items.DIAMOND_AXE);
                      case "helmet": return new ItemStack(Items.DIAMOND_HELMET);
                      case "chestplate": return new ItemStack(Items.DIAMOND_CHESTPLATE);
                      case "leggings": return new ItemStack(Items.DIAMOND_LEGGINGS);
                      case "boots": return new ItemStack(Items.DIAMOND_BOOTS);
                      case "elytra": return new ItemStack(Items.ELYTRA);
                      case "totem": return new ItemStack(Items.TOTEM_OF_UNDYING);
                      default: return ItemStack.EMPTY;
                  }
              }
          }
          EOF

          cat <<'EOF' > src/main/resources/assets/enjoer/lang/en_us.json
          {
            "enjoer.commands.give": "Give items to player",
            "enjoer.commands.god": "Toggle god mode",
            "enjoer.commands.fly": "Toggle flight",
            "enjoer.commands.creative": "Toggle creative mode"
          }
          EOF

      - name: Setup Gradle
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.3

      - name: Build Mod
        run: |
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Simple_Commands_1.21.1
          path: build/libs/*.jar
