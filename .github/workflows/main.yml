                  if(levels.isEmpty()){Toast.makeText(this,"No saved levels",Toast.LENGTH_SHORT).show();return;}
                  for(String n:levels){
                      Button btn=new Button(this);btn.setText(n);
                      btn.setBackgroundResource(R.drawable.btn_blue);btn.setTextColor(0xFF00BFFF);
                      LinearLayout.LayoutParams p=new LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT,120);
                      p.setMargins(0,0,0,10);btn.setLayoutParams(p);
                      btn.setOnClickListener(v->{
                          CopyOnWriteArrayList<Block> loaded=LevelManager.loadLevel(this,n);
                          ren.blocks.clear();ren.blocks.addAll(loaded);loadD.setVisibility(View.GONE);
                          if(loadForPlay){ren.isEngineMode=false;ren.isPlayingLevel=false;resetPlayer();
                          findViewById(R.id.menu_ui).setVisibility(View.GONE);findViewById(R.id.game_ui).setVisibility(View.VISIBLE);}
                          Toast.makeText(this,"Loaded: "+n,Toast.LENGTH_SHORT).show();
                      });
                      levelsList.addView(btn);
                  }
                  loadD.setVisibility(View.VISIBLE);
              }

              private void setupAxis(int id,float dx,float dy,float dz){
                  findViewById(id).setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE)ren.moveSelected(dx*0.5f,dy*0.5f,dz*0.5f);return true;});
              }

              private void updateAxis(){runOnUiThread(()->axisP.setVisibility(ren.selectedIndex>=0?View.VISIBLE:View.GONE));}

              private void setupJoy(View base,View stick){
                  base.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f,cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;
                          if(d>lim){dx*=lim/d;dy*=lim/d;}
                          stick.setTranslationX(dx);stick.setTranslationY(dy);ren.jX=dx/lim;ren.jY=dy/lim;
                      }else if(e.getAction()==MotionEvent.ACTION_UP){stick.setTranslationX(0);stick.setTranslationY(0);ren.jX=0;ren.jY=0;}
                      return true;
                  });
              }

              private void setupLook(View zone){
                  zone.setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*0.25f;ren.rX=Math.max(-85,Math.min(85,ren.rX-(e.getY()-ly)*0.25f));lx=e.getX();ly=e.getY();}
                      return true;
                  });
              }

              private void updateBtnGrp(Button[] btns,int sel){
                  for(int i=0;i<btns.length;i++){
                      if(i==sel){btns[i].setBackgroundResource(R.drawable.btn_blue_filled);btns[i].setTextColor(0xFF000000);}
                      else{btns[i].setBackgroundResource(R.drawable.btn_blue);btns[i].setTextColor(0xFF00BFFF);}
                  }
              }

              private void updateColor(int sel){
                  for(int i=0;i<colorB.length;i++){
                      try{GradientDrawable bg=(GradientDrawable)colorB[i].getBackground();
                      if(i==sel)bg.setStroke(6,0xFFFFFFFF);else bg.setStroke(2,0xFF00BFFF);}catch(Exception e){}
                  }
              }
          }
