name: JsAI Quantum Infinity 5.0 - Multi-File Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Project
        run: |
          mkdir -p app/src/main/java/com/jsai/quantum
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # Настройки AndroidX
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "JsAIQuantum"
          include ':app'
          EOF

          # build.gradle (Root)
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          EOF

          # app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.jsai.quantum'
              compileSdk 34
              defaultConfig {
                  applicationId "com.jsai.quantum"
                  minSdk 26
                  targetSdk 34
                  versionCode 15
                  versionName "Quantum-Infinity-5.0"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          # layout/activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="16dp">
              <TextView android:id="@+id/stats" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:textColor="#00FF00" android:fontFamily="monospace" android:textSize="11sp" android:text="WAITING FOR DATA..."/>
              <ProgressBar android:id="@+id/progress" style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginTop="4dp"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:layout_marginTop="8dp">
                  <TextView android:id="@+id/console" android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:textColor="#00E5FF" android:fontFamily="monospace" android:textSize="12sp"/>
              </ScrollView>
              <EditText android:id="@+id/input" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:textColor="#FFFFFF" android:hint="Enter prompt..." android:textColorHint="#444444" android:background="#111111" android:padding="10dp" android:layout_marginBottom="8dp"/>
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                  <Button android:id="@+id/loadBtn" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="DATA (MULTIPLE)" android:textSize="10sp"/>
                  <Button android:id="@+id/trainBtn" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="TRAIN ALL" android:textSize="10sp" android:layout_marginHorizontal="4dp"/>
                  <Button android:id="@+id/sendBtn" android:layout_width="0dp" android:layout_weight="1" android:layout_height="wrap_content" android:text="SEND" android:textSize="10sp"/>
              </LinearLayout>
          </LinearLayout>
          EOF

          # Ресурсы
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">JsAI Infinity</string></resources>
          EOF
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources><style name="Theme.JsAI" parent="Theme.AppCompat.NoActionBar"/></resources>
          EOF

          # MainActivity.kt (Версия 5.0: Поддержка множества файлов)
          cat > app/src/main/java/com/jsai/quantum/MainActivity.kt << 'EOF'
          package com.jsai.quantum
          import android.app.Activity
          import android.content.Intent
          import android.os.Bundle
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*
          import java.util.*
          import java.io.InputStream
          import android.net.Uri
          import android.provider.OpenableColumns

          class MainActivity : AppCompatActivity() {
              private lateinit var console: TextView
              private lateinit var bar: ProgressBar
              private lateinit var stats: TextView
              private val brain = mutableMapOf<List<String>, MutableMap<String, Int>>()
              private var isTraining = false
              private val contextOrder = 4 
              private val selectedUris = mutableListOf<Uri>()

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  console = findViewById(R.id.console)
                  bar = findViewById(R.id.progress)
                  stats = findViewById(R.id.stats)
                  val input = findViewById<EditText>(R.id.input)

                  findViewById<Button>(R.id.loadBtn).setOnClickListener {
                      val intent = Intent(Intent.ACTION_OPEN_DOCUMENT).apply {
                          type = "text/*"
                          putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true)
                          addCategory(Intent.CATEGORY_OPENABLE)
                      }
                      startActivityForResult(intent, 101)
                  }

                  findViewById<Button>(R.id.trainBtn).setOnClickListener {
                      if(!isTraining && selectedUris.isNotEmpty()) startMultiTraining()
                      else if(selectedUris.isEmpty()) console.append("\n>>> ERROR: SELECT FILES FIRST")
                  }

                  findViewById<Button>(R.id.sendBtn).setOnClickListener {
                      val p = input.text.toString()
                      if(p.isNotBlank()) {
                          console.append("\n\nUSER: $p")
                          input.setText("")
                          generateResponse(p)
                      }
                  }
                  console.text = ">>> JSAI QUANTUM INFINITY 5.0\n>>> READY FOR MULTI-DATA INPUT\n"
              }

              private fun startMultiTraining() = CoroutineScope(Dispatchers.Main).launch {
                  isTraining = true
                  console.append("\n[STARTING GLOBAL TRAINING: ${selectedUris.size} FILES]")
                  bar.max = selectedUris.size
                  bar.progress = 0
                  
                  var totalTokens = 0

                  withContext(Dispatchers.Default) {
                      for ((index, uri) in selectedUris.withIndex()) {
                          val fileName = getFileName(uri)
                          withContext(Dispatchers.Main) { 
                              console.append("\n[FILE ${index+1}/${selectedUris.size}]: $fileName") 
                          }

                          try {
                              contentResolver.openInputStream(uri)?.use { stream ->
                                  val scanner = Scanner(stream).useDelimiter("[^a-zA-Zа-яА-Я0-9']+")
                                  val buffer = LinkedList<String>()
                                  while(scanner.hasNext()) {
                                      val word = scanner.next().lowercase()
                                      if (word.length < 2) continue
                                      if (buffer.size == contextOrder) {
                                          val context = buffer.toList()
                                          val nextMap = brain.getOrPut(context) { mutableMapOf() }
                                          nextMap[word] = (nextMap[word] ?: 0) + 1
                                          buffer.removeFirst()
                                          totalTokens++
                                      }
                                      buffer.add(word)
                                      if (totalTokens % 10000 == 0) {
                                          withContext(Dispatchers.Main) {
                                              stats.text = "FILES: ${index+1}/${selectedUris.size} | TOKENS: $totalTokens | NODES: ${brain.size}"
                                          }
                                      }
                                  }
                              }
                          } catch(e: Exception) {
                              withContext(Dispatchers.Main) { console.append("\nError in $fileName: ${e.message}") }
                          }
                          withContext(Dispatchers.Main) { bar.progress = index + 1 }
                      }
                  }
                  console.append("\n[ALL TRAINING COMPLETE: ${brain.size} KNOWLEDGE NODES]")
                  isTraining = false
                  stats.text = "MODEL READY | NODES: ${brain.size} | DATA: ${selectedUris.size} FILES"
              }

              private fun generateResponse(prompt: String) {
                  if (brain.isEmpty()) { console.append("\nJSAI: I need to be trained first."); return }
                  val tokens = prompt.lowercase().split(" ").filter { it.length > 1 }
                  var currentContext = brain.keys.random()
                  for (token in tokens) {
                      val match = brain.keys.find { it.contains(token) }
                      if (match != null) { currentContext = match; break }
                  }
                  val result = currentContext.toMutableList()
                  repeat(60) {
                      val nextWords = brain[currentContext]
                      if (nextWords != null) {
                          val nextWord = nextWords.maxByOrNull { it.value + (0..1).random() }?.key ?: brain.keys.random()[0]
                          result.add(nextWord)
                          currentContext = result.subList(result.size - contextOrder, result.size)
                      } else {
                          val jump = brain.keys.random()
                          result.addAll(jump); currentContext = jump
                      }
                  }
                  console.append("\nJSAI: ${result.joinToString(" ")}")
              }

              private fun getFileName(uri: Uri): String {
                  var result: String? = null
                  if (uri.scheme == "content") {
                      contentResolver.query(uri, null, null, null, null)?.use { cursor ->
                          if (cursor.moveToFirst()) result = cursor.getString(cursor.getColumnIndex(OpenableColumns.DISPLAY_NAME))
                      }
                  }
                  return result ?: uri.path ?: "unknown_file"
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (resultCode == Activity.RESULT_OK && requestCode == 101) {
                      selectedUris.clear()
                      val clipData = data?.clipData
                      if (clipData != null) {
                          for (i in 0 until clipData.itemCount) {
                              selectedUris.add(clipData.getItemAt(i).uri)
                          }
                      } else {
                          data?.data?.let { selectedUris.add(it) }
                      }
                      stats.text = "FILES SELECTED: ${selectedUris.size} | READY TO TRAIN"
                      console.append("\n>>> READY: ${selectedUris.size} files in queue.")
                  }
              }
          }
          EOF

          # Manifest
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI Infinity" android:theme="@style/Theme.JsAI" android:largeHeap="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI-Infinity-5.0
          path: app/build/outputs/apk/debug/app-debug.apk
