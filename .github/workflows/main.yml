                  if(sL){GLES30.glUniform1f(uS,1.02f); GLES30.glUniform3f(uC,1,1,1); GLES30.glUniform1f(uA,1); GLES30.glLineWidth(4f); GLES30.glVertexAttribPointer(0,3,5126,false,0,wb); GLES30.glDrawArrays(1,0,24); GLES30.glVertexAttribPointer(0,3,5126,false,0,vb);}
              }
          }

          class Net {
              static ConcurrentHashMap<String,float[]> p=new ConcurrentHashMap<>(); static String id=java.util.UUID.randomUUID().toString().substring(0,5); static boolean ok=false;
              MqttClient c;
              Net(Rnd r){new Thread(()->{while(true){try{c=new MqttClient("ssl://broker.hivemq.com:8883","js_"+id,new MemoryPersistence());MqttConnectOptions o=new MqttConnectOptions();o.setCleanSession(true);o.setConnectionTimeout(5);c.connect(o);ok=true;c.setCallback(new MqttCallback(){public void connectionLost(Throwable t){ok=false;}public void messageArrived(String tp,MqttMessage m){try{String[] pts=new String(m.getPayload()).split(",");if(pts[1].equals(id))return;if(pts[0].equals("P"))p.put(pts[1],new float[]{Float.parseFloat(pts[2]),Float.parseFloat(pts[3]),Float.parseFloat(pts[4]),System.currentTimeMillis()});else if(pts[0].equals("B"))r.sB(Integer.parseInt(pts[2]),Integer.parseInt(pts[3]),Integer.parseInt(pts[4]),Byte.parseByte(pts[5]));}catch(Exception e){}}public void deliveryComplete(IMqttDeliveryToken t){}});c.subscribe("js/v11/#");while(c.isConnected()){Thread.sleep(80);long n=System.currentTimeMillis();p.entrySet().removeIf(e->n-e.getValue()[3]>3000);}}catch(Exception e){ok=false;try{Thread.sleep(2000);}catch(Exception ex){}}}}).start();}
