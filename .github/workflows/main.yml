name: AetherAI Real-Vector-Engine
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34 ndk;25.2.9519653 cmake;3.22.1'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/aetherai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Create C++ Vector Engine
        run: |
          cat > app/src/main/cpp/transformer.h << 'EOF'
          #ifndef TRANSFORMER_H
          #define TRANSFORMER_H
          #include <vector>
          #include <string>
          #include <map>
          #include <cmath>
          #include <random>

          constexpr int D_MODEL = 256; // Уменьшим для скорости поиска на мобилках
          constexpr int MAX_VOCAB = 10000;
          constexpr float LR = 0.01f;

          class VectorEngine {
          public:
              float *emb;
              std::map<std::string, int> word_to_id;
              std::vector<std::string> id_to_word;

              bool allocate() {
                  emb = new(std::nothrow) float[MAX_VOCAB * D_MODEL];
                  if (!emb) return false;
                  
                  // Инициализация случайными весами (ВАЖНО!)
                  std::mt19937 gen(42);
                  std::uniform_real_distribution<float> dist(-0.1f, 0.1f);
                  for(int i=0; i < MAX_VOCAB * D_MODEL; i++) emb[i] = dist(gen);
                  return true;
              }

              int get_id(std::string word) {
                  if (word_to_id.count(word)) return word_to_id[word];
                  if (id_to_word.size() >= MAX_VOCAB) return 0;
                  int new_id = id_to_word.size();
                  word_to_id[word] = new_id;
                  id_to_word.push_back(word);
                  return new_id;
              }

              float train_step(int inp, int tar) {
                  int i_ptr = inp * D_MODEL;
                  int t_ptr = tar * D_MODEL;
                  float loss = 0;
                  for(int i=0; i<D_MODEL; i++) {
                      float diff = emb[i_ptr + i] - emb[t_ptr + i];
                      loss += diff * diff;
                      emb[i_ptr + i] -= LR * diff; // Двигаем вектор входа к вектору цели
                  }
                  return loss / D_MODEL;
              }

              std::string predict(std::string word) {
                  if (!word_to_id.count(word)) return "...";
                  int id = word_to_id[word];
                  int best_id = 0;
                  float max_sim = -1e10;

                  // Поиск ближайшего вектора (Inference)
                  for(int i=0; i < (int)id_to_word.size(); i++) {
                      if (i == id) continue;
                      float sim = 0;
                      for(int d=0; d<D_MODEL; d++) sim += emb[id*D_MODEL+d] * emb[i*D_MODEL+d];
                      if (sim > max_sim) { max_sim = sim; best_id = i; }
                  }
                  return id_to_word[best_id];
              }
          };
          #endif
          EOF

          cat > app/src/main/cpp/aetherai_jni.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <vector>
          #include <sstream>
          #include "transformer.h"

          static VectorEngine engine;
          static std::vector<int> tokens;

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_init(JNIEnv* env, jobject) {
              return engine.allocate() ? env->NewStringUTF("OK") : env->NewStringUTF("OOM");
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_aetherai_AIEngine_addText(JNIEnv* env, jobject, jstring text) {
              const char* c = env->GetStringUTFChars(text, nullptr);
              std::stringstream ss(c); std::string w;
              while(ss >> w) tokens.push_back(engine.get_id(w));
              env->ReleaseStringUTFChars(text, c);
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_trainStep(JNIEnv* env, jobject, jint step) {
              if (tokens.size() < 2 || step >= tokens.size()-1) return env->NewStringUTF("0.0");
              float loss = engine.train_step(tokens[step], tokens[step+1]);
              return env->NewStringUTF(std::to_string(loss).c_str());
          }

          extern "C" JNIEXPORT jint JNICALL
          Java_com_aetherai_AIEngine_getTokenCount(JNIEnv* env, jobject) {
              return (jint)tokens.size();
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_generate(JNIEnv* env, jobject, jstring input) {
              const char* c = env->GetStringUTFChars(input, nullptr);
              std::stringstream ss(c); std::string w; std::string last_w;
              while(ss >> last_w);
              std::string res = engine.predict(last_w);
              env->ReleaseStringUTFChars(input, c);
              return env->NewStringUTF(res.c_str());
          }
          EOF

          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(aetherai)
          add_library(aetherai SHARED aetherai_jni.cpp)
          target_link_libraries(aetherai log)
          EOF

      - name: Create Antigravity UI
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#050505" android:padding="10dp">
              <TextView android:id="@+id/st" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="AetherAI: Vector Engine" android:textColor="#00FFCC"/>
              <ProgressBar android:id="@+id/pb" style="?android:attr/progressBarStyleHorizontal" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_below="@id/st" android:visibility="gone"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="match_parent" android:layout_above="@+id/inputArea" android:layout_below="@id/pb">
                  <TextView android:id="@+id/chat" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFFFFF" android:padding="10dp"/>
              </ScrollView>
              <LinearLayout android:id="@+id/inputArea" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:orientation="vertical">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                      <Button android:id="@+id/load" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="LOAD" android:backgroundTint="#222"/>
                      <Button android:id="@+id/train" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="TRAIN" android:backgroundTint="#FF4400" android:layout_marginLeft="10dp"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                      <EditText android:id="@+id/input" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:hint="Input..." android:textColor="#FFF" android:backgroundTint="#00FFCC"/>
                      <Button android:id="@+id/send" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text=">" android:backgroundTint="#00FFCC"/>
                  </LinearLayout>
              </LinearLayout>
          </RelativeLayout>
          EOF

      - name: Create Java Code
        run: |
          cat > app/src/main/java/com/aetherai/AIEngine.java << 'EOF'
          package com.aetherai;
          public class AIEngine {
              static { System.loadLibrary("aetherai"); }
              public native String init();
              public native void addText(String text);
              public native String trainStep(int step);
              public native int getTokenCount();
              public native String generate(String input);
          }
          EOF

          cat > app/src/main/java/com/aetherai/MainActivity.java << 'EOF'
          package com.aetherai;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.*;
          import android.content.Intent;
          import java.io.*;

          public class MainActivity extends Activity {
              AIEngine ai = new AIEngine();
              TextView chat, st; ProgressBar pb; EditText input;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  chat = findViewById(R.id.chat); st = findViewById(R.id.st);
                  pb = findViewById(R.id.pb); input = findViewById(R.id.input);

                  new Thread(() -> ai.init()).start();

                  findViewById(R.id.load).setOnClickListener(v -> {
                      Intent it = new Intent(Intent.ACTION_GET_CONTENT);
                      it.setType("text/plain"); it.putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true);
                      startActivityForResult(it, 1);
                  });

                  findViewById(R.id.train).setOnClickListener(v -> {
                      int count = ai.getTokenCount();
                      if(count < 2) return;
                      pb.setVisibility(android.view.View.VISIBLE);
                      pb.setMax(count);
                      new Thread(() -> {
                          for(int i=0; i<count-1; i++) {
                              String loss = ai.trainStep(i);
                              int finalI = i;
                              runOnUiThread(() -> { pb.setProgress(finalI); st.setText("Loss: " + loss); });
                          }
                          runOnUiThread(() -> { pb.setVisibility(android.view.View.GONE); st.setText("Trained!"); });
                      }).start();
                  });

                  findViewById(R.id.send).setOnClickListener(v -> {
                      String q = input.getText().toString();
                      chat.append("\nYou: " + q);
                      new Thread(() -> {
                          String a = ai.generate(q);
                          runOnUiThread(() -> chat.append("\nAI: " + a));
                      }).start();
                      input.setText("");
                  });
              }

              @Override
              protected void onActivityResult(int req, int res, Intent data) {
                  if (data != null) {
                      new Thread(() -> {
                          try {
                              if (data.getClipData() != null) {
                                  for (int i=0; i<data.getClipData().getItemCount(); i++) readUri(data.getClipData().getItemAt(i).getUri());
                              } else readUri(data.getData());
                              runOnUiThread(() -> st.setText("Files Loaded."));
                          } catch (Exception e) {}
                      }).start();
                  }
              }

              private void readUri(android.net.Uri uri) throws IOException {
                  InputStream is = getContentResolver().openInputStream(uri);
                  BufferedReader br = new BufferedReader(new InputStreamReader(is));
                  String line; while ((line = br.readLine()) != null) ai.addText(line + " ");
                  is.close();
              }
          }
          EOF

      - name: Project Configs (Gradle)
        run: |
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "include ':app'" > settings.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.aetherai'
              compileSdk 34
              defaultConfig { applicationId "com.aetherai.vector"; minSdk 26; targetSdk 34; ndk { abiFilters 'arm64-v8a' } }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="AetherAI Vector" android:largeHeap="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherAI-Vector-Engine
          path: app/build/outputs/apk/debug/app-debug.apk
