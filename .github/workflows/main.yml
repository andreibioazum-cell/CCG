              private TextView subtitle(String s){
                  TextView tv = new TextView(this);
                  tv.setText(s);
                  tv.setTextSize(13f);
                  tv.setTextColor(Color.parseColor("#5D88A8"));
                  return tv;
              }

              private int dp(int v){
                  return (int)(v * getResources().getDisplayMetrics().density);
              }

              private float parseFloat(String s, float d){
                  try { return Float.parseFloat(s); } catch(Exception e){ return d; }
              }

              private String textOr(EditText e, String d){
                  String s = e.getText().toString().trim();
                  return s.isEmpty() ? d : s;
              }
