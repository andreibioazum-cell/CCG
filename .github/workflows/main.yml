name: VOXEL_VULKAN_ULTRA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/enjoer/vulkan
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/AndroidManifest.xml

      - name: Write C++ Vulkan Engine
        run: |
          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <android/log.h>
          #include <vulkan/vulkan.h>
          #include <vector>

          // Код инициализации Vulkan (упрощенная версия для примера)
          // В реальности Vulkan требует ~1000 строк для треугольника, 
          // здесь мы создаем мост для вызова из Java.
          
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_enjoer_vulkan_MainActivity_getVulkanStatus(JNIEnv* env, jobject) {
              uint32_t extensionCount = 0;
              vkEnumerateInstanceExtensionProperties(nullptr, &extensionCount, nullptr);
              return env->NewStringUTF("Vulkan Ultra Engine Ready. Extensions found.");
          }
          EOF

          cat <<'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("voxelvulkan")
          add_library(voxelvulkan SHARED native-lib.cpp)
          find_library(vulkan-lib vulkan)
          find_library(log-lib log)
          target_link_libraries(voxelvulkan ${vulkan-lib} ${log-lib})
          EOF

      - name: Write Java Wrapper
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/vulkan/MainActivity.java
          package com.enjoer.vulkan;
          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              static { System.loadLibrary("voxelvulkan"); }
              public native string getVulkanStatus();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText(getVulkanStatus() + "\nГрафика: Vulkan RT Enabled\nНагрузка: Max");
                  tv.setTextSize(24);
                  setContentView(tv);
                  // Здесь будет запускаться VulkanSurfaceView
              }
          }
          EOF

      - name: Android Config
        run: |
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.vulkan'
              compileSdk 34
              defaultConfig {
                  applicationId "com.enjoer.vulkan"
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild { cmake { cppFlags "-std=c++17" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.vulkan">
              <application android:label="VulkanCraft">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Vulkan_Voxel_Build
          path: app/build/outputs/apk/debug/app-debug.apk
