              private void onPlayScene(){
                  if(currentScene == null) return;
                  isPlaying = true;
                  screenPlayer.setVisibility(View.VISIBLE);
                  playerStageLayer.removeAllViews();

                  for(ObjectItem o : currentScene.objects){
                      o.x = o.startX;
                      o.y = o.startY;
                      o.say = "";
                      o.visible = true;
                  }

                  renderPlayerScene();
                  ScriptRuntime.runScene(runtimeHost());
              }

              private void onStopPlayer(){
                  isPlaying = false;
                  screenScripts.setVisibility(View.VISIBLE);
                  screenPlayer.setVisibility(View.GONE);
                  showScripts();
              }

              private void renderPlayerScene(){
                  if(!isPlaying) return;

                  playerStageLayer.removeAllViews();

                  if(currentScene != null){
                      for(ObjectItem o : currentScene.objects){
                          if(!o.visible) continue;

                          FrameLayout.LayoutParams lp = new FrameLayout.LayoutParams((int)o.w, (int)o.h);
                          lp.leftMargin = (int)o.x;
                          lp.topMargin = (int)o.y;

                          FrameLayout container = new FrameLayout(this);
                          container.setLayoutParams(lp);

                          TextView tv = new TextView(this);
                          tv.setLayoutParams(new FrameLayout.LayoutParams(FrameLayout.LayoutParams.MATCH_PARENT, FrameLayout.LayoutParams.MATCH_PARENT));
                          tv.setText(o.emoji);
                          tv.setTextSize(32);
                          tv.setGravity(Gravity.CENTER);
                          container.addView(tv);

                          if(!o.say.isEmpty()){
                              TextView sayText = new TextView(this);
                              sayText.setLayoutParams(new FrameLayout.LayoutParams(FrameLayout.LayoutParams.MATCH_PARENT, FrameLayout.LayoutParams.WRAP_CONTENT));
                              sayText.setText(o.say);
                              sayText.setBackgroundColor(Color.parseColor("#FFFACD"));
                              sayText.setTextColor(Color.BLACK);
                              sayText.setPadding(4, 2, 4, 2);
                              sayText.setGravity(Gravity.CENTER);
                              FrameLayout.LayoutParams sayLp = new FrameLayout.LayoutParams(FrameLayout.LayoutParams.MATCH_PARENT, FrameLayout.LayoutParams.WRAP_CONTENT);
                              sayLp.topMargin = -(int)o.h/2;
                              sayText.setLayoutParams(sayLp);
                              container.addView(sayText);
                          }

                          playerStageLayer.addView(container);
                      }
                  }
              }

              private boolean hitTest(ObjectItem o, float tx, float ty){
                  return tx >= o.x && tx <= o.x + o.w && ty >= o.y && ty <= o.y + o.h;
              }

              private int getBlockDrawable(String type){
                  if(type.startsWith("event_")) return R.drawable.block_event;
                  if(type.startsWith("move_") || type.equals("go_xy")) return R.drawable.block_motion;
                  if(type.equals("say") || type.equals("hide") || type.equals("show")) return R.drawable.block_looks;
                  if(type.equals("wait") || type.equals("forever")) return R.drawable.block_control;
                  if(type.startsWith("set_") || type.startsWith("change_") || type.equals("list_add")) return R.drawable.block_data;
                  return R.drawable.block_signal;
              }

              private void onDataManager(){}
              private void onTextureLibrary(){}
              private void onFormulaManager(){}

              private ScriptRuntime.Host runtimeHost(){
                  return new ScriptRuntime.Host() {
                      @Override public ProjectItem project() { return currentProject; }
                      @Override public ObjectItem object() { return currentObject; }
                      @Override public float touchX() { return touchX; }
                      @Override public float touchY() { return touchY; }
                      @Override public float touchCount() { return 1f; }
                      @Override public void renderPlayerScene() { MainActivity.this.renderPlayerScene(); }
                      @Override public boolean stopped() { return !isPlaying; }
                      @Override public SceneItem scene() { return currentScene; }
                      @Override public void goToSceneByName(String name) {
                          for(SceneItem s : currentProject.scenes){
                              if(s.name.equals(name)){
                                  currentScene = s;
                                  onPlayScene();
                                  return;
                              }
                          }
                      }
                  };
              }
          }
