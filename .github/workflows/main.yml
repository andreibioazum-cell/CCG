name: JsAI Quantum Infinity - Stable Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Генерируем структуру проекта
      - name: Generate Project
        run: |
          mkdir -p app/src/main/java/com/jsai/quantum
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "JsAIQuantum"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.20'
              }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.jsai.quantum'
              compileSdk 34
              defaultConfig {
                  applicationId "com.jsai.quantum"
                  minSdk 26
                  targetSdk 34
                  versionCode 9
                  versionName "Quantum-Infinity-4.2"
              }
              buildTypes { release { minifyEnabled true; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt') } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          EOF

          cat > app/src/main/java/com/jsai/quantum/MainActivity.kt << 'EOF'
          package com.jsai.quantum
          import android.app.Activity
          import android.content.Intent
          import android.os.Bundle
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import kotlinx.coroutines.*
          import java.util.*
          import java.io.InputStream
          import android.net.Uri

          class MainActivity : AppCompatActivity() {
              private lateinit var console: TextView
              private lateinit var bar: ProgressBar
              private lateinit var stats: TextView
              private val brain = mutableMapOf<List<String>, MutableMap<String, Int>>()
              private var isTraining = false
              private val contextOrder = 4 
              private var selectedFileUri: Uri? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setupUI()
              }

              private fun setupUI() {
                  val root = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setBackgroundColor(0xFF000000.toInt())
                      padding = 32
                  }
                  stats = TextView(this).apply { textColor = 0xFF00FF00.toInt(); typeface = android.graphics.Typeface.MONOSPACE; textSize = 10f }
                  bar = ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal)
                  console = TextView(this).apply { textColor = 0xFF00E5FF.toInt(); textSize = 12f; typeface = android.graphics.Typeface.MONOSPACE }
                  val scroll = ScrollView(this).apply { layoutParams = LinearLayout.LayoutParams(-1, 0, 1f); addView(console) }
                  val input = EditText(this).apply { setTextColor(0xFFFFFFFF.toInt()); hint = "Neural prompt..." }
                  val row = LinearLayout(this)
                  val load = Button(this).apply { text = "DATA" }
                  val train = Button(this).apply { text = "TRAIN" }
                  val send = Button(this).apply { text = "SEND" }
                  row.addView(load); row.addView(train); row.addView(send)
                  root.addView(stats); root.addView(bar); root.addView(scroll); root.addView(input); root.addView(row)
                  setContentView(root)
                  load.setOnClickListener { startActivityForResult(Intent(Intent.ACTION_OPEN_DOCUMENT).apply { type = "text/*" }, 101) }
                  train.setOnClickListener { if(!isTraining && selectedFileUri != null) startInfinityTraining() }
                  send.setOnClickListener {
                      val p = input.text.toString()
                      if(p.isNotBlank()) {
                          console.append("\n\nUSER: $p")
                          input.setText("")
                          generateResponse(p)
                      }
                  }
              }

              private fun startInfinityTraining() = CoroutineScope(Dispatchers.Main).launch {
                  isTraining = true
                  val uri = selectedFileUri ?: return@launch
                  console.append("\n[INFINITY ENGINE: Processing stream...]")
                  withContext(Dispatchers.Default) {
                      try {
                          val inputStream: InputStream? = contentResolver.openInputStream(uri)
                          val scanner = Scanner(inputStream).useDelimiter("[^a-zA-Zа-яА-Я0-9']+")
                          val buffer = LinkedList<String>()
                          var count = 0
                          while(scanner.hasNext()) {
                              val word = scanner.next().lowercase()
                              if (word.length < 2) continue
                              if (buffer.size == contextOrder) {
                                  val context = buffer.toList()
                                  val nextMap = brain.getOrPut(context) { mutableMapOf() }
                                  nextMap[word] = (nextMap[word] ?: 0) + 1
                                  buffer.removeFirst()
                                  count++
                              }
                              buffer.add(word)
                              if (count % 5000 == 0) {
                                  withContext(Dispatchers.Main) { stats.text = "TOKENS: $count | NODES: ${brain.size}" }
                              }
                          }
                          inputStream?.close()
                      } catch(e: Exception) {
                          withContext(Dispatchers.Main) { console.append("\nError: ${e.message}") }
                      }
                  }
                  console.append("\n[TRAINING COMPLETE: ${brain.size} nodes mapped]")
                  isTraining = false
              }

              private fun generateResponse(prompt: String) {
                  if (brain.isEmpty()) return
                  val tokens = prompt.lowercase().split(" ").filter { it.length > 1 }
                  var currentContext = brain.keys.random()
                  for (token in tokens) {
                      val match = brain.keys.find { it.contains(token) }
                      if (match != null) { currentContext = match; break }
                  }
                  val result = currentContext.toMutableList()
                  repeat(60) {
                      val nextWords = brain[currentContext]
                      if (nextWords != null) {
                          val nextWord = nextWords.maxByOrNull { it.value + (0..1).random() }?.key ?: brain.keys.random()[0]
                          result.add(nextWord)
                          currentContext = result.subList(result.size - contextOrder, result.size)
                      } else {
                          val jump = brain.keys.random()
                          result.addAll(jump); currentContext = jump
                      }
                  }
                  console.append("\nJSAI: ${result.joinToString(" ")}")
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (resultCode == Activity.RESULT_OK) selectedFileUri = data?.data
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI Infinity" android:largeHeap="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # 2. Установка Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Установка СТАБИЛЬНОГО Gradle 8.5
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      # 4. Сборка APK через установленный Gradle
      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI-Infinity-Build
          path: app/build/outputs/apk/debug/app-debug.apk
