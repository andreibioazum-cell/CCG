name: Fabric_Clone_Final_1.21.11
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Project
        run: |
          mkdir -p src/main/java/com/enjoer/mod
          mkdir -p src/main/resources

          # --- settings.gradle ---
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  maven { url "https://maven.fabricmc.net/" }
                  gradlePluginPortal()
              }
          }
          rootProject.name = 'EnjoerControl'
          EOF

          # --- fabric.mod.json ---
          cat <<EOF > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "enjoer_clones",
            "version": "1.3.1",
            "name": "Enjoer Control",
            "entrypoints": { "client": [ "com.enjoer.mod.CloneMod" ] },
            "depends": { "fabricloader": ">=0.16.0", "minecraft": "1.21.11" }
          }
          EOF

          # --- Java: Управление (J - спавн, K - килл, L - перехват управления) ---
          cat <<'EOF' > src/main/java/com/enjoer/mod/CloneMod.java
          package com.enjoer.mod;

          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.keybinding.v1.KeyBindingHelper;
          import net.minecraft.client.option.KeyBinding;
          import net.minecraft.client.util.InputUtil;
          import net.minecraft.text.Text;
          import org.lwjgl.glfw.GLFW;

          public class CloneMod implements ClientModInitializer {
              private static KeyBinding keySpawn, keyRemove, keySwitch;
              private boolean isControlling = false;

              @Override
              public void onInitializeClient() {
                  keySpawn = KeyBindingHelper.registerKeyBinding(new KeyBinding("Spawn Clone", InputUtil.Type.KEYSYM, GLFW.GLFW_KEY_J, "Enjoer"));
                  keyRemove = KeyBindingHelper.registerKeyBinding(new KeyBinding("Remove Clone", InputUtil.Type.KEYSYM, GLFW.GLFW_KEY_K, "Enjoer"));
                  keySwitch = KeyBindingHelper.registerKeyBinding(new KeyBinding("Control Clone", InputUtil.Type.KEYSYM, GLFW.GLFW_KEY_L, "Enjoer"));

                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null) return;
                      String botName = client.player.getName().getString() + "_Bot";

                      if (keySpawn.wasPressed()) {
                          client.player.networkHandler.sendChatCommand("player " + botName + " spawn");
                      }
                      if (keyRemove.wasPressed()) {
                          client.player.networkHandler.sendChatCommand("player " + botName + " kill");
                      }
                      if (keySwitch.wasPressed()) {
                          isControlling = !isControlling;
                          String mode = isControlling ? "control" : "stop";
                          client.player.networkHandler.sendChatCommand("player " + botName + " " + mode);
                          client.player.sendMessage(Text.of("§b[Enjoer] Управление: " + (isControlling ? "КЛОН" : "Я")), true);
                      }
                  });
              }
          }
          EOF

          # --- build.gradle (Исправлены версии для стабильности) ---
          cat <<EOF > build.gradle
          plugins {
              id 'fabric-loom' version '1.7.4'
          }

          repositories {
              mavenCentral()
              maven { url "https://maven.fabricmc.net/" }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.21.11"
              mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.0"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21.11"
          }
          EOF

      - name: Build with Gradle 8.10
        run: |
          gradle wrapper --gradle-version 8.10
          chmod +x gradlew
          ./gradlew build

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Clone_Mod_1.21.11
          path: build/libs/*.jar
