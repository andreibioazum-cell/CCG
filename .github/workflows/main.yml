          cat <<'RUNTIME' > app/src/main/java/com/pocketlite/ru/ScriptRuntime.java
          package com.pocketlite.ru;

          import android.os.Handler;
          import android.os.Looper;
          import java.util.ArrayList;
          import java.util.Locale;

          public class ScriptRuntime {
              public interface Host extends FormulaEngine.Host {
                  void renderPlayerScene();
                  boolean stopped();
                  SceneItem scene();
                  void goToSceneByName(String name);
              }

              public static void runScene(Host host){
                  SceneItem scene = host.scene();
                  if(scene == null) return;
                  for(ObjectItem o : scene.objects){
                      runStart(host, o);
                  }
              }

              public static void tapped(Host host, ObjectItem obj){
                  runEvent(host, obj, "event_tap");
              }

              public static void signal(Host host, String name){
                  SceneItem scene = host.scene();
                  if(scene == null) return;
                  for(ObjectItem o : scene.objects){
                      runSignal(host, o, name);
                  }
              }

              private static void runStart(Host host, ObjectItem obj){
                  ArrayList<ArrayList<BlockItem>> scripts = splitScripts(obj.blocks);
                  boolean hasHeaders = false;
                  for(ArrayList<BlockItem> s : scripts){
                      if(!s.isEmpty() && s.get(0).type.startsWith("event_")) hasHeaders = true;
                  }

                  boolean foundStart = false;
                  for(ArrayList<BlockItem> script : scripts){
                      if(!script.isEmpty() && "event_start".equals(script.get(0).type)){
                          foundStart = true;
                          execute(host, obj, script, 1);
                      }
                  }

                  if(!hasHeaders && !foundStart){
                      ArrayList<BlockItem> linear = new ArrayList<>();
                      for(BlockItem b : obj.blocks){
                          if(!b.type.startsWith("event_")) linear.add(b);
                      }
                      if(!linear.isEmpty()) execute(host, obj, linear, 0);
                  }
              }

              private static void runEvent(Host host, ObjectItem obj, String type){
                  ArrayList<ArrayList<BlockItem>> scripts = splitScripts(obj.blocks);
                  for(ArrayList<BlockItem> script : scripts){
                      if(!script.isEmpty() && type.equals(script.get(0).type)){
                          execute(host, obj, script, 1);
                      }
                  }
              }

              private static void runSignal(Host host, ObjectItem obj, String name){
                  ArrayList<ArrayList<BlockItem>> scripts = splitScripts(obj.blocks);
                  for(ArrayList<BlockItem> script : scripts){
                      if(!script.isEmpty() && "event_signal".equals(script.get(0).type)){
                          String sig = script.get(0).arg1 == null ? "" : script.get(0).arg1;
                          if(sig.equals(name)){
                              execute(host, obj, script, 1);
                          }
                      }
                  }
              }

              private static ArrayList<ArrayList<BlockItem>> splitScripts(ArrayList<BlockItem> blocks){
                  ArrayList<ArrayList<BlockItem>> out = new ArrayList<>();
                  ArrayList<BlockItem> cur = null;
                  for(BlockItem b : blocks){
                      if(b.type.startsWith("event_")){
                          cur = new ArrayList<>();
                          cur.add(b);
                          out.add(cur);
                      } else {
                          if(cur == null){
                              cur = new ArrayList<>();
                              out.add(cur);
                          }
                          cur.add(b);
                      }
                  }
                  return out;
              }

              private static void execute(Host host, ObjectItem obj, ArrayList<BlockItem> seq, int startIndex){
                  Handler h = new Handler(Looper.getMainLooper());
                  long delay = 0;

                  for(int i=startIndex;i<seq.size();i++){
                      BlockItem b = seq.get(i);

                      if("forever".equals(b.type)){
                          ArrayList<BlockItem> body = new ArrayList<>();
                          int depth = 1;
                          for(int j=i+1;j<seq.size();j++){
                              BlockItem x = seq.get(j);
                              if("forever".equals(x.type)) depth++;
                              else if("end_forever".equals(x.type)){
                                  depth--;
                                  if(depth == 0) break;
                              }
                              if(depth > 0) body.add(x);
                          }
                          final ArrayList<BlockItem> bodyFinal = body;
                          h.postDelayed(() -> loop(host, obj, bodyFinal), delay);
                          break;
                      }

                      if("end_forever".equals(b.type)) continue;

                      switch (b.type){
                          case "move_x": {
                              final float dx = FormulaEngine.eval(hostFor(host, obj), b.arg1);
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.x += dx;
                                  host.renderPlayerScene();
                              }, delay);
                              break;
                          }
                          case "move_y": {
                              final float dy = FormulaEngine.eval(hostFor(host, obj), b.arg1);
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.y += dy;
                                  host.renderPlayerScene();
                              }, delay);
                              break;
                          }
                          case "go_xy": {
                              final float x = FormulaEngine.eval(hostFor(host, obj), b.arg1);
                              final float y = FormulaEngine.eval(hostFor(host, obj), b.arg2);
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.x = x;
                                  obj.y = y;
                                  host.renderPlayerScene();
                              }, delay);
                              break;
                          }
                          case "say": {
                              final String txt = FormulaEngine.text(hostFor(host, obj), b.arg1);
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.say = txt;
                                  host.renderPlayerScene();
                              }, delay);
                              break;
                          }
                          case "hide": {
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.visible = false;
                                  host.renderPlayerScene();
                              }, delay);
                              break;
                          }
                          case "show": {
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  obj.visible = true;
                                  host.renderPlayerScene();
                              }, delay);
                              break;
                          }
                          case "wait": {
                              delay += (long)(Math.max(0f, FormulaEngine.eval(hostFor(host, obj), b.arg1)) * 1000f);
                              break;
                          }
                          case "set_var": {
                              final String n = b.arg1 == null ? "" : b.arg1;
                              final String valExpr = b.arg2 == null ? "0" : b.arg2;
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  ProjectItem p = host.project();
                                  if(p != null){
                                      for(VariableItem v : p.variables){
                                          if(v.name.equals(n)){
                                              float r = FormulaEngine.eval(hostFor(host, obj), valExpr);
                                              v.value = String.format(Locale.US, "%.2f", r);
                                              break;
                                          }
                                      }
                                  }
                              }, delay);
                              break;
                          }
                          case "change_var": {
                              final String n = b.arg1 == null ? "" : b.arg1;
                              final String valExpr = b.arg2 == null ? "0" : b.arg2;
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  ProjectItem p = host.project();
                                  if(p != null){
                                      for(VariableItem v : p.variables){
                                          if(v.name.equals(n)){
                                              float oldv = 0f;
                                              try { oldv = Float.parseFloat(v.value); } catch(Exception ignored){}
                                              float add = FormulaEngine.eval(hostFor(host, obj), valExpr);
                                              v.value = String.format(Locale.US, "%.2f", oldv + add);
                                              break;
                                          }
                                      }
                                  }
                              }, delay);
                              break;
                          }
                          case "signal": {
                              final String sig = b.arg1 == null ? "" : b.arg1;
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  signal(host, sig);
                              }, delay);
                              break;
                          }
                          case "goto_scene": {
                              final String sceneName = FormulaEngine.text(hostFor(host, obj), b.arg1).replace("\"", "");
                              h.postDelayed(() -> {
                                  if(host.stopped()) return;
                                  host.goToSceneByName(sceneName);
                              }, delay);
                              break;
                          }
                          case "list_add": {
                              final String listName = b.arg1 == null ? "" : b.arg1;
                              final String val = b.arg2 == null ? "" : b.arg2;
                              h.postDelayed(() -> {
                                  ProjectItem p = host.project();
                                  if(p != null){
                                      for(ListItemModel li : p.lists){
                                          if(li.name.equals(listName)){
                                              li.items.add(FormulaEngine.text(hostFor(host, obj), val));
                                              break;
                                          }
                                      }
                                  }
                              }, delay);
                              break;
                          }
                      }
                  }
              }

              private static void loop(Host host, ObjectItem obj, ArrayList<BlockItem> body){
                  Handler h = new Handler(Looper.getMainLooper());
                  Runnable[] rr = new Runnable[1];
                  rr[0] = () -> {
                      if(host.stopped()) return;
                      execute(host, obj, body, 0);
                      h.postDelayed(rr[0], 60);
                  };
                  h.post(rr[0]);
              }

              private static FormulaEngine.Host hostFor(Host h, ObjectItem o){
                  return new FormulaEngine.Host() {
                      @Override public ProjectItem project() { return h.project(); }
                      @Override public ObjectItem object() { return o; }
                      @Override public float touchX() { return h.touchX(); }
                      @Override public float touchY() { return h.touchY(); }
                      @Override public float touchCount() { return h.touchCount(); }
                  };
              }
          }
