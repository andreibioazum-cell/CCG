name: JsAI_GDScript_Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Studio Structure
        run: |
          mkdir -p app/src/main/java/com/jsai/studio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal(); } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); } }
          include ':app'
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.1.1' apply false }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.jsai.studio'
              compileSdk 34
              defaultConfig { applicationId "com.jsai.studio"; minSdk 26; targetSdk 34; versionCode 1; versionName "5.0" }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.luaj:luaj-jse:3.0.1'
          }
          EOF

          # --- ИНТЕРФЕЙС (Roblox/Godot Style) ---
          cat > app/src/main/res/layout/editor_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#1B1B1B">
              <LinearLayout android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="38dp" android:background="#222" android:orientation="horizontal" android:gravity="center_vertical" android:paddingHorizontal="8dp">
                  <Button android:id="@+id/btnAdd" android:layout_width="35dp" android:layout_height="30dp" android:text="+" android:backgroundTint="#FFF" android:textColor="#000" android:insetTop="0dp" android:insetBottom="0dp"/>
                  <Button android:id="@+id/btnPlay" android:layout_width="80dp" android:layout_height="30dp" android:text="Запуск" android:backgroundTint="#FFF" android:textColor="#000" android:textSize="10sp" android:layout_marginLeft="8dp" android:insetTop="0dp" android:insetBottom="0dp"/>
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="JsAI: GD-Edition" android:textColor="#444" android:textSize="10sp"/>
              </LinearLayout>
              
              <LinearLayout android:id="@+id/sidebar" android:layout_width="160dp" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_alignParentRight="true" android:background="#252525" android:orientation="vertical">
                  <TextView android:layout_width="match_parent" android:layout_height="22dp" android:text=" Проводник" android:textColor="#AAA" android:textSize="9sp" android:background="#333" android:gravity="center_vertical"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"><LinearLayout android:id="@+id/explorer" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"/></ScrollView>
                  <TextView android:layout_width="match_parent" android:layout_height="22dp" android:text=" Свойства" android:textColor="#AAA" android:textSize="9sp" android:background="#333" android:gravity="center_vertical"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1.2" android:background="#1A1A1A"><LinearLayout android:id="@+id/properties" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="5dp"/></ScrollView>
              </LinearLayout>

              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_toLeftOf="@id/sidebar">
                  <com.jsai.studio.GameView android:id="@+id/gameView" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000"/>
                  <EditText android:id="@+id/codeEditor" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#111" android:textColor="#0F4" android:fontFamily="monospace" android:gravity="top" android:padding="10dp" android:visibility="gone" android:textSize="13sp"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          # --- КЛАСС ОБЪЕКТА (NODE) ---
          cat > app/src/main/java/com/jsai/studio/Instance.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          import org.luaj.vm2.LuaValue;
          public class Instance {
              public String name, type, luaCode = "", text = "";
              public float x=400, y=400, w=100, h=100, scale=1, rotation=0;
              public float sX, sY, sW, sH, sSc, sRot;
              public int color = 0xFFFFFFFF;
              public boolean isOpen = true, isDeleted = false;
              public Instance parent;
              public List<Instance> children = new ArrayList<>();
              public LuaValue onClick = LuaValue.NIL, onUpdate = LuaValue.NIL;

              public Instance(String n, String t) { name=n; type=t; }
              public void save() { sX=x; sY=y; sW=w; sH=h; sSc=scale; sRot=rotation; }
              public void reset() { x=sX; y=sY; w=sW; h=sH; scale=sSc; rotation=sRot; isDeleted=false; onClick=LuaValue.NIL; onUpdate=LuaValue.NIL; }
              
              // GDScript-like API
              public void setX(float v) { x=v; } public float getX() { return x; }
              public void setY(float v) { y=v; } public float getY() { return y; }
              public void setRot(float v) { rotation=v; }
              public void setText(String v) { text=v; }
              public void remove() { isDeleted = true; }
          }
          EOF

          # --- ENGINE (GDScript Parser) ---
          cat > app/src/main/java/com/jsai/studio/EngineCore.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          import org.luaj.vm2.*;
          import org.luaj.vm2.lib.jse.*;
          public class EngineCore {
              public static List<Instance> root = new ArrayList<>();
              public static boolean isPlaying = false;
              
              public static String compile(String r) {
                  return r.replace("пусть ", "local ")
                          .replace("старт", "function _ready()")
                          .replace("цикл", "function _process")
                          .replace("нажат", "function _on_click()")
                          .replace("конец", "end")
                          .replace("если ", "if ")
                          .replace("тогда", "then")
                          .replace("иначе", "else")
                          .replace("я.", "self:")
                          .replace("предок.", "parent:")
                          .replace("равно", "==");
              }

              public static void start() {
                  isPlaying = true;
                  process(root);
              }
              private static void process(List<Instance> list) {
                  for(Instance i : list) {
                      i.save();
                      if(i.type.equals("Script") && i.parent != null) {
                          Globals g = JsePlatform.standardGlobals();
                          g.set("self", CoerceJavaToLua.coerce(i.parent));
                          g.set("parent", i.parent.parent != null ? CoerceJavaToLua.coerce(i.parent.parent) : LuaValue.NIL);
                          try {
                              g.load(compile(i.luaCode)).call();
                              i.parent.onUpdate = g.get("_process");
                              i.parent.onClick = g.get("_on_click");
                              LuaValue ready = g.get("_ready");
                              if(!ready.isnil()) ready.call();
                          } catch(Exception e) {}
                      }
                      process(i.children);
                  }
              }
              public static void stop() { isPlaying = false; resetR(root); }
              private static void resetR(List<Instance> list) {
                  for(Instance i : list) { i.reset(); resetR(i.children); }
              }
              public static void update(float dt) {
                  if(!isPlaying) return;
                  updateR(root, dt);
              }
              private static void updateR(List<Instance> list, float dt) {
                  for(Instance i : list) {
                      if(!i.onUpdate.isnil()) try { i.onUpdate.call(LuaValue.valueOf(dt)); } catch(Exception e) {}
                      updateR(i.children, dt);
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/GameView.java << 'EOF'
          package com.jsai.studio;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;
          public class GameView extends View {
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              public GameView(Context c, AttributeSet a) { super(c, a); }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  canvas.drawColor(Color.BLACK);
                  drawR(canvas, EngineCore.root);
                  if(EngineCore.isPlaying) { EngineCore.update(0.016f); invalidate(); }
              }
              private void drawR(Canvas canvas, java.util.List<Instance> list) {
                  for(Instance i : list) {
                      if(i.isDeleted) continue;
                      if(i.type.contains("Блок") || i.type.contains("Шар")) {
                          p.setColor(i.color);
                          canvas.save();
                          canvas.translate(i.x + (i.w*i.scale)/2, i.y + (i.h*i.scale)/2);
                          canvas.rotate(i.rotation);
                          if(i.type.contains("Блок")) canvas.drawRect(-i.w*i.scale/2, -i.h*i.scale/2, i.w*i.scale/2, i.h*i.scale/2, p);
                          else canvas.drawCircle(0, 0, (i.w/2)*i.scale, p);
                          if(!i.text.isEmpty()) { p.setColor(Color.WHITE); p.setTextSize(40); p.setTextAlign(Paint.Align.CENTER); canvas.drawText(i.text, 0, 15, p); }
                          canvas.restore();
                      }
                      drawR(canvas, i.children);
                  }
              }
              @Override public boolean onTouchEvent(MotionEvent e) {
                  if(e.getAction() == MotionEvent.ACTION_DOWN && EngineCore.isPlaying) checkClick(EngineCore.root, e.getX(), e.getY());
                  return true;
              }
              private void checkClick(java.util.List<Instance> list, float tx, float ty) {
                  for(Instance i : list) {
                      if(!i.isDeleted && !i.onClick.isnil()) {
                          if(tx > i.x && tx < i.x + i.w*i.scale && ty > i.y && ty < i.y + i.h*i.scale) try { i.onClick.call(); } catch(Exception ex){}
                      }
                      checkClick(i.children, tx, ty);
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EditorActivity.java << 'EOF'
          package com.jsai.studio;
          import android.app.*;
          import android.os.Bundle;
          import android.view.*;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;
          import android.graphics.Color;
          import java.util.*;

          public class EditorActivity extends Activity {
              LinearLayout explorer, props; EditText codeEd; View gameView; Instance sel, clip;
              protected void onCreate(Bundle b) {
                  super.onCreate(b); requestWindowFeature(1); setContentView(R.layout.editor_main);
                  explorer = findViewById(R.id.explorer); props = findViewById(R.id.properties);
                  codeEd = findViewById(R.id.codeEditor); gameView = findViewById(R.id.gameView);

                  findViewById(R.id.btnAdd).setOnClickListener(v -> {
                      PopupMenu pm = new PopupMenu(this, v);
                      pm.getMenu().add("Блок"); pm.getMenu().add("Шар"); pm.getMenu().add("Folder"); pm.getMenu().add("Script");
                      pm.setOnMenuItemClickListener(item -> {
                          Instance i = new Instance(item.getTitle().toString() + " " + (new Random().nextInt(99)), item.getTitle().toString());
                          if(sel != null && (sel.type.equals("Folder"))) { i.parent = sel; sel.children.add(i); }
                          else { EngineCore.root.add(i); }
                          updateExp(); return true;
                      }); pm.show();
                  });

                  findViewById(R.id.btnPlay).setOnClickListener(v -> {
                      hideKB();
                      if(!EngineCore.isPlaying) { EngineCore.start(); ((Button)v).setText("Стоп"); }
                      else { EngineCore.stop(); ((Button)v).setText("Запуск"); }
                      gameView.invalidate();
                  });
              }

              void updateExp() {
                  explorer.removeAllViews(); renderR(EngineCore.root, 0);
              }

              void renderR(List<Instance> list, int ind) {
                  for(Instance i : list) {
                      LinearLayout row = new LinearLayout(this); row.setPadding(ind * 30, 5, 5, 5);
                      if(i.type.equals("Folder")) {
                          TextView t = new TextView(this); t.setText(i.isOpen ? "[-] " : "[+] "); t.setTextColor(Color.WHITE);
                          t.setOnClickListener(v -> { i.isOpen = !i.isOpen; updateExp(); }); row.addView(t);
                      }
                      TextView tv = new TextView(this); tv.setText(i.name); tv.setTextColor(sel == i ? Color.BLACK : Color.WHITE);
                      tv.setBackgroundColor(sel == i ? Color.WHITE : 0);
                      tv.setOnClickListener(v -> { sel = i; showProps(i); updateExp(); hideKB(); });
                      tv.setOnLongClickListener(v -> { showCtx(v, i); return true; });
                      row.addView(tv); explorer.addView(row);
                      if(i.isOpen) renderR(i.children, ind + 1);
                  }
              }

              void showCtx(View v, Instance i) {
                  PopupMenu pm = new PopupMenu(this, v); pm.getMenu().add("Вырезать"); pm.getMenu().add("Вставить"); pm.getMenu().add("Удалить");
                  pm.setOnMenuItemClickListener(item -> {
                      if(item.getTitle().equals("Удалить")) { if(i.parent!=null) i.parent.children.remove(i); else EngineCore.root.remove(i); sel=null; }
                      else if(item.getTitle().equals("Вырезать")) clip = i;
                      else if(item.getTitle().equals("Вставить") && clip != null) {
                          if(clip.parent!=null) clip.parent.children.remove(clip); else EngineCore.root.remove(clip);
                          clip.parent = i; i.children.add(clip);
                      }
                      updateExp(); return true;
                  }); pm.show();
              }

              void showProps(Instance i) {
                  props.removeAllViews();
                  boolean isS = i.type.equals("Script");
                  codeEd.setVisibility(isS ? View.VISIBLE : View.GONE);
                  gameView.setVisibility(isS ? View.GONE : View.VISIBLE);
                  if(i.type.equals("Folder")) return;
                  if(isS) {
                      codeEd.setText(i.luaCode);
                      codeEd.addTextChangedListener(new android.text.TextWatcher() {
                          public void afterTextChanged(android.text.Editable s) { i.luaCode = s.toString(); }
                          public void beforeTextChanged(CharSequence s, int st, int c, int a) {} public void onTextChanged(CharSequence s, int st, int b, int c) {}
                      });
                  }
                  addS("X", 0, 2000, i.x, v -> i.x = v); addS("Y", 0, 2000, i.y, v -> i.y = v);
                  addS("Угол", 0, 360, i.rotation, v -> i.rotation = v);
                  addS("Разм", 10, 1000, i.w, v -> { i.w = v; i.h = v; });
                  EditText col = new EditText(this); col.setHint("#HEX"); col.setTextColor(-1);
                  col.setOnEditorActionListener((v,a,e) -> { try { i.color = Color.parseColor(v.getText().toString()); hideKB(); } catch(Exception ex){} return true; });
                  props.addView(col);
              }

              void addS(String l, float min, float max, float cur, Upd u) {
                  TextView t = new TextView(this); t.setText(l + ": " + (int)cur); t.setTextColor(Color.GRAY); t.setTextSize(10);
                  SeekBar s = new SeekBar(this); s.setMax(100); s.setProgress((int)((cur-min)/(max-min)*100));
                  s.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      public void onProgressChanged(SeekBar sb, int p, boolean b) { float v = min+(max-min)*(p/100f); u.u(v); t.setText(l+": "+(int)v); }
                      public void onStartTrackingTouch(SeekBar sb) {} public void onStopTrackingTouch(SeekBar sb) {}
                  });
                  props.addView(t); props.addView(s);
              }
              void hideKB() { InputMethodManager imm = (InputMethodManager)getSystemService(INPUT_METHOD_SERVICE); View f = getCurrentFocus(); if(f!=null) imm.hideSoftInputFromWindow(f.getWindowToken(), 0); }
              interface Upd { void u(float v); }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI GD-Edition" android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".EditorActivity" android:exported="true" android:screenOrientation="landscape" android:windowSoftInputMode="adjustPan">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI_GD_Edition
          path: app/build/outputs/apk/debug/app-debug.apk
