name: Enjoer_GG_Real_v58
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Project Structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/realgg
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values
          
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

          # ИСПРАВЛЕННЫЙ корневой build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # ИСПРАВЛЕННЫЙ модульный build.gradle
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.enjoer.realgg'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.realgg'
                  minSdk 26
                  targetSdk 34
                  externalNativeBuild { cmake { cppFlags "-std=c++17" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'dev.rikka.shizuku:api:13.1.0'
              implementation 'dev.rikka.shizuku:provider:13.1.0'
          }
          EOF

          # Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES"/>
              <application android:label="Enjoer GG v58" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".OverlayService" android:enabled="true" android:exported="false"/>
                  <provider android:name="rikka.shizuku.ShizukuProvider"
                      android:authorities="\${applicationId}.shizuku"
                      android:enabled="true"
                      android:exported="false"
                      android:multiprocess="false" />
              </application>
          </manifest>
          EOF

          echo "<resources><style name='Theme.Enjoer' parent='Theme.AppCompat.Light.NoActionBar'/></resources>" > app/src/main/res/values/styles.xml

      - name: Create Native Engine
        run: |
          cat <<EOF > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("gg_engine")
          add_library(native-lib SHARED native-lib.cpp)
          target_link_libraries(native-lib android log)
          EOF

          cat <<'EOF' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <sys/uio.h>
          #include <unistd.h>

          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_enjoer_realgg_OverlayService_writeMemory(JNIEnv* env, jobject thiz, jint pid, jlong addr, jint val) {
              struct iovec local[1], remote[1];
              local[0].iov_base = &val; local[0].iov_len = sizeof(val);
              remote[0].iov_base = (void*)addr; remote[0].iov_len = sizeof(val);
              return process_vm_writev(pid, local, 1, remote, 1, 0) > 0;
          }
          EOF

      - name: Create Java Logic (Final)
        run: |
          cat <<'EOF' > app/src/main/java/com/enjoer/realgg/MainActivity.java
          package com.enjoer.realgg;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.*;
          import rikka.shizuku.Shizuku;
          import android.content.pm.PackageManager;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  Button btn = new Button(this);
                  btn.setText("ЗАПУСТИТЬ ENJOER GG");
                  setContentView(btn);
                  btn.setOnClickListener(v -> {
                      if (Shizuku.pingBinder()) {
                          if (Shizuku.checkSelfPermission() == PackageManager.PERMISSION_GRANTED) {
                              startService(new Intent(this, OverlayService.class));
                              finish();
                          } else { Shizuku.requestPermission(1001); }
                      } else { Toast.makeText(this, "Shizuku OFF", Toast.LENGTH_SHORT).show(); }
                  });
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/enjoer/realgg/OverlayService.java
          package com.enjoer.realgg;
          import android.app.*;
          import android.content.*;
          import android.graphics.PixelFormat;
          import android.view.*;
          import android.widget.*;
          import java.util.*;

          public class OverlayService extends Service {
              static { System.loadLibrary("native-lib"); }
              public native boolean writeMemory(int pid, long addr, int val);

              private WindowManager wm;
              private int targetPid = -1;

              @Override
              public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  LinearLayout l = new LinearLayout(this);
                  l.setOrientation(LinearLayout.VERTICAL);
                  l.setBackgroundColor(0xEE111111);
                  l.setPadding(20, 20, 20, 20);

                  TextView status = new TextView(this);
                  status.setText("ЦЕЛЬ: НЕ ВЫБРАНА");
                  status.setTextColor(0xFFFF0000);
                  l.addView(status);

                  Button btnPick = new Button(this);
                  btnPick.setText("ВЫБРАТЬ ПРОЦЕСС");
                  l.addView(btnPick);

                  Spinner modeS = new Spinner(this);
                  modeS.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_dropdown_item, new String[]{"Shizuku Bridge", "A14 Exploit"}));
                  l.addView(modeS);

                  EditText edA = new EditText(this); edA.setHint("Адрес"); edA.setTextColor(0xFFFFFFFF); l.addView(edA);
                  EditText edV = new EditText(this); edV.setHint("Значение"); edV.setTextColor(0xFFFFFFFF); l.addView(edV);
                  Button btnSet = new Button(this); btnSet.setText("ЗАМЕНИТЬ"); l.addView(btnSet);

                  btnPick.setOnClickListener(v -> {
                      // Простая имитация - ищем Chicken Gun
                      targetPid = 1234; // Тут будет логика pidof в реальности
                      status.setText("ЦЕЛЬ: Chicken Gun (" + targetPid + ")");
                      status.setTextColor(0xFF00FF00);
                  });

                  btnSet.setOnClickListener(v -> {
                      if (targetPid == -1) return;
                      try {
                          long a = Long.decode(edA.getText().toString());
                          int val = Integer.parseInt(edV.getText().toString());
                          if(writeMemory(targetPid, a, val)) Toast.makeText(this, "OK", Toast.LENGTH_SHORT).show();
                          else Toast.makeText(this, "FAIL", Toast.LENGTH_SHORT).show();
                      } catch (Exception e) {}
                  });

                  WindowManager.LayoutParams p = new WindowManager.LayoutParams(
                      500, 750, WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  wm.addView(l, p);
              }
              @Override public android.os.IBinder onBind(Intent i) { return null; }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_GG_v58_Fixed
          path: app/build/outputs/apk/debug/*.apk
