name: JsAI_Python_Studio_MegaFast_Ultimate_Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Create Studio Structure
        run: |
          mkdir -p app/src/main/java/com/jsai/studio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- 1. SETTINGS.GRADLE (Централизованное управление репозиториями) ---
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
                  maven { url "https://chaquo.com/maven" }
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://chaquo.com/maven" }
              }
          }
          rootProject.name = "JsAI Studio"
          include ':app'
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties

          # --- 2. ROOT BUILD.GRADLE ---
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'com.chaquo.python' version '15.0.0' apply false
          }
          EOF
          
          # --- 3. APP BUILD.GRADLE (ИСПРАВЛЕННЫЙ ПОРЯДОК) ---
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'com.chaquo.python'
          }

          android {
              namespace 'com.jsai.studio'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.jsai.studio'
                  minSdk 24
                  targetSdk 34
                  ndk { abiFilters "armeabi-v7a", "arm64-v8a", "x86_64" }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          // Блок конфигурации Chaquopy (строго после плагинов)
          chaquopy {
              defaultConfig {
                  version = "3.10"
                  buildPython "python3"
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # --- 4. UI LAYOUT ---
          cat > app/src/main/res/layout/editor_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal" android:background="#1E1E1E">
              <LinearLayout android:layout_width="140dp" android:layout_height="match_parent" android:orientation="vertical" android:background="#252525" android:padding="5dp">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Explorer" android:textColor="#FFF" android:textStyle="bold" android:layout_marginBottom="5dp"/>
                  <Button android:id="@+id/btnAddBlock" android:layout_width="match_parent" android:layout_height="35dp" android:text="+ Block" android:textSize="10sp" android:backgroundTint="#333" android:textColor="#FFF"/>
                  <Button android:id="@+id/btnAddScript" android:layout_width="match_parent" android:layout_height="35dp" android:text="+ PyScript" android:textSize="10sp" android:backgroundTint="#2D5A2D" android:textColor="#FFF" android:layout_marginTop="2dp"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="match_parent" android:layout_marginTop="5dp">
                      <LinearLayout android:id="@+id/explorerList" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"/>
                  </ScrollView>
              </LinearLayout>
              <LinearLayout android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:orientation="vertical">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="40dp" android:orientation="horizontal" android:background="#2D2D2D">
                      <Button android:id="@+id/tabScene" android:layout_width="wrap_content" android:layout_height="35dp" android:text="Scene" android:backgroundTint="#444" android:textColor="#FFF"/>
                      <Button android:id="@+id/tabScript" android:layout_width="wrap_content" android:layout_height="35dp" android:text="Python" android:backgroundTint="#222" android:textColor="#FFE873" android:layout_marginLeft="5dp"/>
                      <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <Button android:id="@+id/btnPlay" android:layout_width="wrap_content" android:layout_height="35dp" android:text="▶ PLAY" android:backgroundTint="#00A2FF" android:textColor="#FFF"/>
                  </LinearLayout>
                  <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent">
                      <android.opengl.GLSurfaceView android:id="@+id/glView" android:layout_width="match_parent" android:layout_height="match_parent"/>
                      <EditText android:id="@+id/codeEditor" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#1E1E1E" android:textColor="#D4D4D4" android:fontFamily="monospace" android:gravity="top|left" android:padding="10dp" android:visibility="gone" android:text="part = Workspace.FindPart('Block 0')\ndef update(dt):\n    if part:\n        part.rotY += 100.0 * dt\n        part.posY += 2.0 * dt\n        if part.posY > 5.0: part.posY = 0.0" />
                  </FrameLayout>
              </LinearLayout>
          </LinearLayout>
          EOF

          # --- 5. JAVA CORE (ENGINE) ---
          cat > app/src/main/java/com/jsai/studio/Instance.java << 'EOF'
          package com.jsai.studio;
          import android.opengl.Matrix;
          public class Instance {
              public String name;
              public float posX=0, posY=3, posZ=0, rotY=0, scale=1, colR=0.6f, colG=0.6f, colB=0.6f;
              public boolean anchored=true; public float velocityY=0;
              public Instance(String n) { this.name = n; }
              public float[] getMatrix() {
                  float[] m = new float[16]; Matrix.setIdentityM(m,0);
                  Matrix.translateM(m,0,posX,posY,posZ); Matrix.rotateM(m,0,rotY,0,1,0); Matrix.scaleM(m,0,scale,scale,scale);
                  return m;
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EngineCore.java << 'EOF'
          package com.jsai.studio;
          import java.util.*; import com.chaquo.python.*;
          public class EngineCore {
              public static List<Instance> parts = new ArrayList<>();
              public static String currentScript = "";
              public static boolean isPlaying = false;
              private static PyObject updateFunc = null;

              public static void start() {
                  isPlaying = true;
                  try {
                      Python py = Python.getInstance();
                      PyObject globals = py.getModule("builtins").callAttr("dict");
                      globals.put("Workspace", new Object() {
                          public Instance FindPart(String n) {
                              for(Instance i:parts) if(i.name.equals(n)) return i;
                              return null;
                          }
                      });
                      py.getModule("builtins").callAttr("exec", currentScript, globals);
                      if(globals.get("update") != null) updateFunc = globals.get("update");
                  } catch(Exception e) { e.printStackTrace(); }
              }

              public static void step(float dt) {
                  if(!isPlaying) return;
                  if(updateFunc != null) try { updateFunc.call(dt); } catch(Exception e){}
                  for(Instance p:parts) if(!p.anchored) {
                      p.velocityY -= 9.8f * dt; p.posY += p.velocityY * dt;
                      if(p.posY < 0.5f) { p.posY = 0.5f; p.velocityY = 0; }
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EditorActivity.java << 'EOF'
          package com.jsai.studio;
          import android.app.Activity; import android.os.Bundle; import android.view.*; import android.widget.*;
          import com.chaquo.python.*; import com.chaquo.python.android.AndroidPlatform;

          public class EditorActivity extends Activity {
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b); requestWindowFeature(1); getWindow().setFlags(1024,1024);
                  if(!Python.isStarted()) Python.start(new AndroidPlatform(this));
                  setContentView(R.layout.editor_main);
                  
                  EditText ed = findViewById(R.id.codeEditor);
                  findViewById(R.id.btnAddBlock).setOnClickListener(v -> {
                      Instance p = new Instance("Block " + EngineCore.parts.size());
                      EngineCore.parts.add(p);
                      Toast.makeText(this, "Added: " + p.name, 0).show();
                  });

                  findViewById(R.id.btnPlay).setOnClickListener(v -> {
                      if(!EngineCore.isPlaying) {
                          EngineCore.currentScript = ed.getText().toString();
                          EngineCore.start();
                          ((Button)v).setText("STOP");
                      } else {
                          EngineCore.isPlaying = false;
                          ((Button)v).setText("PLAY");
                      }
                  });

                  findViewById(R.id.tabScript).setOnClickListener(v -> {
                      findViewById(R.id.glView).setVisibility(View.GONE);
                      ed.setVisibility(View.VISIBLE);
                  });
                  findViewById(R.id.tabScene).setOnClickListener(v -> {
                      findViewById(R.id.glView).setVisibility(View.VISIBLE);
                      ed.setVisibility(View.GONE);
                  });
              }
          }
          EOF

          # --- 6. MANIFEST ---
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI Python Studio" android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".EditorActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Turbo Build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI_Python_Studio_Ultimate
          path: app/build/outputs/apk/debug/app-debug.apk
