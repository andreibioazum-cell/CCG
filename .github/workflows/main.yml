              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                  }
              }
          }
          EOF
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.enableJetifier=true
          org.gradle.jvmargs=-Xmx8192m
          org.gradle.parallel=true
          EOF
          
          echo 'include ":app"' > settings.gradle

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Package Release
        run: |
          mkdir -p AetherAI_Release
          cp app/build/outputs/apk/debug/app-debug.apk AetherAI_Release/AetherAI-LARGE-1.3GB.apk
          
          cat > AetherAI_Release/README.md << 'EOF'
          # 🧠 AetherAI LARGE - 1.3GB Model
          
          ## ⚡ Specifications:
          
          **Architecture:**
          - Vocab: 32,768 tokens
          - Layers: 12
          - Hidden: 1024
          - Attention heads: 16
          - FFN: 4096
          - Context: 512 tokens
          - Parameters: ~350M
          - Memory: **1.3 GB**
          
          ## 📱 Requirements:
          
          - **RAM**: Minimum 3GB (4GB+ recommended)
          - **Android**: 9.0+ (API 28+)
          - **Arch**: ARM64 only
          - **Storage**: 1.5GB free space
          
          ## 🎯 Usage:
          
          1. Install APK
          2. Wait for initialization (~30 seconds)
          3. Select TXT files (max 50MB total)
          4. Train (3-5 epochs recommended)
          5. Generate high-quality text
          
          ## ⚠️ Warnings:
          
          - **First launch**: Takes 30-60 seconds to allocate memory
          - **Training**: SLOW on weak devices
          - **Battery**: Heavy power consumption
          - **Heat**: Device may get warm
          
          ## 💡 Tips:
          
          - Close all other apps before training
          - Use airplane mode during training
          - Plug in charger
          - Let device cool between sessions
          
          ---
          
          **Version:** 2.0-LARGE  
          **License:** MIT  
          **This is a LARGE model - use smaller version for low-end devices**
          EOF
          
          cd AetherAI_Release
          zip -r ../AetherAI-LARGE.zip .
          cd ..
          
      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: AetherAI-LARGE-Release
          path: |
            AetherAI-LARGE.zip
            AetherAI_Release/
          retention-days: 90
