name: JsAI_Craft_V11_GL46_ULTRA_OPTIMIZED
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Files
        run: |
          mkdir -p app/src/main/java/com/jsai/craft app/src/main/res/layout app/src/main/res/drawable
          
          cat > app/src/main/res/drawable/dot.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#FFF"/></shape>
          EOF
          cat > app/src/main/res/drawable/b1.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#59BF40"/></shape>
          EOF
          cat > app/src/main/res/drawable/b2.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#999"/></shape>
          EOF
          cat > app/src/main/res/drawable/b3.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#8B4513"/></shape>
          EOF
          cat > app/src/main/res/drawable/jb.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#12FFFFFF"/><stroke android:width="1.5dp" android:color="#20FFFFFF"/></shape>
          EOF
          cat > app/src/main/res/drawable/jh.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#50FFFFFF"/></shape>
          EOF

          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.jsai.craft'; compileSdk 34; defaultConfig { applicationId 'com.jsai.craft'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5' }
          EOF

          cat > app/src/main/res/layout/main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:clipChildren="false" android:clipToPadding="false"><android.opengl.GLSurfaceView android:id="@+id/gl" android:layout_width="match_parent" android:layout_height="match_parent"/><View android:layout_width="3dp" android:layout_height="3dp" android:background="@drawable/dot" android:layout_centerInParent="true"/><TextView android:id="@+id/tv" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_margin="10dp" android:textColor="#0F0" android:shadowColor="#000" android:shadowDx="2" android:shadowDy="2" android:shadowRadius="2"/><LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_centerHorizontal="true" android:layout_marginTop="10dp"><Button android:id="@+id/b1" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/b1" android:text="1" android:textColor="#FFF"/><Button android:id="@+id/b2" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/b2" android:text="2" android:textColor="#FFF" android:layout_marginLeft="5dp"/><Button android:id="@+id/b3" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/b3" android:text="3" android:textColor="#FFF" android:layout_marginLeft="5dp"/></LinearLayout><FrameLayout android:id="@+id/jz" android:layout_width="90dp" android:layout_height="90dp" android:layout_alignParentBottom="true" android:layout_margin="35dp" android:background="@drawable/jb" android:clipChildren="false" android:clipToPadding="false"><View android:id="@+id/jh" android:layout_width="34dp" android:layout_height="34dp" android:layout_gravity="center" android:background="@drawable/jh"/></FrameLayout><LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_alignParentRight="true" android:layout_margin="10dp" android:orientation="vertical"><LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"><Button android:id="@+id/brk" android:layout_width="65dp" android:layout_height="65dp" android:text="BRK"/><Button android:id="@+id/plc" android:layout_width="65dp" android:layout_height="65dp" android:text="PLC" android:layout_marginLeft="5dp"/></LinearLayout><Button android:id="@+id/jmp" android:layout_width="135dp" android:layout_height="70dp" android:text="JUMP" android:layout_marginTop="5dp"/></LinearLayout></RelativeLayout>
          EOF

          cat > app/src/main/java/com/jsai/craft/App.java << 'EOF'
          package com.jsai.craft;
          import android.app.Activity; import android.os.*; import android.view.*; import android.widget.*;
