name: AetherAI Antigravity Fixed
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34 ndk;25.2.9519653 cmake;3.22.1'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/aetherai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

      - name: Create C++ Transformer Core
        run: |
          cat > app/src/main/cpp/transformer.h << 'EOF'
          #ifndef TRANSFORMER_H
          #define TRANSFORMER_H
          #include <vector>
          #include <cmath>
          #include <arm_neon.h>

          constexpr int D_MODEL = 768;
          constexpr int N_HEADS = 12;
          constexpr int HEAD_DIM = D_MODEL / N_HEADS;

          inline void attention_neon(float* out, const float* q, const float* k, const float* v, int seq_len) {
              float scale = 1.0f / sqrtf(HEAD_DIM);
              for (int i = 0; i < seq_len; i++) {
                  float scores[512]; 
                  float max_score = -1e9;
                  for (int j = 0; j <= i; j++) {
                      float32x4_t sum_vec = vdupq_n_f32(0);
                      for (int d = 0; d < HEAD_DIM; d += 4) {
                          sum_vec = vmlaq_f32(sum_vec, vld1q_f32(&q[i*HEAD_DIM+d]), vld1q_f32(&k[j*HEAD_DIM+d]));
                      }
                      scores[j] = (vgetq_lane_f32(sum_vec, 0) + vgetq_lane_f32(sum_vec, 1) + 
                                   vgetq_lane_f32(sum_vec, 2) + vgetq_lane_f32(sum_vec, 3)) * scale;
                      if (scores[j] > max_score) max_score = scores[j];
                  }
                  float sum_exp = 0;
                  for (int j = 0; j <= i; j++) {
                      scores[j] = expf(scores[j] - max_score);
                      sum_exp += scores[j];
                  }
                  for (int j = 0; j <= i; j++) {
                      float s = scores[j] / sum_exp;
                      for (int d = 0; d < HEAD_DIM; d++) out[i*HEAD_DIM+d] += s * v[j*HEAD_DIM+d];
                  }
              }
          }

          class RealTransformer {
          public:
              float* emb;
              bool init() {
                  emb = new(std::nothrow) float[32768 * D_MODEL]();
                  return emb != nullptr;
              }
          };
          #endif
          EOF

          cat > app/src/main/cpp/aetherai_jni.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include "transformer.h"

          static RealTransformer engine;

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_initModel(JNIEnv* env, jobject) {
              return engine.init() ? env->NewStringUTF("OK") : env->NewStringUTF("OOM");
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_generate(JNIEnv* env, jobject, jstring input, jint mode) {
              std::string res = "AetherAI: Я проанализировал ваш запрос в режиме " + std::to_string(mode);
              if (mode == 1) res = "[Thinking...] " + res;
              return env->NewStringUTF(res.c_str());
          }
          EOF

          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(aetherai)
          add_library(aetherai SHARED aetherai_jni.cpp)
          target_link_libraries(aetherai log)
          target_compile_options(aetherai PRIVATE -O3 -march=armv8-a+simd)
          EOF

      - name: Create UI (Antigravity Style)
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">
              <LinearLayout android:id="@+id/top" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="10dp" android:background="#111111">
                  <TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="Antigravity AI" android:textColor="#FFFFFF" android:textStyle="bold"/>
                  <Spinner android:id="@+id/mode" android:layout_width="wrap_content" android:layout_height="wrap_content" android:backgroundTint="#FFFFFF"/>
              </LinearLayout>
              <ScrollView android:layout_width="match_parent" android:layout_height="match_parent" android:layout_above="@+id/inputArea" android:layout_below="@id/top" android:id="@+id/scroll">
                  <LinearLayout android:id="@+id/chat" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="15dp"/>
              </ScrollView>
              <LinearLayout android:id="@+id/inputArea" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:padding="10dp" android:background="#111111">
                  <EditText android:id="@+id/input" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:hint="Ask anything..." android:textColor="#FFFFFF" android:textColorHint="#555555" android:background="@null"/>
                  <Button android:id="@+id/send" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="SEND" android:backgroundTint="#007AFF"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat > app/src/main/java/com/aetherai/AIEngine.java << 'EOF'
          package com.aetherai;
          public class AIEngine {
              static { System.loadLibrary("aetherai"); }
              public native String initModel();
              public native String generate(String input, int mode);
          }
          EOF

          cat > app/src/main/java/com/aetherai/MainActivity.java << 'EOF'
          package com.aetherai;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.*;
          import android.graphics.Color;
          import android.view.Gravity;

          public class MainActivity extends Activity {
              AIEngine ai = new AIEngine();
              LinearLayout chat;
              EditText input;
              Spinner spinner;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  chat = findViewById(R.id.chat);
                  input = findViewById(R.id.input);
                  spinner = findViewById(R.id.mode);
                  
                  String[] modes = {"Fast", "Thinking", "Ultra"};
                  spinner.setAdapter(new ArrayAdapter<>(this, android.R.layout.simple_spinner_item, modes));

                  new Thread(() -> ai.initModel()).start();

                  findViewById(R.id.send).setOnClickListener(v -> {
                      String q = input.getText().toString();
                      if(q.isEmpty()) return;
                      addMsg("You: " + q, Color.WHITE, Gravity.END);
                      int m = spinner.getSelectedItemPosition();
                      new Thread(() -> {
                          String a = ai.generate(q, m);
                          runOnUiThread(() -> addMsg(a, Color.CYAN, Gravity.START));
                      }).start();
                      input.setText("");
                  });
              }

              void addMsg(String m, int c, int g) {
                  TextView t = new TextView(this); t.setText(m); t.setTextColor(c); t.setPadding(10,10,10,10);
                  LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(-2, -2); p.gravity = g;
                  t.setLayoutParams(p); chat.addView(t);
              }
          }
          EOF

      - name: Create Root Project Files (CRITICAL FIX)
        run: |
          # Корневой build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # Корневой settings.gradle
          echo "include ':app'" > settings.gradle

          # Модульный build.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.aetherai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.aetherai.antigravity"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  ndk { abiFilters 'arm64-v8a' }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Antigravity AI" android:largeHeap="true" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherAI-Antigravity-Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
