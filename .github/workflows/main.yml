          cat <<'FORMULA' > app/src/main/java/com/pocketlite/ru/FormulaEngine.java
          package com.pocketlite.ru;

          public class FormulaEngine {
              public interface Host {
                  ProjectItem project();
                  ObjectItem object();
                  float touchX();
                  float touchY();
                  float touchCount();
              }

              public static float eval(Host host, String expr){
                  if(expr == null) return 0f;
                  expr = expr.trim();
                  if(expr.isEmpty()) return 0f;

                  if(isNumber(expr)) return Float.parseFloat(expr);

                  if(expr.equalsIgnoreCase("X")) return host.object() != null ? host.object().x : 0f;
                  if(expr.equalsIgnoreCase("Y")) return host.object() != null ? host.object().y : 0f;
                  if(expr.equalsIgnoreCase("касаниеX")) return host.touchX();
                  if(expr.equalsIgnoreCase("касаниеY")) return host.touchY();
                  if(expr.equalsIgnoreCase("колКасаний")) return host.touchCount();

                  ProjectItem p = host.project();
                  if(p != null){
                      for(VariableItem v : p.variables){
                          if(expr.equals(v.name)){
                              try { return Float.parseFloat(v.value); } catch(Exception ignored){}
                          }
                      }
                  }

                  if(expr.startsWith("-") && expr.length() > 1){
                      if(isNumber(expr)) return Float.parseFloat(expr);
                  }

                  int plus = findLastTop(expr, '+');
                  if(plus > 0) return eval(host, expr.substring(0, plus)) + eval(host, expr.substring(plus+1));

                  int minus = findLastTopMinus(expr);
                  if(minus > 0) return eval(host, expr.substring(0, minus)) - eval(host, expr.substring(minus+1));

                  if(expr.startsWith("sin(") && expr.endsWith(")")) return (float)Math.sin(Math.toRadians(eval(host, inner(expr))));
                  if(expr.startsWith("cos(") && expr.endsWith(")")) return (float)Math.cos(Math.toRadians(eval(host, inner(expr))));
                  if(expr.startsWith("tan(") && expr.endsWith(")")) return (float)Math.tan(Math.toRadians(eval(host, inner(expr))));
                  if(expr.startsWith("atan(") && expr.endsWith(")")) return (float)Math.toDegrees(Math.atan(eval(host, inner(expr))));
                  if(expr.startsWith("sqrt(") && expr.endsWith(")")) return (float)Math.sqrt(Math.max(0f, eval(host, inner(expr))));
                  if(expr.startsWith("abs(") && expr.endsWith(")")) return Math.abs(eval(host, inner(expr)));

                  if(expr.startsWith("random(") && expr.endsWith(")")){
                      String body = inner(expr);
                      String[] a = body.split(",");
                      if(a.length == 2){
                          float x = eval(host, a[0].trim());
                          float y = eval(host, a[1].trim());
                          float mn = Math.min(x, y), mx = Math.max(x, y);
                          return mn + (float)Math.random() * (mx - mn);
                      }
                  }

                  return 0f;
              }

              public static String text(Host host, String expr){
                  if(expr == null) return "";
                  expr = expr.trim();
                  if(expr.startsWith("\"") && expr.endsWith("\"") && expr.length() >= 2){
                      return expr.substring(1, expr.length()-1);
                  }
                  ProjectItem p = host.project();
                  if(p != null){
                      for(VariableItem v : p.variables){
                          if(expr.equals(v.name)) return v.value;
                      }
                  }
                  return expr;
              }

              private static boolean isNumber(String s){
                  try { Float.parseFloat(s); return true; } catch(Exception e){ return false; }
              }

              private static String inner(String s){
                  return s.substring(s.indexOf('(')+1, s.lastIndexOf(')')).trim();
              }

              private static int findLastTop(String s, char op){
                  int depth = 0;
                  for(int i=s.length()-1;i>=0;i--){
                      char c = s.charAt(i);
                      if(c==')') depth++;
                      else if(c=='(') depth--;
                      else if(depth==0 && c==op) return i;
                  }
                  return -1;
              }

              private static int findLastTopMinus(String s){
                  int depth = 0;
                  for(int i=s.length()-1;i>=1;i--){
                      char c = s.charAt(i);
                      if(c==')') depth++;
                      else if(c=='(') depth--;
                      else if(depth==0 && c=='-'){
                          char prev = s.charAt(i-1);
                          if(prev=='+' || prev=='-' || prev=='*' || prev=='/' || prev=='(') continue;
                          return i;
                      }
                  }
                  return -1;
              }
          }
          FORMULA

          cat <<'STORE' > app/src/main/java/com/pocketlite/ru/ProjectStore.java
          package com.pocketlite.ru;

          import android.content.Context;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.*;
          import java.util.ArrayList;

          public class ProjectStore {
              private static File file(Context c){
                  return new File(c.getFilesDir(), "projects_lite_ru.json");
              }

              public static ArrayList<ProjectItem> load(Context c){
                  ArrayList<ProjectItem> out = new ArrayList<>();
                  try{
                      File f = file(c);
                      if(!f.exists()) return out;

                      BufferedReader rd = new BufferedReader(new FileReader(f));
                      StringBuilder sb = new StringBuilder();
                      String line;
                      while((line = rd.readLine()) != null) sb.append(line);
                      rd.close();

                      JSONArray arr = new JSONArray(sb.toString());
                      for(int i=0;i<arr.length();i++){
                          JSONObject p = arr.getJSONObject(i);
                          ProjectItem pr = new ProjectItem();
                          pr.name = p.optString("name", "Проект");

                          JSONArray tex = p.optJSONArray("textures");
                          if(tex != null){
                              for(int t=0;t<tex.length();t++){
                                  JSONObject o = tex.getJSONObject(t);
                                  TextureItem tx = new TextureItem();
                                  tx.id = o.optString("id");
                                  tx.name = o.optString("name");
                                  tx.uri = o.optString("uri");
                                  pr.textures.add(tx);
                              }
                          }

                          JSONArray vars = p.optJSONArray("variables");
                          if(vars != null){
                              for(int v=0;v<vars.length();v++){
                                  JSONObject o = vars.getJSONObject(v);
                                  VariableItem vi = new VariableItem();
                                  vi.name = o.optString("name");
                                  vi.value = o.optString("value");
                                  pr.variables.add(vi);
                              }
                          }

                          JSONArray lists = p.optJSONArray("lists");
                          if(lists != null){
                              for(int l=0;l<lists.length();l++){
                                  JSONObject o = lists.getJSONObject(l);
                                  ListItemModel li = new ListItemModel();
                                  li.name = o.optString("name");
                                  JSONArray its = o.optJSONArray("items");
                                  if(its != null){
                                      for(int z=0;z<its.length();z++) li.items.add(its.optString(z));
                                  }
                                  pr.lists.add(li);
                              }
                          }

                          JSONArray scenes = p.optJSONArray("scenes");
                          if(scenes != null){
                              for(int j=0;j<scenes.length();j++){
                                  JSONObject s = scenes.getJSONObject(j);
                                  SceneItem sc = new SceneItem();
                                  sc.name = s.optString("name", "Сцена");
                                  sc.bgColor = s.optString("bgColor", "#D8F0FF");

                                  JSONArray objs = s.optJSONArray("objects");
                                  if(objs != null){
                                      for(int k=0;k<objs.length();k++){
                                          JSONObject o = objs.getJSONObject(k);
                                          ObjectItem ob = new ObjectItem();
                                          ob.name = o.optString("name", "Объект");
                                          ob.spriteType = o.optString("spriteType", "emoji");
                                          ob.emoji = o.optString("emoji", "🐱");
                                          ob.text = o.optString("text", "Текст");
                                          ob.textureId = o.optString("textureId", "");
                                          ob.shape = o.optString("shape", "square");
                                          ob.color = o.optString("color", "#FFFFFF");
                                          ob.startX = (float)o.optDouble("startX", 100);
                                          ob.startY = (float)o.optDouble("startY", 80);
                                          ob.x = ob.startX;
                                          ob.y = ob.startY;
                                          ob.w = (float)o.optDouble("w", 72);
                                          ob.h = (float)o.optDouble("h", 72);
                                          ob.visible = o.optBoolean("visible", true);
                                          ob.say = o.optString("say", "");

                                          JSONArray blocks = o.optJSONArray("blocks");
                                          if(blocks != null){
                                              for(int z=0;z<blocks.length();z++){
                                                  JSONObject b = blocks.getJSONObject(z);
                                                  ob.blocks.add(new BlockItem(
                                                      b.optString("type"),
                                                      b.optString("label"),
                                                      b.optString("arg1"),
                                                      b.optString("arg2")
                                                  ));
                                              }
                                          }
                                          sc.objects.add(ob);
                                      }
                                  }
                                  pr.scenes.add(sc);
                              }
                          }

                          out.add(pr);
                      }
                  }catch(Exception ignored){}
                  return out;
              }

              public static void save(Context c, ArrayList<ProjectItem> projects){
                  try{
                      JSONArray arr = new JSONArray();

                      for(ProjectItem pr : projects){
                          JSONObject p = new JSONObject();
                          p.put("name", pr.name);

                          JSONArray tex = new JSONArray();
                          for(TextureItem t : pr.textures){
                              JSONObject o = new JSONObject();
                              o.put("id", t.id);
                              o.put("name", t.name);
                              o.put("uri", t.uri);
                              tex.put(o);
                          }
                          p.put("textures", tex);

                          JSONArray vars = new JSONArray();
                          for(VariableItem v : pr.variables){
                              JSONObject o = new JSONObject();
                              o.put("name", v.name);
                              o.put("value", v.value);
                              vars.put(o);
                          }
                          p.put("variables", vars);

                          JSONArray lists = new JSONArray();
                          for(ListItemModel li : pr.lists){
                              JSONObject o = new JSONObject();
                              o.put("name", li.name);
                              JSONArray its = new JSONArray();
                              for(String s : li.items) its.put(s);
                              o.put("items", its);
                              lists.put(o);
                          }
                          p.put("lists", lists);

                          JSONArray scenes = new JSONArray();
                          for(SceneItem sc : pr.scenes){
                              JSONObject s = new JSONObject();
                              s.put("name", sc.name);
                              s.put("bgColor", sc.bgColor);

                              JSONArray objs = new JSONArray();
                              for(ObjectItem ob : sc.objects){
                                  JSONObject o = new JSONObject();
                                  o.put("name", ob.name);
                                  o.put("spriteType", ob.spriteType);
                                  o.put("emoji", ob.emoji);
                                  o.put("text", ob.text);
                                  o.put("textureId", ob.textureId);
                                  o.put("shape", ob.shape);
                                  o.put("color", ob.color);
                                  o.put("startX", ob.startX);
                                  o.put("startY", ob.startY);
                                  o.put("w", ob.w);
                                  o.put("h", ob.h);
                                  o.put("visible", ob.visible);
                                  o.put("say", ob.say);

                                  JSONArray bl = new JSONArray();
                                  for(BlockItem b : ob.blocks){
                                      JSONObject bb = new JSONObject();
                                      bb.put("type", b.type);
                                      bb.put("label", b.label);
                                      bb.put("arg1", b.arg1);
                                      bb.put("arg2", b.arg2);
                                      bl.put(bb);
                                  }
                                  o.put("blocks", bl);
                                  objs.put(o);
                              }
                              s.put("objects", objs);
                              scenes.put(s);
                          }
                          p.put("scenes", scenes);

                          arr.put(p);
                      }

                      FileWriter wr = new FileWriter(file(c));
                      wr.write(arr.toString());
                      wr.close();
                  }catch(Exception ignored){}
              }
          }
