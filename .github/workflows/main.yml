              public void placeBlock() {
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float vy=(float)Math.sin(Math.toRadians(rX));
                  float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float ny=pY+vy*placeDist;
                  if(ny-blockSY/2<FLOOR_Y) ny=FLOOR_Y+blockSY/2;
                  blocks.add(new Block(pX+vx*placeDist, ny, pZ+vz*placeDist, blockSX, blockSY, blockSZ, blockR, blockG, blockB));
              }
              
              public void deleteSelected() {
                  if(selectedIndex>=0 && selectedIndex<blocks.size()) { blocks.remove(selectedIndex); selectedIndex=-1; }
              }
              
              public void moveSelected(float dx, float dy, float dz) {
