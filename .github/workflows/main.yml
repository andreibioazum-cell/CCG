name: JsAI_Russian_Final_Engine
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Studio Structure
        run: |
          mkdir -p app/src/main/java/com/jsai/studio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # --- CONFIG ---
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal(); } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); } }
          include ':app'
          EOF
          
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.1.1' apply false }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.jsai.studio'
              compileSdk 34
              defaultConfig { applicationId "com.jsai.studio"; minSdk 26; targetSdk 34; versionCode 1; versionName "8.0" }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.luaj:luaj-jse:3.0.1'
          }
          EOF

          # --- UI (ROBLOX STYLE) ---
          cat > app/src/main/res/layout/editor_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#1B1B1B">
              <LinearLayout android:id="@+id/toolbar" android:layout_width="match_parent" android:layout_height="40dp" android:background="#222" android:orientation="horizontal" android:gravity="center_vertical" android:paddingHorizontal="10dp">
                  <Button android:id="@+id/btnAdd" android:layout_width="40dp" android:layout_height="32dp" android:text="+" android:backgroundTint="#333" android:textColor="#FFF" android:insetTop="0dp" android:insetBottom="0dp"/>
                  <Button android:id="@+id/btnPlay" android:layout_width="90dp" android:layout_height="32dp" android:text="ЗАПУСК" android:backgroundTint="#00A2FF" android:textColor="#FFF" android:textSize="10sp" android:layout_marginLeft="10dp" android:insetTop="0dp" android:insetBottom="0dp"/>
                  <Space android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="JsAI RUSSIAN" android:textColor="#555" android:textSize="10sp"/>
              </LinearLayout>
              
              <LinearLayout android:id="@+id/sidebar" android:layout_width="160dp" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_alignParentRight="true" android:background="#252525" android:orientation="vertical">
                  <TextView android:layout_width="match_parent" android:layout_height="22dp" android:text=" Explorer" android:textColor="#AAA" android:textSize="9sp" android:background="#2D2D2D" android:gravity="center_vertical"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1"><LinearLayout android:id="@+id/explorer" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"/></ScrollView>
                  <TextView android:layout_width="match_parent" android:layout_height="22dp" android:text=" Properties" android:textColor="#AAA" android:textSize="9sp" android:background="#2D2D2D" android:gravity="center_vertical"/>
                  <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1.2" android:background="#202020"><LinearLayout android:id="@+id/properties" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="5dp"/></ScrollView>
              </LinearLayout>

              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent" android:layout_below="@id/toolbar" android:layout_toLeftOf="@id/sidebar">
                  <com.jsai.studio.GameView android:id="@+id/gameView" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000"/>
                  <EditText android:id="@+id/codeEditor" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#1E1E1E" android:textColor="#0F4" android:fontFamily="monospace" android:gravity="top" android:padding="15dp" android:visibility="gone" android:textSize="14sp" android:inputType="textMultiLine|textNoSuggestions"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          # --- ENGINE (ТРАНСЛЯТОР) ---
          cat > app/src/main/java/com/jsai/studio/EngineCore.java << 'EOF'
          package com.jsai.studio;
          import java.util.*;
          import org.luaj.vm2.*;
          import org.luaj.vm2.lib.*;
          import org.luaj.vm2.lib.jse.*;

          public class EngineCore {
              public static boolean isPlaying = false;
              public static int bgColor = 0xFF000000;
              public static List<DrawCmd> drawQueue = new ArrayList<>();
              public static float mx, my;
              private static Globals globals;
              private static LuaValue loopFunc, clickFunc;

              public static class DrawCmd {
                  String type; float x, y, r, w, h; int color; String text;
                  DrawCmd(String t, float x, float y, float r, float w, float h, int c, String txt) { 
                      this.type=t; this.x=x; this.y=y; this.r=r; this.w=w; this.h=h; this.color=c; this.text=txt; 
                  }
              }

              public static String compile(String code) {
                  String res = code
                      .replace("игра", "function loop()")
                      .replace("клик", "function onClick(кх, ку)")
                      .replace("конец", "end")
                      .replace("если", "if")
                      .replace("тогда", "then")
                      .replace("иначе", "else")
                      .replace("равно", "==").replace("больше", ">").replace("меньше", "<")
                      .replace(" или ", " or ").replace(" и ", " and ");

                  // Обработка графических команд из твоего JS проекта
                  String[] cmds = {"фон", "цвет", "круг", "квадрат", "текст", "пиши"};
                  String[] luaCmds = {"setBackground", "setColor", "drawCircle", "drawRect", "drawText", "print"};
                  
                  String[] lines = res.split("\n");
                  StringBuilder sb = new StringBuilder();
                  for(String line : lines) {
                      String l = line.trim();
                      boolean found = false;
                      for(int i=0; i<cmds.length; i++) {
                          if(l.startsWith(cmds[i] + " ")) {
                              String args = l.substring(cmds[i].length()).trim();
                              if(!args.contains(",") && !args.startsWith("\"")) args = "'" + args + "'";
                              sb.append(luaCmds[i]).append("(").append(args).append(")\n");
                              found = true; break;
                          }
                      }
                      if(!found) sb.append(line).append("\n");
                  }
                  return sb.toString();
              }

              public static void start(String code) {
                  drawQueue.clear();
                  globals = JsePlatform.standardGlobals();
                  globals.set("_c", LuaValue.valueOf(0xFFFFFFFF));
                  
                  globals.set("setBackground", new OneArgFunction() { @Override public LuaValue call(LuaValue a) { bgColor = parseCol(a.tojstring()); return NIL; } });
                  globals.set("setColor", new OneArgFunction() { @Override public LuaValue call(LuaValue a) { globals.set("_c", LuaValue.valueOf(parseCol(a.tojstring()))); return NIL; } });
                  globals.set("drawCircle", new ThreeArgFunction() { @Override public LuaValue call(LuaValue x, LuaValue y, LuaValue r) {
                      drawQueue.add(new DrawCmd("circle", (float)x.todouble(), (float)y.todouble(), (float)r.todouble(), 0, 0, globals.get("_c").toint(), "")); return NIL; } 
                  });
                  globals.set("drawRect", new LibFunction() { @Override public LuaValue call(LuaValue x, LuaValue y, LuaValue w, LuaValue h) {
                      drawQueue.add(new DrawCmd("rect", (float)x.todouble(), (float)y.todouble(), 0, (float)w.todouble(), (float)h.todouble(), globals.get("_c").toint(), "")); return NIL; } 
                  });
                  globals.set("drawText", new ThreeArgFunction() { @Override public LuaValue call(LuaValue t, LuaValue x, LuaValue y) {
                      drawQueue.add(new DrawCmd("text", (float)x.todouble(), (float)y.todouble(), 0, 0, 0, globals.get("_c").toint(), t.tojstring())); return NIL; } 
                  });

                  try {
                      globals.load(compile(code)).call();
                      loopFunc = globals.get("loop");
                      clickFunc = globals.get("onClick");
                      isPlaying = true;
                  } catch(Exception e) { isPlaying = false; }
              }

              public static void stop() { isPlaying = false; loopFunc = null; drawQueue.clear(); }
              public static void update() {
                  if(!isPlaying || loopFunc == null || loopFunc.isnil()) return;
                  drawQueue.clear();
                  globals.set("мышьХ", LuaValue.valueOf(mx)); globals.set("мышьУ", LuaValue.valueOf(my));
                  try { loopFunc.call(); } catch(Exception e) {}
              }

              private static int parseCol(String n) {
                  if(n.startsWith("#")) try { return android.graphics.Color.parseColor(n); } catch(Exception e) {}
                  switch(n) {
                      case "белый": return 0xFFFFFFFF; case "черный": return 0xFF000000;
                      case "красный": return 0xFFFF0000; case "малиновый": return 0xFFDC143C;
                      case "синий": return 0xFF0000FF; case "голубой": return 0xFF1E90FF;
                      case "золото": return 0xFFFFD700; case "зеленый": return 0xFF00FF00;
                      default: return 0xFFFFFFFF;
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/GameView.java << 'EOF'
          package com.jsai.studio;
          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;

          public class GameView extends View {
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              public GameView(Context c, AttributeSet a) { super(c, a); }
              @Override protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);
                  if(!EngineCore.isPlaying) return;
                  canvas.drawColor(EngineCore.bgColor);
                  EngineCore.update();
                  for(EngineCore.DrawCmd cmd : new java.util.ArrayList<>(EngineCore.drawQueue)) {
                      p.setColor(cmd.color);
                      if(cmd.type.equals("circle")) canvas.drawCircle(cmd.x, cmd.y, cmd.r, p);
                      else if(cmd.type.equals("rect")) canvas.drawRect(cmd.x, cmd.y, cmd.x+cmd.w, cmd.y+cmd.h, p);
                      else if(cmd.type.equals("text")) { p.setTextSize(50); canvas.drawText(cmd.text, cmd.x, cmd.y, p); }
                  }
                  invalidate();
              }
              @Override public boolean onTouchEvent(MotionEvent e) {
                  EngineCore.mx = e.getX(); EngineCore.my = e.getY();
                  return true;
              }
          }
          EOF

          cat > app/src/main/java/com/jsai/studio/EditorActivity.java << 'EOF'
          package com.jsai.studio;
          import android.app.*;
          import android.os.Bundle;
          import android.view.*;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;

          public class EditorActivity extends Activity {
              EditText codeEd; Button btnPlay;
              protected void onCreate(Bundle b) {
                  super.onCreate(b); requestWindowFeature(1); setContentView(R.layout.editor_main);
                  codeEd = findViewById(R.id.codeEditor); btnPlay = findViewById(R.id.btnPlay);
                  codeEd.setVisibility(View.VISIBLE);

                  btnPlay.setOnClickListener(v -> {
                      InputMethodManager imm = (InputMethodManager)getSystemService(INPUT_METHOD_SERVICE);
                      if(getCurrentFocus()!=null) imm.hideSoftInputFromWindow(getCurrentFocus().getWindowToken(), 0);
                      
                      if(!EngineCore.isPlaying) {
                          EngineCore.start(codeEd.getText().toString());
                          btnPlay.setText("СТОП"); codeEd.setVisibility(View.GONE);
                      } else {
                          EngineCore.stop();
                          btnPlay.setText("ЗАПУСК"); codeEd.setVisibility(View.VISIBLE);
                      }
                  });
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="JsAI Russian" android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".EditorActivity" android:exported="true" android:screenOrientation="landscape" android:windowSoftInputMode="adjustPan">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JsAI_Russian_Final
          path: app/build/outputs/apk/debug/app-debug.apk
