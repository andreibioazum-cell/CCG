name: AetherAI Real-QA Antigravity
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34 ndk;25.2.9519653 cmake;3.22.1'

      - name: Project Structure
        run: |
          mkdir -p app/src/main/cpp app/src/main/java/com/aetherai app/src/main/res/layout app/src/main/res/values

      - name: Create C++ QA-Engine
        run: |
          cat > app/src/main/cpp/transformer.h << 'EOF'
          #ifndef TRANSFORMER_H
          #define TRANSFORMER_H
          #include <vector>
          #include <string>
          #include <map>
          #include <cmath>
          #include <random>

          class QAEngine {
          public:
              float *emb;
              std::map<std::string, int> word_to_id;
              std::vector<std::string> id_to_word;
              std::mt19937 gen;

              QAEngine() : gen(42) {}

              bool allocate() {
                  emb = new(std::nothrow) float[20000 * 256]();
                  return emb != nullptr;
              }

              int get_id(std::string w) {
                  if (word_to_id.count(w)) return word_to_id[w];
                  int id = id_to_word.size();
                  word_to_id[w] = id;
                  id_to_word.push_back(w);
                  return id;
              }

              void train(int inp, int tar) {
                  float lr = 0.05f;
                  for(int i=0; i<256; i++) {
                      float diff = emb[inp*256+i] - emb[tar*256+i];
                      emb[inp*256+i] -= lr * diff; // Сближаем векторы слов
                  }
              }

              std::string generate_answer(std::string prompt) {
                  if (id_to_word.empty()) return "Загрузи файлы и обучи меня.";
                  
                  // Принудительно начинаем с тега ответа, если он есть
                  std::string current_w = "A:";
                  if (!word_to_id.count(current_w)) current_w = id_to_word[0];
                  
                  std::string result = "";
                  int curr_id = word_to_id[current_w];

                  for (int i = 0; i < 20; i++) {
                      int best_id = -1;
                      float max_sim = -1e10;
                      
                      for (int next = 0; next < id_to_word.size(); next++) {
                          if (next == curr_id) continue;
                          float sim = 0;
                          for(int d=0; d<256; d++) sim += emb[curr_id*256+d] * emb[next*256+d];
                          
                          if (sim > max_sim) {
                              max_sim = sim;
                              best_id = next;
                          }
                      }
                      
                      if (best_id == -1 || id_to_word[best_id] == "U:") break; // Стоп, если ИИ захотел "стать пользователем"
                      curr_id = best_id;
                      result += id_to_word[curr_id] + " ";
                  }
                  return result;
              }
          };
          #endif
          EOF

          cat > app/src/main/cpp/aetherai_jni.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <vector>
          #include <sstream>
          #include "transformer.h"

          static QAEngine engine;
          static std::vector<int> tokens;

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_init(JNIEnv* env, jobject) {
              return engine.allocate() ? env->NewStringUTF("OK") : env->NewStringUTF("OOM");
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_aetherai_AIEngine_addText(JNIEnv* env, jobject, jstring text) {
              const char* c = env->GetStringUTFChars(text, nullptr);
              std::stringstream ss(c); std::string w;
              while(ss >> w) tokens.push_back(engine.get_id(w));
              env->ReleaseStringUTFChars(text, c);
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_trainStep(JNIEnv* env, jobject, jint step) {
              engine.train(tokens[step], tokens[step+1]);
              return env->NewStringUTF("OK");
          }

          extern "C" JNIEXPORT jint JNICALL
          Java_com_aetherai_AIEngine_getTokenCount(JNIEnv* env, jobject) {
              return tokens.size();
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_aetherai_AIEngine_generate(JNIEnv* env, jobject, jstring input) {
              const char* c = env->GetStringUTFChars(input, nullptr);
              std::string res = engine.generate_answer(c);
              env->ReleaseStringUTFChars(input, c);
              return env->NewStringUTF(res.c_str());
          }
          EOF

          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(aetherai)
          add_library(aetherai SHARED aetherai_jni.cpp)
          target_link_libraries(aetherai log)
          EOF

      - name: Create UI
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000" android:padding="10dp">
              <TextView android:id="@+id/status" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Status: Waiting" android:textColor="#00FFCC"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="match_parent" android:layout_above="@+id/inputArea" android:layout_below="@id/status">
                  <TextView android:id="@+id/chat" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFF" android:textSize="18sp"/>
              </ScrollView>
              <LinearLayout android:id="@+id/inputArea" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:orientation="vertical" android:background="#111">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                      <Button android:id="@+id/load" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="LOAD"/>
                      <Button android:id="@+id/train" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="TRAIN" android:backgroundTint="#FF4400" android:layout_marginLeft="10dp"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                      <EditText android:id="@+id/input" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:hint="Ask something..." android:textColor="#FFF"/>
                      <Button android:id="@+id/send" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text=">"/>
                  </LinearLayout>
              </LinearLayout>
          </RelativeLayout>
          EOF

      - name: Create Java Bridge
        run: |
          cat > app/src/main/java/com/aetherai/AIEngine.java << 'EOF'
          package com.aetherai;
          public class AIEngine {
              static { System.loadLibrary("aetherai"); }
              public native String init();
              public native void addText(String text);
              public native String trainStep(int step);
              public native int getTokenCount();
              public native String generate(String input);
          }
          EOF

          cat > app/src/main/java/com/aetherai/MainActivity.java << 'EOF'
          package com.aetherai;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.*;
          import android.content.Intent;
          import java.io.*;

          public class MainActivity extends Activity {
              AIEngine ai = new AIEngine();
              TextView chat, status; EditText input;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  chat = findViewById(R.id.chat); status = findViewById(R.id.status); input = findViewById(R.id.input);
                  new Thread(() -> ai.init()).start();

                  findViewById(R.id.load).setOnClickListener(v -> {
                      Intent it = new Intent(Intent.ACTION_GET_CONTENT);
                      it.setType("text/plain"); it.putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true);
                      startActivityForResult(it, 1);
                  });

                  findViewById(R.id.train).setOnClickListener(v -> {
                      int count = ai.getTokenCount();
                      new Thread(() -> {
                          for(int e=0; e<10; e++) { // 10 эпох для лучшего понимания QA
                              for(int i=0; i<count-1; i++) ai.trainStep(i);
                          }
                          runOnUiThread(() -> status.setText("AetherAI: Trained and Ready."));
                      }).start();
                  });

                  findViewById(R.id.send).setOnClickListener(v -> {
                      String q = input.getText().toString();
                      chat.append("\nYou: " + q);
                      new Thread(() -> {
                          String a = ai.generate(q);
                          runOnUiThread(() -> chat.append("\nAI: " + a));
                      }).start();
                      input.setText("");
                  });
              }

              @Override
              protected void onActivityResult(int req, int res, Intent data) {
                  if (data != null) {
                      new Thread(() -> {
                          try {
                              if (data.getClipData() != null) {
                                  for (int i=0; i<data.getClipData().getItemCount(); i++) readUri(data.getClipData().getItemAt(i).getUri());
                              } else readUri(data.getData());
                              runOnUiThread(() -> status.setText("Data Loaded. Press Train."));
                          } catch (Exception e) {}
                      }).start();
                  }
              }

              private void readUri(android.net.Uri uri) throws IOException {
                  InputStream is = getContentResolver().openInputStream(uri);
                  BufferedReader br = new BufferedReader(new InputStreamReader(is));
                  String line; while ((line = br.readLine()) != null) ai.addText(line + " ");
                  is.close();
              }
          }
          EOF

      - name: Gradle Configs
        run: |
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "include ':app'" > settings.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.aetherai'
              compileSdk 34
              defaultConfig { applicationId "com.aetherai.qa"; minSdk 26; targetSdk 34; ndk { abiFilters 'arm64-v8a' } }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="AetherAI QA" android:largeHeap="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherAI-QA-Engine
          path: app/build/outputs/apk/debug/app-debug.apk
