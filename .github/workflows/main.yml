name: Enjoer_Pro_Memory_Scanner
on: [push, workflow_dispatch]

jobs:
  build_mod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project Structure
        run: |
          # Создаем структуру папок стандартного Android приложения
          mkdir -p app/src/main/java/com/enjoer/scanner
          mkdir -p app/src/main/res/layout
          
          # Переносим твои декомпилированные ресурсы (если они есть в корне)
          # Если ты загрузил папку 'res', она попадет в сборку
          [ -d "res" ] && cp -r res/* app/src/main/res/ || echo "No res folder found"

          # --- Создаем файлы конфигурации Gradle ---
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.scanner'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.gigiarig.chickengun'
                  minSdk 24
                  targetSdk 34
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create Scanner Source Code
        run: |
          # Логика работы с памятью
          cat <<'EOF' > app/src/main/java/com/enjoer/scanner/MemoryManager.java
          package com.enjoer.scanner;
          import java.util.ArrayList;
          import java.util.List;
          public class MemoryManager {
              public static List<Long> foundAddresses = new ArrayList<>();
              public static void performScan(int value) {
                  foundAddresses.clear();
                  // Имитация для теста (в реальности нужен доступ к /proc/self/mem)
                  for (int i = 0; i < 3; i++) foundAddresses.add(0x70000000L + (i * 0x4));
              }
              public static void writeMemory(long address, int newValue) {
                  // Здесь будет код записи
              }
          }
          EOF

          # Интерфейс Мод-Меню
          cat <<'EOF' > app/src/main/java/com/enjoer/scanner/ModMenuService.java
          package com.enjoer.scanner;
          import android.app.*;
          import android.content.*;
          import android.graphics.PixelFormat;
          import android.view.*;
          import android.widget.*;
          public class ModMenuService extends Service {
              public void onCreate() {
                  super.onCreate();
                  WindowManager wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setBackgroundColor(0xEE000000);
                  layout.setPadding(20, 20, 20, 20);

                  EditText input = new EditText(this);
                  input.setHint("Что ищем?");
                  input.setTextColor(0xFFFFFFFF);
                  layout.addView(input);

                  Button btn = new Button(this);
                  btn.setText("ПОИСК");
                  layout.addView(btn);

                  ListView lv = new ListView(this);
                  ArrayAdapter<Long> adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, MemoryManager.foundAddresses);
                  lv.setAdapter(adapter);
                  layout.addView(lv);

                  lv.setOnItemClickListener((p, v, pos, id) -> {
                      long addr = MemoryManager.foundAddresses.get(pos);
                      showDialog(addr);
                  });

                  btn.setOnClickListener(v -> {
                      MemoryManager.performScan(Integer.parseInt(input.getText().toString()));
                      adapter.notifyDataSetChanged();
                  });

                  WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                      500, 800, WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  wm.addView(layout, params);
              }
              private void showDialog(long addr) {
                  // Здесь создается окно ввода нового значения
              }
              public android.os.IBinder onBind(Intent i) { return null; }
          }
          EOF

      - name: Patch Original Smali
        run: |
          # Вшиваем запуск меню во все найденные smali файлы (где есть onCreate)
          find . -name "*.smali" -exec sed -i '/onCreate(Landroid\/os\/Bundle;)V/,/.end method/ s/return-void/new-instance v0, Landroid\/content\/Intent;\n    const-class v1, Lcom\/enjoer\/scanner\/ModMenuService;\n    invoke-direct {v0, p0, v1}, Landroid\/content\/Intent;-><init>(Landroid\/content\/Context;Ljava/lang/Class;)V\n    invoke-virtual {p0, v0}, Landroid\/view\/ContextThemeWrapper;->startService(Landroid\/content\/Intent;)Landroid\/content\/ComponentName;\n    return-void/' {} +

      - name: Build and Sign APK
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload Modded APK
        uses: actions/upload-artifact@v4
        with:
          name: ChickenGun_Scanner_Mod
          path: app/build/outputs/apk/debug/*.apk
