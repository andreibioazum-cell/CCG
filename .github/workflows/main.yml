                  ll.addView(t1);

                  EditText e1 = new EditText(this);
                  e1.setText(b.arg1 != null ? b.arg1 : "");
                  ll.addView(e1);

                  TextView t2 = new TextView(this);
                  t2.setText("Параметр 2:");
