      - name: Create VPN Service
        run: |
          cat > app/src/main/java/com/dpibypass/pro/VpnService.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.content.Intent; import android.os.ParcelFileDescriptor;
          import java.io.*; import java.nio.ByteBuffer; import java.util.*;

          public class VpnService extends android.net.VpnService {
              private ParcelFileDescriptor vpn;
              private Thread thread;
              private volatile boolean running = false;
              private PacketEngine engine = new PacketEngine();
              
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if(running) return START_STICKY;
                  
                  boolean autoMode = intent.getBooleanExtra("auto_mode", true);
                  String[] whitelist = intent.getStringArrayExtra("whitelist");
                  String[] blacklist = intent.getStringArrayExtra("blacklist");
                  
                  engine.setAutoMode(autoMode);
                  if(whitelist != null) engine.setWhitelist(whitelist);
                  if(blacklist != null) engine.setBlacklist(blacklist);
                  
                  Builder builder = new Builder();
                  builder.setSession("DPI Bypass PRO");
                  builder.setMtu(1500);
                  builder.addAddress("10.0.0.2", 24);
                  builder.addRoute("0.0.0.0", 0);
                  builder.addDnsServer("1.1.1.1");
                  builder.addDnsServer("8.8.8.8");
                  
                  vpn = builder.establish();
                  if(vpn == null) return START_NOT_STICKY;
                  
                  running = true;
                  thread = new Thread(() -> {
                      FileInputStream in = new FileInputStream(vpn.getFileDescriptor());
                      FileOutputStream out = new FileOutputStream(vpn.getFileDescriptor());
                      ByteBuffer buffer = ByteBuffer.allocate(32768);
                      
                      try {
                          while(running) {
                              buffer.clear();
                              int len = in.read(buffer.array());
                              if(len > 0) {
                                  byte[] packet = new byte[len];
                                  System.arraycopy(buffer.array(), 0, packet, 0, len);
                                  
                                  ArrayList<byte[]> processed = engine.processPacket(packet);
                                  if(processed != null) {
                                      for(byte[] p : processed) out.write(p);
                                  }
                              }
                          }
                      } catch(Exception e) {}
                  });
                  thread.start();
                  
                  MainActivity.updateStatus(true);
                  return START_STICKY;
              }
              
              @Override
              public void onDestroy() {
                  running = false;
                  if(thread != null) thread.interrupt();
                  if(vpn != null) try { vpn.close(); } catch(Exception e) {}
                  MainActivity.updateStatus(false);
                  super.onDestroy();
              }
              
              public PacketEngine getEngine() { return engine; }
          }
          JAVAEOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/dpibypass/pro/MainActivity.java << 'JAVAEOF'
          package com.dpibypass.pro;
          import android.app.Activity; import android.content.*; import android.os.Bundle;
          import android.widget.*; import android.graphics.Color; import android.view.*;
          import java.util.*;

          public class MainActivity extends Activity {
              private static TextView statusView, statsView;
              private Switch mainSwitch, autoSwitch;
              private EditText whitelistEdit, blacklistEdit;
              private TextView strategyStatsView;
              private Timer timer;
              private PacketEngine engine = new PacketEngine();
              
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  
                  ScrollView scroll = new ScrollView(this);
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(40, 40, 40, 40);
                  root.setBackgroundColor(0xFF0a0e27);
                  
                  TextView title = new TextView(this);
                  title.setText("🛡️ DPI BYPASS PRO");
                  title.setTextSize(28);
                  title.setTextColor(Color.WHITE);
                  title.setPadding(0, 0, 0, 30);
                  root.addView(title);
                  
                  mainSwitch = new Switch(this);
                  mainSwitch.setText("Защита");
                  mainSwitch.setTextSize(20);
                  mainSwitch.setTextColor(Color.WHITE);
                  mainSwitch.setOnCheckedChangeListener((v, c) -> {
                      if(c) startVpn(); else stopVpn();
                  });
                  root.addView(mainSwitch);
                  
                  autoSwitch = new Switch(this);
                  autoSwitch.setText("🤖 Автоматический режим (умный выбор методов)");
                  autoSwitch.setTextSize(16);
                  autoSwitch.setTextColor(Color.WHITE);
                  autoSwitch.setChecked(true);
                  root.addView(autoSwitch);
                  
                  statusView = new TextView(this);
                  statusView.setText("● ВЫКЛЮЧЕНО");
                  statusView.setTextSize(18);
                  statusView.setTextColor(0xFFff4757);
                  statusView.setPadding(0, 20, 0, 10);
                  root.addView(statusView);
                  
                  statsView = new TextView(this);
                  statsView.setText("Пакетов: 0 | Модифицировано: 0");
                  statsView.setTextSize(14);
                  statsView.setTextColor(0xFF747d8c);
                  root.addView(statsView);
                  
                  TextView methodsTitle = new TextView(this);
                  methodsTitle.setText("\n⚙️ Поддерживаемые методы:");
                  methodsTitle.setTextSize(16);
                  methodsTitle.setTextColor(Color.WHITE);
                  root.addView(methodsTitle);
                  
                  String[] methods = {
                      "✅ Мини-фрагментация (2 байта)",
                      "✅ Средняя фрагментация (40 байт)",
                      "✅ Умная фрагментация (перед SNI)",
                      "✅ Fake SYN packets",
                      "✅ TTL manipulation",
                      "✅ Disorder (обратный порядок)",
                      "✅ Split2 (двойное разбиение)",
                      "✅ MD5 Signature fake",
                      "✅ HTTP Host split",
                      "✅ Комбинированный режим"
                  };
                  
                  for(String m : methods) {
                      TextView tv = new TextView(this);
                      tv.setText(m);
                      tv.setTextSize(12);
                      tv.setTextColor(0xFF95afc0);
                      tv.setPadding(10, 5, 10, 5);
                      root.addView(tv);
                  }
                  
                  TextView filterTitle = new TextView(this);
                  filterTitle.setText("\n🔍 Фильтры доменов:");
                  filterTitle.setTextSize(16);
                  filterTitle.setTextColor(Color.WHITE);
                  root.addView(filterTitle);
                  
                  TextView whiteLabel = new TextView(this);
                  whiteLabel.setText("Whitelist (через запятую, * для wildcard):");
                  whiteLabel.setTextSize(12);
                  whiteLabel.setTextColor(0xFF95afc0);
                  whiteLabel.setPadding(0, 10, 0, 5);
                  root.addView(whiteLabel);
                  
                  whitelistEdit = new EditText(this);
                  whitelistEdit.setHint("*.google.com, *.microsoft.com");
                  whitelistEdit.setTextColor(Color.WHITE);
                  whitelistEdit.setHintTextColor(0xFF57606f);
                  whitelistEdit.setBackgroundColor(0xFF1a1a2e);
                  whitelistEdit.setPadding(15, 15, 15, 15);
                  root.addView(whitelistEdit);
                  
                  TextView blackLabel = new TextView(this);
                  blackLabel.setText("Blacklist (обрабатывать только эти):");
                  blackLabel.setTextSize(12);
                  blackLabel.setTextColor(0xFF95afc0);
                  blackLabel.setPadding(0, 10, 0, 5);
                  root.addView(blackLabel);
                  
                  blacklistEdit = new EditText(this);
                  blacklistEdit.setHint("*.youtube.com, *.twitter.com");
                  blacklistEdit.setTextColor(Color.WHITE);
                  blacklistEdit.setHintTextColor(0xFF57606f);
                  blacklistEdit.setBackgroundColor(0xFF1a1a2e);
                  blacklistEdit.setPadding(15, 15, 15, 15);
                  root.addView(blacklistEdit);
                  
                  Button statsBtn = new Button(this);
                  statsBtn.setText("📊 Показать статистику стратегий");
                  statsBtn.setTextColor(Color.WHITE);
                  statsBtn.setBackgroundColor(0xFF2f3542);
                  statsBtn.setOnClickListener(v -> showStrategyStats());
                  LinearLayout.LayoutParams btnParams = new LinearLayout.LayoutParams(-1, -2);
                  btnParams.setMargins(0, 20, 0, 0);
                  statsBtn.setLayoutParams(btnParams);
                  root.addView(statsBtn);
                  
                  strategyStatsView = new TextView(this);
                  strategyStatsView.setText("");
                  strategyStatsView.setTextSize(10);
                  strategyStatsView.setTextColor(0xFF95afc0);
                  strategyStatsView.setPadding(10, 10, 10, 10);
                  strategyStatsView.setTypeface(android.graphics.Typeface.MONOSPACE);
                  root.addView(strategyStatsView);
                  
                  scroll.addView(root);
                  setContentView(scroll);
                  
                  timer = new Timer();
                  timer.scheduleAtFixedRate(new TimerTask() {
                      @Override
                      public void run() {
                          updateStats();
                      }
                  }, 1000, 2000);
              }
              
              private void startVpn() {
                  Intent intent = android.net.VpnService.prepare(this);
                  if(intent != null) {
                      startActivityForResult(intent, 100);
                  } else {
                      activateVpn();
                  }
              }
              
              private void stopVpn() {
                  stopService(new Intent(this, VpnService.class));
              }
              
              @Override
              protected void onActivityResult(int req, int res, Intent data) {
                  if(req == 100 && res == RESULT_OK) {
                      activateVpn();
                  } else {
                      mainSwitch.setChecked(false);
                  }
              }
              
              private void activateVpn() {
                  Intent svc = new Intent(this, VpnService.class);
                  svc.putExtra("auto_mode", autoSwitch.isChecked());
                  
                  String white = whitelistEdit.getText().toString().trim();
                  if(!white.isEmpty()) {
                      svc.putExtra("whitelist", white.split(",\\s*"));
                  }
                  
                  String black = blacklistEdit.getText().toString().trim();
                  if(!black.isEmpty()) {
                      svc.putExtra("blacklist", black.split(",\\s*"));
                  }
                  
                  startService(svc);
              }
              
              public static void updateStatus(boolean active) {
                  if(statusView != null) {
                      statusView.post(() -> {
                          statusView.setText(active ? "● АКТИВНО" : "● ВЫКЛЮЧЕНО");
                          statusView.setTextColor(active ? 0xFF2ed573 : 0xFFff4757);
                      });
                  }
              }
              
              private void updateStats() {
                  runOnUiThread(() -> {
                      long total = engine.getTotalPackets();
                      long modified = engine.getModifiedPackets();
                      statsView.setText(String.format("Пакетов: %d | Модифицировано: %d (%.1f%%)",
                          total, modified, total > 0 ? (modified * 100.0 / total) : 0));
                  });
              }
              
              private void showStrategyStats() {
                  String stats = engine.getStrategyStats();
                  strategyStatsView.setText(stats);
              }
              
              @Override
              protected void onDestroy() {
                  if(timer != null) timer.cancel();
                  super.onDestroy();
              }
          }
          JAVAEOF

