name: Enjoer_6.1_Full_Native_Power
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Hybrid Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # --- КРИТИЧЕСКИЙ С++ СЛОЙ (NDK) ---
          # Здесь вся математика, которую мы забрали у Java
          cat <<'CPPSOURCE' > app/src/main/cpp/native-lib.cpp
          #include <jni.h>
          #include <vector>
          #include <cmath>
          #include <algorithm>

          struct Block {
              float x, y, z, sx, sy, sz;
              float minX() { return x - sx/2.0f; }
              float maxX() { return x + sx/2.0f; }
              float minY() { return y - sy/2.0f; }
              float maxY() { return y + sy/2.0f; }
              float minZ() { return z - sz/2.0f; }
              float maxZ() { return z + sz/2.0f; }
          };

          std::vector<Block> blocks;

          extern "C" JNIEXPORT void JNICALL
          Java_com_enjoer_game_GameRenderer_syncBlocks(JNIEnv* env, jobject thiz, jfloatArray data) {
              jfloat* items = env->GetFloatArrayElements(data, 0);
              jsize len = env->GetArrayLength(data);
              blocks.clear();
              for(int i=0; i<len; i+=6) {
                  blocks.push_back({items[i], items[i+1], items[i+2], items[i+3], items[i+4], items[i+5]});
              }
              env->ReleaseFloatArrayElements(data, items, 0);
          }

          extern "C" JNIEXPORT jfloatArray JNICALL
          Java_com_enjoer_game_GameRenderer_computePhysics(JNIEnv* env, jobject thiz, 
              jfloat pX, jfloat pY, jfloat pZ, jfloat vY, jfloat mX, jfloat mZ, jfloat radP, jfloat hP) {
              
              float nX = pX + mX;
              float nY = pY + vY;
              float nZ = pZ + mZ;
              float fY = nY - hP; // Floor check height

              if (fY < 0.0f) { nY = hP; } 

              for (auto& b : blocks) {
                  if (nX + radP > b.minX() && nX - radP < b.maxX() && nZ + radP > b.minZ() && nZ - radP < b.maxZ()) {
                      if (pY - hP >= b.maxY() - 0.15f && fY < b.maxY()) {
                          nY = b.maxY() + hP;
                      } else if (fY < b.maxY() - 0.1f && nY > b.minY() + 0.1f) {
                          float oX1 = (nX + radP) - b.minX();
                          float oX2 = b.maxX() - (nX - radP);
                          float oZ1 = (nZ + radP) - b.minZ();
                          float oZ2 = b.maxZ() - (nZ - radP);
                          float minO = std::min({oX1, oX2, oZ1, oZ2});
                          if (minO == oX1) nX = b.minX() - radP;
                          else if (minO == oX2) nX = b.maxX() + radP;
                          else if (minO == oZ1) nZ = b.minZ() - radP;
                          else nZ = b.maxZ() + radP;
                      }
                  }
              }
              jfloatArray res = env->NewFloatArray(3);
              float out[3] = {nX, nY, nZ};
              env->SetFloatArrayRegion(res, 0, 3, out);
              return res;
          }
          CPPSOURCE

          # --- JAVA RENDERER (С ГРАФИКОЙ И JNI) ---
          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              static { System.loadLibrary("enjoer_native"); }
              private native void syncBlocks(float[] data);
              private native float[] computePhysics(float x, float y, float z, float vy, float mx, float mz, float rp, float hp);

              public float pX=0, pY=6, pZ=15, rY=0, rX=0, jX=0, jY=0, vY=0;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              private final float[] proj=new float[16], view=new float[16], model=new float[16];
              private int prog;
              private FloatBuffer vBuf, nBuf;
              private static final float PLAYER_HEIGHT=3.2f, PLAYER_RADIUS=0.5f;

              // Твои шейдеры со звёздами и пост-обработкой
              private final String VS = "#version 300 es\nlayout(location=0)in vec4 aP;layout(location=1)in vec3 aN;uniform mat4 uMVP,uM;out vec3 vN,vP;void main(){vP=vec3(uM*aP);vN=normalize(mat3(uM)*aN);gl_Position=uMVP*aP;}";
              private final String FS = "#version 300 es\nprecision highp float;in vec3 vN,vP;uniform vec3 camP;uniform vec4 uC;out vec4 fC;float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}vec3 sky(vec3 d){float t=d.y*.5+.5;vec3 b=mix(vec3(.005,.01,.03),vec3(.0,.2,.5),t);if(d.y>0.05){vec2 uv=d.xz/(d.y+.001);vec2 id=floor(uv*80.);if(hash(id)>.97){float tw=sin(hash(id)*6.28)*.3+.7;b+=vec3(1.)*smoothstep(.15,.0,length(fract(uv*80.)-.5))*tw;}}return b;}void main(){vec3 n=normalize(vN),vD=normalize(camP-vP),lD=normalize(vec3(.4,1.,.2));float diff=max(dot(n,lD),0.);vec3 col=uC.rgb*(diff+.2);fC=vec4(mix(col,sky(vD),clamp(length(camP-vP)*.006,0.,.9)),uC.a);}";

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  prog = GLES30.glCreateProgram();
                  int vsh = GLES30.glCreateShader(35633); GLES30.glShaderSource(vsh, VS); GLES30.glCompileShader(vsh);
                  int fsh = GLES30.glCreateShader(35632); GLES30.glShaderSource(fsh, FS); GLES30.glCompileShader(fsh);
                  GLES30.glAttachShader(prog, vsh); GLES30.glAttachShader(prog, fsh); GLES30.glLinkProgram(prog);
                  float[] vc={-.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, -.5f,.5f,-.5f, -.5f,.5f,.5f, .5f,.5f,-.5f, .5f,.5f,.5f, -.5f,-.5f,-.5f, -.5f,-.5f,.5f, .5f,-.5f,-.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, -.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, .5f,.5f,.5f, .5f,-.5f,.5f};
                  vBuf=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc);vBuf.position(0);
              }

              private void update() {
                  float s=0.35f, rad=(float)Math.toRadians(rY);
                  float mX=((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*s;
                  float mZ=((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*s;
                  vY-=.025f;

                  float[] bData = new float[blocks.size()*6];
                  for(int i=0; i<blocks.size(); i++){
                      Block b=blocks.get(i); bData[i*6]=b.x; bData[i*6+1]=b.y; bData[i*6+2]=b.z;
                      bData[i*6+3]=b.sx; bData[i*6+4]=b.sy; bData[i*6+5]=b.sz;
                  }
                  syncBlocks(bData);
                  float[] nP = computePhysics(pX, pY, pZ, vY, mX, mZ, PLAYER_RADIUS, PLAYER_HEIGHT);
                  pX=nP[0]; pY=nP[1]; pZ=nP[2];
                  if(pY <= PLAYER_HEIGHT) vY=0;
              }

              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClear(16640);
                  // Отрисовка блоков (использует твой метод draw из оригинала)
                  // ...
              }
              @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,55,(float)w/h,.1f,500f); }
          }
          RENDERER

          # --- (ОСТАЛЬНЫЕ ФАЙЛЫ: MainActivity, Block.java, Res, Manifest — копируются из оригинала) ---
          # [Используются твои XML макеты с кнопками EDITOR, PLAY и джойстиками]
          # ...

          # --- CMAKE ДЛЯ СБОРКИ ---
          cat <<EOF > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          add_library(enjoer_native SHARED native-lib.cpp)
          target_link_libraries(enjoer_native log)
          EOF

          # --- BUILD.GRADLE С ПОДДЕРЖКОЙ NDK ---
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild { cmake { cppFlags "-std=c++17" } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug
