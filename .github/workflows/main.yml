name: Enjoer_6.2_Final_Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/python

          # Настройки проекта
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # Python скрипт
          cat <<EOF > app/src/main/python/main.py
          def run_script(count):
              return f"Python: Scene has {count} objects"
          EOF

          # Ресурсы (Кнопки и темы)
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/><solid android:color="#101820"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/btn_blue_filled.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/><solid android:color="#00BFFF"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/btn_red.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/><solid android:color="#101820"/><stroke android:width="2dp" android:color="#FF4444"/>
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/panel_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/><solid android:color="#E6101820"/><stroke android:width="1dp" android:color="#00BFFF"/>
          </shape>
          EOF

          # UI (DeSelect перенесен в axis_panel, которая скрывается целиком)
          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#02050A">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view"
                  android:layout_width="match_parent" android:layout_height="match_parent"/>
              <RelativeLayout android:id="@+id/engine_ui" android:layout_width="match_parent" 
                  android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/engine_touch_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" 
                      android:layout_alignParentTop="true" android:orientation="horizontal" android:padding="10dp">
                      <Button android:id="@+id/btn_python" android:layout_width="60dp" android:layout_height="50dp" 
                          android:text="PY" android:background="@drawable/btn_blue" android:textColor="#FFD700"/>
                      <View android:layout_width="0dp" android:layout_height="1dp" android:layout_weight="1"/>
                      <Button android:id="@+id/btn_delete" android:layout_width="100dp" android:layout_height="50dp" 
                          android:text="DELETE" android:background="@drawable/btn_red" android:textColor="#FF4444" android:visibility="gone"/>
                  </LinearLayout>
                  <LinearLayout android:id="@+id/axis_panel" android:layout_width="wrap_content" android:layout_height="wrap_content" 
                      android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="20dp" 
                      android:orientation="horizontal" android:background="@drawable/panel_bg" android:padding="8dp" android:visibility="gone">
                      <Button android:id="@+id/axis_x" android:layout_width="50dp" android:layout_height="50dp" android:text="X+"/>
                      <Button android:id="@+id/axis_y" android:layout_width="50dp" android:layout_height="50dp" android:text="Y+" android:layout_marginLeft="5dp"/>
                      <Button android:id="@+id/btn_deselect" android:layout_width="100dp" android:layout_height="50dp" 
                          android:text="DESELECT" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="15dp"/>
                  </LinearLayout>
              </RelativeLayout>
              <LinearLayout android:id="@+id/menu_ui" android:layout_width="match_parent" android:layout_height="match_parent"
                  android:orientation="vertical" android:gravity="center">
                  <Button android:id="@+id/btn_engine" android:layout_width="200dp" android:layout_height="60dp" 
                      android:text="START ENGINE" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
              </LinearLayout>
          </FrameLayout>
          LAYOUT

          # Java: Логика скрытия кнопок
          cat <<'MAINACT' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import com.chaquo.python.Python;
          import com.chaquo.python.PyObject;
          import com.chaquo.python.android.AndroidPlatform;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private View axisPanel, engineUI, menuUI, btnDelete;

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  if (!Python.isStarted()) Python.start(new AndroidPlatform(this));
                  
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  axisPanel = findViewById(R.id.axis_panel);
                  engineUI = findViewById(R.id.engine_ui);
                  menuUI = findViewById(R.id.menu_ui);
                  btnDelete = findViewById(R.id.btn_delete);

                  findViewById(R.id.btn_engine).setOnClickListener(v -> {
                      menuUI.setVisibility(View.GONE);
                      engineUI.setVisibility(View.VISIBLE);
                      ren.isEngineMode = true;
                  });

                  findViewById(R.id.btn_python).setOnClickListener(v -> {
                      try {
                          PyObject obj = Python.getInstance().getModule("main").callAttr("run_script", ren.blocks.size());
                          Toast.makeText(this, obj.toString(), Toast.LENGTH_SHORT).show();
                      } catch (Exception e) { Toast.makeText(this, "Py Error", Toast.LENGTH_SHORT).show(); }
                  });

                  findViewById(R.id.btn_deselect).setOnClickListener(v -> {
                      ren.selectedIndex = -1;
                      updateUI();
                  });

                  findViewById(R.id.engine_touch_zone).setOnTouchListener((v, e) -> {
                      if(e.getAction() == MotionEvent.ACTION_UP) {
                          // Здесь твоя логика выбора объекта
                          // ren.selectedIndex = ren.raycastBlock(e.getX(), e.getY());
                          updateUI();
                      }
                      return true;
                  });
              }

              private void updateUI() {
                  runOnUiThread(() -> {
                      int vis = (ren.selectedIndex >= 0) ? View.VISIBLE : View.GONE;
                      axisPanel.setVisibility(vis);
                      btnDelete.setVisibility(vis);
                  });
              }
          }
          MAINACT

          # GameRenderer и Block (возвращены в полном объеме)
          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;
          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) {
                  this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b;
              }
          }
          EOF

          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public boolean isEngineMode = false;
              public int selectedIndex = -1;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) { GLES30.glClearColor(0,0,0,1); }
              @Override public void onSurfaceChanged(GL10 gl, int w, int h) { GLES30.glViewport(0,0,w,h); }
              @Override public void onDrawFrame(GL10 gl) { GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT); }
          }
          RENDERER

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer 6.2" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Gradle файлы
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral(); maven { url "https://chaquo.com/maven" } }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'com.chaquo.python:gradle:15.0.1'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'com.chaquo.python' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  ndk { abiFilters "armeabi-v7a", "arm64-v8a" }
                  python { buildPython "python3" }
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_6.2_Final
          path: app/build/outputs/apk/debug/app-debug.apk
