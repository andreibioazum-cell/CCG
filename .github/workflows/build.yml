name: Build Mod Menu
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
      - name: Build with ndk-build
        run: |
          cd app/src/main/jni
          ndk-build
      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: my-mod-library
          path: app/src/main/libs/
