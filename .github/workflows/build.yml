name: Generate_My_Bypass_APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Clone and Prepare
        run: |
          # Клонируем в отдельную папку temp_dir
          git clone https://github.com/dovecoteescapee/ByeDPIAndroid.git temp_dir
          # Переносим всё содержимое в текущую папку
          cp -rn temp_dir/* ./
          cp -rn temp_dir/.[^.]* ./ || true
          # Удаляем временную папку
          rm -rf temp_dir

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My_Bypass_Tool_Final
          path: app/build/outputs/apk/debug/*.apk
