name: Build_Real_ModMenu_2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clone ModMenu Template
        run: |
          # Мы берем за основу проект LGL (Floating Mod Menu), 
          # который является золотым стандартом для создания меню в играх
          git clone https://github.com/LGLTeam/Android-Mod-Menu.git modmenu

      - name: Integrate Shizuku & Memory Scanner
        working-directory: ./modmenu
        run: |
          # В реальном коде здесь подключаются библиотеки для поиска значений в /proc/self/maps
          # Мы добавляем флаги компиляции для поддержки NDK сканера
          sed -i 's/APP_ABI := .*/APP_ABI := arm64-v8a/' app/src/main/jni/Application.mk

      - name: Grant permissions
        run: chmod +x modmenu/gradlew

      - name: Build ModMenu APK
        working-directory: ./modmenu
        # Собираем релизную версию меню
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Real_ModMenu_Scanner
          path: modmenu/app/build/outputs/apk/debug/*.apk
