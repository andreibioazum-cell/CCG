name: KUSMAN_V1_COMMANDS
on: [push, workflow_dispatch]

jobs:
  fabric-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Project Structure
        run: |
          mkdir -p src/main/java/com/kusman/mixin
          mkdir -p src/main/resources
          
          # 1. settings.gradle
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = "https://maven.fabricmc.net/" }
                  gradlePluginPortal()
              }
          }
          rootProject.name = 'kusman_mod'
          EOF

          # 2. build.gradle
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.2-SNAPSHOT' }
          repositories {
              maven { url = "https://maven.fabricmc.net/" }
              mavenCentral()
          }
          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.14.21"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.83.0+1.20.1"
          }
          EOF

          # 3. fabric.mod.json
          cat <<EOF > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "kusman_core",
            "version": "1.1.0",
            "name": "Kusman Core",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] },
            "mixins": [ "kusman.mixins.json" ],
            "depends": { "fabricloader": ">=0.14.21", "minecraft": "~1.20.1" }
          }
          EOF

          # 4. kusman.mixins.json
          cat <<EOF > src/main/resources/kusman.mixins.json
          {
            "required": true,
            "minCompatibilityLevel": "JAVA_17",
            "package": "com.kusman.mixin",
            "mixins": [ "XRayMixin", "ChatMixin" ]
          }
          EOF

          # 5. KusmanClient.java (Логика и Хранение настроек)
          cat <<EOF > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.network.packet.c2s.play.PlayerInteractEntityC2SPacket;
          import net.minecraft.text.Text;
          import net.minecraft.util.Hand;

          public class KusmanClient implements ClientModInitializer {
              public static boolean xrayEnabled = false;
              public static boolean killauraEnabled = false;

              @Override
              public void onInitializeClient() {
                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player != null && killauraEnabled) {
                          for (PlayerEntity target : client.world.getPlayers()) {
                              if (target != client.player && !target.isDead() && client.player.distanceTo(target) <= 4.5) {
                                  if (client.player.getAttackCooldownProgress(0) >= 1.0f) {
                                      client.getNetworkHandler().sendPacket(PlayerInteractEntityC2SPacket.attack(target, false));
                                      client.player.swingHand(Hand.MAIN_HAND);
                                  }
                              }
                          }
                      }
                  });
              }

              public static void handleCommand(String msg) {
                  MinecraftClient mc = MinecraftClient.getInstance();
                  String[] args = msg.toLowerCase().split(" ");
                  if (args.length < 1) return;

                  if (args[0].equals(".xray")) {
                      xrayEnabled = !xrayEnabled;
                      mc.worldRenderer.reload(); // Перерисовка чанков для XRay
                      mc.player.sendMessage(Text.of("§6[K] XRay: " + (xrayEnabled ? "§aON" : "§cOFF")), false);
                  } else if (args[0].equals(".aura")) {
                      killauraEnabled = !killauraEnabled;
                      mc.player.sendMessage(Text.of("§6[K] KillAura: " + (killauraEnabled ? "§aON" : "§cOFF")), false);
                  }
              }
          }
          EOF

          # 6. ChatMixin.java (Перехват сообщений)
          cat <<EOF > src/main/java/com/kusman/mixin/ChatMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.client.network.ClientPlayerEntity;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(ClientPlayerEntity.class)
          public class ChatMixin {
              @Inject(method = "sendChatMessage", at = @At("HEAD"), cancellable = true)
              private void onSendMessage(String message, CallbackInfo ci) {
                  if (message.startsWith(".")) {
                      KusmanClient.handleCommand(message);
                      ci.cancel(); // Сообщение не отправляется на сервер
                  }
              }
          }
          EOF

          # 7. XRayMixin.java
          cat <<EOF > src/main/java/com/kusman/mixin/XRayMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.block.*;
          import net.minecraft.util.math.BlockPos;
          import net.minecraft.util.math.Direction;
          import net.minecraft.world.BlockView;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

          @Mixin(AbstractBlock.class)
          public abstract class XRayMixin {
              @Inject(method = "getAmbientOcclusionLightValue", at = @At("HEAD"), cancellable = true)
              private void onLight(BlockState state, BlockView world, BlockPos pos, CallbackInfoReturnable<Float> cir) {
                  if (KusmanClient.xrayEnabled) cir.setReturnValue(1.0f);
              }
              @Inject(method = "isSideInvisible", at = @At("HEAD"), cancellable = true)
              private void onSide(BlockState state, BlockState stateFrom, Direction direction, CallbackInfoReturnable<Boolean> cir) {
                  if (KusmanClient.xrayEnabled) {
                      boolean isOre = state.getBlock() instanceof OreBlock || state.getBlock() == Blocks.DIAMOND_BLOCK;
                      cir.setReturnValue(!isOre);
                  }
              }
          }
          EOF

      - name: Build with Gradle 8.1
        run: |
          gradle wrapper --gradle-version 8.1
          ./gradlew build --no-daemon

      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-Command-Mod
          path: build/libs/*.jar
