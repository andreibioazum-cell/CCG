name: KUSMAN_V3_FINAL
on: [push, workflow_dispatch]

jobs:
  build-fabric-mod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Scaffold Project Structure
        run: |
          mkdir -p src/main/java/com/kusman/mixin
          mkdir -p src/main/resources

          # 1. settings.gradle
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'kusman_mod'" >> settings.gradle

          # 2. build.gradle (Loom 1.7 - самая стабильная версия)
          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.0+1.20.1"
          }
          EOF

          # 3. fabric.mod.json
          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "kusman",
            "version": "3.0.0",
            "name": "Kusman Core V3",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] },
            "mixins": [ "kusman.mixins.json" ],
            "depends": { "fabricloader": ">=0.15.11", "minecraft": "1.20.1" }
          }
          EOF

          # 4. Mixin Configuration
          echo '{"required":true,"package":"com.kusman.mixin","mixins":["XRayMixin","ChatMixin"]}' > src/main/resources/kusman.mixins.json

          # 5. KusmanClient.java (KillAura + Command Logic)
          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.network.packet.c2s.play.PlayerInteractEntityC2SPacket;
          import net.minecraft.text.Text;
          import net.minecraft.util.Hand;

          public class KusmanClient implements ClientModInitializer {
              public static boolean xray = false;
              public static boolean aura = false;

              @Override
              public void onInitializeClient() {
                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player != null && aura) {
                          for (PlayerEntity target : client.world.getPlayers()) {
                              if (target != client.player && !target.isDead() && client.player.distanceTo(target) <= 4.5) {
                                  if (client.player.getAttackCooldownProgress(0) >= 1.0f) {
                                      client.getNetworkHandler().sendPacket(PlayerInteractEntityC2SPacket.attack(target, false));
                                      client.player.swingHand(Hand.MAIN_HAND);
                                  }
                              }
                          }
                      }
                  });
              }

              public static void exec(String msg) {
                  MinecraftClient mc = MinecraftClient.getInstance();
                  if (msg.equalsIgnoreCase(".xray")) {
                      xray = !xray;
                      mc.worldRenderer.reload();
                      mc.player.sendMessage(Text.literal("§6[K] XRay: " + (xray ? "§aON" : "§cOFF")), false);
                  } else if (msg.equalsIgnoreCase(".aura")) {
                      aura = !aura;
                      mc.player.sendMessage(Text.literal("§6[K] Aura: " + (aura ? "§aON" : "§cOFF")), false);
                  }
              }
          }
          EOF

          # 6. ChatMixin.java
          cat <<'EOF' > src/main/java/com/kusman/mixin/ChatMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.client.network.ClientPlayerEntity;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(ClientPlayerEntity.class)
          public class ChatMixin {
              @Inject(method = "sendChatMessage", at = @At("HEAD"), cancellable = true)
              private void onSend(String message, CallbackInfo ci) {
                  if (message.startsWith(".")) {
                      KusmanClient.exec(message);
                      ci.cancel();
                  }
              }
          }
          EOF

          # 7. XRayMixin.java
          cat <<'EOF' > src/main/java/com/kusman/mixin/XRayMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.block.*;
          import net.minecraft.util.math.BlockPos;
          import net.minecraft.util.math.Direction;
          import net.minecraft.world.BlockView;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

          @Mixin(AbstractBlock.class)
          public abstract class XRayMixin {
              @Inject(method = "getAmbientOcclusionLightValue", at = @At("HEAD"), cancellable = true)
              private void onLight(BlockState s, BlockView w, BlockPos p, CallbackInfoReturnable<Float> cir) {
                  if (KusmanClient.xray) cir.setReturnValue(1.0f);
              }
              @Inject(method = "isSideInvisible", at = @At("HEAD"), cancellable = true)
              private void onSide(BlockState s, BlockState sf, Direction d, CallbackInfoReturnable<Boolean> cir) {
                  if (KusmanClient.xray) {
                      boolean ore = s.getBlock() instanceof OreBlock || s.getBlock() == net.minecraft.block.Blocks.DIAMOND_BLOCK;
                      cir.setReturnValue(!ore);
                  }
              }
          }
          EOF

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V3-Final
          path: build/libs/*.jar
