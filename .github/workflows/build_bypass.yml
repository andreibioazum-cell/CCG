name: Generate_My_Bypass_APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean and Clone
        run: |
          # Удаляем всё лишнее, чтобы git clone сработал в текущую папку
          rm -rf ./* ./.git
          git clone https://github.com/dovecoteescapee/ByeDPIAndroid.git .

      - name: Prepare Bypass Core
        run: |
          # Вшиваем настройки обхода прямо в код уведомления или конфиг
          # Параметры: -s 1 (split), -o 1 (disorder), -f -1 (fake packet)
          sed -i 's/args = ""/args = "-s 1 -o 1 -f -1 -k 1"/' app/src/main/java/org/byedpi/manager/ServiceNotification.java || true

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My_Bypass_Tool_Final
          path: app/build/outputs/apk/debug/*.apk
